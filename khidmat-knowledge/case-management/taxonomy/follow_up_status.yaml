version: "1.0.0"
domain: case_management
file: taxonomy/follow_up_status.yaml
status: active

purpose: >
  Classification of a Follow-up's lifecycle status. Added per Phase 1.4
  Canonical Taxonomy Completion, resolving the taxonomy_ref left
  unauthored when the Follow-up entity was introduced at Phase 1.2 (see
  case-management/ontology/data-properties.yaml#follow_up_status).

schemes:
  - id: follow_up_status
    description: >
      The lifecycle status of a scheduled or completed case-level follow-up
      review or monitoring activity.
    concepts:
      - id: scheduled
        description: The follow-up has a due date and has not yet occurred.
      - id: completed
        description: The follow-up was conducted; see follow_up_outcome_notes.
      - id: missed
        description: The follow-up's due date passed without it being conducted.
      - id: cancelled
        description: The follow-up was cancelled before its due date, e.g. because the case closed.
      - id: rescheduled
        description: The follow-up's due date was changed to a new date.
