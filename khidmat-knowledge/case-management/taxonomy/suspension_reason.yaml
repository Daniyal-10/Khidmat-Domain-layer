version: "1.1.0"
domain: case_management
file: taxonomy/suspension_reason.yaml
status: active

purpose: >
  Reason for suspending a case.

schemes:
  # Renamed from suspension_reason to case_suspension_reason per Phase 1.4
  # Canonical Taxonomy Completion: this scheme id collided with
  # beneficiary-lifecycle/taxonomy/suspension-reasons.yaml's own
  # suspension_reason scheme (a genuinely different concept — why a
  # beneficiary's lifecycle engagement was suspended, not why a case was
  # suspended). No taxonomy_ref in the repository currently targeted this
  # scheme by its old bare id (confirmed by search before renaming), so
  # this rename has zero consumers to update.
  - id: case_suspension_reason
    description: >
      Reason for suspending a case.
    concepts:
      - id: subject_unavailable
        description: Subject is temporarily unavailable.
      - id: resource_constraint
        description: Lack of resources to continue.
      - id: safety_concern
        description: Suspended due to safety concerns.
      - id: pending_external_action
        description: Waiting on an external action.
