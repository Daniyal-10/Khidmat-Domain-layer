version: "1.0.0"
domain: case_management
file: taxonomy/closure_reason.yaml
status: active

purpose: >
  The administrative qualifier explaining why a Case was closed outside of normal operational resolution, merged with operational outcomes.

schemes:
  - id: closure_reason
    description: >
      Consolidated closure taxonomy scheme.
    concepts:
      - id: resolved
        description: Resolved operationally.
      - id: partially_resolved
        description: Partially resolved.
      - id: referred_elsewhere
        description: Referred to another agency.
      - id: transferred
        description: Transferred internally.
      - id: withdrawn
        description: Withdrawn by subject.
      - id: unable_to_contact
        description: Unable to contact subject.
      - id: duplicate
        description: Closed as duplicate.
      - id: merged
        description: Merged into another case.
      - id: cancelled
        description: Cancelled administratively.
