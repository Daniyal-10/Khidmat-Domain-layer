version: "1.2.0"
domain: case_management
file: ontology/data-properties.yaml
status: active

data_properties:
  - id: status
    domain: case
    taxonomy_ref: case_status
    cardinality: { min: 1, max: 1 }

  - id: priority
    domain: case
    taxonomy_ref: priority_level
    cardinality: { min: 1, max: 1 }

  - id: origin
    domain: case
    taxonomy_ref: case_origin
    cardinality: { min: 1, max: 1 }

  - id: closure_reason
    domain: case
    taxonomy_ref: closure_reason
    cardinality: { min: 0, max: 1 }

  - id: case_timeline
    domain: case
    description: A composite Value Object holding timeline events.
    cardinality: { min: 1, max: 1 }
    fields:
      - id: case_note
        description: A chronological observational record preserving the operational history of a Case.
        cardinality: { min: 0, max: unconstrained }
        type: string
    notes: >
      The follow_up field previously declared here was promoted to its own
      entity, follow_up, per the Phase 1.1A Canonical Semantic Foundation — a
      scheduled/trackable activity requires status, an assignee, a due date,
      and an outcome, which a string field cannot carry. See follow_up's own
      data properties below and case_has_follow_up in relationships.yaml.

  - id: plan_status
    domain: case_plan
    taxonomy_ref: case_plan_status
    cardinality: { min: 1, max: 1 }

  - id: objective_status
    domain: case_objective
    taxonomy_ref: objective_status
    cardinality: { min: 1, max: 1 }
    notes: >
      Domain migrated from case_plan to case_objective per RFC v1.0 Wave 2.
      Previously, this served as a coarse status for the entire plan. With the
      extraction of the explicit case_objective entity, this status now correctly
      tracks the finer-grained progress of individual goals within a plan.

  - id: ref_status
    domain: referral
    taxonomy_ref: referral_status
    cardinality: { min: 1, max: 1 }

  - id: ref_type
    domain: referral
    taxonomy_ref: referral_type
    cardinality: { min: 1, max: 1 }

  - id: follow_up_status
    domain: follow_up
    taxonomy_ref: follow_up_status
    cardinality: { min: 1, max: 1 }
    notes: >
      Taxonomy scheme follow_up_status authored at Phase 1.4 Canonical
      Taxonomy Completion (case-management/taxonomy/follow_up_status.yaml).

  - id: follow_up_due_date
    domain: follow_up
    cardinality: { min: 1, max: 1 }
    datatype: xsd:date

  - id: follow_up_completed_at
    domain: follow_up
    cardinality: { min: 0, max: 1 }
    datatype: xsd:dateTime

  - id: follow_up_outcome_notes
    domain: follow_up
    cardinality: { min: 0, max: 1 }
    datatype: xsd:string
    notes: >
      Freeform outcome record. Kept as a plain string rather than a second new
      taxonomy scheme, consistent with this pass's scope (ontology only, no
      taxonomy design).
