version: "1.0.0"
domain: case_management
file: ontology/lifecycle-constraints.yaml
status: active

lifecycle:
  - id: active_status_requires_plan
    description: A Case is permitted to progress to active status only after an approved Case Plan has been established.
    rule: >
      Transition of case C to status 'active' requires C to have at least one case_plan P.

  - id: completed_case_immutable
    description: A formally completed Case is preserved as an immutable historical record and is not reopened for a new operational objective.
    rule: >
      If case C status is 'closed' and closure_reason is 'resolved', it cannot transition to 'active' or 'opened'.
