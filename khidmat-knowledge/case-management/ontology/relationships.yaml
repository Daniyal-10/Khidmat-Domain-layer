version: "1.3.0"
domain: case_management
file: ontology/relationships.yaml
status: active

namespaces:
  shared: shared
  needs_assessment: needs_assessment
  consent_and_privacy: consent_and_privacy
  shared_human_model: "shared/human-model/ontology/family-structure.yaml"
  programs: programs
  registration: registration

relationships:
  - id: case_informed_by_family
    from: case
    relationship: informed_by
    to: shared_human_model:family
    cardinality: { min: 0, max: 1 }
    notes: >
      Added per Phase 1.2 domain completion pass, per Blueprint §6 (Family
      Model) and family-structure.yaml's own boundary note that "reasoning
      must reference families." Optional because not every Case has an
      identified family distinct from its primary Subject's household
      context. Case Management does not redefine Family or any of its
      kinship/support-role vocabulary — both remain owned by
      shared/human-model/ontology/family-structure.yaml. This relationship
      adds a new edge to the existing Case entity; it does not reopen or
      modify the Case/Registration-Record identity question governed by
      ADR-021 and ADR-029.

  - id: case_has_follow_up
    from: case
    relationship: has
    to: follow_up
    cardinality: { min: 0, max: unbounded }
    notes: >
      Per the Phase 1.1A Canonical Semantic Foundation. Associates a Case with its
      scheduled and completed Follow-ups.

  - id: follow_up_assigned_to_actor
    from: follow_up
    relationship: assigned_to
    to: shared:actor
    cardinality: { min: 0, max: 1 }
    notes: >
      References the authoritative Actor (see shared/ontology/entities.yaml)
      responsible for conducting the Follow-up. Case Management does not define
      actor qualification or role.

  - id: referral_targets_organisation
    from: referral
    relationship: targets
    to: shared:organisation
    cardinality: { min: 0, max: 1 }
    notes: >
      Per the Phase 1.1A Canonical Semantic Foundation, cardinality relaxed
      from {min:1,max:1} to {min:0,max:1} per Phase 1.6A Operational Blocker
      Resolution. An external Referral (ref_type: external — see
      taxonomy/referral_type.yaml) targets exactly one Organisation,
      representing the government body, NGO, or institution expected to
      provide the specialized service. An internal Referral instead targets
      a Program (see referral_targets_program below); the two are mutually
      exclusive per ref_type, enforced by
      external_referral_requires_organisation_target and
      internal_referral_requires_program_target in
      semantic-constraints.yaml, mirroring the existing
      external_referrals_require_consent /
      internal_referrals_no_consent pattern already in that file. Case
      Management does not redefine Organisation or its type classification
      (owned by shared/taxonomy/organisations.yaml).

  - id: referral_targets_program
    from: referral
    relationship: targets
    to: programs:program
    cardinality: { min: 0, max: 1 }
    notes: >
      Added per Phase 1.6A Operational Blocker Resolution, resolving the
      Business Validation's Cross-Program Referral gap. taxonomy/referral_type.yaml
      already distinguished internal/external referrals, and
      semantic-constraints.yaml already had internal/external rules for the
      Consent dimension (external_referrals_require_consent,
      internal_referrals_no_consent) — the Blueprint and existing ontology
      already anticipated an internal referral pathway distinct from
      external; only the target relationship for the internal case was
      missing. An internal Referral (ref_type: internal) targets exactly one
      Program (see programs/ontology/entities.yaml), representing the Khidmat
      program a beneficiary is being referred to. Case Management does not
      redefine Program or its eligibility/enrollment structure (owned by
      programs/ontology/).

  - id: case_has_case_plan
    from: case
    relationship: has
    to: case_plan
    cardinality: { min: 0, max: unbounded }
    notes: Associates a Case with its current and historical Case Plans.

  - id: case_plan_owns_objective
    from: case_plan
    relationship: owns
    to: case_objective
    cardinality: { min: 1, max: unbounded }
    notes: >
      A Case Plan comprises one or more actionable Case Objectives designed 
      to address a specific need. Added per RFC v1.0 Wave 2.

  - id: case_has_referral
    from: case
    relationship: has
    to: referral
    cardinality: { min: 0, max: unbounded }
    notes: Associates a Case with external or internal Referrals.

  - id: case_superseded_by_case
    from: case
    relationship: superseded_by
    to: case
    cardinality: { min: 0, max: 1 }
    notes: Links a Case administratively closed as a duplicate or merge to the surviving authoritative Case.

  - id: case_has_primary_subject
    from: case
    relationship: has_primary_subject
    to: shared:subject
    cardinality: { min: 0, max: 1 }
    notes: References the authoritative Subject serving as the Primary Subject of the Case.

  - id: case_plan_references_need_assertion
    from: case_plan
    relationship: references
    to: needs_assessment:need_assertion
    cardinality: { min: 0, max: unbounded }
    notes: Linked from case_plan to needs_assessment:need_assertion.

  - id: case_plan_addressed_by_intervention
    from: case_plan
    relationship: addressed_by
    to: registration:support_intervention
    cardinality: { min: 0, max: unbounded }
    notes: >
      Added per Stage 7B Repository Remediation, closing Critical Finding
      C-1 of HKMP_STAGE7_REPOSITORY_SEMANTIC_INTEGRITY_AUDIT.md: case_plan's
      own description ("the structured, approved operational strategy
      guiding the coordination of interventions for a Case") had no
      relationship to any intervention entity. Reuses the existing
      support_intervention entity (registration/ontology/entities.yaml) and
      the existing addressed_by predicate already used by
      need_addressed_by_intervention (registration/ontology/relationships.yaml)
      — no new entity, no new predicate. support_intervention was chosen
      over programs:intervention_offering because it is the entity already
      representing "what assistance is being provided" at case scope, and
      is already the target of need_addressed_by_intervention; where a
      support_intervention is in turn delivered through a formal Program,
      that linkage already flows through the existing internal-Referral
      pathway (referral_targets_program), which this relationship does not
      duplicate. This is the completing edge for the
      Needs -> Case Plan -> Intervention segment of the audited lifecycle
      chain; Case Plan -> Support Delivery was already intact via
      delivery_event fulfills case_plan (support-delivery/ontology/relationships.yaml).
      Cardinality is { min: 0, max: unbounded } because a case_plan may be
      approved before every intervention is finalised, and may coordinate
      more than one.

  - id: referral_references_consent
    from: referral
    relationship: references
    to: consent_and_privacy:consent
    cardinality: { min: 0, max: 1 }
    notes: Linked from referral to consent_and_privacy:consent.

  - id: case_has_lead_coordinator
    from: case
    relationship: has_lead_coordinator
    to: shared:actor
    cardinality: { min: 0, max: 1 }
    notes: Role representing the lead coordinator for the case.

  - id: case_has_statutory_owner
    from: case
    relationship: has_statutory_owner
    to: shared:actor
    cardinality: { min: 0, max: 1 }
    notes: Role representing the statutory owner of the case.

  - id: referral_addresses_need
    from: referral
    relationship: addresses_need
    to: needs_assessment:need_assertion
    cardinality: { min: 1, max: unbounded }
    notes: Explicitly identifies the specific need(s) that generated this referral.
