version: "1.2.0"
domain: case_management
file: ontology/entities.yaml
status: active

entities:
  - id: case
    description: >
      The central, long-lived operational container coordinating holistic support for a Subject.
    notes: >
      Ownership (Phase 1.3A): per ADR-021, this is the sole canonical Case
      entity — Case Management is its owner. registration/ontology/entities.yaml
      also declares an entry with id: case; that entry is not a second,
      independent entity but the pre-operational-phase view of this same
      canonical Case (see the notes on that entry, and
      ADR_RECONCILIATION_CASE.md for the full determination). Registration's
      case_statuses describe the pre-handoff phase; this domain's case_status
      (taxonomy/case_status.yaml) describes the phase from handoff onward.

  - id: case_plan
    description: >
      The structured, approved operational strategy guiding the coordination of interventions for a Case.

  - id: referral
    description: >
      A formal request for a specialized service provided by an internal or external party.

  - id: follow_up
    description: >
      A scheduled or completed case-level review or monitoring activity revisiting a
      beneficiary's situation after initial support, with its own status, assigned
      Actor, due date, and outcome. Distinct from Referral: a Follow-up is Case
      Management acting on its own Case and targets no external Organisation.
    notes: >
      Introduced per the Phase 1.1A Canonical Semantic Foundation, promoted from a
      string field (case_timeline.follow_up) to its own entity, matching the Case
      Manager's "plans, referrals, follow-ups" responsibility named alongside Case
      Plan and Referral in the Business Blueprint §4.

  - id: case_objective
    description: >
      A granular, actionable goal within a Case Plan designed to address a specific need.
    notes: >
      Introduced per RFC v1.0 Wave 2 to model specific casework goals and trace referral 
      origins accurately, extracting it from being a deferred property in the case_plan.
