case_management:
  entities:
    - name: Case
      description: The central, long-lived operational container coordinating holistic support for a Subject.

    - name: CasePlan
      description: The structured, approved operational strategy guiding the coordination of interventions for a Case.

    - name: Referral
      description: A formal request for a specialized service provided by an internal or external party.

    - name: FollowUp
      description: A scheduled case-level interaction, review, or monitoring activity conducted as part of active Case Management. Distinct from program-level monitoring and evaluation activities owned by the Monitoring & Evaluation bounded context.

    - name: CaseAssignment
      description: The operational association between a Case and one or more responsible Actors accountable for case activities.

    - name: CaseNote
      description: A chronological observational record preserving the operational history of a Case.

    - name: CaseOutcome
      description: The recorded final disposition of a completed Case, consisting of a substantive operational outcome and, where applicable, an independent administrative closure qualifier.

  relationships:

    internal:

      - name: has_case_plan
        source: Case
        target: CasePlan
        cardinality: one_to_many
        description: Associates a Case with its current and historical Case Plans. Exactly one Case Plan may be designated as current.

      - name: has_referral
        source: Case
        target: Referral
        cardinality: one_to_many

      - name: has_follow_up
        source: Case
        target: FollowUp
        cardinality: one_to_many

      - name: has_case_assignment
        source: Case
        target: CaseAssignment
        cardinality: one_to_many
        description: Associates a Case with current and historical operational assignments.

      - name: has_case_note
        source: Case
        target: CaseNote
        cardinality: one_to_many

      - name: has_case_outcome
        source: Case
        target: CaseOutcome
        cardinality: one_to_one
        description: Associates a completed Case with its final operational outcome.

      - name: superseded_by
        source: Case
        target: Case
        cardinality: many_to_one
        description: Links a Case administratively closed as a duplicate or merge to the surviving authoritative Case.

    external_references:

      - name: references_subject
        source: Case
        target: Subject
        domain: Shared Human Model
        cardinality: many_to_one
        description: References the authoritative Subject serving as the Primary Subject of the Case.

      - name: references_assessment
        source: CasePlan
        target: Assessment
        domain: Needs Assessment
        cardinality: one_to_many
        description: References one or more Assessments that informed development of the Case Plan.

      - name: references_consent
        source: Referral
        target: Consent
        domain: Consent & Privacy
        cardinality: one_to_one
        description: References the Consent authorizing disclosure for an external Referral. Internal Referrals do not instantiate this relationship.

      - name: references_intervention_type
        source: CasePlan
        target: InterventionType
        domain: Shared Ontology
        cardinality: many_to_many
        description: References standardized Intervention Types used by the Case Plan.

      - name: references_lifecycle
        source: Case
        target: BeneficiaryLifecycle
        domain: Shared Human Model
        cardinality: many_to_one
        description: References the Subject's authoritative lifecycle information maintained by the Shared Human Model.

      - name: references_actor
        source: CaseAssignment
        target: Actor
        domain: Shared Ontology
        cardinality: many_to_one
        description: References the authoritative Actor responsible for the assignment.

  constraints:

    - A Case requires exactly one Subject acting in the Primary Subject role.

    - A Subject acting in the Primary Subject role may participate in multiple Cases concurrently or over time.

    - A Case may reference multiple Referrals.

    - Case Notes form a chronological operational record. Corrections require a new addendum note and never replace existing notes.

    - Emergency Cases may temporarily reference an unverified Subject without duplicating Registration or Verification processes.

    - Closing a Case never changes the referenced BeneficiaryLifecycle.

    - A Case is permitted to progress to active status only after an approved Case Plan has been established.

    - External Referrals require a referenced Consent record.

    - Internal Referrals do not reference Consent.

    - A formally completed Case is preserved as an immutable historical record and is not reopened for a new operational objective.

    - Exactly one CasePlan per Case may carry a case_plan_status of current; all others are historical.

    - One or more CaseAssignments may carry a case_assignment_status of current. Historical assignments remain preserved with a status of historical.

    - A Case whose CaseOutcome carries an administrative_closure_reason of duplicate or merged must reference its surviving counterpart through the superseded_by relationship.

    - administrative_closure_reason qualifies CaseOutcome independently of case_outcome and never replaces the substantive operational outcome.