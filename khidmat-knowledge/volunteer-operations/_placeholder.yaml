domain: volunteer-operations
maturity: canonical_foundational_operational_deferred
status: foundational_active

scope: >
  This domain governs volunteer identity, capacity, assignment eligibility,
  routing, performance, and trust. It is entirely separate from the registration
  domain. Volunteers appear in registration only as a registrant_type — their
  full profile lives here. Under ADR-024 the FOUNDATIONAL (organization-invariant)
  ontology and taxonomy are authored; the OPERATIONAL/runtime layer is deferred.

concepts_this_domain_will_own:
  - volunteer_profile
  - volunteer_availability
  - volunteer_geographic_coverage
  - volunteer_trust_score
  - volunteer_assignment_history
  - volunteer_training_status

do_not_implement_until: >
  A volunteer management workflow is defined with operations staff. This gate now
  applies ONLY to the operational/runtime layer (Tier 2): scheduling, dispatch,
  routing, workload balancing, optimization, trust/performance scoring, the
  assignment act, and per-instance assignment/training history. The foundational
  layer (Tier 1) is authored — see ontology/, taxonomy/, and ADR-024.
