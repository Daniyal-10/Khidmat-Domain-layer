version: "1.0.0"
domain: volunteer_operations
file: volunteer-operations/ontology/relationships.yaml
status: active

# Foundational (Tier 1) relationships, authored under ADR-024.
# All predicates are domain-local (used only within volunteer-operations);
# none is promoted to shared (Canonical_Ontology_Schema.md §11) — no second active
# domain uses them yet. Cross-domain rows use the pre-C-2 file-path namespace form,
# matching community-context/ontology/relationships.yaml.

namespaces:
  shared_core: "shared/ontology/entities.yaml"
  shared_org: "shared/taxonomy/organisations.yaml"

relationships:

  # -------------------------------------------------------------------------
  # Reference to the shared Actor (the single most important boundary)
  # -------------------------------------------------------------------------

  - id: volunteer_profile_profile_of_actor
    from: volunteer_profile
    relationship: profile_of
    to: shared_core:actor
    cardinality: { min: 1, max: 1 }
    notes: >
      Attaches the volunteer qualification profile *behind* the shared Actor
      forward-declared in shared/ontology/entities.yaml. This is the FLAG-006 /
      ADR-018 / D-VO5 mechanism: Volunteer Operations references the shared Actor,
      it never mints a second actor and never redefines the `volunteer` role
      label (shared/taxonomy/persons.yaml). No inverse row is authored — the
      reverse edge would live in the shared module, which this domain does not
      own or modify.

  # -------------------------------------------------------------------------
  # Internal domain relationships (team membership)
  # -------------------------------------------------------------------------

  - id: volunteer_profile_member_of_team
    from: volunteer_profile
    relationship: member_of
    to: volunteer_team
    cardinality: { min: 0, max: unbounded }
    inverse: volunteer_team_has_member_profile
    notes: >
      A volunteer may belong to more than one team. Structural membership only —
      no roster, rota, or leadership-assignment semantics (Tier 2, deferred).

  - id: volunteer_team_has_member_profile
    from: volunteer_team
    relationship: has_member
    to: volunteer_profile
    cardinality: { min: 0, max: unbounded }
    inverse: volunteer_profile_member_of_team
    notes: >
      Inverse of volunteer_profile_member_of_team. A team groups zero or more
      volunteer profiles.

  # -------------------------------------------------------------------------
  # Cross-domain reference (affiliation to a formal organisation)
  # -------------------------------------------------------------------------

  - id: volunteer_profile_affiliated_with_organisation
    from: volunteer_profile
    relationship: affiliated_with
    to: shared_org:organisation
    cardinality: { min: 0, max: unbounded }
    notes: >
      Links a volunteer profile to the formal organisation(s) it is affiliated
      with. Ownership of the organisation reference is Shared Taxonomy; this row
      states only the affiliation edge. The KIND of affiliation is the
      affiliation_type data property (data-properties.yaml). Mirrors the
      community-context precedent (built_infrastructure_operated_by_organization
      → shared_org:organisation). No inverse row — the reverse edge belongs to
      the (future) organisations domain, not authored here.

# -------------------------------------------------------------------------
# Deferred (Tier 2 / cross-domain, NOT authored):
#   - volunteer_profile covers community-context:geographic_area — a genuine
#     cross-domain coverage edge, blocked on the repository-wide manifest + C-2
#     ratified base IRI (the same Phase-5 blocker that parks Registration and
#     Community Context). coverage_mode (data-properties.yaml) is the authored
#     foundational stand-in; the geographic_area link activates with the CURIE
#     layer.
#   - The assignment ACT (VerificationAssignment / CaseAssignment) — owned by
#     verification-operations / case-management; VO owns eligibility, never the
#     act (FLAG-006). No row pointing at or duplicating those assignment entities
#     is authored.
#   - dispatch / routing / workload edges — operational, Tier 2 (ADR-024).
# -------------------------------------------------------------------------
