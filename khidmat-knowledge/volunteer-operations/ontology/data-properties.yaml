version: "1.0.0"
domain: volunteer_operations
file: volunteer-operations/ontology/data-properties.yaml
status: active

# Foundational (Tier 1) data properties, authored under ADR-024.
# Every coded property's `taxonomy_ref` names a scheme authored in this domain's
# own taxonomy/ module. Language identity is modeled as an xsd:string, mirroring
# the established repository pattern (registration/ontology/data-properties.yaml
# `language`, xsd:string) — only the genuinely-stable proficiency band is a
# controlled vocabulary. No organization-specific decomposition (a concrete skill
# catalogue, proficiency scoring, task-to-skill mapping) is authored — that is
# Tier 2, deferred to operations staff (ADR-024, refining D-VO3).

data_properties:

  # ---------------------------------------------------------------------------
  # volunteer_profile
  # ---------------------------------------------------------------------------

  - id: volunteer_id
    domain: volunteer_profile
    datatype: xsd:string
    cardinality: { min: 1, max: 1 }

  - id: volunteer_status
    domain: volunteer_profile
    taxonomy_ref: volunteer_status
    cardinality: { min: 1, max: 1 }
    notes: >
      Source scheme: taxonomy/volunteer-classification.yaml#volunteer_status.
      The engagement lifecycle STATE of the profile (prospective … exited), not
      an operational duty/roster status.

  - id: volunteer_type
    domain: volunteer_profile
    taxonomy_ref: volunteer_type
    cardinality: { min: 0, max: unbounded }
    notes: >
      Source scheme: taxonomy/volunteer-classification.yaml#volunteer_type. A
      volunteer may carry more than one engagement basis (e.g. field + remote).

  - id: skill
    domain: volunteer_profile
    taxonomy_ref: skill_category
    cardinality: { min: 0, max: unbounded }
    notes: >
      Source scheme: taxonomy/skills.yaml#skill_category. Top-level, extensible
      humanitarian skill families only. The organization-specific catalogue of
      individual skills and any proficiency scoring are Tier 2 (deferred).

  - id: certification
    domain: volunteer_profile
    taxonomy_ref: certification_type
    cardinality: { min: 0, max: unbounded }
    notes: >
      Source scheme: taxonomy/certifications.yaml#certification_type. Records the
      KIND of credential held. Issuing authority, credential identifiers, and
      validity dates are per-instance operational detail (Tier 2, deferred). A
      certification is a plausible future_entity candidate once Support Delivery /
      quality assurance need to reference and re-validate a specific credential
      across time (Canonical_Ontology_Schema.md §20) — see the Flagged Boundary
      Cases note in governance.md.

  - id: language_competency
    domain: volunteer_profile
    fields:
      - id: language
        datatype: xsd:string
        cardinality: { min: 1, max: 1 }
      - id: proficiency
        taxonomy_ref: language_proficiency
        cardinality: { min: 0, max: 1 }
    cardinality: { min: 0, max: unbounded }
    notes: >
      A Value Object (Canonical_Ontology_Schema.md §17): an owner-scoped bundle of
      {language, proficiency} with no independent identity. `language` is an
      xsd:string language identifier (mirroring registration's `language`
      property — the repository does not maintain a controlled world-language
      vocabulary). `proficiency` draws from
      taxonomy/languages.yaml#language_proficiency. Passes the §17 promotion test:
      no entity references a specific competency; identical values are the same
      fact; it lives and dies with the profile.

  - id: availability_commitment
    domain: volunteer_profile
    taxonomy_ref: availability_type
    cardinality: { min: 0, max: unbounded }
    notes: >
      Source scheme: taxonomy/availability.yaml#availability_type. The KIND of
      availability a volunteer offers (regular, on-call, seasonal, surge …), not
      a concrete schedule, calendar, or slot. Scheduling is Tier 2 (deferred).

  - id: coverage_mode
    domain: volunteer_profile
    taxonomy_ref: coverage_type
    cardinality: { min: 0, max: 1 }
    notes: >
      Source scheme: taxonomy/coverage.yaml#coverage_type. HOW a volunteer covers
      geography (residence-based, willing-to-travel, remote-only). The link to a
      specific geographic_area (community-context) is a cross-domain reference
      deferred to the manifest/C-2 CURIE phase (governance.md), not authored here.

  - id: eligible_assignment_type
    domain: volunteer_profile
    taxonomy_ref: assignment_type
    cardinality: { min: 0, max: unbounded }
    notes: >
      Source scheme: taxonomy/assignment-types.yaml#assignment_type. Declares the
      categories of work the volunteer is *fit to be assigned to* — VO owns
      eligibility (fitness), never the assignment ACT itself
      (VerificationAssignment / CaseAssignment, owned elsewhere; FLAG-006).

  - id: affiliation_type
    domain: volunteer_profile
    taxonomy_ref: affiliation_type
    cardinality: { min: 0, max: unbounded }
    notes: >
      Source scheme: taxonomy/affiliation.yaml#affiliation_type. The KIND of
      relationship the volunteer holds to the organization. The link to a
      specific organisation is expressed in relationships.yaml
      (volunteer_profile_affiliated_with_organisation).

  - id: training_status
    domain: volunteer_profile
    taxonomy_ref: training_status
    cardinality: { min: 0, max: 1 }
    notes: >
      Source scheme: taxonomy/training.yaml#training_status. The volunteer's
      overall onboarding/training standing. The per-course training RECORD
      (specific courses, completion dates, expiry tracking) is per-instance
      operational history — Tier 2 (deferred, ADR-024).

  # ---------------------------------------------------------------------------
  # volunteer_team
  # ---------------------------------------------------------------------------

  - id: team_id
    domain: volunteer_team
    datatype: xsd:string
    cardinality: { min: 1, max: 1 }

  # ---------------------------------------------------------------------------
  # volunteer_profile_member_of_team (Relationship properties)
  # ---------------------------------------------------------------------------

  - id: membership_status
    domain: volunteer_profile_member_of_team
    taxonomy_ref: membership_status
    cardinality: { min: 1, max: 1 }
    notes: >
      Added per RFC v1.0 Wave 4 to track the temporal lifecycle state of a volunteer's 
      membership within a specific team.

  - id: start_date
    domain: volunteer_profile_member_of_team
    datatype: xsd:date
    cardinality: { min: 1, max: 1 }
    notes: >
      The objective timestamp when this specific team membership became active. 
      Added per RFC v1.0 Wave 4.

  - id: end_date
    domain: volunteer_profile_member_of_team
    datatype: xsd:date
    cardinality: { min: 0, max: 1 }
    notes: >
      The objective timestamp when this specific team membership concluded or was suspended.
      Added per RFC v1.0 Wave 4.
