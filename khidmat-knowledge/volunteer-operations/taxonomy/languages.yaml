version: "1.0.0"
domain: volunteer_operations
file: volunteer-operations/taxonomy/languages.yaml
status: active

purpose: >
  Owns the organization-invariant proficiency bands for a volunteer's spoken
  languages (language_proficiency). It does NOT own a controlled world-language
  vocabulary — language identity is recorded as an xsd:string on the
  language_competency value object (ontology/data-properties.yaml), mirroring the
  established repository pattern (registration models `language` as xsd:string).
  language_proficiency is a candidate for promotion to shared/ if and when a second
  domain needs it (Canonical_Ontology_Schema.md §11) — see the Flagged Boundary
  Cases note in governance.md.

schemes:
  - id: language_proficiency
    label: Language Proficiency
    description: >
      A coarse, organization-invariant band describing how well a volunteer uses a
      language. Deliberately simple; not a formal framework (e.g. CEFR), which an
      organization may adopt as its own extension.
    concepts:
      - id: native
        label: Native
        description: Native or bilingual proficiency.
      - id: fluent
        label: Fluent
        description: Full professional or fluent proficiency.
      - id: working
        label: Working
        description: Working proficiency — able to handle routine interaction.
      - id: basic
        label: Basic
        description: Basic or elementary proficiency.
