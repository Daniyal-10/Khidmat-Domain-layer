version: "1.0.0"
domain: volunteer_operations
file: volunteer-operations/taxonomy/certifications.yaml
status: active

purpose: >
  Owns the organization-invariant KINDS of formal credential a volunteer may hold
  (certification_type). Extensible. Does NOT own specific credential catalogues,
  issuing authorities, credential identifiers, validity/expiry tracking, or
  verification of a credential — those are per-instance operational detail
  (Tier 2, deferred, ADR-024).

schemes:
  - id: certification_type
    label: Certification Type
    description: >
      A broad category of formal credential or qualification a volunteer may hold.
    concepts:
      - id: professional_licence
        label: Professional Licence
        description: >
          A state- or body-issued professional licence (e.g. medical, legal,
          engineering).
      - id: first_aid_and_safety
        label: First Aid and Safety
        description: >
          First-aid, CPR, fire-safety, or comparable safety certification.
      - id: safeguarding_and_protection
        label: Safeguarding and Protection
        description: >
          Child-protection, PSEA, or safeguarding certification.
      - id: sector_technical_certification
        label: Sector Technical Certification
        description: >
          A humanitarian-sector technical certification (e.g. WASH, food security,
          shelter).
      - id: organisational_training_certificate
        label: Organisational Training Certificate
        description: >
          A certificate issued by the organization's own training programme
          (e.g. code of conduct, security induction).
