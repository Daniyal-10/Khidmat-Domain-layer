version: "1.0.0"
domain: volunteer_operations
file: volunteer-operations/taxonomy/assignment-types.yaml
status: active

purpose: >
  Owns the organization-invariant categories of work a volunteer may be ELIGIBLE
  for (assignment_type). These classify the KIND of work for eligibility/fitness
  purposes only. This file emphatically does NOT own the assignment ACT — issuing
  a VerificationAssignment (verification-operations) or a CaseAssignment
  (case-management) — nor dispatch, routing, matching, or scheduling. Volunteer
  Operations owns *who is fit to be assigned*; the assignment event is owned by the
  operational domains (FLAG-006, ADR-008, ADR-024).

schemes:
  - id: assignment_type
    label: Assignment Type
    description: >
      A category of work a volunteer can be considered eligible for. Used to
      express fitness/eligibility, never to model an assignment event.
    concepts:
      - id: field_verification
        label: Field Verification
        description: >
          On-the-ground verification of a registration or claim. The verification
          assignment ACT is owned by verification-operations; this concept only
          classifies fitness for such work.
      - id: case_support
        label: Case Support
        description: >
          Support to case management activities. The case assignment ACT is owned
          by case-management; this concept only classifies fitness.
      - id: delivery_support
        label: Delivery Support
        description: >
          Support to the delivery of assistance. (The Support Delivery domain,
          when active, owns the delivery task and its assignment.)
      - id: outreach_and_mobilisation
        label: Outreach and Mobilisation
        description: >
          Community outreach, awareness, and mobilisation work.
      - id: administrative_support
        label: Administrative Support
        description: >
          Office, data, and coordination support work.
      - id: remote_support
        label: Remote Support
        description: >
          Work performable remotely (phone, online, back-office).

# Eligibility declared via this scheme (the volunteer_profile
# eligible_assignment_type data property) is an INPUT the operational domains may
# consult when they issue their own assignment acts. It never constitutes or
# replaces those acts: VerificationAssignment (verification-operations) and
# CaseAssignment (case-management) remain the sole owners of the assignment event
# (FLAG-006).
