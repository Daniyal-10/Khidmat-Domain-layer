version: "1.0.0"
domain: volunteer_operations
file: volunteer-operations/taxonomy/coverage.yaml
status: active

purpose: >
  Owns the organization-invariant MODE by which a volunteer covers geography
  (coverage_type). This classifies HOW a volunteer relates to geography, not WHERE
  — the specific geographic area a volunteer covers is a cross-domain reference to
  community-context's geographic hierarchy, deferred to the manifest/C-2 CURIE
  phase (governance.md). This file does not own, redefine, or duplicate the
  geographic hierarchy (community-context/taxonomy/geographic-hierarchy.yaml).

schemes:
  - id: coverage_type
    label: Coverage Type
    description: >
      The mode by which a volunteer covers geography.
    concepts:
      - id: residence_based
        label: Residence Based
        description: >
          Covers the area in or around their own place of residence.
      - id: travel_willing
        label: Travel Willing
        description: >
          Willing to travel beyond their residence to cover other areas.
      - id: remote_only
        label: Remote Only
        description: >
          Provides coverage remotely without a physical geographic footprint.

references:
  - scheme: geographic_hierarchy
    relation: informs
    note: >
      A volunteer's actual coverage AREA is expressed by referencing
      community-context's geographic hierarchy on activation of the cross-domain
      CURIE layer (the same manifest/C-2 blocker that parks Registration and
      Community Context at Phase 5). coverage_type here classifies only the mode,
      never the place; the geographic hierarchy is owned by community-context and
      referenced, never redefined.
