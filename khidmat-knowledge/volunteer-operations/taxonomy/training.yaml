version: "1.0.0"
domain: volunteer_operations
file: volunteer-operations/taxonomy/training.yaml
status: active

purpose: >
  Owns the organization-invariant standing of a volunteer's training/onboarding
  (training_status). It classifies the overall status only. It does NOT own the
  per-course training RECORD (specific courses, completion dates, expiry
  tracking), the training curriculum, or any competency-scoring — those are
  per-instance operational concerns (Tier 2, deferred, ADR-024).

schemes:
  - id: training_status
    label: Training Status
    description: >
      The overall standing of a volunteer's required training/onboarding.
    concepts:
      - id: not_started
        label: Not Started
        description: Required training has not begun.
      - id: in_progress
        label: In Progress
        description: Required training is underway but not complete.
      - id: completed
        label: Completed
        description: Required training is complete and current.
      - id: expired
        label: Expired
        description: >
          Previously completed training has lapsed and requires renewal.
