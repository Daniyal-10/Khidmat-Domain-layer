# =============================================================================
# Governance/Compliance Extension — Clearance Types Taxonomy
# =============================================================================
# Purpose: Defines the canonical categories of governance and compliance clearances
#          without executing validation engines or establishing organizational policy.
# Origin: Added per RFC v1.0 Wave 6.
# =============================================================================

schemes:
  - id: compliance_clearance_type
    label: Compliance Clearance Type
    description: >
      A canonical vocabulary for types of organizational compliance requirements.
    concepts:
      - id: kyc
        label: Know Your Customer (KYC)
        description: Standard clearance verifying the identity of an individual or organization.

      - id: aml
        label: Anti-Money Laundering (AML)
        description: Clearance indicating checks against money laundering risks have been satisfied.

      - id: sanctions_screening
        label: Sanctions Screening
        description: Clearance indicating the subject has been screened against relevant international or local sanctions lists.
