version: "1.0.0"
domain: programs
file: ontology/lifecycle-constraints.yaml
status: active

entity: program
lifecycle:
  - state: planned
    transitions_to: [active, closed]
  - state: active
    transitions_to: [suspended, closed]
  - state: suspended
    transitions_to: [active, closed]
  - state: closed
    transitions_to: []

entity: program_version
lifecycle:
  - state: draft
    transitions_to: [active, deprecated]
  - state: active
    transitions_to: [deprecated]
  - state: deprecated
    transitions_to: []

entity: enrollment
lifecycle:
  - state: applied
    transitions_to: [waitlisted, enrolled_active, exited]
  - state: waitlisted
    transitions_to: [enrolled_active, exited]
  - state: enrolled_active
    transitions_to: [enrolled_suspended, exited]
  - state: enrolled_suspended
    transitions_to: [enrolled_active, exited]
  - state: exited
    transitions_to: []

entity: appeal
lifecycle:
  - state: submitted
    transitions_to: [under_review, resolved]
  - state: under_review
    transitions_to: [resolved]
  - state: resolved
    transitions_to: []

entity: humanitarian_override
lifecycle:
  - state: requested
    transitions_to: [under_review, approved, rejected]
  - state: under_review
    transitions_to: [approved, rejected]
  - state: approved
    transitions_to: []
  - state: rejected
    transitions_to: []
