version: "1.0.0"
domain: programs
file: ontology/semantic-constraints.yaml
status: active

constraints:
  - id: program_must_have_one_active_version
    type: cardinality
    property: has_version
    entities: [program]
    parameters: { min: 1, max: unbounded }

  - id: enrollment_requires_beneficiary
    type: cardinality
    property: covers_beneficiary
    entities: [enrollment, shared_human:person]
    parameters: { min: 1, max: 1 }

  - id: mutually_exclusive_programs_cannot_share_enrollment
    type: mutually_exclusive
    property: covers_beneficiary
    entities: [enrollment, program]
    parameters: {}

  - id: override_must_link_to_enrollment
    type: required_if
    property: approves_enrollment
    entities: [humanitarian_override]
    parameters: { condition: "always" }

  - id: enrollment_terminated_requires_reason
    type: required_if
    property: termination_reason
    entities: [enrollment]
    parameters: { condition: "enrollment_outcome == terminated" }
