version: "1.0.0"
domain: programs
file: ontology/relationships.yaml
status: active

namespaces:
  # Retargeted per Phase 1.1A Canonical Semantic Foundation: Organisation is now
  # a canonical entity in shared/ontology/entities.yaml (Shared Core). The
  # organisation-type classification remains separately owned by
  # shared/taxonomy/organisations.yaml.
  # Both retargeted per Phase 1.2 domain completion pass to the domain-name-only
  # IRI convention already used by community_ctx/verif_ops below (by
  # convention, resolves to shared/ontology/entities.yaml, mirroring how
  # community_ctx resolves to community-context/ontology/*). Organisation is
  # now a canonical entity in Shared Core, not a taxonomy scheme; Person and
  # Household are Shared Core entities, not a shared/human-model entities
  # file, which does not exist. program_funded_by, program_implemented_by,
  # program_managed_by, enrollment_for_beneficiary, and enrollment_for_household
  # below were unresolvable references until this retarget.
  shared_org: http://khidmat.org/ontology/shared
  shared_human: http://khidmat.org/ontology/shared
  community_ctx: http://khidmat.org/ontology/community-context
  verif_ops: http://khidmat.org/ontology/verification-operations

relationships:
  - id: program_has_version
    from: program
    relationship: has_version
    to: program_version
    cardinality: { min: 1, max: unbounded }
    inverse: version_belongs_to_program

  - id: program_has_variant
    from: program
    relationship: has_variant
    to: program_variant
    cardinality: { min: 0, max: unbounded }
    inverse: variant_belongs_to_program

  - id: program_has_successor
    from: program
    relationship: has_successor
    to: program
    cardinality: { min: 0, max: 1 }
    inverse: is_successor_of_program

  - id: program_mutually_exclusive_with
    from: program
    relationship: mutually_exclusive_with
    to: program
    cardinality: { min: 0, max: unbounded }

  - id: program_prerequisite_for
    from: program
    relationship: prerequisite_for
    to: program
    cardinality: { min: 0, max: unbounded }

  - id: program_funded_by
    from: program
    relationship: funded_by
    to: shared_org:organisation
    cardinality: { min: 0, max: unbounded }

  - id: program_implemented_by
    from: program
    relationship: implemented_by
    to: shared_org:organisation
    cardinality: { min: 0, max: unbounded }

  - id: program_managed_by
    from: program
    relationship: managed_by
    to: shared_human:person
    cardinality: { min: 0, max: unbounded }

  - id: variant_located_in
    from: program_variant
    relationship: located_in
    to: community_ctx:geographic_area
    cardinality: { min: 1, max: unbounded }

  - id: version_has_eligibility_rule
    from: program_version
    relationship: has_eligibility_rule
    to: eligibility_rule
    cardinality: { min: 1, max: unbounded }

  - id: version_has_intervention_offering
    from: program_version
    relationship: has_intervention_offering
    to: intervention_offering
    cardinality: { min: 1, max: unbounded }

  - id: offering_verified_by
    from: intervention_offering
    relationship: verified_by
    to: verif_ops:verification_activity
    cardinality: { min: 0, max: unbounded }

  # -------------------------------------------------------------------
  # Added per Stage 6 Canonical Implementation, closing the
  # "Intervention-Level Relationships" gap identified in
  # STAGE6_INTERVENTION_ONTOLOGY_GAP_AUDIT.md. Deliberately mirrors the
  # shape of program_prerequisite_for / program_mutually_exclusive_with
  # above rather than importing the generic-relationship-plus-qualifier
  # pattern used elsewhere in this knowledge layer (e.g. Registration's
  # need_influences_need) — within this domain, the established
  # convention for "one program relates to another in a specific way" is
  # already a set of separately-named relationships, and extending that
  # same convention one level down, to intervention_offering, keeps the
  # file internally consistent rather than mixing two relationship
  # design idioms in one domain. Four relationships, not one: prerequisite
  # and incompatibility were already precedented at the program level
  # above; reinforcement and substitution are new but follow the
  # identical shape. All four are structural facts about intervention
  # *types* in the catalogue (this offering, in general, depends on /
  # precludes / reinforces / substitutes for that one) — not a
  # household-specific or case-specific fact, which would belong to
  # Case Management, not Programs.
  # -------------------------------------------------------------------
  - id: offering_prerequisite_for
    from: intervention_offering
    relationship: prerequisite_for
    to: intervention_offering
    cardinality: { min: 0, max: unbounded }
    notes: >
      This offering must ordinarily be completed, or its underlying need
      resolved, before the target offering can be expected to succeed —
      e.g. vocational training as prerequisite_for a matched employment
      placement offering.

  - id: offering_mutually_exclusive_with
    from: intervention_offering
    relationship: mutually_exclusive_with
    to: intervention_offering
    cardinality: { min: 0, max: unbounded }
    notes: >
      These two offerings should not ordinarily be provided to the same
      beneficiary or household concurrently without an explicit,
      documented rationale — e.g. unconditional cash assistance
      mutually_exclusive_with a conditional public-works cash-for-work
      offering targeting the same need.

  - id: offering_reinforces
    from: intervention_offering
    relationship: reinforces
    to: intervention_offering
    cardinality: { min: 0, max: unbounded }
    notes: >
      These two offerings strengthen each other's effect when provided
      together, without either being a strict prerequisite for the
      other — e.g. a business grant offering reinforces, and is
      reinforced by, a mentoring service_delivery offering.

  - id: offering_substitutes_for
    from: intervention_offering
    relationship: substitutes_for
    to: intervention_offering
    cardinality: { min: 0, max: unbounded }
    notes: >
      These two offerings address the same underlying need through
      different means, such that ordinarily only one, not both, would be
      selected for a given beneficiary or household — e.g. an employment
      placement offering substitutes_for a business grant offering
      addressing the same livelihood need.

  - id: enrollment_belongs_to_version
    from: enrollment
    relationship: belongs_to_version
    to: program_version
    cardinality: { min: 1, max: 1 }

  - id: enrollment_belongs_to_variant
    from: enrollment
    relationship: belongs_to_variant
    to: program_variant
    cardinality: { min: 0, max: 1 }

  - id: enrollment_for_beneficiary
    from: enrollment
    relationship: covers_beneficiary
    to: shared_human:person
    cardinality: { min: 1, max: 1 }

  - id: enrollment_for_household
    from: enrollment
    relationship: covers_household
    to: shared_human:household
    cardinality: { min: 0, max: 1 }

  - id: override_approves_enrollment
    from: humanitarian_override
    relationship: approves_enrollment
    to: enrollment
    cardinality: { min: 1, max: 1 }

  - id: appeal_challenges_enrollment
    from: appeal
    relationship: challenges_enrollment
    to: enrollment
    cardinality: { min: 1, max: 1 }

  - id: checkpoint_audits_program
    from: compliance_checkpoint
    relationship: audits_program
    to: program
    cardinality: { min: 1, max: 1 }
