version: "1.0.0"
domain: programs
file: ontology/data-properties.yaml
status: active

data_properties:
  # Program Properties
  - id: program_status
    domain: [program, program_variant]
    taxonomy_ref: program_status
    cardinality: { min: 1, max: 1 }

  - id: program_phase
    domain: [program, program_variant]
    taxonomy_ref: program_phase
    cardinality: { min: 1, max: 1 }

  - id: program_topology
    domain: program
    taxonomy_ref: program_topology
    cardinality: { min: 1, max: 1 }

  - id: thematic_sector
    domain: [program, program_variant]
    taxonomy_ref: thematic_sectors
    cardinality: { min: 1, max: unbounded }

  - id: funding_source_type
    domain: [program, program_variant]
    taxonomy_ref: funding_source_types
    cardinality: { min: 1, max: unbounded }

  - id: funding_restriction
    domain: [program, program_variant]
    taxonomy_ref: funding_restrictions
    cardinality: { min: 0, max: unbounded }

  - id: quota_type
    domain: [program, program_variant]
    taxonomy_ref: quota_types
    cardinality: { min: 1, max: 1 }

  - id: waitlist_priority_rule
    domain: [program, program_variant]
    taxonomy_ref: waitlist_priority
    cardinality: { min: 1, max: 1 }

  - id: capacity_limit
    domain: [program, program_variant]
    datatype: xsd:integer
    cardinality: { min: 0, max: 1 }

  # Version & Variant Properties
  - id: amendment_reason
    domain: program_version
    taxonomy_ref: amendment_reasons
    cardinality: { min: 0, max: 1 }

  - id: suspension_reason
    domain: [program, program_variant]
    taxonomy_ref: suspension_reasons
    cardinality: { min: 0, max: 1 }

  - id: reopening_reason
    domain: [program, program_variant]
    taxonomy_ref: reopening_reasons
    cardinality: { min: 0, max: 1 }

  - id: activation_date
    domain: [program_version, program_variant]
    datatype: xsd:dateTime
    cardinality: { min: 1, max: 1 }

  # Eligibility Properties
  - id: eligibility_category
    domain: eligibility_rule
    taxonomy_ref: eligibility_categories
    cardinality: { min: 1, max: 1 }

  - id: operator
    domain: eligibility_rule
    taxonomy_ref: eligibility_operators
    cardinality: { min: 1, max: 1 }

  - id: target_value
    domain: eligibility_rule
    datatype: xsd:string
    cardinality: { min: 1, max: 1 }

  # Intervention Offering Properties
  - id: intervention_modality
    domain: intervention_offering
    taxonomy_ref: intervention_modality
    cardinality: { min: 1, max: 1 }

  - id: conditionality_type
    domain: intervention_offering
    taxonomy_ref: conditionality_types
    cardinality: { min: 0, max: unbounded }

  - id: milestone_type
    domain: intervention_offering
    taxonomy_ref: milestone_types
    cardinality: { min: 0, max: 1 }

  # Enrollment Properties
  - id: enrollment_status
    domain: enrollment
    taxonomy_ref: enrollment_status
    cardinality: { min: 1, max: 1 }

  - id: enrollment_outcome
    domain: enrollment
    taxonomy_ref: enrollment_outcome
    cardinality: { min: 0, max: 1 }

  - id: termination_reason
    domain: enrollment
    taxonomy_ref: termination_reasons
    cardinality: { min: 0, max: 1 }

  - id: application_date
    domain: enrollment
    datatype: xsd:dateTime
    cardinality: { min: 1, max: 1 }

  # Exceptions & Appeals
  - id: override_reason
    domain: humanitarian_override
    taxonomy_ref: override_reasons
    cardinality: { min: 1, max: 1 }

  - id: override_authority
    domain: humanitarian_override
    taxonomy_ref: override_authorities
    cardinality: { min: 1, max: 1 }

  - id: appeal_outcome
    domain: appeal
    taxonomy_ref: appeal_outcomes
    cardinality: { min: 0, max: 1 }

  # Compliance
  - id: reporting_period
    domain: compliance_checkpoint
    taxonomy_ref: reporting_periods
    cardinality: { min: 1, max: 1 }

  - id: audit_finding
    domain: compliance_checkpoint
    taxonomy_ref: audit_findings
    cardinality: { min: 0, max: 1 }

  # Cross-Domain Role Extensions
  - id: implementing_partner_role
    domain: shared_org:organisation
    taxonomy_ref: implementing_partner_roles
    cardinality: { min: 0, max: unbounded }
