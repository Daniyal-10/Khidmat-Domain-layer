version: "1.0.0"
domain: programs
file: taxonomy/lifecycle-and-status.yaml
status: active

purpose: >
  Classifies the lifecycle stages, phases, statuses, and evolutionary events
  of a humanitarian program. Does not model individual beneficiary lifecycles.

schemes:
  - id: program_status
    label: Program Status
    description: >
      The current operational status of the program as a whole.
    concepts:
      - id: planned
        label: Planned
        description: >
          The program is being designed and funded but is not yet active.
      - id: active
        label: Active
        description: >
          The program is currently operating and may process enrollments or deliveries.
      - id: suspended
        label: Suspended
        description: >
          The program operations are temporarily halted (e.g., due to conflict or funding cuts).
      - id: closed
        label: Closed
        description: >
          The program has permanently ended.
          
  - id: program_phase
    label: Program Phase
    description: >
      The structural phase of a program's execution, distinct from its operational status.
    concepts:
      - id: pilot
        label: Pilot Phase
        description: >
          Initial testing phase with a restricted cohort.
      - id: scale_up
        label: Scale-Up
        description: >
          Expanding the program geographically or demographically.
      - id: steady_state
        label: Steady State
        description: >
          Standard ongoing operations.
      - id: phase_down
        label: Phase-Down
        description: >
          Gradually reducing operations leading to closure or handover.
          
  - id: amendment_reasons
    label: Amendment Reasons
    description: >
      Justifications for why a program version was amended.
    concepts:
      - id: legislative_change
        label: Legislative Change
        description: >
          A change in government law or regulation required the amendment.
      - id: donor_mandate
        label: Donor Mandate
        description: >
          The funding entity required a change in scope or criteria.
      - id: contextual_shift
        label: Contextual Shift
        description: >
          Macro-economic or conflict changes (e.g., severe inflation) forced a redesign.
          
  - id: suspension_reasons
    label: Suspension Reasons
    description: >
      Classifies why an active program was suspended.
    concepts:
      - id: security_deterioration
        label: Security Deterioration
        description: >
          Loss of safe access to the operational area.
      - id: funding_shortfall
        label: Funding Shortfall
        description: >
          Unexpected loss of budget or delayed donor disbursements.
      - id: regulatory_block
        label: Regulatory Block
        description: >
          Government or local authority revoked permission to operate.
          
  - id: reopening_reasons
    label: Reopening Reasons
    description: >
      Classifies why a suspended program resumed.
    concepts:
      - id: security_restored
        label: Security Restored
        description: >
          Safe access has been re-established.
      - id: funding_secured
        label: Funding Secured
        description: >
          The budget shortfall has been resolved.
          
  - id: successor_relationships
    label: Successor Relationships
    description: >
      How a new program relates to the program it replaces.
    concepts:
      - id: direct_continuation
        label: Direct Continuation
        description: >
          The new program continues the old one with identical aims but new funding.
      - id: phased_transition
        label: Phased Transition
        description: >
          The new program serves the same cohort but with different interventions (e.g., relief to recovery).
      - id: merger
        label: Merger
        description: >
          The new program consolidates multiple prior programs.
