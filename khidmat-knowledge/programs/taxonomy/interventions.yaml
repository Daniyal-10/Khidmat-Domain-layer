version: "1.0.0"
domain: programs
file: taxonomy/interventions.yaml
status: active

purpose: >
  Classifies the modalities and catalogues of support offerings a program provides,
  including conditionality and milestone structures.

schemes:
  - id: intervention_modality
    label: Intervention Modality
    description: >
      The fundamental nature of the assistance provided.
    concepts:
      - id: unrestricted_cash
        label: Unrestricted Cash
        description: >
          Direct monetary transfer with no spending constraints.
      - id: restricted_voucher
        label: Restricted Voucher
        description: >
          Value that can only be spent on specific goods or at specific merchants.
      - id: in_kind_goods
        label: In-Kind Goods
        description: >
          Physical items (e.g., food rations, blankets).
      - id: service_delivery
        label: Service Delivery
        description: >
          Professional services (e.g., medical treatment, legal aid, training).
      - id: asset_transfer
        label: Asset Transfer
        description: >
          Productive assets (e.g., livestock, sewing machines) for livelihood generation.
          
  - id: conditionality_types
    label: Conditionality Types
    description: >
      Behavioral or external requirements that must be met to receive the intervention.
    concepts:
      - id: unconditional
        label: Unconditional
        description: >
          Provided without any required action by the beneficiary.
      - id: health_attendance
        label: Health Attendance
        description: >
          Conditional on attending clinics (e.g., maternal health checkups).
      - id: school_attendance
        label: School Attendance
        description: >
          Conditional on children maintaining a minimum school attendance rate.
      - id: public_works
        label: Public Works
        description: >
          Conditional on participating in community labor (Cash-for-Work).
          
  - id: milestone_types
    label: Milestone Types
    description: >
      Significant phases or achievements in a phased graduation program.
    concepts:
      - id: intake_consumption_support
        label: Intake & Consumption Support
        description: >
          Initial phase providing basic survival needs.
      - id: asset_selection
        label: Asset Selection & Transfer
        description: >
          Phase where productive livelihood assets are provided.
      - id: skill_certification
        label: Skill Certification
        description: >
          Completion of required training.
      - id: graduation_readiness
        label: Graduation Readiness
        description: >
          Final evaluation phase before exiting the program.

  # ---------------------------------------------------------------------
  # Added per Stage 6 Canonical Implementation, closing the "Intervention
  # Objective Category" gap identified in
  # STAGE6_INTERVENTION_ONTOLOGY_GAP_AUDIT.md. Deliberately independent of
  # both intervention_modality (the delivery form — cash, voucher, in-kind,
  # service, asset) and thematic_sectors (structure.yaml — the sector,
  # e.g. WASH, livelihood, health). Two interventions can share a modality
  # and sector (e.g. two asset_transfer, livelihood-sector interventions —
  # a business grant and a business grant repeated after enterprise
  # failure) while serving entirely different humanitarian purposes; this
  # scheme names that third, independent axis. Six categories, not an
  # exhaustive list — mirrors the "small, closed, illustrative" design
  # discipline already used for hazard-categories.yaml and
  # protection-indicators.yaml elsewhere in this knowledge layer.
  # ---------------------------------------------------------------------
  - id: intervention_objective_category
    label: Intervention Objective Category
    description: >
      The underlying humanitarian purpose an intervention is intended to
      serve, independent of its delivery modality and thematic sector.
      Answers "what problem is this meant to solve," not "how is it
      delivered" or "which sector does it belong to."
    concepts:
      - id: survival_and_stabilization
        label: Survival and Stabilization
        description: >
          Preserves life, safety, or basic physiological function in the
          near term. Does not address the underlying cause of the crisis.
      - id: restoration
        label: Restoration
        description: >
          Returns a person or household toward a prior functioning
          baseline that was disrupted by a specific event or loss.
      - id: capacity_building
        label: Capacity Building
        description: >
          Builds a new skill, asset, or ability that did not previously
          exist, or did not exist at a sufficient level, in the person or
          household.
      - id: protective
        label: Protective
        description: >
          Reduces exposure to harm, exploitation, or a specific
          identified safeguarding risk.
      - id: connective
        label: Connective
        description: >
          Links an already-capable person or household to an opportunity,
          market, service, or entitlement they could not otherwise reach.
      - id: resilience_building
        label: Resilience Building
        description: >
          Builds capacity to absorb a future shock without falling back
          into crisis, independent of any currently active crisis.
    note: >
      An intervention_offering may reasonably be assigned more than one
      category where its purpose is genuinely mixed (see the
      intervention_objective_category data property's cardinality in
      programs/ontology/data-properties.yaml); the categories are not
      mutually exclusive.
