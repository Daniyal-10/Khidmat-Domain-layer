version: "1.0.0"
domain: programs
file: taxonomy/governance-and-exceptions.yaml
status: active

purpose: >
  Classifies the mechanisms for manual overrides, appeals, and governance exceptions.

schemes:
  - id: override_reasons
    label: Override Reasons
    description: >
      Justifications for a Humanitarian Override bypassing standard eligibility rules.
    concepts:
      - id: extreme_protection_risk
        label: Extreme Protection Risk
        description: >
          The individual faces imminent harm, superseding demographic or geographic criteria.
      - id: undocumented_vulnerability
        label: Undocumented Vulnerability
        description: >
          The person is highly vulnerable but lacks the formal documentation required by standard rules.
      - id: family_unity
        label: Family Unity
        description: >
          Overriding criteria to keep a household enrolled together when one member technically ages out.
          
  - id: override_authorities
    label: Override Authorities
    description: >
      The role or entity empowered to approve a Humanitarian Override.
    concepts:
      - id: field_director
        label: Field Director
        description: >
          Senior operational leader in the geographic zone.
      - id: technical_specialist
        label: Technical Specialist
        description: >
          Subject matter expert (e.g., Child Protection Officer) authorizing based on clinical/social need.
      - id: donor_waiver
        label: Donor Waiver
        description: >
          Explicit exception granted directly by the funding entity.
          
  - id: appeal_outcomes
    label: Appeal Outcomes
    description: >
      The result of a beneficiary challenging an enrollment rejection or termination.
    concepts:
      - id: appeal_upheld
        label: Appeal Upheld
        description: >
          The original decision was overturned; enrollment is granted/restored.
      - id: appeal_rejected
        label: Appeal Rejected
        description: >
          The original decision stands.
      - id: conditional_probation
        label: Conditional Probation
        description: >
          Enrollment restored temporarily pending further verification.
