version: "1.0.0"
domain: programs
file: taxonomy/funding-and-compliance.yaml
status: active

purpose: >
  Classifies funding restrictions, source types, and compliance/reporting checkpoints.

schemes:
  - id: funding_source_types
    label: Funding Source Types
    description: >
      The macro-category of the entity providing the program funds.
    concepts:
      - id: government_statutory
        label: Government Statutory
        description: >
          Funds mandated by law or national budget (e.g., entitlement programs).
      - id: multilateral_agency
        label: Multilateral Agency
        description: >
          UN agencies, World Bank, or international consortiums.
      - id: private_foundation
        label: Private Foundation
        description: >
          Philanthropic trusts and foundations.
      - id: corporate_csr
        label: Corporate CSR
        description: >
          Corporate Social Responsibility funds.
      - id: public_donations
        label: Public Donations
        description: >
          Crowdfunding or individual unrestricted giving.
          
  - id: funding_restrictions
    label: Funding Restrictions
    description: >
      Rules governing how the program's funds can be used.
    concepts:
      - id: unrestricted
        label: Unrestricted
        description: >
          Funds can be deployed flexibly at the program manager's discretion.
      - id: earmarked_geographic
        label: Earmarked (Geographic)
        description: >
          Funds must be spent in a specific location.
      - id: earmarked_demographic
        label: Earmarked (Demographic)
        description: >
          Funds must be spent on a specific cohort (e.g., orphans).
      - id: tied_procurement
        label: Tied Procurement
        description: >
          Supplies must be purchased from specific vendors or countries.
          
  - id: quota_types
    label: Quota Types
    description: >
      How the program's capacity is constrained.
    concepts:
      - id: hard_household_cap
        label: Hard Household Cap
        description: >
          A strict limit on the number of enrolled households.
      - id: budget_drawdown
        label: Budget Drawdown
        description: >
          Capacity ends when the financial pool is exhausted, regardless of household count.
      - id: uncapped_entitlement
        label: Uncapped Entitlement
        description: >
          No quota; the program must serve all who meet statutory criteria.
          
  - id: reporting_periods
    label: Reporting Periods
    description: >
      Mandated intervals for donor or regulatory compliance reporting.
    concepts:
      - id: monthly
        label: Monthly
        description: >
          Reports due every month.
      - id: quarterly
        label: Quarterly
        description: >
          Reports due every 3 months.
      - id: annual
        label: Annual
        description: >
          Reports due once a year.
      - id: end_of_project
        label: End of Project
        description: >
          A single comprehensive report at closure.
          
  - id: compliance_checkpoints
    label: Compliance Checkpoints
    description: >
      Mandatory verifications required to maintain active enrollment or funding.
    concepts:
      - id: proof_of_life
        label: Proof of Life
        description: >
          Periodic verification that a pension or long-term beneficiary is still alive.
      - id: financial_audit
        label: Financial Audit
        description: >
          Verification of fund disbursement integrity.
      - id: eligibility_reverification
        label: Eligibility Reverification
        description: >
          Checking that an active beneficiary still meets income/demographic rules.
          
  - id: audit_findings
    label: Audit Findings
    description: >
      Outcomes of a compliance checkpoint.
    concepts:
      - id: compliant
        label: Compliant
        description: >
          No issues found.
      - id: minor_discrepancy
        label: Minor Discrepancy
        description: >
          Issues found but curable; program continues.
      - id: critical_violation
        label: Critical Violation
        description: >
          Severe breach (e.g., fraud) triggering suspension or termination.
