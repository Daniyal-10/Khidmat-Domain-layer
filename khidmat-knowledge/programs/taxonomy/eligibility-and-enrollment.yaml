version: "1.0.0"
domain: programs
file: taxonomy/eligibility-and-enrollment.yaml
status: active

purpose: >
  Classifies the rules for eligibility, enrollment states, outcomes, and graduation.

schemes:
  - id: eligibility_categories
    label: Eligibility Categories
    description: >
      The broad type of criteria used to target beneficiaries.
    concepts:
      - id: demographic_categorical
        label: Demographic Categorical
        description: >
          Based on inherent traits like age, gender, or disability.
      - id: means_tested
        label: Means-Tested
        description: >
          Based on income, assets, or economic capacity.
      - id: geographic
        label: Geographic
        description: >
          Based solely on residence in a specific location or disaster zone.
      - id: vulnerability_scored
        label: Vulnerability-Scored
        description: >
          Based on a composite risk or vulnerability score crossing a threshold.
          
  - id: eligibility_operators
    label: Eligibility Operators
    description: >
      Logical operators used in eligibility rule definitions.
    concepts:
      - id: equals
        label: Equals
        description: >
          Must perfectly match the target value.
      - id: greater_than
        label: Greater Than
        description: >
          Numeric or ordinal value must be strictly higher.
      - id: less_than
        label: Less Than
        description: >
          Numeric or ordinal value must be strictly lower.
      - id: in_set
        label: In Set
        description: >
          Value must be one of the specified allowed values.
          
  - id: enrollment_status
    label: Enrollment Status
    description: >
      The state of a beneficiary's relationship with the program.
    concepts:
      - id: applied
        label: Applied
        description: >
          Application received but not yet evaluated.
      - id: waitlisted
        label: Waitlisted
        description: >
          Eligible, but program capacity is currently full.
      - id: enrolled_active
        label: Enrolled (Active)
        description: >
          Currently receiving interventions.
      - id: enrolled_suspended
        label: Enrolled (Suspended)
        description: >
          Enrollment is temporarily paused (e.g., pending compliance check).
      - id: exited
        label: Exited
        description: >
          No longer in the program.
          
  - id: enrollment_outcome
    label: Enrollment Outcome
    description: >
      The final resolution of an enrollment when it reaches the exited state.
    concepts:
      - id: graduated
        label: Graduated
        description: >
          Successfully completed the program and achieved its objectives.
        note: >
          Added per Stage 7B Repository Remediation (Major Finding M-3,
          HKMP_STAGE7_REPOSITORY_SEMANTIC_INTEGRITY_AUDIT.md). Scoped to
          this specific Program enrollment only — distinct from, and not
          automatically implying, beneficiary_lifecycle:exit_reason#graduated
          (beneficiary-lifecycle/taxonomy/exit-reasons.yaml), which
          describes the beneficiary's entire ecosystem relationship
          concluding because self-sufficiency was achieved. A beneficiary
          may graduate from one program while remaining engaged, or
          enrolled in another, elsewhere in the ecosystem. Neither value
          redefines the other.
      - id: terminated
        label: Terminated
        description: >
          Removed from the program before completion (e.g., fraud, moved away).
      - id: transitioned
        label: Transitioned
        description: >
          Moved to a successor or different program.
          
  - id: termination_reasons
    label: Termination Reasons
    description: >
      Why an enrollment was terminated prematurely.
    concepts:
      - id: loss_of_eligibility
        label: Loss of Eligibility
        description: >
          The beneficiary no longer meets the criteria (e.g., aged out, income rose).
      - id: beneficiary_withdrawal
        label: Beneficiary Withdrawal
        description: >
          The beneficiary voluntarily opted out.
      - id: fraud_or_misrepresentation
        label: Fraud or Misrepresentation
        description: >
          The enrollment was based on false claims.
      - id: unreachable
        label: Unreachable
        description: >
          The beneficiary cannot be located for an extended period.
          
  - id: waitlist_priority
    label: Waitlist Priority
    description: >
      The method used to rank applicants on a waitlist.
    concepts:
      - id: first_come_first_served
        label: First-Come, First-Served
        description: >
          Ranked strictly by application date.
      - id: highest_vulnerability_first
        label: Highest Vulnerability First
        description: >
          Ranked by a computed risk or vulnerability score.
      - id: lottery
        label: Lottery
        description: >
          Randomized selection from the eligible pool.

  # ---------------------------------------------------------------------
  # Added per Stage 6 Canonical Implementation, closing the "Intervention
  # Readiness" gap identified in
  # STAGE6_INTERVENTION_ONTOLOGY_GAP_AUDIT.md.
  #
  # Deliberately distinct from three existing, adjacent concepts, none of
  # which this scheme redefines or duplicates:
  #   - eligibility_categories (this file): a categorical, rule-based
  #     qualification question — does this beneficiary formally qualify
  #     under the program's stated rules. A beneficiary can be fully
  #     eligible and still not ready (a business grant applicant who
  #     qualifies on means-tested criteria but has no confirmed market for
  #     the proposed enterprise), or occasionally ready in practice before
  #     formal eligibility is confirmed.
  #   - shared/risk/ontology/vulnerability.yaml#vulnerability_level: a
  #     latent susceptibility-to-harm judgement, describing the household
  #     independent of any specific intervention.
  #   - shared/human-model/taxonomy/capabilities.yaml capability levels: a
  #     person's general ability in a capability domain, independent of
  #     any specific intervention or current market/contextual conditions.
  #     A person can have full vocational capability and still not be
  #     ready for a specific business grant if the local market for that
  #     specific enterprise is currently saturated.
  # Readiness is the composed judgement that sits downstream of all
  # three: given eligibility, vulnerability, and capability are already
  # known, is the specific context and capacity actually in place for
  # this specific intervention to succeed now. Reuses the qualitative,
  # non-scored, four-level composition pattern already established for
  # vulnerability_level and verification_confidence, rather than
  # inventing a new scale shape.
  # ---------------------------------------------------------------------
  - id: intervention_readiness_level
    label: Intervention Readiness Level
    description: >
      A structured, qualitative judgement of whether the actual context
      and capacity for a specific intervention are currently in place for
      a specific beneficiary or household — distinct from formal
      eligibility, from general vulnerability, and from general
      capability (see the design note above). Assessed per intervention,
      not once per beneficiary, since readiness for one intervention type
      does not imply readiness for another.
    concepts:
      - id: ready
        label: Ready
        description: >
          The confirmed prerequisites and context for this specific
          intervention are in place now; no further preparation is
          required before proceeding.
      - id: partially_ready
        label: Partially Ready
        description: >
          Some, but not all, of the confirmed prerequisites and context
          are in place; proceeding without addressing the remaining gap
          carries a materially elevated risk of failure.
      - id: not_ready
        label: Not Ready
        description: >
          A confirmed prerequisite or contextual condition for this
          intervention is absent; proceeding now would not be expected to
          succeed.
      - id: not_assessed
        label: Not Assessed
        description: >
          Readiness for this specific intervention has not yet been
          examined. Consistent with the open-world assumption applied
          throughout this knowledge layer, absence of assessment is not
          evidence of not_ready.
