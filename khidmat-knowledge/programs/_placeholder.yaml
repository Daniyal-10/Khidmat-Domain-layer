domain: programs
maturity: level_2_placeholder
status: not_yet_active

scope: >
  This domain governs structured programs that group interventions
  under defined criteria — targeting rules, eligibility, duration,
  funding constraints, and reporting requirements.

concepts_this_domain_will_own:
  - program_definition
  - eligibility_criteria
  - program_cycle
  - beneficiary_enrollment_in_program
  - program_budget
  - program_reporting

do_not_implement_until: >
  A structured program distinct from ad-hoc case-by-case
  assistance has been defined by the client.