# Needs Assessment Taxonomy

assessment_depth:
  description: "The granularity and duration of the assessment event."
  values:
    - rapid: "A quick, lower-granularity evaluation conducted to gauge macro-level needs over a short duration."
    - detailed: "A comprehensive, in-depth evaluation conducted to formulate long-term recovery plans."

assessment_urgency:
  description: "The operational context and triage pressure driving the assessment."
  values:
    - routine: "Conducted as part of standard operations without immediate acute threat to life."
    - emergency: "An immediate, focused assessment triggered by an acute threat to life or safety."

assessment_scope:
  description: "The primary subject unit being evaluated during the assessment."
  values:
    - individual: "The assessment focuses on specific needs belonging to a single person (e.g., child protection, maternal health)."
    - household: "The assessment evaluates shared needs affecting the entire family unit (e.g., shelter, WASH, food security)."
    - community: "The assessment evaluates needs affecting a broader group or geographic area."

assessment_status:
  description: "The lifecycle stage of the assessment event itself."
  values:
    - planned: "The assessment is scheduled but has not yet commenced."
    - in_progress: "The assessment is actively underway or data collection is ongoing."
    - completed: "The assessment has been formally concluded and findings are immutable."
    - discontinued: "The assessment was halted before completion and did not produce valid findings."

assessment_methodology:
  description: "The broad methodological approach or class of the evaluation."
  values:
    - structured: "A standardized evaluation using fixed questions and predefined quantitative metrics."
    - semi_structured: "An evaluation combining standard questions with open-ended qualitative exploration."
    - observational: "An evaluation primarily relying on direct field observation of conditions."
    - participatory: "An evaluation actively involving the community or subject in the analytical process."
    - clinical: "An evaluation involving medical, psychological, or specialized technical measurements."
    - mixed_method: "An evaluation explicitly combining two or more distinct methodological classes."

finding_confidence:
  description: "The degree of epistemic trust or analytical confidence placed in an Assessment Finding based on evidence quality, corroboration, and professional judgement."
  values:
    - very_high: "Conclusion is supported by overwhelming, corroborated evidence or direct, unimpeachable observation."
    - high: "Conclusion is supported by strong evidence and consistent narrative, meeting the threshold for definitive action."
    - medium: "Conclusion is supported by partial or proxy evidence; sufficient for planning but may require further verification before major resource commitment."
    - low: "Conclusion is suspected based on fragmented, weak, or conflicting evidence; requires immediate cross-checking."

need_severity:
  description: "The objective intensity, depth, or acuteness of an Identified Need, evaluated without regard to resource availability."
  values:
    - critical: "Immediate threat to life, severe physical harm, or total collapse of basic survival mechanisms."
    - high: "Significant deprivation causing severe suffering or irreversible harm if not addressed promptly."
    - medium: "Moderate deprivation that degrades well-being or resilience but is not immediately life-threatening."
    - low: "Mild deprivation that limits full potential but does not threaten basic safety or survival."