version: "1.0.0"
domain: needs_assessment
file: ontology/relationships.yaml
status: active

namespaces:
  community_ctx: http://khidmat.org/ontology/community-context
  shared: http://khidmat.org/ontology/shared
  registration: http://khidmat.org/ontology/registration
  verification_operations: http://khidmat.org/ontology/verification-operations

relationships:
  - id: session_uses_instrument
    from: assessment_session
    relationship: uses_instrument
    to: assessment_instrument
    cardinality: { min: 1, max: 1 }
    inverse: instrument_used_in_session

  - id: instrument_contains_indicator
    from: assessment_instrument
    relationship: contains_indicator
    to: assessment_indicator
    cardinality: { min: 1, max: unbounded }
    inverse: indicator_belongs_to_instrument

  - id: session_evaluates_person
    from: assessment_session
    relationship: evaluates_person
    to: shared:person
    cardinality: { min: 0, max: 1 }

  - id: session_evaluates_household
    from: assessment_session
    relationship: evaluates_household
    to: shared:household
    cardinality: { min: 0, max: 1 }

  - id: session_evaluates_community
    from: assessment_session
    relationship: evaluates_community
    to: community_ctx:geographic_area
    cardinality: { min: 0, max: 1 }

  - id: session_conducted_by_person
    from: assessment_session
    relationship: conducted_by
    to: shared:person
    cardinality: { min: 0, max: unbounded }

  - id: session_conducted_by_actor
    from: assessment_session
    relationship: conducted_by_actor
    to: shared:actor
    cardinality: { min: 0, max: unbounded }

  - id: session_yields_observation
    from: assessment_session
    relationship: yields_observation
    to: observation
    cardinality: { min: 1, max: unbounded }
    inverse: observation_from_session

  - id: observation_evaluates_indicator
    from: observation
    relationship: evaluates_indicator
    to: assessment_indicator
    cardinality: { min: 1, max: 1 }
    inverse: indicator_evaluated_by_observation

  - id: observation_synthesizes_into
    from: observation
    relationship: synthesizes_into
    to: need_assertion
    cardinality: { min: 1, max: unbounded }
    inverse: assertion_synthesized_from

  - id: observation_based_on_claim
    from: observation
    relationship: based_on_claim
    to: registration:claim
    cardinality: { min: 0, max: unbounded }

  - id: need_assertion_based_on_verified_fact
    from: need_assertion
    relationship: based_on_verified_fact
    to: verification_operations:verification_finding
    cardinality: { min: 0, max: unbounded }

  - id: consensus_resolves_finding
    from: finding_consensus
    relationship: resolves_finding
    to: need_assertion
    cardinality: { min: 1, max: unbounded }
    inverse: finding_resolved_by

  - id: consensus_reviews_observation
    from: finding_consensus
    relationship: reviews_observation
    to: observation
    cardinality: { min: 1, max: unbounded }

  - id: session_supersedes_assertion
    from: assessment_session
    relationship: supersedes_assertion
    to: need_assertion
    cardinality: { min: 0, max: unbounded }
    inverse: assertion_superseded_by_session

  - id: review_audits_session
    from: supervisor_review
    relationship: audits_session
    to: assessment_session
    cardinality: { min: 1, max: 1 }

  - id: calibration_audits_assessor
    from: assessor_calibration
    relationship: audits_assessor
    to: shared:person
    cardinality: { min: 1, max: 1 }

  - id: trigger_initiates_session
    from: reassessment_trigger
    relationship: initiates_session
    to: assessment_session
    cardinality: { min: 1, max: unbounded }

  # Added per Stage 2A Canonical Needs Assessment Enrichment, mirroring
  # registration/ontology/relationships.yaml#need_influences_need at the
  # synthesized-finding level. A need_assertion is the governed, confidence-
  # rated conclusion this domain owns; once two need_assertions are both
  # authoritative (or provisional) in the same session/case, this relationship
  # records the same three humanitarian patterns the Registration-level
  # relationship records for raw needs — causal contribution, structural
  # blocking, and compounding. It does not duplicate need_influences_need:
  # Registration's need is the intake-time claim, needs-assessment's
  # need_assertion is the synthesized, evidence-weighted finding — the two
  # entities are already distinct and separately owned (see this domain's
  # README, "Does Not Own"), so the relationship between their respective
  # instances is necessarily a separate relationship, not a re-declaration.
  - id: assertion_influences_assertion
    from: need_assertion
    relationship: influences
    to: need_assertion
    cardinality: { min: 0, max: unbounded }
    inverse: influenced_by_assertion
