version: "1.0.0"
domain: needs_assessment
file: ontology/entities.yaml
status: active

namespaces:
  shared: http://khidmat.org/ontology/shared

entities:
  - id: assessment_instrument
    label: Assessment Instrument
    description: >
      The formalized tool, questionnaire, or matrix defining the structure of the evaluation.
    required: true
    parent: shared:assessment_tool

  - id: assessment_indicator
    label: Assessment Indicator
    description: >
      The specific question, metric, or indicator measured by an assessment instrument.
    required: true

  - id: assessment_session
    label: Assessment Session
    description: >
      The episodic event of applying an instrument to a subject at a specific time and location.
    required: true

  - id: observation
    label: Observation
    description: >
      A raw, uninterpreted piece of evidence or data point gathered during a session.
    required: true

  - id: need_assertion
    label: Need Assertion (Finding)
    description: >
      The synthesized conclusion that a subject has a specific deficit, vulnerability, or capacity gap.
    required: true

  - id: finding_consensus
    label: Finding Consensus
    description: >
      The governance record that resolves conflicting findings or elevates a finding to Authoritative status.
    required: false

  - id: supervisor_review
    label: Supervisor Review
    description: >
      The formal quality assurance gate where a supervisor evaluates an assessment session or finding.
    required: false

  - id: assessor_calibration
    label: Assessor Calibration
    description: >
      The governance process for identifying and correcting systemic bias in an assessor's scoring.
    required: false

  - id: reassessment_trigger
    label: Reassessment Trigger
    description: >
      An incident, schedule, or rule that mandates a new assessment session to supersede an aging baseline.
    required: false
