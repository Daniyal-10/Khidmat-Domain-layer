version: "1.2.0"
domain: needs_assessment
file: ontology/data-properties.yaml
status: active

namespaces:
  programs_tax: http://khidmat.org/ontology/programs/taxonomy
  registration_tax: http://khidmat.org/ontology/registration/taxonomy

# need_assertion_relationship_type (below) references
# registration_tax:need_relationship_type — the same reconciliation pattern
# already used by need_severity (see that property's own notes): no new
# taxonomy scheme is authored here, and the scheme is not duplicated.

data_properties:
  # Assessment Session Properties
  - id: session_status
    domain: assessment_session
    taxonomy_ref: session_status
    cardinality: { min: 1, max: 1 }

  - id: assessment_modality
    domain: assessment_session
    taxonomy_ref: assessment_modality
    cardinality: { min: 1, max: 1 }

  - id: session_date
    domain: assessment_session
    datatype: xsd:dateTime
    cardinality: { min: 1, max: 1 }

  - id: assessment_depth
    domain: assessment_session
    taxonomy_ref: assessment_depth
    cardinality: { min: 1, max: 1 }

  - id: assessment_urgency
    domain: assessment_session
    taxonomy_ref: assessment_urgency
    cardinality: { min: 1, max: 1 }

  - id: assessment_methodology
    domain: assessment_session
    taxonomy_ref: assessment_methodology
    cardinality: { min: 1, max: 1 }

  # Observation Properties
  - id: observation_value
    domain: observation
    datatype: xsd:string
    cardinality: { min: 0, max: 1 }

  - id: evidence_type
    domain: observation
    taxonomy_ref: evidence_type
    cardinality: { min: 1, max: 1 }

  - id: confidence_level
    domain: [observation, need_assertion]
    taxonomy_ref: confidence_level
    cardinality: { min: 1, max: 1 }

  - id: conflict_status
    domain: [observation, need_assertion]
    taxonomy_ref: conflict_status
    cardinality: { min: 1, max: 1 }

  - id: missing_data_reason
    domain: observation
    taxonomy_ref: missing_data_reason
    cardinality: { min: 0, max: 1 }

  - id: requires_case_escalation
    domain: observation
    datatype: xsd:boolean
    cardinality: { min: 0, max: 1 }

  # Need Assertion Properties
  - id: finding_status
    domain: need_assertion
    taxonomy_ref: need_assertion_status
    cardinality: { min: 1, max: 1 }
    notes: >
      Property id unchanged; taxonomy_ref retargeted from finding_status to
      need_assertion_status per Phase 1.4 Canonical Taxonomy Completion
      (see needs-assessment/taxonomy/finding.yaml for the rename rationale).

  - id: need_severity
    domain: need_assertion
    taxonomy_ref: registration_tax:need_severity
    cardinality: { min: 1, max: 1 }
    notes: >
      Migrated per Phase 1.3A Ownership Conflict Resolution: this is the
      Needs Assessment domain's own synthesized/verified severity
      classification for the need, distinct from need_urgency (temporal
      pressure) and from Registration's own claimed severity at intake
      (registration/ontology/data-properties.yaml's need.need_severity).
      References the same existing critical/high/medium/low scheme already
      authored in registration/taxonomy/needs.yaml rather than duplicating
      it — that scheme's own comment marked it "pending Phase 5
      reconciliation with needs-assessment/taxonomy.yaml#need_severity";
      this property is that reconciliation. No new taxonomy scheme was
      authored. This was previously declared only in the legacy monolith
      (needs-assessment/ontology.yaml#IdentifiedNeed.need_severity, now
      retired) and had no canonical home until this property was added.

  - id: invalidation_reason
    domain: need_assertion
    taxonomy_ref: invalidation_reason
    cardinality: { min: 0, max: 1 }

  - id: need_urgency
    domain: need_assertion
    taxonomy_ref: need_urgency
    cardinality: { min: 1, max: 1 }

  - id: thematic_sector
    domain: need_assertion
    taxonomy_ref: programs_tax:thematic_sectors
    cardinality: { min: 1, max: unbounded }

  - id: validity_window_end
    domain: need_assertion
    datatype: xsd:dateTime
    cardinality: { min: 0, max: 1 }

  # Added per Stage 2A Canonical Needs Assessment Enrichment.
  - id: need_assertion_relationship_type
    domain: assertion_influences_assertion
    taxonomy_ref: registration_tax:need_relationship_type
    cardinality: { min: 1, max: 1 }
    notes: >
      Domain is the assertion_influences_assertion relationship
      (ontology/relationships.yaml), not the need_assertion entity — this
      property qualifies a specific edge between two need_assertion
      instances. References registration_tax:need_relationship_type rather
      than authoring a parallel scheme, per Single Ownership (ADR-008): the
      relationship semantics (contributes_to / blocks / compounds) are a
      single humanitarian concept regardless of whether the two connected
      instances are Registration's intake-time needs or this domain's
      synthesized need_assertions.

  # Finding Consensus Properties
  - id: consensus_date
    domain: finding_consensus
    datatype: xsd:dateTime
    cardinality: { min: 1, max: 1 }

  - id: consensus_status
    domain: finding_consensus
    taxonomy_ref: consensus_status
    cardinality: { min: 1, max: 1 }

  - id: consensus_outcome
    domain: finding_consensus
    taxonomy_ref: consensus_outcome
    cardinality: { min: 0, max: 1 }

  # Supervisor Review Properties
  - id: review_status
    domain: supervisor_review
    taxonomy_ref: review_status
    cardinality: { min: 1, max: 1 }

  - id: rejection_reason
    domain: supervisor_review
    taxonomy_ref: rejection_reason
    cardinality: { min: 0, max: 1 }

  # Assessor Calibration Properties
  - id: calibration_status
    domain: assessor_calibration
    taxonomy_ref: calibration_status
    cardinality: { min: 1, max: 1 }

  - id: calibration_outcome
    domain: assessor_calibration
    taxonomy_ref: calibration_outcome
    cardinality: { min: 0, max: 1 }

  # Reassessment Trigger Properties
  - id: trigger_status
    domain: reassessment_trigger
    taxonomy_ref: trigger_status
    cardinality: { min: 1, max: 1 }

  - id: trigger_type
    domain: reassessment_trigger
    taxonomy_ref: trigger_type
    cardinality: { min: 1, max: 1 }
