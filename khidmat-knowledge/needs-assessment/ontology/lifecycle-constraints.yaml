version: "1.0.0"
domain: needs-assessment
file: ontology/lifecycle-constraints.yaml
status: active

entity: assessment_session
lifecycle:
  - state: scheduled
    transitions_to: [in_progress, abandoned]
  - state: in_progress
    transitions_to: [completed, partially_completed, interrupted, abandoned]
  - state: completed
    transitions_to: []
  - state: partially_completed
    transitions_to: []
  - state: interrupted
    transitions_to: [in_progress, abandoned]
  - state: abandoned
    transitions_to: []

entity: need_assertion
lifecycle:
  - state: provisional
    transitions_to: [under_review, disputed, authoritative, invalidated]
  - state: under_review
    transitions_to: [authoritative, disputed, invalidated]
  - state: disputed
    transitions_to: [under_review, authoritative, invalidated]
  - state: authoritative
    transitions_to: [expired, invalidated]
  - state: expired
    transitions_to: []
  - state: invalidated
    transitions_to: []

entity: supervisor_review
lifecycle:
  - state: pending
    transitions_to: [in_progress, cancelled]
  - state: in_progress
    transitions_to: [approved, rejected]
  - state: approved
    transitions_to: []
  - state: rejected
    transitions_to: []

entity: finding_consensus
lifecycle:
  - state: initiated
    transitions_to: [under_review, resolved]
  - state: under_review
    transitions_to: [resolved]
  - state: resolved
    transitions_to: []

entity: reassessment_trigger
lifecycle:
  - state: active
    transitions_to: [triggered, cancelled]
  - state: triggered
    transitions_to: [resolved]
  - state: resolved
    transitions_to: []
  - state: cancelled
    transitions_to: []
