version: "1.0.0"
domain: needs-assessment
file: ontology/semantic-constraints.yaml
status: active

constraints:
  - id: session_must_evaluate_at_least_one_subject
    type: required_if
    property: evaluates_person
    entities: [assessment_session]
    parameters: { condition: "evaluates_household == empty and evaluates_community == empty" }

  - id: missing_data_requires_reason
    type: required_if
    property: missing_data_reason
    entities: [observation]
    parameters: { condition: "evidence_type == null or observation_value == null" }

  - id: invalidated_finding_requires_reason
    type: required_if
    property: invalidation_reason
    entities: [need_assertion]
    parameters: { condition: "finding_status == invalidated" }

  - id: finding_consensus_must_resolve_finding
    type: cardinality
    property: resolves_finding
    entities: [finding_consensus, need_assertion]
    parameters: { min: 1, max: unbounded }

  - id: safety_risk_triggers_escalation
    type: required_if
    property: requires_case_escalation
    entities: [observation]
    parameters: { condition: "missing_data_reason == safety_risk" }
