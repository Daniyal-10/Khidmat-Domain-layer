version: "1.0.0"
domain: needs_assessment
file: taxonomy/session.yaml
status: active

purpose: >
  Classifies the states, modalities, missing data reasons, depth, urgency,
  and methodology of an assessment session.

schemes:
  - id: session_status
    label: Session Status
    description: >
      The execution state of a specific assessment session.
    concepts:
      - id: scheduled
        label: Scheduled
        description: Planned but not yet started.
      - id: in_progress
        label: In Progress
        description: Currently being conducted.
      - id: completed
        label: Completed
        description: All sections applied and finalized.
      - id: partially_completed
        label: Partially Completed
        description: Some sections applied, finalized without full completion.
      - id: interrupted
        label: Interrupted
        description: Stopped abruptly by external events (e.g., security incident).
      - id: abandoned
        label: Abandoned
        description: Stopped abruptly and will not be resumed.

  - id: assessment_modality
    label: Assessment Modality
    description: >
      The method by which the session is conducted.
    concepts:
      - id: in_person_interview
        label: In-Person Interview
        description: Face-to-face questionnaire.
      - id: remote_phone
        label: Remote Phone Survey
        description: Conducted via voice call.
      - id: direct_observation
        label: Direct Observation
        description: Assessor evaluates without interacting with a respondent.
      - id: digital_self_service
        label: Digital Self-Service
        description: The subject fills out the instrument themselves.

  - id: missing_data_reason
    label: Missing Data Reason
    description: >
      Why a specific observation or finding was not gathered.
    concepts:
      - id: beneficiary_refusal
        label: Beneficiary Refusal
        description: The subject declined to answer.
      - id: safety_risk
        label: Safety / Protection Risk
        description: Assessor skipped due to risk to the subject (e.g., abuser present).
      - id: language_barrier
        label: Language Barrier
        description: Question could not be translated or understood.
      - id: session_interrupted
        label: Session Interrupted
        description: Event stopped before reaching this point.
      - id: not_applicable
        label: Not Applicable
        description: The section logically does not apply.

  - id: assessment_depth
    label: Assessment Depth
    description: >
      The granularity and duration of the assessment event.
    concepts:
      - id: rapid
        label: Rapid
        description: >
          A quick, lower-granularity evaluation conducted to gauge
          macro-level needs over a short duration.
      - id: detailed
        label: Detailed
        description: >
          A comprehensive, in-depth evaluation conducted to formulate
          long-term recovery plans.

  - id: assessment_urgency
    label: Assessment Urgency
    description: >
      The operational context and triage pressure driving the assessment.
    concepts:
      - id: routine
        label: Routine
        description: >
          Conducted as part of standard operations without immediate acute
          threat to life.
      - id: emergency
        label: Emergency
        description: >
          An immediate, focused assessment triggered by an acute threat to
          life or safety.

  - id: assessment_methodology
    label: Assessment Methodology
    description: >
      The broad methodological approach or class of the evaluation.
    concepts:
      - id: structured
        label: Structured
        description: >
          A standardized evaluation using fixed questions and predefined
          quantitative metrics.
      - id: semi_structured
        label: Semi-Structured
        description: >
          An evaluation combining standard questions with open-ended
          qualitative exploration.
      - id: observational
        label: Observational
        description: >
          An evaluation primarily relying on direct field observation of
          conditions.
      - id: participatory
        label: Participatory
        description: >
          An evaluation actively involving the community or subject in the
          analytical process.
      - id: clinical
        label: Clinical
        description: >
          An evaluation involving medical, psychological, or specialized
          technical measurements.
      - id: mixed_method
        label: Mixed Method
        description: >
          An evaluation explicitly combining two or more distinct
          methodological classes.
