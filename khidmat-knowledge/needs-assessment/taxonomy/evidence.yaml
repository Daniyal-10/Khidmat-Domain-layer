version: "1.0.0"
domain: needs-assessment
file: taxonomy/evidence.yaml
status: active

purpose: >
  Classifies the epistemology of evidence: types, confidence levels, and conflict statuses.

schemes:
  - id: evidence_type
    label: Evidence Type
    description: >
      The epistemological source of an observation.
    concepts:
      - id: declared
        label: Declared
        description: Self-reported by the subject.
      - id: proxy_reported
        label: Proxy Reported
        description: Stated by a third party (e.g., household head, community leader).
      - id: observed
        label: Assessor Observed
        description: Direct sensory observation by the assessor.
      - id: verified
        label: Document Verified
        description: Backed by formal documentation or biometric proof.
      - id: inferred
        label: Inferred
        description: Deduced through the professional judgment of the assessor.

  - id: confidence_level
    label: Confidence Level
    description: >
      The degree of certainty attached to an observation or finding.
    concepts:
      - id: high
        label: High
        description: Corroborated or definitively verified.
      - id: medium
        label: Medium
        description: Standard self-report or uncorroborated observation.
      - id: low
        label: Low
        description: Suspected inaccuracy or conflict with other indicators.
      - id: highly_uncertain
        label: Highly Uncertain
        description: Guesswork or heavily compromised data collection.

  - id: conflict_status
    label: Conflict Status
    description: >
      Indicates if a finding contradicts other data points.
    concepts:
      - id: consistent
        label: Consistent
        description: Aligns with all other observations.
      - id: internal_conflict
        label: Internal Conflict
        description: Contradicts other observations within the same session.
      - id: external_conflict
        label: External Conflict
        description: Contradicts external sessions or legacy findings.
