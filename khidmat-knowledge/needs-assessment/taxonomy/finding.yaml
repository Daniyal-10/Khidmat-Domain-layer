version: "1.1.0"
domain: needs_assessment
file: taxonomy/finding.yaml
status: active

purpose: >
  Classifies the status, severity, and invalidation rules for synthesized need assertions.

schemes:
  # Renamed from finding_status to need_assertion_status per Phase 1.4
  # Canonical Taxonomy Completion: this scheme id collided with
  # verification-operations/taxonomy/verification-findings.yaml's own
  # finding_status scheme, which classifies a different real-world concept
  # (what a completed verification_activity established about a claim, not
  # a need_assertion's governance state). The two were never the same
  # concept, only the same generic name; this rename disambiguates without
  # changing either scheme's content. The one consuming taxonomy_ref
  # (needs-assessment/ontology/data-properties.yaml#finding_status, the
  # need_assertion property — property id unchanged, only its taxonomy_ref
  # value updated) was updated to match.
  - id: need_assertion_status
    label: Need Assertion Status
    description: >
      The governance state of a Need Assertion.
    concepts:
      - id: provisional
        label: Provisional
        description: Drafted by assessor, awaiting supervisor review.
      - id: under_review
        label: Under Review
        description: Currently being audited or peer-reviewed.
      - id: disputed
        label: Disputed
        description: Challenged by another assessor or agency.
      - id: authoritative
        label: Authoritative (Consensus Reached)
        description: Accepted as the canonical truth.
      - id: expired
        label: Expired
        description: Naturally aged out of its validity window.
      - id: invalidated
        label: Invalidated
        description: Forcefully retired due to external events.

  - id: invalidation_reason
    label: Invalidation Reason
    description: >
      Why an authoritative finding was forcibly retired before expiry.
    concepts:
      - id: mass_disaster
        label: Mass Disaster Event
        description: Catastrophe changed the baseline reality.
      - id: superseded
        label: Superseded
        description: Replaced by a newer reassessment session.
      - id: fraud_detected
        label: Fraud Detected
        description: Original evidence found to be maliciously altered.

  - id: need_urgency
    label: Need Urgency
    description: >
      The severity of the deficit or vulnerability.
    concepts:
      - id: critical
        label: Critical
        description: Immediate threat to life or severe protection risk.
      - id: severe
        label: Severe
        description: Major degradation of living conditions.
      - id: moderate
        label: Moderate
        description: Struggling but surviving; requires eventual support.
      - id: mild
        label: Mild
        description: Minor vulnerability; coping mechanisms intact.
      - id: none
        label: None
        description: No vulnerability detected.
