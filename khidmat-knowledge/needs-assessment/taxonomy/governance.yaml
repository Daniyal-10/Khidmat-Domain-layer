version: "1.0.0"
domain: needs_assessment
file: taxonomy/governance.yaml
status: active

purpose: >
  Classifies the states and outcomes of the domain's quality-assurance and
  governance processes: supervisor review, assessor calibration, finding
  consensus, and reassessment triggers. Does not classify the substantive
  content of a finding or session itself (see finding.yaml, session.yaml) —
  only the governance process wrapped around it.

schemes:
  - id: review_status
    label: Review Status
    description: >
      The execution state of a supervisor_review.
    concepts:
      - id: pending
        label: Pending
        description: >
          The review has not yet started.
      - id: in_progress
        label: In Progress
        description: >
          The review is actively underway.
      - id: approved
        label: Approved
        description: >
          The reviewed session or finding was accepted without disqualifying issue.
      - id: rejected
        label: Rejected
        description: >
          The reviewed session or finding was found deficient and did not pass review.

  - id: rejection_reason
    label: Rejection Reason
    description: >
      Why a supervisor_review concluded in rejected.
    concepts:
      - id: insufficient_evidence
        label: Insufficient Evidence
        description: >
          The underlying observations do not support the conclusion reached.
      - id: methodology_concern
        label: Methodology Concern
        description: >
          The assessment was conducted in a way that deviates materially
          from the required methodology.
      - id: inconsistent_with_prior_findings
        label: Inconsistent with Prior Findings
        description: >
          The finding conflicts with an existing authoritative finding
          without adequate explanation.
      - id: requires_reassessment
        label: Requires Reassessment
        description: >
          The underlying session or evidence is too degraded or incomplete
          to certify, and a new assessment session is needed instead.
      - id: other
        label: Other
        description: >
          A rejection reason not covered by the other concepts in this scheme.

  - id: calibration_status
    label: Calibration Status
    description: >
      The execution state of an assessor_calibration process.
    concepts:
      - id: initiated
        label: Initiated
        description: >
          The calibration process has been opened against an assessor.
      - id: in_progress
        label: In Progress
        description: >
          The calibration analysis is actively underway.
      - id: resolved
        label: Resolved
        description: >
          The calibration process has concluded with a recorded outcome.

  - id: calibration_outcome
    label: Calibration Outcome
    description: >
      The conclusion reached by a resolved assessor_calibration.
    concepts:
      - id: bias_confirmed_corrective_action_issued
        label: Bias Confirmed — Corrective Action Issued
        description: >
          Systemic bias was confirmed in the assessor's scoring and a
          corrective action was issued.
      - id: bias_confirmed_monitoring_only
        label: Bias Confirmed — Monitoring Only
        description: >
          Systemic bias was confirmed but judged minor enough to warrant
          continued monitoring rather than immediate corrective action.
      - id: no_bias_detected
        label: No Bias Detected
        description: >
          The calibration analysis found no systemic bias in the assessor's scoring.
      - id: inconclusive
        label: Inconclusive
        description: >
          The available data was insufficient to reach a determination.

  - id: consensus_status
    label: Consensus Status
    description: >
      The execution state of a finding_consensus process.
    concepts:
      - id: initiated
        label: Initiated
        description: >
          The consensus process has been opened to resolve a conflicting
          or disputed finding.
      - id: under_review
        label: Under Review
        description: >
          The conflicting findings and underlying observations are actively
          being reconciled.
      - id: resolved
        label: Resolved
        description: >
          The consensus process has concluded with a recorded outcome.

  - id: consensus_outcome
    label: Consensus Outcome
    description: >
      The conclusion reached by a resolved finding_consensus.
    concepts:
      - id: finding_upheld
        label: Finding Upheld
        description: >
          The original finding was confirmed as correct without modification.
      - id: finding_revised
        label: Finding Revised
        description: >
          The finding was modified as a result of the consensus process.
      - id: finding_escalated
        label: Finding Escalated
        description: >
          The disagreement could not be resolved at this level and was
          escalated for a higher-level decision.
      - id: finding_invalidated
        label: Finding Invalidated
        description: >
          The consensus process concluded the finding should not stand and
          it was invalidated.

  - id: trigger_status
    label: Trigger Status
    description: >
      The execution state of a reassessment_trigger.
    concepts:
      - id: active
        label: Active
        description: >
          The trigger condition is being monitored but has not fired.
      - id: triggered
        label: Triggered
        description: >
          The trigger condition has fired and a reassessment session is mandated.
      - id: resolved
        label: Resolved
        description: >
          The mandated reassessment session was initiated and the trigger's
          purpose is fulfilled.
      - id: cancelled
        label: Cancelled
        description: >
          The trigger was withdrawn before firing or before a reassessment
          session was initiated.

  - id: trigger_type
    label: Trigger Type
    description: >
      What kind of event, schedule, or rule caused a reassessment_trigger
      to be created.
    concepts:
      - id: scheduled
        label: Scheduled
        description: >
          A routine, time-based reassessment cadence (e.g., a baseline that
          has aged past its validity window).
      - id: incident_based
        label: Incident-Based
        description: >
          A specific incident affecting the subject warrants re-evaluation.
      - id: disaster_event
        label: Disaster Event
        description: >
          A mass-scale event has changed the baseline reality for an area
          or population.
      - id: case_manager_request
        label: Case Manager Request
        description: >
          A case manager has requested a new assessment based on operational
          judgment.
      - id: data_quality_concern
        label: Data Quality Concern
        description: >
          A quality issue with the existing baseline (e.g., an invalidated
          finding) requires a new assessment to re-establish it.
      - id: other
        label: Other
        description: >
          A trigger type not covered by the other concepts in this scheme.
