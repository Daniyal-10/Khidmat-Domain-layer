version: "1.0.0"
domain: donor_resource
file: taxonomy/allocation.yaml
status: active

purpose: >
  Classifies three independent facets of a resource_allocation decision:
  allocation_priority (how urgently it should be fulfilled relative to other
  allocations), allocation_status (its own lifecycle state), and
  reservation_state (whether and how firmly the underlying inventory_item
  quantity is held against other claims). Kept as three separate schemes
  because a single resource_allocation varies independently on all three —
  a high-priority allocation can be merely tentatively reserved, or a
  low-priority allocation can be firmly committed.

schemes:
  - id: allocation_priority
    label: Allocation Priority
    description: >
      The urgency with which a resource_allocation should be fulfilled
      relative to other pending allocations drawing on the same or
      overlapping stock.
    concepts:
      - id: critical
        label: Critical
        description: >
          Immediate, life-safety-relevant need; fulfilled ahead of all other
          priority levels where stock is contested.
      - id: high
        label: High
        description: >
          Urgent but not immediately life-safety-critical.
      - id: standard
        label: Standard
        description: >
          Ordinary programmatic priority.
      - id: deferred
        label: Deferred
        description: >
          Explicitly lower priority than standard — e.g. a reserve allocation
          held for a contingency rather than an active, present need.

  - id: allocation_status
    label: Allocation Status
    description: >
      The lifecycle state of the allocation decision itself.
    concepts:
      - id: reserved
        label: Reserved
        description: >
          The allocation has been recorded, but the target program or
          case_plan may not yet be finalized (both allocated_to relationships
          may be unpopulated — relationships.yaml). Cannot be delivered from
          in this state, and cannot be fulfilled_from by a Support Delivery
          delivery_event (that reference row activates only once allocated).
      - id: committed
        label: Committed
        description: >
          The allocation is fully specified — inventory_item, quantity, and
          a populated allocated_to target — and ready for Support Delivery's
          downstream fulfilled_from reference to draw on.
      - id: fulfilled
        label: Fulfilled
        description: >
          The allocated stock has been handed off into the custody chain
          (Support Delivery has recorded a delivery_event referencing this
          allocation). This domain records that the allocation reached this
          state; it does not itself track the delivery_event's own
          progress — that remains Support Delivery's (governance.md Rule 9).
      - id: cancelled
        label: Cancelled
        description: >
          The allocation was withdrawn before fulfillment; its reserved
          quantity is released back to the inventory_item's available stock.
      - id: expired_unfulfilled
        label: Expired Unfulfilled
        description: >
          The allocation's relevance window passed without fulfillment (e.g.
          a time-bound emergency allocation whose response window closed);
          distinguished from cancelled by not being a deliberate withdrawal.

  - id: reservation_state
    label: Reservation State
    description: >
      How firmly an allocation's claim on its inventory_item's quantity is
      held against competing claims, independent of allocation_status.
    concepts:
      - id: tentative
        label: Tentative
        description: >
          A soft hold; the quantity may still be reassigned to a
          higher-priority allocation without formal cancellation of this one.
      - id: firm
        label: Firm
        description: >
          A hard hold; the quantity is not available to any other
          allocation until this one is fulfilled or cancelled.
      - id: released
        label: Released
        description: >
          The hold has ended (via fulfillment or cancellation) and the
          quantity, if unfulfilled, has returned to the inventory_item's
          available stock.
