version: "1.0.0"
domain: donor_resource
file: taxonomy/funding.yaml
status: active

purpose: >
  Classifies the lifecycle state of a grant (grant_status) and a contribution
  (contribution_status), and the renewal posture of a grant approaching or
  past its funding window's end (renewal_status). Funding windows themselves
  (start/end dates) are modeled as a value object on grant
  (data-properties.yaml#funding_window), not as a taxonomy — a date range has
  no controlled vocabulary to classify.

  This file does not redefine programs:funding_source_types or
  programs:funding_restrictions (programs/taxonomy/funding-and-compliance.yaml).
  A grant's funding_source_type and funding_restriction data properties
  reference those existing schemes directly; no parallel scheme is authored
  here.

schemes:
  - id: grant_status
    label: Grant Status
    description: >
      The macro lifecycle state of a grant, from proposal through closure.
    concepts:
      - id: proposed
        label: Proposed
        description: >
          The funding proposal has been submitted or is under negotiation;
          no commitment yet exists.
      - id: committed
        label: Committed
        description: >
          The donor has formally committed to the funding, but disbursement
          (contribution tranches) has not yet begun.
      - id: active
        label: Active
        description: >
          The grant is currently funding one or more programs and/or
          receiving contribution tranches within its funding window.
      - id: suspended
        label: Suspended
        description: >
          Funding is temporarily halted (e.g. pending a compliance review or
          audit finding) without the grant being terminated or expired.
      - id: renewed
        label: Renewed
        description: >
          The grant has been extended into a new funding window beyond its
          original end date. See renewal_status for finer-grained renewal
          posture.
      - id: expired
        label: Expired
        description: >
          The grant's funding window has ended without renewal; no further
          contributions are expected.
      - id: terminated
        label: Terminated
        description: >
          The grant was ended before its funding window's natural end,
          typically due to a critical compliance violation or a donor
          decision unrelated to the funding window's schedule.
      - id: closed
        label: Closed
        description: >
          The grant's full lifecycle (including any final reporting or
          audit) is complete and administratively closed, whether it reached
          this state via expiry, renewal-then-eventual-closure, or
          termination.

  - id: contribution_status
    label: Contribution Status
    description: >
      The lifecycle state of a single discrete giving event.
    concepts:
      - id: pledged
        label: Pledged
        description: >
          The donor has committed to this specific contribution but funds
          have not yet been received.
      - id: received
        label: Received
        description: >
          Funds have been received from the donor.
      - id: processing
        label: Processing
        description: >
          Received funds are being processed (e.g. currency conversion,
          internal allocation preparation) prior to being available for
          allocation.
      - id: allocated
        label: Allocated
        description: >
          The contribution has been committed to a specific funding purpose.
          Note: this records that the contribution's funds have a designated
          purpose within the funding chain — it is distinct from Stage 8C's
          resource_allocation entity (the act of committing a material or
          financial RESOURCE UNIT to a case_plan/program), which does not yet
          exist in this repository and is not referenced here.
      - id: reversed
        label: Reversed
        description: >
          The contribution was refunded, reversed, or otherwise did not
          complete (e.g. a failed payment, a donor-requested refund).

  - id: renewal_status
    label: Renewal Status
    description: >
      The renewal posture of a grant relative to its funding window, tracked
      independently of grant_status because a grant can be simultaneously
      active and already known to be pending_renewal or non_renewing well
      before its window actually ends.
    concepts:
      - id: not_applicable
        label: Not Applicable
        description: >
          The grant is a one-time, non-renewable commitment by design.
      - id: pending_renewal
        label: Pending Renewal
        description: >
          Renewal is under discussion or evaluation ahead of the funding
          window's end.
      - id: renewed
        label: Renewed
        description: >
          Renewal has been confirmed for a subsequent funding window.
      - id: non_renewed
        label: Non-Renewed
        description: >
          A renewal decision has been made, and the decision was not to
          renew.
      - id: lapsed
        label: Lapsed
        description: >
          The funding window ended with no renewal decision having been
          made either way.

references:
  - scheme: programs_tax:funding_source_types
    relation: distinct_from
    note: >
      grant.funding_source_type (data-properties.yaml) references this
      existing Programs scheme directly. No parallel scheme is authored in
      this file.
  - scheme: programs_tax:funding_restrictions
    relation: distinct_from
    note: >
      grant.funding_restriction (data-properties.yaml) references this
      existing Programs scheme directly. No parallel scheme is authored in
      this file.
