version: "1.0.0"
domain: donor_resource
file: taxonomy/stock-movement.yaml
status: active

purpose: >
  Classifies the KIND of stock movement event a specific inventory_item can
  undergo. This file authors the classification scheme only —
  stock_movement_type — and deliberately does NOT author a per-instance stock
  movement LOG entity (a "this inventory_item moved on this date for this
  reason" record). That per-instance, timestamped operational history is
  runtime/instance state, not stable ontology, mirroring the ADR-023 §19
  runtime/reasoning boundary already applied to Volunteer Operations'
  deferred assignment/training history (volunteer-operations/governance.md
  Rule 8). Authoring a movement LOG entity now would be inventing
  organization-specific operational process this domain does not own — the
  same discipline ADR-024 already established for Volunteer Operations' Tier
  2. If a future Stage 8D or operational pass needs a movement log, it is
  authored against this scheme, not by re-deriving it.

namespaces:
  support_delivery: support_delivery

schemes:
  - id: stock_movement_type
    label: Stock Movement Type
    description: >
      The kind of event that changes an inventory_item's quantity, location,
      or condition.
    concepts:
      - id: receiving
        label: Receiving
        description: >
          Stock enters inventory for the first time (e.g. from a donor
          in-kind contribution, a procurement delivery, or a transfer from
          another storage_location).
      - id: dispatch
        label: Dispatch
        description: >
          Stock leaves inventory tracking to enter the custody chain,
          typically as the direct upstream cause of Support Delivery's
          custody_transfer/delivery_event (referenced only by name here, not
          modeled — see governance.md Rule 9, Support Delivery boundary).
      - id: transfer
        label: Transfer
        description: >
          Stock moves from one storage_location to another storage_location
          without leaving inventory (i.e. without entering the custody
          chain) — a warehouse-to-warehouse or warehouse-to-distribution-
          center repositioning.
      - id: replenishment
        label: Replenishment
        description: >
          Stock is added to an existing inventory_item's quantity from a new
          receiving event, distinguished from the initial receiving of a
          previously-empty or newly-created inventory_item.
      - id: loss
        label: Loss
        description: >
          Stock is unaccounted for (e.g. theft, misplacement) without a
          determinable cause fitting damage or spoilage.
      - id: damage
        label: Damage
        description: >
          Stock becomes physically compromised while in inventory, resulting
          in a resource_condition change to damaged
          (taxonomy/resource-classification.yaml#resource_condition).
      - id: spoilage
        label: Spoilage
        description: >
          Perishable stock deteriorates past usability while in inventory,
          typically resulting in a resource_condition change to expired or
          contaminated.
      - id: return
        label: Return
        description: >
          Stock re-enters inventory after having left it — most commonly
          goods returned undelivered from a failed Support Delivery handover
          (support_delivery:delivery_status#returned,
          support-delivery/taxonomy/delivery-lifecycle.yaml, referenced not
          redefined). This is the exact seam the discovery report identified:
          the word "inventory" already appears informally in Support
          Delivery's delivery_status#returned concept; this stock_movement_
          type#return value is the formal reconciliation of that pre-existing
          informal usage, per HKMP_STAGE8A_ARCHITECTURE_AND_GOVERNANCE.md
          Part 5.

references:
  - scheme: support_delivery:delivery_status
    relation: distinct_from
    note: >
      stock_movement_type#dispatch and #return describe inventory-side stock
      events; support_delivery:delivery_status
      (support-delivery/taxonomy/delivery-lifecycle.yaml) describes the
      execution-side state of a specific delivery_event (dispatched, arrived,
      handover_attempted, delivered, failed, returned). The two schemes
      describe the same real-world moments from opposite sides of the
      inventory/custody boundary (governance.md Rule 9) and are not merged.
