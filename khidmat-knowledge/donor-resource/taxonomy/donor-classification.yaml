version: "1.0.0"
domain: donor_resource
file: taxonomy/donor-classification.yaml
status: active

purpose: >
  Classifies the donor_profile entity along three independent axes: legal/
  identity form (donor_type), giving behavior pattern (donor_engagement_pattern),
  and disclosure posture (anonymity_level). These are deliberately kept as
  three separate schemes rather than one flat list, because a single
  donor_profile instance genuinely varies independently on all three — e.g. an
  individual (donor_type) who gives recurring (donor_engagement_pattern) and
  wishes to remain undisclosed (anonymity_level) is one donor, not three. The
  original brief listed all eleven terms as a single flat list; this file
  reorganizes them into their correct independent axes without dropping or
  renaming any of them.

  donor_type is distinct from programs:funding_source_types
  (programs/taxonomy/funding-and-compliance.yaml) — the former classifies the
  GIVER's own segment (who they are), the latter classifies a PROGRAM's
  funding category (what kind of money funds this program). Both may be
  populated for the same funding relationship without duplication: a
  private_foundation-type donor_profile issuing a grant, and that grant's own
  funding_source_type value (also private_foundation, by convention, though
  not enforced as identical), are two separately-owned facts. See
  PREPARED_GOVERNANCE_ADDITIONS.md for the full reconciliation note.

schemes:
  - id: donor_type
    label: Donor Type
    description: >
      The legal or identity form of the giving party. A donor_profile may
      carry more than one value if genuinely dual-natured (e.g. a registered
      faith-based organisation that is also a government-recognized charity).
    concepts:
      - id: individual
        label: Individual Donor
        description: >
          A single natural person giving in a personal capacity.
      - id: institutional
        label: Institutional Donor
        description: >
          A formally structured non-corporate institution (multilateral
          agency, UN body, international NGO) — the donor-side counterpart to
          shared:organisation when the organisation's primary relationship to
          Khidmat is as a funder.
      - id: corporate
        label: Corporate Donor
        description: >
          A for-profit business entity giving directly or through a
          Corporate Social Responsibility (CSR) program.
      - id: government
        label: Government Donor
        description: >
          A government body or statutory agency providing funds, distinct
          from programs:funding_source_types#government_statutory, which
          classifies the funding's category rather than the giver.
      - id: foundation
        label: Foundation Donor
        description: >
          A private or public philanthropic foundation or grant-making trust.
      - id: faith_based
        label: Faith-Based Donor
        description: >
          An individual or institution giving specifically through a
          religious framework or religious-institutional channel. Does not
          itself imply which Islamic Giving type (see islamic-giving.yaml)
          applies — a faith_based donor_type and an islamic_giving_type value
          on a grant/contribution are independent facts that commonly, but
          not necessarily, co-occur.
      - id: community
        label: Community Donor
        description: >
          A community-native collective giving collectively — e.g. a
          local_philanthropic_trust or burial_or_bereavement_society
          (community-context:local-organizations.yaml, referenced not
          redefined).
      - id: anonymous
        label: Anonymous Donor
        description: >
          A donor whose identity is deliberately not disclosed in
          donor-facing reporting. Distinct from anonymity_level below:
          donor_type#anonymous marks the donor's own chosen category; the
          separate anonymity_level scheme records the DEGREE of disclosure
          for any donor_type, including non-anonymous ones who request
          discretion on a specific gift.

  - id: donor_engagement_pattern
    label: Donor Engagement Pattern
    description: >
      The temporal/behavioral pattern of a donor's giving, independent of
      their legal form. Any donor_type value may co-occur with any of these.
    concepts:
      - id: recurring
        label: Recurring Donor
        description: >
          Gives on a regular, ongoing basis rather than as a single event.
      - id: major
        label: Major Donor
        description: >
          Gives at a scale materially larger than the organisation's typical
          gift, warranting distinct stewardship — a relative, not absolute,
          classification left to implementing operational policy.
      - id: emergency
        label: Emergency Donor
        description: >
          Gives specifically and primarily in response to a declared
          emergency or crisis appeal, as distinct from steady-state giving.

  - id: anonymity_level
    label: Anonymity Level
    description: >
      The donor's disclosure posture, independent of donor_type. Applies to a
      donor_profile as a whole (its default posture) and may be further
      qualified per grant or contribution in future operational extensions —
      not modeled at that granularity here, per the discipline of not
      inventing per-instance operational detail this domain does not yet have
      a concrete requirement for.
    concepts:
      - id: named
        label: Named
        description: >
          The donor's identity is fully disclosed in donor-facing reporting
          and public acknowledgement, where applicable.
      - id: disclosed_internally_only
        label: Disclosed Internally Only
        description: >
          The donor's identity is known to Khidmat's operations but withheld
          from public-facing reporting and acknowledgement.
      - id: fully_anonymous
        label: Fully Anonymous
        description: >
          The donor's identity is not recorded, or is recorded but withheld
          from every party, including internal reporting beyond what is
          strictly required for financial-integrity purposes.

references:
  - scheme: programs_tax:funding_source_types
    relation: distinct_from
    note: >
      donor_type classifies the giving PARTY (who gives); funding_source_types
      (programs/taxonomy/funding-and-compliance.yaml) classifies a PROGRAM's
      funding category (what kind of money funds this program). Neither
      redefines the other. See this file's purpose note above and
      PREPARED_GOVERNANCE_ADDITIONS.md for the full reconciliation record.
