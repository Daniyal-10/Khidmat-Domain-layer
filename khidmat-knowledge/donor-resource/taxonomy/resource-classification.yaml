version: "1.1.0"
domain: donor_resource
file: taxonomy/resource-classification.yaml
status: active

purpose: >
  Classifies the two resource kinds (material_resource, financial_resource)
  and the tracked condition of an inventory_item (resource_condition). These
  three schemes are kept separate because they classify different things: WHAT
  KIND of material good (material_resource_category), WHAT KIND of financial
  instrument (financial_resource_category), and WHAT STATE a specific tracked
  unit is currently in (resource_condition) — a single inventory_item of
  material_resource_category#medicine could be in resource_condition#usable
  today and resource_condition#expired next month; the category does not
  change, only the condition.

  material_resource_category is distinct from programs:intervention_modality
  (programs/taxonomy/interventions.yaml) and support_delivery:delivery_modality
  (support-delivery/taxonomy/delivery-modalities.yaml) — see this file's
  reference block below, extending the reconciliation note already authored
  between those two existing schemes.

namespaces:
  programs: programs
  support_delivery: support_delivery

schemes:
  - id: material_resource_category
    label: Material Resource Category
    description: >
      The kind of physical good a material_resource represents. Canonical
      humanitarian categories only — not a product catalogue.
    concepts:
      - id: food
        label: Food
        description: >
          Food commodities and rations, from bulk staples to fortified
          supplementary items.
      - id: medicine
        label: Medicine
        description: >
          Pharmaceuticals and medical consumables. Frequently
          cold_chain_required (data-properties.yaml).
      - id: shelter_materials
        label: Shelter Materials
        description: >
          Tents, tarpaulins, construction materials, and other shelter
          construction/repair inputs.
      - id: clothing
        label: Clothing
        description: >
          Garments and footwear distributed as assistance.
      - id: hygiene_kits
        label: Hygiene Kits
        description: >
          Assembled kits of hygiene and sanitation items (soap, sanitary
          supplies, water purification materials).
      - id: educational_materials
        label: Educational Materials
        description: >
          Textbooks, school supplies, and learning materials.
      - id: medical_equipment
        label: Medical Equipment
        description: >
          Durable clinical equipment, distinct from consumable medicine.
      - id: vehicles
        label: Vehicles
        description: >
          Transport assets used in operations or distributed as livelihood
          assets.
      - id: fuel
        label: Fuel
        description: >
          Fuel stock for vehicles, generators, or cooking.
      - id: water
        label: Water
        description: >
          Bottled or bulk-stored potable water, distinct from WASH
          infrastructure (community-context:infrastructure-types.yaml,
          referenced not redefined).
      - id: agricultural_inputs
        label: Agricultural Inputs
        description: >
          Seeds, tools, fertilizer, and other livelihood/agricultural
          production inputs.

  - id: financial_resource_category
    label: Financial Resource Category
    description: >
      The kind of financial instrument a financial_resource represents.
      Distinct from a grant's funding_restriction (which classifies a
      FUNDING INSTANCE's restriction shape, programs_tax:funding_restrictions,
      referenced not redefined) — this scheme classifies the financial stock
      ITSELF that Khidmat holds.
    concepts:
      - id: unrestricted_cash
        label: Unrestricted Cash
        description: >
          Cash holdings deployable at operational discretion.
      - id: restricted_cash
        label: Restricted Cash
        description: >
          Cash holdings earmarked to a specific purpose, geography, or
          cohort, mirroring the restriction shape a grant may separately
          carry (programs_tax:funding_restrictions), applied here to the
          held stock rather than the funding instance.
      - id: voucher_value
        label: Voucher Value
        description: >
          The value backing distributable vouchers (commodity or cash
          vouchers), tracked as a financial resource distinct from the
          physical or digital voucher instrument's delivery form
          (support_delivery:delivery_modality#digital_cash_voucher /
          physical_cash_voucher, referenced not redefined).
      - id: revolving_fund
        label: Revolving Fund
        description: >
          A fund structured to be replenished by returns/repayments and
          redeployed (e.g. a microloan or cash-for-work revolving pool).
      - id: emergency_reserve
        label: Emergency Reserve
        description: >
          Financial stock held specifically for rapid deployment in a
          declared emergency, distinct from ordinary operational cash.

  - id: resource_condition
    label: Resource Condition
    description: >
      The current physical/usability state of a specific tracked
      inventory_item. Applies primarily to material_resource stock; a
      financial_resource's inventory_item ordinarily carries #usable or #new
      only (a cash balance does not expire, contaminate, or become damaged in
      the sense these concepts describe, though it may be #quarantined —
      e.g. funds under compliance hold).
    concepts:
      - id: new
        label: New
        description: >
          Unused, freshly received stock.
      - id: usable
        label: Usable
        description: >
          Fit for its intended humanitarian use, whether new or previously
          held.
      - id: damaged
        label: Damaged
        description: >
          Physically compromised such that it cannot be used for its
          original purpose without repair or reprocessing.
      - id: expired
        label: Expired
        description: >
          Past its usable shelf life or validity date. Cannot be allocated
          (semantic-constraints.yaml).
      - id: contaminated
        label: Contaminated
        description: >
          Compromised by an external contaminant, rendering it unsafe for
          its intended use pending remediation or disposal.
      - id: quarantined
        label: Quarantined
        description: >
          Held out of circulation pending investigation, compliance review,
          or a quality/safety determination — whether or not it is
          ultimately found usable. Cannot be allocated
          (semantic-constraints.yaml). Distinct from contaminated: a
          quarantined item's condition is not yet determined; a contaminated
          item's condition IS determined and confirmed unsafe.
      - id: under_inspection
        label: Under Inspection
        description: >
          Actively being assessed to determine its condition, prior to a
          final determination (usable, damaged, expired, contaminated, or
          quarantined-pending-further-action).

references:
  - scheme: programs:intervention_modality
    relation: distinct_from
    note: >
      material_resource_category classifies the STOCK Khidmat holds (what
      kind of good exists in inventory, before any allocation decision is
      made). intervention_modality (programs/taxonomy/interventions.yaml)
      classifies the catalogued Program OFFERING's financial/delivery form
      (cash, voucher, in-kind, service, asset). Neither redefines the other.
      Extends the existing two-way reconciliation note already authored in
      support-delivery/taxonomy/delivery-modalities.yaml to a three-way
      relationship. The staged extension to that existing file's own note
      was integrated during Stage 8D.
  - scheme: support_delivery:delivery_modality
    relation: distinct_from
    note: >
      material_resource_category classifies the stock itself.
      delivery_modality (support-delivery/taxonomy/delivery-modalities.yaml)
      classifies a specific delivery EVENT's handling, custody, and
      protection requirements at the moment of handover. Neither redefines
      the other. See the note above.
  - scheme: programs:intervention_modality
    relation: distinct_from
    note: >
      Added per HKMP Stage 8R Certification Remediation, completing the
      taxonomy reconciliation left half-done at Stage 8C (Major finding,
      HKMP_STAGE8E_SEMANTIC_INTEGRITY_AUDIT.md §5.2 /
      HKMP_STAGE8F_CERTIFICATION_REVIEW.md §5): the two references above
      cover material_resource_category only; financial_resource_category
      (unrestricted_cash, restricted_cash, voucher_value, revolving_fund,
      emergency_reserve) was left unreconciled against
      intervention_modality's own cash/voucher values, despite the direct
      terminology overlap. financial_resource_category classifies the
      FINANCIAL STOCK Khidmat holds (what kind of money/fund exists,
      before any allocation decision is made) — the same "stock, not
      offering-form" distinction material_resource_category already
      carries against intervention_modality (see the note above), applied
      to the financial side. intervention_modality's cash/voucher values
      classify the catalogued Program OFFERING's delivery form. Neither
      redefines the other; a Program offering intervention_modality#voucher
      is not required to be, and is not implied to be, backed by an
      inventory_item of financial_resource_category#voucher_value
      specifically — the two vocabularies are independently applicable.
  - scheme: support_delivery:delivery_modality
    relation: distinct_from
    note: >
      Added per HKMP Stage 8R Certification Remediation, same rationale as
      the programs:intervention_modality entry immediately above, applied to
      delivery_modality's own #digital_cash_voucher / #physical_cash_voucher
      values. financial_resource_category classifies the financial stock
      itself (e.g. voucher_value held in inventory); delivery_modality
      classifies a specific delivery EVENT's handover form once dispatched.
      Neither redefines the other, and a financial_resource's category is
      not required to align one-to-one with the delivery_modality of any
      specific delivery_event it eventually funds via
      resource_allocation → delivery_event_fulfilled_from_resource_allocation
      (support-delivery/ontology/relationships.yaml).
