#   - delivery_event fulfilled_from resource_allocation — Support Delivery's
#     own future reference row, authored on the Support Delivery side (not
#     here), the same discipline already applied throughout this file: the
#     domain owning the "from" entity authors the edge. Not authored by this
#     pass; Support Delivery's own certified files remain untouched (§2 of
#     HKMP_STAGE8C_IMPLEMENTATION_REPORT.md).
#   - Any relationship referencing custody_transfer, delivery_event,
#     proof_of_delivery, custodian, or dispatch workflow of any kind —
