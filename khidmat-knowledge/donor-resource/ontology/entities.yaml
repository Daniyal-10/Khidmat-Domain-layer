version: "1.1.0"
domain: donor_resource
file: donor-resource/ontology/entities.yaml
status: active

# Donor & Funding Intelligence (HKMP Stage 8B). Implements ADR-025 (Donor
# Identity Model), ADR-026 (Volunteer Boundary), and ADR-027 (Grant
# Ownership) as ratified in HKMP_STAGE8A_ARCHITECTURE_AND_GOVERNANCE.md.
#
# Stage 8C addendum (Material Resource & Logistics, ADR-028): the
# section below the Stage 8B entities adds resource, financial_resource,
# material_resource, inventory_item, storage_location, and resource_allocation.
# Nothing in the Stage 8B section above this line was altered to add them —
# per the Stage 8C brief's own rule, Donor, Grant, and Contribution are not
# revisited in this pass.

entities:

  - id: donor_profile
    label: Donor Profile
    description: >
      The record of a party's giving relationship with Khidmat's operations —
      segmentation, anonymity posture, and the aggregation point for the
      grants and contributions that party has made. Never an independent
      identity: it attaches BEHIND an existing shared:person (individual,
      faith-based-individual, community, or internally-known-but-publicly-
      anonymous donors) or shared:organisation (institutional, corporate,
      government, foundation donors) — never both for the same instance, and
      never neither unless the donor is genuinely untraceable (see
      ownership_boundary).
    required: false
    ownership_boundary: >
      Owns the giving-relationship profile only: donor segmentation
      (donor_type, donor_engagement_pattern), anonymity posture
      (anonymity_level), and the issued_by/given_by aggregation point for
      grant and contribution. Does NOT own person or organisation identity
      (name, contact, demographic data, organisation type) — those remain
      exclusively owned by shared/ontology/entities.yaml and
      shared/taxonomy/organisations.yaml. Does NOT own program funding
      classification (funding_source_types, funding_restrictions) — those
      remain exclusively owned by programs/taxonomy/funding-and-compliance.yaml
      and are referenced by grant, not by donor_profile itself. Mirrors the
      volunteer_profile / shared:actor pattern (ADR-024, FLAG-006) applied to
      a two-target case (person or organisation) instead of a single-target
      one (actor).
    notes: >
      Scalar/coded properties are authored in data-properties.yaml: donor_id,
      donor_type, donor_engagement_pattern, anonymity_level. The attachment to
      shared:person / shared:organisation is expressed in relationships.yaml
      (donor_profile_of_person, donor_profile_of_organisation — at most one
      populated per instance, enforced in semantic-constraints.yaml). A
      donor_profile with NEITHER relationship populated represents a
      genuinely untraceable giver (e.g. an unattributed cash-collection-box
      contribution) — this is an explicitly permitted zero-cardinality case
      per ADR-025, not a data-entry omission.

  - id: grant
    label: Grant
    description: >
      A funding commitment instance issued by a donor_profile — the missing
      link Programs' own gap report named ("tracking the lifecycle of the
      funding proposal that created the program", Programs_Repository_Gap_Report.md
      Type D). Represents formal, typically institutional funding with its own
      lifecycle (proposed, committed, active, suspended, renewed, expired,
      terminated, closed), funding window, and restriction shape. Optional,
      not mandatory: informal or unrestricted giving may fund a program
      directly via the pre-existing programs:program_funded_by edge without
      ever passing through a grant (ADR-027).
    required: false
    ownership_boundary: >
      Owns the funding-commitment instance and its lifecycle/window/renewal
      state. Does NOT own program-level funding classification
      (funding_source_types, funding_restrictions, quota_types,
      compliance_checkpoints, audit_findings) — those remain exclusively owned
      by programs/taxonomy/funding-and-compliance.yaml and are referenced by
      this entity's data properties, never redefined. Does NOT own the
      program_funded_by relationship (programs/ontology/relationships.yaml) —
      that edge is untouched; this entity adds a separate, additive funding
      path (grant_funds_program, relationships.yaml) rather than modifying it.
    notes: >
      Scalar/coded properties are authored in data-properties.yaml: grant_id,
      grant_status, funding_window (value object), renewal_status,
      funding_source_type (references programs_tax:funding_source_types),
      funding_restriction (references programs_tax:funding_restrictions),
      islamic_giving_type, zakat_eligible_category. Relationships: issued_by
      (donor_profile), funds (programs:program, additive/optional).

  - id: contribution
    label: Contribution
    description: >
      A single, discrete act of giving — one gift, or one disbursement
      tranche of a larger grant. May stand alone (a single unrestricted gift
      referencing only a donor_profile) or aggregate into a grant
      (contributes_to). A contribution is never itself the funding-lifecycle
      object — that role belongs to grant alone; a contribution records that
      one transfer occurred, not an ongoing commitment.
    required: false
    ownership_boundary: >
      Owns the discrete giving-event record only: date, status, designated
      purpose (free-text earmark note), and — for a standalone gift not tied
      to a grant — its own islamic_giving_type. Does NOT own the aggregation
      or commitment lifecycle a grant represents; a contribution's relation to
      an ongoing funding commitment is expressed only via contributes_to, not
      by duplicating grant's lifecycle fields.
    notes: >
      Scalar/coded properties are authored in data-properties.yaml:
      contribution_id, contribution_date, contribution_status,
      designated_purpose, islamic_giving_type. Relationships: given_by
      (donor_profile, required), contributes_to (grant, optional).

  # ===========================================================================
  # Material Resource & Logistics Intelligence (HKMP Stage 8C). Implements
  # ADR-028 (Resource Model) as ratified in
  # HKMP_STAGE8A_ARCHITECTURE_AND_GOVERNANCE.md. Stage 8B entities above are
  # unmodified.
  # ===========================================================================

  - id: resource
    label: Resource
    description: >
      Abstract supertype for anything Khidmat holds and can allocate — the
      common abstraction for financial_resource and material_resource,
      mirroring shared:subject's "owns no demographic data" discipline
      (ADR-018) applied to the resource domain. Resource itself is never
      allocated, stored with a quantity, or delivered directly — only a
      concrete inventory_item instantiating a resource (via one of its
      specializations) can be.
    required: false
    ownership_boundary: >
      Owns nothing — no data property of any kind is declared with
      `domain: resource`. Owns no identity, quantity, condition, or
      location — identity belongs to each concrete specialization
      (financial_resource_id/_name, material_resource_id/_name), and
      quantity/condition/location belong to inventory_item. Does NOT own
      delivery, custody, or handover — those remain exclusively Support
      Delivery's (delivery_event, custody_transfer, custodian,
      proof_of_delivery), referenced nowhere from this domain.

      Corrected per HKMP Stage 8R Certification Remediation
      (HKMP_STAGE8E_SEMANTIC_INTEGRITY_AUDIT.md §4.2 /
      HKMP_STAGE8F_CERTIFICATION_REVIEW.md §5): this entity previously
      declared `resource_id`/`resource_name` itself, contradicting both this
      text's own "owns no allocatable data" claim and the shared:subject
      precedent this entity is built to mirror — subject owns zero data
      properties; person_id/household_id/organisation_id are each declared
      on their own concrete type only. resource now matches that precedent
      exactly.
    notes: >
      Specializations (financial_resource, material_resource) declare
      `parent: resource`, per the same class-hierarchy mechanism already used
      by person/household under shared:subject (shared/ontology/entities.yaml).
      inventory_item references resource (or, more precisely, whichever
      specialization applies) via instance_of (relationships.yaml) — the
      type/instance split ADR-028 requires as non-negotiable.

  - id: financial_resource
    label: Financial Resource
    description: >
      A resource kind whose stock is monetary or monetary-equivalent value —
      unrestricted cash, restricted cash, voucher value, a revolving fund, or
      an emergency reserve (taxonomy/resource-classification.yaml#financial_resource_category).
      Inherits from resource.
    required: false
    parent: resource
    ownership_boundary: >
      Owns its own identity (financial_resource_id, financial_resource_name —
      moved here from the abstract resource entity per HKMP Stage 8R
      Certification Remediation, matching the person_id/household_id
      precedent), financial-resource-kind classification
      (financial_resource_category), and currency identity. Does NOT own a
      specific funding instance's restriction shape (that remains
      grant.funding_restriction, referencing Programs) or a specific tracked
      cash balance at a location (that is inventory_item's quantity_on_hand /
      available_quantity).
    notes: >
      Scalar/coded properties are authored in data-properties.yaml:
      financial_resource_id, financial_resource_name,
      financial_resource_category, currency.

  - id: material_resource
    label: Material Resource
    description: >
      A resource kind whose stock is physical goods — food, medicine, shelter
      materials, clothing, hygiene kits, educational materials, medical
      equipment, vehicles, fuel, water, or agricultural inputs
      (taxonomy/resource-classification.yaml#material_resource_category).
      Inherits from resource.
    required: false
    parent: resource
    ownership_boundary: >
      Owns its own identity (material_resource_id, material_resource_name —
      moved here from the abstract resource entity per HKMP Stage 8R
      Certification Remediation, matching the person_id/household_id
      precedent), material-resource-kind classification
      (material_resource_category), and the cold_chain_required
      characteristic. Does NOT own a specific tracked quantity, condition,
      expiry, or storage location — those are inventory_item's. Distinct
      from, and does not redefine, programs:intervention_modality (the
      catalogued Program offering's financial/delivery form) or
      support_delivery:delivery_modality (a delivery event's
      handover-requirement classification) — see
      taxonomy/resource-classification.yaml's reconciliation note.
    notes: >
      Scalar/coded properties are authored in data-properties.yaml:
      material_resource_id, material_resource_name, material_resource_category,
      cold_chain_required.

  - id: inventory_item
    label: Inventory Item
    description: >
      The trackable INSTANCE of a resource — a specific tracked quantity of a
      given resource kind, in a given condition, at a given storage_location,
      as of now. Never collapsed into resource: resource/financial_resource/
      material_resource describe WHAT KIND of thing this is; inventory_item
      describes HOW MUCH of it exists, in what condition, WHERE, right now.
      This is the type/instance split ADR-028 makes non-negotiable.
    required: false
    ownership_boundary: >
      Owns the tracked stock record: quantity (quantity_on_hand and
      available_quantity — the latter added per HKMP Stage 8R Certification
      Remediation to make "allocated quantity cannot exceed available
      quantity" checkable across multiple concurrent allocations, not just
      one at a time), unit of measure, condition, expiry, receipt date, and
      its current storage_location. Owns nothing once the item leaves
      inventory into the custody chain — the moment goods are dispatched,
      Support Delivery's custody_transfer/delivery_event takes over (Support
      Delivery boundary, governance.md Rule 9); this entity has no
      relationship pointing at either.
    notes: >
      Scalar properties are authored in data-properties.yaml:
      inventory_item_id, quantity_on_hand, available_quantity,
      unit_of_measure, resource_condition, expiry_date, received_date.
      Relationships: instance_of (resource), stored_at (storage_location).

  - id: storage_location
    label: Storage Location
    description: >
      A canonical storage concept — a warehouse, distribution center,
      cold-chain storage facility, temporary storage site, or mobile storage
      unit (taxonomy/storage.yaml#storage_location_type) — holding zero or
      more inventory_items. Represents WHERE stock physically sits before
      dispatch; not a software concept (no system, database, or application
      is modeled here).
    required: false
    ownership_boundary: >
      Owns storage-location identity and type classification only. Does NOT
      own the movement of goods into, out of, or between locations (that is
      stock_movement_type, taxonomy/stock-movement.yaml, a classification
      scheme only — no per-instance movement LOG entity is authored at this
      maturity, mirroring the ADR-023 §19 runtime/instance-state boundary
      already applied to Volunteer Operations' deferred assignment history).
      Does NOT own custody once goods leave — that is Support Delivery's
      custody_transfer/custodian.
    notes: >
      Scalar/coded properties are authored in data-properties.yaml:
      storage_location_id, storage_location_type.

  - id: resource_allocation
    label: Resource Allocation
    description: >
      The decision that reserves or commits a specific inventory_item (or a
      quantity of it) to a program or a case_plan, BEFORE delivery. Not
      delivery, not logistics execution, not the act of dispatch or handover —
      those remain Support Delivery's (delivery_event). Resource_allocation is
      the last decision point this domain owns; Support Delivery's own future
      reference row (delivery_event fulfilled_from resource_allocation) picks
      up from here, authored on the Support Delivery side, not here.
    required: false
    ownership_boundary: >
      Owns the allocation decision: which inventory_item, how much, at what
      priority, in what status, reserved against what funding
      (grant/contribution), and allocated to what program or case_plan. Does
      NOT own delivery scheduling, routing, custody, or handover — no
      relationship here points at delivery_event, custody_transfer,
      custodian, or proof_of_delivery (Support Delivery boundary,
      governance.md Rule 9). Does NOT own case_plan or program themselves —
      both are referenced, never redefined.
    notes: >
      Scalar/coded properties are authored in data-properties.yaml:
      resource_allocation_id, allocated_quantity, allocation_priority,
      allocation_status, reservation_state, allocation_date. Relationships:
      allocates (inventory_item), allocated_to (programs:program OR
      case_management:case_plan — mutually exclusive, see
      semantic-constraints.yaml), funded_by (grant OR contribution,
      optional).
