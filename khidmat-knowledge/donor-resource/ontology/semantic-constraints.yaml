version: "1.1.0"
domain: donor_resource
file: donor-resource/ontology/semantic-constraints.yaml
status: active

constraints:

  - id: donor_profile_attachment_exclusive
    type: mutually_exclusive
    property: profile_of_person
    entities: [donor_profile]
    parameters:
      with: [profile_of_organisation]
    notes: >
      At most one of profile_of_person, profile_of_organisation
      (relationships.yaml — rows donor_profile_of_person /
      donor_profile_of_organisation) may be populated on a single
      donor_profile instance. A donor_profile is an individual's giving
      profile or an organisation's, never both simultaneously (ADR-025).
      Zero populated is explicitly permitted (genuinely untraceable donor)
      and is therefore not enforced here as a minimum — only the mutual
      exclusivity is a hard invariant.

      `property`/`with` corrected per HKMP Stage 8R Certification
      Remediation to reference the canonical relationship verbs
      (`profile_of_person`, `profile_of_organisation`) rather than the
      per-row relationship ids this constraint previously used, closing a
      Critical finding — a direct violation of
      Canonical_Ontology_Schema.md §9 ("never a per-row relationship id").
      No change to what is actually constrained.

  - id: grant_requires_donor_profile
    type: cardinality
    property: issued_by
    entities: [grant, donor_profile]
    parameters: { min: 1, max: 1 }
    notes: >
      Every grant MUST trace to exactly one donor_profile — the structural
      expression of "a grant is issued BY someone," even when that someone is
      an untraceable donor_profile with no person/organisation attachment.

  - id: contribution_requires_donor_profile
    type: cardinality
    property: given_by
    entities: [contribution, donor_profile]
    parameters: { min: 1, max: 1 }
    notes: >
      Every contribution MUST trace to exactly one donor_profile, for the
      same reason as grant_requires_donor_profile above. There is no
      contribution authored without SOME donor_profile, even for fully
      anonymous giving (ADR-025).

  - id: contribution_single_grant
    type: cardinality
    property: contributes_to
    entities: [contribution, grant]
    parameters: { min: 0, max: 1 }
    notes: >
      A contribution contributes_to at most one grant — it is either a
      tranche of exactly one grant, or a standalone gift referencing no
      grant. A contribution split across multiple grants is not modeled;
      such a case would be authored as multiple contribution instances.

  - id: zakat_grant_requires_eligible_category
    type: required_if
    property: zakat_eligible_category
    entities: [grant]
    parameters: { condition: "grant_islamic_giving_type == zakat" }
    notes: >
      A grant tagged as zakat (islamic-giving.yaml#islamic_giving_type) MUST
      name at least one zakat_eligible_category. This is the semantic
      constraint the discovery report (§12) recommended be authored from the
      outset rather than deferred the way the pre-existing
      case_plan_addressed_by_intervention same-case gap was (a
      previously disclosed and accepted gap) — this domain does not repeat
      that known, disclosed gap pattern for its own zakat-restriction
      relationship.

  - id: contribution_date_not_before_grant_window
    type: cardinality
    property: contribution_date
    entities: [contribution, grant]
    parameters:
      expression: "contributes_to is not populated OR contribution_date >= grant.funding_window.window_start_date"
    notes: >
      When a contribution contributes_to a grant, its contribution_date must
      not precede that grant's funding_window.window_start_date — a tranche
      cannot be disbursed before the funding commitment it belongs to has
      begun. Does not constrain window_end_date, since a grant's window may
      be renewed (renewal_status) and a late-window or post-renewal
      contribution is a valid, ordinary case, not an anomaly.

      Reclassified from `required_if` to `cardinality` per Stage 8R
      Certification Remediation (optional cleanup item): `contribution_
      date` is already unconditionally required (data-properties.yaml,
      {min:1,max:1}), so `required_if` — reserved elsewhere in this
      repository for making an otherwise-optional property conditionally
      required (e.g. registration's `situation_safety_notes_required_if`) —
      was a type-vocabulary mismatch for what is really a general boolean
      invariant. `cardinality` with an `expression` parameter is the
      mechanism this same file's `inventory_quantity_non_negative` and
      `allocated_quantity_not_exceed_available` already use for the
      identical shape. The condition is folded into the expression itself
      (`contributes_to is not populated OR ...`) rather than kept as a
      separate `condition` parameter, since `cardinality`'s parameter shape
      does not include `condition` — this is a pure type/shape
      reclassification; the enforced invariant is unchanged.

  # ===========================================================================
  # Material Resource & Logistics Intelligence (HKMP Stage 8C).
  # Stage 8B constraints above are unmodified. Every constraint below models
  # humanitarian knowledge (a structural fact about resources, stock, and
  # allocation) — none is software input validation; how each row renders
  # into OWL/SHACL/LPG remains a generator concern (Canonical_Ontology_Schema.md
  # §9), unchanged from the Stage 8B constraints above.
  # ===========================================================================

  - id: inventory_item_requires_resource_type
    type: cardinality
    property: instance_of
    entities: [inventory_item, resource]
    parameters: { min: 1, max: 1 }
    notes: >
      Every inventory_item MUST instantiate exactly one resource — the
      structural expression of the type/instance split ADR-028
      requires: a tracked stock record cannot exist without stating what
      kind of thing it tracks.

  - id: inventory_item_requires_storage_location
    type: cardinality
    property: stored_at
    entities: [inventory_item, storage_location]
    parameters: { min: 1, max: 1 }
    notes: >
      Every inventory_item MUST be stored at exactly one storage_location.
      There is no "unlocated" tracked stock in this domain's model — stock
      that has left all storage_locations has left inventory tracking
      entirely and become Support Delivery's concern (governance.md Rule 9).

  - id: inventory_quantity_non_negative
    type: cardinality
    property: quantity_on_hand
    entities: [inventory_item]
    parameters: { expression: "quantity_on_hand >= 0" }
    notes: >
      An inventory_item's tracked quantity can never be negative. Mirrors
      registration's own use of the cardinality type's expression parameter
      for a general non-negativity invariant (registration:
      beneficiary_age_validation, household_size_validation), not a literal
      relationship-count restriction.

  - id: resource_allocation_requires_inventory_item
    type: cardinality
    property: allocates
    entities: [resource_allocation, inventory_item]
    parameters: { min: 1, max: 1 }
    notes: >
      Every resource_allocation MUST allocate exactly one inventory_item —
      the structural expression of "a reservation/commitment decision is a
      decision ABOUT some specific tracked stock."

  - id: inventory_item_available_quantity_bounds
    type: cardinality
    property: available_quantity
    entities: [inventory_item]
    parameters:
      expression: "available_quantity >= 0 AND available_quantity <= quantity_on_hand"
    notes: >
      An inventory_item's available_quantity (data-properties.yaml — the
      portion of quantity_on_hand not currently held by a firm or committed
      resource_allocation) can never be negative and can never exceed
      quantity_on_hand. Added per Stage 8R Certification Remediation to
      resolve a Major finding: previously,
      allocated_quantity_not_exceed_available checked a single
      resource_allocation against raw quantity_on_hand, which multiple
      concurrent allocations could each individually satisfy while
      collectively over-committing the stock. Maintaining available_quantity
      as its own tracked fact (declared, bounded, and checked here, exactly
      as quantity_on_hand itself is declared and checked by
      inventory_quantity_non_negative) keeps this within ontology scope: the
      ontology declares and constrains the FACT of how much is available; it
      does not prescribe the reasoning/application-layer process that keeps
      available_quantity in sync with the sum of active allocations against
      the item, for the same reason this repository does not author a
      per-instance stock-movement LOG entity (taxonomy/stock-movement.yaml's
      own purpose note, mirroring the ADR-023 §19 runtime/instance-state
      boundary already applied to Volunteer Operations' Tier 2).

  - id: allocated_quantity_not_exceed_available
    type: cardinality
    property: allocated_quantity
    entities: [resource_allocation, inventory_item]
    parameters:
      expression: "allocated_quantity <= inventory_item.available_quantity"
    notes: >
      A resource_allocation's allocated_quantity must not exceed the
      available_quantity (not the raw quantity_on_hand) of the inventory_item
      it allocates. Retargeted from quantity_on_hand to available_quantity
      per HKMP Stage 8R Certification Remediation — see
      inventory_item_available_quantity_bounds above for the full rationale.
      This closes the multi-allocation over-commitment gap: because
      available_quantity is maintained (by the reasoning/application layer)
      as the net-of-existing-commitments figure, checking allocated_quantity
      against it — rather than against the gross quantity_on_hand — is what
      actually prevents two valid-looking allocations from collectively
      exceeding stock. This is the "allocated quantity cannot exceed
      available quantity" invariant named in the Stage 8C brief, now checked
      against a field actually named and scoped for that purpose.

  - id: expired_or_quarantined_resource_not_allocatable
    type: cardinality
    property: allocation_status
    entities: [resource_allocation, inventory_item]
    parameters:
      expression: "NOT (inventory_item.resource_condition IN [expired, quarantined] AND allocation_status IN [committed, fulfilled])"
    notes: >
      An inventory_item whose resource_condition is expired or quarantined
      cannot be the target of a committed or fulfilled resource_allocation
      (a reserved-only allocation against such stock is likewise expected to
      block progression to committed while the condition holds, though that
      transition rule itself is lifecycle behavior this domain does not
      author a separate lifecycle-constraints.yaml file for at this maturity
      — see README.md's note on that decision). This is the direct
      structural translation, at this domain's own boundary, of the Stage
      8C brief's "expired resources cannot be allocated" and "quarantined
      resources cannot be distributed": since Support Delivery's distribution
      act (delivery_event) can only ever fulfil an already-committed
      allocation (fulfilled_from, authored on the Support Delivery side —
      see relationships.yaml's deferred-items note), blocking allocation at
      this boundary transitively blocks distribution without this domain
      needing to reference delivery_event at all.

  - id: resource_allocation_target_exclusive
    type: mutually_exclusive
    property: allocated_to_program
    entities: [resource_allocation]
    parameters:
      with: [allocated_to_case_plan]
    notes: >
      At most one of allocated_to_program, allocated_to_case_plan
      (relationships.yaml — rows resource_allocation_allocated_to_program /
      resource_allocation_allocated_to_case_plan) may be populated on a
      single resource_allocation instance — an allocation is committed to a
      program-level pool or to a specific case_plan, never both
      simultaneously. Both unpopulated is permitted for a merely reserved
      allocation (allocation_status#reserved, taxonomy/allocation.yaml) not
      yet assigned to either target.

      `property`/`with` corrected per HKMP Stage 8R Certification
      Remediation to reference the canonical relationship verbs
      (`allocated_to_program`, `allocated_to_case_plan`) rather than the
      per-row relationship ids — see donor_profile_attachment_exclusive's
      note above for the full rationale. No change to what is actually
      constrained.

  - id: resource_allocation_funding_source_exclusive
    type: mutually_exclusive
    property: funded_by_grant
    entities: [resource_allocation]
    parameters:
      with: [funded_by_contribution]
    notes: >
      At most one of funded_by_grant, funded_by_contribution
      (relationships.yaml — rows resource_allocation_funded_by_grant /
      resource_allocation_funded_by_contribution) may be populated on a
      single resource_allocation instance. Both unpopulated is permitted for
      an allocation drawn from general, non-earmarked stock with no
      specific funding instance behind it.

      `property`/`with` corrected per HKMP Stage 8R Certification
      Remediation to reference the canonical relationship verbs
      (`funded_by_grant`, `funded_by_contribution`) rather than the per-row
      relationship ids — see donor_profile_attachment_exclusive's note
      above for the full rationale. No change to what is actually
      constrained.

  - id: cold_chain_integrity_constraint
    type: cardinality
    property: storage_location_type
    entities: [inventory_item, storage_location, material_resource]
    parameters:
      expression: "inventory_item.instance_of NOT INSTANCE OF material_resource OR material_resource.cold_chain_required IS NOT true OR cold_chain_storage IN storage_location.storage_location_type"
    notes: >
      An inventory_item instantiating a material_resource with
      cold_chain_required true MUST be stored_at a storage_location whose
      storage_location_type includes cold_chain_storage
      (taxonomy/storage.yaml). This is the Stage 8C brief's "cold-chain
      integrity constraint," modeled as canonical humanitarian knowledge (a
      structural fact about what storage a temperature-sensitive resource
      requires) rather than a software validation rule. Representative of
      the brief's broader "storage compatibility requirements" category —
      this domain implements the cold-chain case concretely, since it is
      the named, canonical example, and does not attempt to enumerate every
      possible category-to-storage-type compatibility rule (e.g. hazardous/
      food-grade segregation) exhaustively at this maturity; further such
      rules are a legitimate future extension of this same constraint
      pattern, not a gap in the pattern itself.

      Reclassified from `required_if` to `cardinality`, and the expression
      rewritten to explicitly type-narrow to `material_resource` before
      reading `cold_chain_required`, per Stage 8R Certification
      Remediation (optional cleanup):
      `storage_location_type` is already unconditionally required
      ({min:1,max:unbounded}), making the prior `required_if` a type
      mismatch (same class of issue as
      contribution_date_not_before_grant_window, above); and the prior
      expression assumed `inventory_item.instance_of.cold_chain_required`
      was always resolvable, which is false when `instance_of` resolves to
      `financial_resource` (no such property). The rewritten expression's
      first two disjuncts short-circuit safely for that case instead of
      relying on an undefined property access evaluating as
      not-true — a defensive, generator-portable restatement of the exact
      same invariant, not a semantic change.
