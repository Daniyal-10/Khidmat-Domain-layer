domain: beneficiary-lifecycle
maturity: level_4_ontology
status: active

imports:
  - shared-ontology
  - shared-human-model
  - shared-time
  - shared-risk
  - registration
  - verification-operations

entities:
  BeneficiaryLifecycle:
    description: "The authoritative lifecycle record representing a continuous, overarching journey of a beneficiary (Person or Household) within the Khidmat ecosystem."
    type: core_entity
    attributes:
      - lifecycle_id: Unique identifier for the lifecycle.
      - current_stage (reference: taxonomy/engagement_stage)
      - stage_entered_timestamp (reference: shared-time/Timestamp)
    relationships:
      - tracksJourneyOf:
          target: shared-ontology/Subject
          cardinality: 1..1
          inverse_of: hasBeneficiaryLifecycle
          description: "Links the lifecycle instance to the independent human or household subject."
      - hasTransitionHistory:
          target: LifecycleTransition
          cardinality: 0..N
          inverse_of: partOfLifecycle
          description: "The immutable chronological log of state changes for this lifecycle."
      - followedBy:
          target: BeneficiaryLifecycle
          cardinality: 0..1
          inverse_of: precededBy
          description: "References a subsequent lifecycle instance if a subject re-enters the ecosystem after exiting."

  LifecycleTransition:
    description: "An immutable event representing a macro-state change within a BeneficiaryLifecycle."
    type: event_entity
    attributes:
      - transition_id: Unique identifier for the transition.
      - transition_timestamp (reference: shared-time/Timestamp)
      - prior_stage (reference: taxonomy/engagement_stage)
      - new_stage (reference: taxonomy/engagement_stage)
      - exit_reason (reference: taxonomy/exit_reason, optional)
      - suspension_reason (reference: taxonomy/suspension_reason, optional)
      - review_trigger (reference: taxonomy/review_trigger, optional)
    relationships:
      - triggeredByRegistrationCompletion:
          target: registration/case
          cardinality: 0..1
          description: "Transition triggered by the completion of a registration."
      - triggeredByVerificationOutcome:
          target: verification-operations/verification_finding
          cardinality: 0..1
          description: "Transition triggered by a verification outcome."
      - triggeredByRiskAssessment:
          target: shared-risk/risk_characterization
          cardinality: 0..1
          description: "Transition triggered by a risk assessment threshold."
      - triggeredByCaseDecision:
          target: registration/case
          cardinality: 0..1
          description: "Transition triggered by a manual case decision."
      - partOfLifecycle:
          target: BeneficiaryLifecycle
          cardinality: 1..1
          inverse_of: hasTransitionHistory
          description: "The lifecycle to which this transition belongs."

constraints:
  - id: one_active_lifecycle_per_subject
    type: uniqueness_constraint
    subject_class: BeneficiaryLifecycle
    property: tracksJourneyOf
    condition: "current_stage != 'exited'"
    description: "A Person or Household can have at most one active BeneficiaryLifecycle instance at a time."
  
  - id: independent_household_individual_lifecycles
    type: semantic_independence
    subject_class: BeneficiaryLifecycle
    description: "Household lifecycles and Individual lifecycles are tracked independently and do not overwrite each other."
  
  - id: immutable_history
    type: immutability_constraint
    subject_classes: [BeneficiaryLifecycle, LifecycleTransition]
    description: "Historical, inactive BeneficiaryLifecycle instances and LifecycleTransitions cannot be modified or deleted."
  
  - id: manual_exit_policy
    type: dependency_constraint
    subject_class: LifecycleTransition
    condition: "new_stage == 'exited'"
    requires: "exit_reason IS NOT NULL"
    description: "A transition to the 'exited' stage must be accompanied by an explicit exit_reason representing human approval."
  
  - id: re_entry_creates_new_instance
    type: structural_constraint
    subject_class: BeneficiaryLifecycle
    trigger: "re_activation_of_exited_subject"
    enforces: "CREATE NEW BeneficiaryLifecycle AND LINK via followedBy"
    description: "Re-activating an exited subject generates a brand new BeneficiaryLifecycle instance, linked to the previous via the 'followedBy' relationship."

cross_domain_references:
  - shared-human-model: "References Person and Household as the subjects of the lifecycle. Never redefines demographic data."
  - registration: "References Registration complete events as transition triggers. Never redefines registration forms."
  - verification-operations: "References Verification outcome events to gate transitions. Never redefines verification mechanics."
  - shared-risk: "References Risk events as triggers for suspension holds. Never redefines risk definitions."
  - shared-time: "References Timestamps for accurate duration and transition tracking."
