version: "1.0.0"
domain: beneficiary_lifecycle
file: taxonomy/review-triggers.yaml
status: active

schemes:
  - id: review_trigger
    label: Review Trigger
    description: "Events or conditions that transition a subject to the Review Required stage, necessitating human intervention before exit."
    concepts:
      - id: prolonged_inactivity
        label: Prolonged Inactivity
        description: "No recorded interaction with the ecosystem over a predefined duration."
      - id: recurring_suspensions
        label: Recurring Suspensions
        description: "Multiple temporary suspensions indicating a potential need for exit."
      - id: systemic_alert
        label: Systemic Alert
        description: "Represents the lifecycle's reaction to an externally generated event; strictly references alerts originating from other bounded contexts (e.g., Shared Risk, Verification Operations) and does not define the alert itself."
