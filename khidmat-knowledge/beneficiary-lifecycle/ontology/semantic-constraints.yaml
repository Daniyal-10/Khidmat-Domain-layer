version: "1.0.0"
domain: beneficiary_lifecycle
file: ontology/semantic-constraints.yaml
status: active

constraints:
  - id: manual_exit_policy
    type: required_if
    property: exit_reason
    entities: [lifecycle_transition]
    parameters:
      condition_property: new_stage
      condition_value: exited

  - id: human_development_stage_requires_assessment_timestamp
    type: required_if
    property: human_development_stage_assessed_timestamp
    entities: [beneficiary_lifecycle]
    parameters:
      condition_property: human_development_stage
      condition_value: not_null
    notes: >
      Added per Stage 6 Canonical Implementation. Ensures a
      human_development_stage value is never recorded without a
      timestamp, so staleness can always be assessed (see the staleness
      note in taxonomy/engagement-stage.yaml#human_development_stage).
