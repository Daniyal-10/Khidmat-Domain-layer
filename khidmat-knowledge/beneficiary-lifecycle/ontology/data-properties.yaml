version: "1.0.0"
domain: beneficiary_lifecycle
file: ontology/data-properties.yaml
status: active

namespaces:
  beneficiary_lifecycle: "beneficiary_lifecycle"

data_properties:
  - id: lifecycle_id
    domain: beneficiary_lifecycle
    datatype: xsd:string
    cardinality: { min: 1, max: 1 }
    description: "Unique identifier for the lifecycle."

  - id: current_stage
    domain: beneficiary_lifecycle
    taxonomy_ref: beneficiary_lifecycle:engagement_stage
    cardinality: { min: 1, max: 1 }
    description: "The current macro-level state of a beneficiary's continuous journey."

  - id: stage_entered_timestamp
    domain: beneficiary_lifecycle
    datatype: xsd:dateTime
    cardinality: { min: 1, max: 1 }
    description: "The timestamp when the current stage was entered."

  - id: human_development_stage
    domain: beneficiary_lifecycle
    taxonomy_ref: beneficiary_lifecycle:human_development_stage
    cardinality: { min: 0, max: 1 }
    description: >
      Added per Stage 6 Canonical Implementation. The beneficiary's or
      household's current position in the humanitarian developmental
      trajectory (crisis through community_contribution) — a distinct
      axis from current_stage (engagement_stage) above; see
      taxonomy/engagement-stage.yaml#human_development_stage for the
      mandatory distinction between the two. Optional (min: 0) because
      this assessment may not yet have been made for every tracked
      lifecycle, consistent with the open-world assumption applied
      throughout this knowledge layer.

  - id: human_development_stage_assessed_timestamp
    domain: beneficiary_lifecycle
    datatype: xsd:dateTime
    cardinality: { min: 0, max: 1 }
    description: >
      Added per Stage 6 Canonical Implementation. The timestamp of the
      most recent human_development_stage assessment, distinct from
      stage_entered_timestamp above (which tracks engagement_stage).
      Required alongside human_development_stage so that a stale
      assessment can be distinguished from a current one; see the
      staleness note in taxonomy/engagement-stage.yaml#human_development_stage.

  - id: transition_id
    domain: lifecycle_transition
    datatype: xsd:string
    cardinality: { min: 1, max: 1 }
    description: "Unique identifier for the transition."

  - id: transition_timestamp
    domain: lifecycle_transition
    datatype: xsd:dateTime
    cardinality: { min: 1, max: 1 }
    description: "The timestamp when the transition occurred."

  - id: prior_stage
    domain: lifecycle_transition
    taxonomy_ref: beneficiary_lifecycle:engagement_stage
    cardinality: { min: 0, max: 1 }
    description: "The engagement stage before the transition."

  - id: new_stage
    domain: lifecycle_transition
    taxonomy_ref: beneficiary_lifecycle:engagement_stage
    cardinality: { min: 1, max: 1 }
    description: "The engagement stage after the transition."

  - id: exit_reason
    domain: lifecycle_transition
    taxonomy_ref: beneficiary_lifecycle:exit_reason
    cardinality: { min: 0, max: 1 }
    description: "The specific justification for manually transitioning a subject to the Exited stage."

  - id: suspension_reason
    domain: lifecycle_transition
    taxonomy_ref: beneficiary_lifecycle:suspension_reason
    cardinality: { min: 0, max: 1 }
    description: "The justification for pausing a subject's active engagement in the ecosystem."

  - id: review_trigger
    domain: lifecycle_transition
    taxonomy_ref: beneficiary_lifecycle:review_trigger
    cardinality: { min: 0, max: 1 }
    description: "Events or conditions that transition a subject to the Review Required stage."
