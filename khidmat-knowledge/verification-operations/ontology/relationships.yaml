version: "1.0.0"
domain: verification_operations
file: ontology/relationships.yaml
status: active

purpose: >
  Defines all relationships among entities declared in entities.yaml,
  and all semantic references from those entities to concepts owned by
  other bounded contexts. Internal relationships never cross a domain
  boundary. External references follow the Reference-Not-Redefine and
  Semantic Reference rules in ARCHITECTURE.md and never restate the
  structure of the referenced concept.

governance:
  governing_adr:
    - ADR-008
    - ADR-001
    - ADR-002
    - ADR-006
    - ADR-021

namespaces:
  registration: registration
  case_management: case_management
  shared: shared
  shared_risk: shared_risk
  shared_time: shared_time

relationships:
  # -----------------------------------------------------------------
  # Internal relationships
  # -----------------------------------------------------------------

  - id: verification_subject_participates_in_verification_activity
    from: verification_subject
    relationship: participates_in
    to: verification_activity
    cardinality: { min: 0, max: unbounded }
    inverse: verification_activity_evaluates_verification_subject

  - id: verification_activity_evaluates_verification_subject
    from: verification_activity
    relationship: evaluates
    to: verification_subject
    cardinality: { min: 1, max: 1 }
    inverse: verification_subject_participates_in_verification_activity

  - id: verification_activity_produces_field_observation
    from: verification_activity
    relationship: produces
    to: field_observation
    cardinality: { min: 0, max: unbounded }
    inverse: field_observation_recorded_during_verification_activity
    notes: >
      Zero observations is valid for a could_not_complete or cancelled
      activity (see lifecycle-constraints.yaml).

  - id: field_observation_recorded_during_verification_activity
    from: field_observation
    relationship: recorded_during
    to: verification_activity
    cardinality: { min: 1, max: 1 }
    inverse: verification_activity_produces_field_observation

  - id: verification_activity_produces_verification_finding
    from: verification_activity
    relationship: produces
    to: verification_finding
    cardinality: { min: 0, max: 1 }
    inverse: verification_finding_produced_by_verification_activity
    notes: >
      Present only when verification_status is completed. A
      could_not_complete or cancelled activity produces no finding —
      see verification-status.yaml.

  - id: verification_finding_produced_by_verification_activity
    from: verification_finding
    relationship: produced_by
    to: verification_activity
    cardinality: { min: 1, max: 1 }
    inverse: verification_activity_produces_verification_finding

  - id: verification_finding_derived_from_field_observation
    from: verification_finding
    relationship: derived_from
    to: field_observation
    cardinality: { min: 0, max: unbounded }
    inverse: field_observation_informs_verification_finding
    notes: >
      Zero observations is valid only when finding_status is
      not_applicable (see verification-findings.yaml).

  - id: field_observation_informs_verification_finding
    from: field_observation
    relationship: informs
    to: verification_finding
    cardinality: { min: 0, max: unbounded }
    inverse: verification_finding_derived_from_field_observation

  - id: verification_finding_resolves_verification_subject
    from: verification_finding
    relationship: resolves
    to: verification_subject
    cardinality: { min: 1, max: 1 }
    notes: >
      A subject may accumulate more than one finding over time (e.g. a
      contradicted finding followed by a later confirmed finding after
      reverification); the most recent finding is operationally
      authoritative but earlier findings are preserved, consistent with
      the append-only pattern used throughout this knowledge layer.

  - id: verification_finding_reviewed_by_human_review
    from: verification_finding
    relationship: reviewed_by
    to: human_review
    cardinality: { min: 0, max: unbounded }
    inverse: human_review_reviews_verification_finding
    notes: >
      Zero reviews is valid — most findings never require escalation.
      One finding may accumulate more than one human_review record over
      time under escalation_reason: reviewer_disagreement (see
      review-decisions.yaml#reviewer_disagreement_note); each is a new,
      permanent, append-only record.

  - id: human_review_reviews_verification_finding
    from: human_review
    relationship: reviews
    to: verification_finding
    cardinality: { min: 1, max: 1 }
    inverse: verification_finding_reviewed_by_human_review

  - id: human_review_supersedes_human_review
    from: human_review
    relationship: supersedes
    to: human_review
    cardinality: { min: 0, max: 1 }
    notes: >
      Links a review_decision of escalated_further, or a review that is
      itself the subject of escalation_reason: reviewer_disagreement, to
      the prior human_review it follows. Mirrors the immutable,
      append-only chain pattern used elsewhere in this knowledge layer.
      The prior human_review is never edited or removed. The reviewer
      recorded on a human_review must be a different actor than the
      actor referenced by verification_activity_conducted_by_actor for
      the activity whose finding is under review (reviewer_role_constraint,
      review-decisions.yaml) — this cross-relationship distinctness rule
      has no closed semantic-constraints.yaml `type` that fits it (it is
      not cardinality, disjoint, required_if, or mutually_exclusive), so
      per the precedent already established in
      community-context/ontology/semantic-constraints.yaml (geographic_area
      anti-recursion), it is recorded here as a note rather than invented
      as new constraint-type vocabulary.

  - id: reverification_trigger_may_be_created_from_verification_finding
    from: reverification_trigger
    relationship: may_be_created_from
    to: verification_finding
    cardinality: { min: 0, max: 1 }
    notes: >
      Optional because a periodic_reassessment or
      registrant_or_third_party_request trigger
      (reverification-triggers.yaml) may be raised independent of any
      specific finding.

  - id: reverification_trigger_raised_for_verification_subject
    from: reverification_trigger
    relationship: raised_for
    to: verification_subject
    cardinality: { min: 1, max: 1 }

  - id: verification_assignment_has_activity_verification_activity
    from: verification_assignment
    relationship: has_activity
    to: verification_activity
    cardinality: { min: 1, max: unbounded }
    notes: >
      An assignment may accumulate more than one activity when the
      first attempt reaches could_not_complete and a subsequent activity
      is scheduled against the same assignment, per
      verification-status.yaml#status_transition_note.

  - id: verification_activity_part_of_verification_assignment
    from: verification_activity
    relationship: part_of
    to: verification_assignment
    cardinality: { min: 1, max: 1 }
    inverse: verification_assignment_has_activity_verification_activity

  # -----------------------------------------------------------------
  # External / cross-domain references
  # -----------------------------------------------------------------

  - id: verification_subject_derived_from_claim
    from: verification_subject
    relationship: derived_from
    to: registration:claim
    cardinality: { min: 1, max: 1 }
    notes: >
      Every current verification_subject wraps exactly one Claim, per
      the examples already declared for verification_subject.
      Verification Operations does not redefine claim_type, claim_text,
      information_sufficiency, or information_consistency — all remain
      owned by registration/ontology/ and registration/taxonomy/claims.yaml.

  - id: field_observation_corroborated_by_evidence
    from: field_observation
    relationship: corroborated_by
    to: registration:evidence
    cardinality: { min: 0, max: unbounded }
    notes: >
      A field observation may confirm, add to, or reference an Evidence
      record. Verification Operations never defines a competing
      evidence entity or evidence_type/evidence_subtype vocabulary —
      both remain owned by registration/ontology/ and
      registration/taxonomy/evidence.yaml. This relationship is the
      complete implementation of the "Evidence collection model"
      pending item in knowledge_layer_roadmap.md Stage 4: collection is
      modelled as a reference from the observation that collected it,
      not as a new owned entity.

  - id: verification_assignment_verifies_case
    from: verification_assignment
    relationship: verifies
    to: case_management:case
    cardinality: { min: 1, max: 1 }
    notes: >
      References the Case whose open verification_subjects the
      assignment covers. Per ADR-021, the Case entity is canonical and
      persists across the Registration-to-Case-Management phase
      handoff; this reference targets that single canonical Case
      regardless of which phase it currently occupies, and Verification
      Operations does not redefine case_status in either vocabulary.

  - id: verification_assignment_issued_from_brief_context_of_case
    from: verification_assignment
    relationship: issued_from_brief_context_of
    to: registration:case
    cardinality: { min: 1, max: 1 }
    notes: >
      Per ADR-001, the Verification Brief is a projection, not a stored
      entity — it has no entity id a relationship `to:` field can
      resolve to. This row therefore targets the Case the brief
      projects from (the only persisted entity the brief is ever a
      snapshot of), preserving the original relationship's meaning
      ("an assignment is always created in the context of a brief
      projected at a point in time") without pointing at a non-existent
      entity. Re-issuance after a Case update is tracked structurally
      through reverification_trigger_type: case_updated_after_issuance
      (reverification-triggers.yaml), not by this relationship.

  - id: verification_activity_conducted_by_actor
    from: verification_activity
    relationship: conducted_by
    to: shared:actor
    cardinality: { min: 1, max: 1 }
    notes: >
      References the authoritative Actor declared in
      shared/ontology/entities.yaml. Verification Operations does not
      define actor qualification, roles, or types — that remains a
      Volunteer Operations concern.

  - id: verification_assignment_assigned_to_actor
    from: verification_assignment
    relationship: assigned_to
    to: shared:actor
    cardinality: { min: 1, max: 1 }
    notes: References the authoritative Actor an assignment is issued to.

  - id: human_review_reviewed_by_actor
    from: human_review
    relationship: reviewed_by
    to: shared:actor
    cardinality: { min: 1, max: 1 }
    notes: >
      References the authoritative Actor acting as reviewer. Subject to
      the reviewer_role_constraint in review-decisions.yaml: this Actor
      must differ from the Actor referenced by
      verification_activity_conducted_by_actor on the
      verification_activity whose resulting verification_finding is
      under review (see the note on human_review_supersedes_human_review
      above for why this is recorded as a note, not a
      semantic-constraints.yaml row).

  - id: reverification_trigger_informed_by_risk_characterization
    from: reverification_trigger
    relationship: informed_by
    to: shared_risk:risk_characterization
    cardinality: { min: 0, max: 1 }
    notes: >
      Present only when reverification_trigger_type includes
      risk_escalation. References risk_trend: deteriorating from
      shared/risk/ontology/risk.yaml by value, per
      reverification-triggers.yaml. Verification Operations does not
      redefine risk_trend or any Risk Domain concept.

cross_domain_references:
  - registration: >
      References Claim and Evidence. Never redefines claim types,
      evidence types, or case status vocabulary. Treats Verification
      Requirement and Verification Brief as derived projections per
      ADR-001, never as stored entities to hold a foreign key against —
      the brief reference targets the underlying Case instead (see
      verification_assignment_issued_from_case).
  - shared: >
      References Actor as the participant in verification activities,
      assignments, and human review. Never redefines actor
      qualification or role.
  - shared_risk: >
      References risk_characterization as an optional informing signal
      for risk_escalation reverification triggers. Never redefines Risk
      Domain concepts.
  - shared_time: >
      References evidence_freshness and waiting_and_grace_periods by
      value throughout the taxonomy layer this file's entities carry
      (waiting_and_grace_periods is carried as the scheduled_window data
      property in data-properties.yaml, not as a relationship). Never
      redefines temporal vocabulary.
  - case_management: >
      verification_assignment_verifies_case references the canonical
      Case per ADR-021. Case Management remains the eventual canonical
      owner of Case once the Registration-phase handoff occurs;
      Verification Operations does not redefine case_status in either
      vocabulary and does not require Case Management's ontology to be
      modified to receive this reference, since the reference direction
      runs from Verification Operations outward.
