version: "1.0.0"
domain: verification_operations
file: ontology/data-properties.yaml
status: active

purpose: >
  Datatype and coded properties for the Verification Operations entity
  layer (entities.yaml). Consolidates properties previously declared
  inline on each entity into the single canonical data-properties.yaml
  required by Canonical_Ontology_Schema.md §5. No property, type, or
  cardinality changed in meaning during consolidation.

namespaces:
  registration: registration
  shared_time: shared_time

# CURIE resolution note (audit fix): priority_classification is referenced
# below as registration:priority_classification. This is the currently
# authoritative reference — it is not yet a Canonical_Taxonomy_Schema.md-
# conformant scheme. It is defined as a bare, unwrapped list (no `schemes:`/
# `concepts:`, no version/domain/file/status header) inside
# registration/verification/verification-requirements.yaml, not inside
# registration/taxonomy/. Promoting it into a conformant
# registration/taxonomy/ scheme is an upstream Registration-domain change,
# out of scope here; until that happens, this CURIE names the correct
# domain (registration) but not a schema-conformant taxonomy file.

data_properties:
  # ---------------------------------------------------------------------
  # verification_subject
  # ---------------------------------------------------------------------
  - id: subject_id
    domain: verification_subject
    datatype: xsd:string
    cardinality: { min: 1, max: 1 }
    label: Subject ID
    description: Unique identifier for the verification subject instance.

  - id: subject_role
    domain: verification_subject
    datatype: xsd:string
    cardinality: { min: 1, max: 1 }
    label: Subject Role
    description: >
      The informal role category drawn from the examples already
      declared for verification_subject (e.g. identity_assertion,
      household_composition_assertion, medical_assertion,
      residence_assertion). Not a controlled taxonomy vocabulary in its
      own right — it mirrors registration:claim_type and must not
      diverge from it.

  - id: requirement_priority
    domain: verification_subject
    taxonomy_ref: registration:priority_classification
    cardinality: { min: 0, max: 1 }
    label: Requirement Priority
    description: >
      Mirrors the priority_classification computed by Registration at
      Verification Brief projection time
      (registration/verification/verification-requirements.yaml). This
      is a read-only echo of a derived value, not an independently
      owned attribute — Registration remains authoritative for
      requirement derivation and priority. Recorded here only so that
      queue_management and scheduling reasoning can order work without
      re-deriving priority.

  # ---------------------------------------------------------------------
  # verification_activity
  # ---------------------------------------------------------------------
  - id: activity_id
    domain: verification_activity
    datatype: xsd:string
    cardinality: { min: 1, max: 1 }
    label: Activity ID
    description: Unique identifier for the verification activity instance.

  - id: verification_method
    domain: verification_activity
    taxonomy_ref: verification_methods
    cardinality: { min: 1, max: 1 }
    label: Verification Method
    description: >
      The method used, from verification-methods.yaml. Selected at
      scheduling time; may differ from the method originally planned
      if a could_not_complete_reason forces a method substitution on a
      subsequent attempt.

  - id: verification_status
    domain: verification_activity
    taxonomy_ref: verification_status
    cardinality: { min: 1, max: 1 }
    label: Verification Status
    description: >
      The activity's own lifecycle state, from verification-status.yaml.
      See lifecycle-constraints.yaml for the transition model.

  - id: could_not_complete_reason
    domain: verification_activity
    taxonomy_ref: could_not_complete_reason
    cardinality: { min: 0, max: 1 }
    label: Could Not Complete Reason
    description: >
      Required when verification_status is could_not_complete; absent
      otherwise, from verification-status.yaml. See
      semantic-constraints.yaml (activity_requires_reason_when_could_not_complete).

  - id: scheduled_at
    domain: verification_activity
    datatype: xsd:dateTime
    cardinality: { min: 0, max: 1 }

  - id: started_at
    domain: verification_activity
    datatype: xsd:dateTime
    cardinality: { min: 0, max: 1 }

  - id: completed_at
    domain: verification_activity
    datatype: xsd:dateTime
    cardinality: { min: 0, max: 1 }

  # ---------------------------------------------------------------------
  # field_observation
  # ---------------------------------------------------------------------
  - id: observation_id
    domain: field_observation
    datatype: xsd:string
    cardinality: { min: 1, max: 1 }
    label: Observation ID
    description: Unique identifier for the field observation instance.

  - id: observation_summary
    domain: field_observation
    datatype: xsd:string
    cardinality: { min: 1, max: 1 }
    label: Observation Summary
    description: >
      A concise, factual record of what was directly observed (e.g.
      "beneficiary present", "damaged roof observed"). Observational
      only — carries no conclusion; conclusions belong to
      verification_finding.

  - id: observation_alignment
    domain: field_observation
    datatype: xsd:string
    cardinality: { min: 1, max: 1 }
    label: Observation Alignment
    description: >
      The semantic alignment of this observation with the underlying
      claim. Exposes the result of the observation for purely semantic
      reasoning. Expected values (not yet a formal taxonomy scheme in
      the source material — carried forward as a documented content
      gap, not invented here): supports_claim, partially_supports_claim,
      contradicts_claim, refutes_claim, inconclusive.

  - id: observed_at
    domain: field_observation
    datatype: xsd:dateTime
    cardinality: { min: 1, max: 1 }

  # ---------------------------------------------------------------------
  # verification_finding
  # ---------------------------------------------------------------------
  - id: finding_id
    domain: verification_finding
    datatype: xsd:string
    cardinality: { min: 1, max: 1 }
    label: Finding ID
    description: Unique identifier for the verification finding instance.

  - id: recorded_at
    domain: verification_finding
    datatype: xsd:dateTime
    cardinality: { min: 1, max: 1 }
    label: Recorded At
    description: >
      When this verification_finding was recorded. Backs
      reasoning/reverification-rules.yaml's evidence-expiry, risk-escalation,
      and periodic-reassessment triggers, which measure elapsed time since a
      finding was reached.

  - id: finding_status
    domain: verification_finding
    taxonomy_ref: finding_status
    cardinality: { min: 1, max: 1 }
    label: Finding Status
    description: From verification-findings.yaml.

  - id: contradiction_type
    domain: verification_finding
    taxonomy_ref: contradiction_type
    cardinality: { min: 0, max: 1 }
    label: Contradiction Type
    description: >
      Present only when finding_status is contradicted or refuted, from
      verification-findings.yaml. See semantic-constraints.yaml
      (finding_requires_contradiction_type_when_disputed).

  - id: verification_confidence
    domain: verification_finding
    taxonomy_ref: verification_confidence
    cardinality: { min: 1, max: 1 }
    label: Verification Confidence
    description: >
      From verification-confidence.yaml. Every finding carries a
      confidence value from creation; indeterminate is the honest
      placeholder before a reasoned judgement is composed. See
      lifecycle-constraints.yaml for the expected resolution path out
      of indeterminate.

  # ---------------------------------------------------------------------
  # human_review
  # ---------------------------------------------------------------------
  - id: review_id
    domain: human_review
    datatype: xsd:string
    cardinality: { min: 1, max: 1 }
    label: Review ID
    description: Unique identifier for the human review instance.

  - id: escalation_reason
    domain: human_review
    taxonomy_ref: escalation_reason
    cardinality: { min: 1, max: 1 }
    label: Escalation Reason
    description: >
      The reason this finding required human review, from
      escalation-reasons.yaml. A review always has exactly one primary
      reason; contributing reasons are recorded at the instance level
      per that file's description.

  - id: review_decision
    domain: human_review
    taxonomy_ref: review_decision
    cardinality: { min: 0, max: 1 }
    label: Review Decision
    description: >
      The reviewer's decision, from review-decisions.yaml. Absent while
      the review is open; present and immutable once recorded. Never
      overwritten — see lifecycle-constraints.yaml.

  - id: decided_at
    domain: human_review
    datatype: xsd:dateTime
    cardinality: { min: 0, max: 1 }
    description: Present only once review_decision is recorded. See
      semantic-constraints.yaml (review_requires_decided_at_when_decided).

  # ---------------------------------------------------------------------
  # reverification_trigger
  # ---------------------------------------------------------------------
  - id: trigger_id
    domain: reverification_trigger
    datatype: xsd:string
    cardinality: { min: 1, max: 1 }
    label: Trigger ID
    description: Unique identifier for the reverification trigger instance.

  - id: reverification_trigger_type
    domain: reverification_trigger
    taxonomy_ref: reverification_trigger_type
    cardinality: { min: 1, max: unbounded }
    label: Reverification Trigger Type
    description: >
      From reverification-triggers.yaml. Multiple simultaneous trigger
      types are recorded independently per that file's description —
      this is a to-many cardinality by design, not an oversight.

  - id: raised_at
    domain: reverification_trigger
    datatype: xsd:dateTime
    cardinality: { min: 1, max: 1 }

  # ---------------------------------------------------------------------
  # verification_assignment
  # ---------------------------------------------------------------------
  - id: assignment_id
    domain: verification_assignment
    datatype: xsd:string
    cardinality: { min: 1, max: 1 }
    label: Assignment ID
    description: Unique identifier for the verification assignment instance.

  - id: brief_issued_at
    domain: verification_assignment
    datatype: xsd:dateTime
    cardinality: { min: 1, max: 1 }
    label: Brief Issued At
    description: >
      When this assignment was created in the context of a Verification
      Brief projected from the Case (see
      verification_assignment_issued_from_brief_context_of_case,
      relationships.yaml). Per ADR-001 the Brief itself is a projection,
      not a stored entity, so this timestamp is recorded on the assignment
      it gave rise to rather than on the brief. Backs
      reasoning/reverification-rules.yaml's case_updated_after_issuance
      trigger, which compares this moment against the Case's own
      updated_at to detect staleness.

  - id: assignment_status
    domain: verification_assignment
    datatype: xsd:string
    cardinality: { min: 1, max: 1 }
    label: Assignment Status
    description: >
      The assignment's own lifecycle state. A minimal, structural
      workflow vocabulary, not a humanitarian-domain taxonomy — it
      exists solely to give the assignment workflow concept a
      queryable state. The concrete status values were never enumerated
      as a formal taxonomy scheme in the pre-migration source material;
      this is a genuine, pre-existing content gap carried forward
      unchanged, not invented during this migration.

  - id: queue_priority
    domain: verification_assignment
    taxonomy_ref: registration:priority_classification
    cardinality: { min: 0, max: 1 }
    label: Queue Priority
    description: >
      Echoes the highest requirement_priority among the
      verification_subjects covered by this assignment, for queue
      ordering. Read-only derivation, not an independently owned value —
      see verification_subject.requirement_priority note.

  - id: scheduled_window
    domain: verification_assignment
    taxonomy_ref: shared_time:waiting_and_grace_periods
    cardinality: { min: 0, max: 1 }
    label: Scheduled Window
    description: >
      References the scheduling window vocabulary already owned by
      shared/taxonomy/time.yaml. Not redefined here. (Consolidates what
      was previously represented twice — once as this data property and
      once as a duplicate relationships.yaml row targeting the same
      taxonomy scheme; a taxonomy-scheme value is a coded data property,
      never a relationship target, so the relationships.yaml row was
      removed as the redundant of the two representations, per
      Canonical_Ontology_Schema.md §5.)
