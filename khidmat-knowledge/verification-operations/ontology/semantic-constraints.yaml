version: "1.0.0"
domain: verification_operations
file: ontology/semantic-constraints.yaml
status: active

# Target-neutral structural facts only (Canonical_Ontology_Schema.md §9).
# How each row renders into OWL/SHACL/LPG is entirely a generator concern —
# no hand-authored OWL functional syntax is stored here.
#
# Only conditional-requirement facts already stated explicitly in the
# taxonomy layer's prose are encoded below (type: required_if). No new
# business rule was invented for this migration.
#
# One additional prose rule — reviewer independence
# (review-decisions.yaml#reviewer_role_constraint) — does not fit any
# closed §9 constraint `type` (it constrains distinctness across two
# separate relationship edges, not a cardinality/disjoint/required_if/
# mutually_exclusive fact about one property). Following the precedent
# already set in community-context/ontology/semantic-constraints.yaml for
# geographic_area anti-recursion, it is recorded as a `notes:` field on
# the affected relationships.yaml rows instead of invented as new
# constraint-type vocabulary.

constraints:
  - id: activity_requires_reason_when_could_not_complete
    type: required_if
    property: could_not_complete_reason
    entities: [verification_activity]
    parameters: { depends_on: verification_status, equals: could_not_complete }
    notes: >
      could_not_complete_reason is required when verification_status is
      could_not_complete; absent otherwise (verification-status.yaml).

  - id: finding_requires_contradiction_type_when_disputed
    type: required_if
    property: contradiction_type
    entities: [verification_finding]
    parameters: { depends_on: finding_status, equals: [contradicted, refuted] }
    notes: >
      contradiction_type is present only when finding_status is
      contradicted or refuted (verification-findings.yaml).

  - id: review_requires_decided_at_when_decided
    type: required_if
    property: decided_at
    entities: [human_review]
    parameters: { depends_on: review_decision, exists: true }
    notes: >
      decided_at is present only once review_decision is recorded
      (entities.yaml / data-properties.yaml).
