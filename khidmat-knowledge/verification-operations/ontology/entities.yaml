version: "1.0.0"
domain: verification_operations
file: ontology/entities.yaml
status: active

purpose: >
  Defines the first-class entities owned by the Verification Operations
  domain: the concepts that carry the controlled vocabularies established
  in verification-operations/taxonomy/. Verification Operations is
  responsible for producing verification knowledge from verification
  activities performed against registration outputs. This file
  consolidates the domain's core ontology and its operational entity
  layer (previously split between a pre-canonical core-ontology file and
  this folder) into the single canonical entities.yaml required by
  Canonical_Ontology_Schema.md §2. No entity, description, or ownership
  decision changed during consolidation — only the serialization shape.

governance:
  governing_adr:
    - ADR-008
    - ADR-001
    - ADR-006
    - ADR-017

ownership_rules: >
  Registration owns claims, evidence, needs, situations, readiness,
  verification requirements, and verification briefs. Shared Human Model
  owns lifecycle, capability, dependency, family, and health concepts.
  Risk Domain owns risk concepts. Verification Operations owns
  verification knowledge generated after verification begins, and must
  not redefine any upstream concept.

entities:
  - id: verification_subject
    label: Verification Subject
    description: >
      The target of a verification activity. Wraps a single assertion
      requiring external confirmation — in the current taxonomy this is
      always a claim made during registration (claim,
      identity_assertion, household_composition_assertion,
      medical_assertion, residence_assertion). Distinct from the Claim
      it wraps: the Claim is the registration-owned assertion; the
      Verification Subject is the verification-owned unit of work
      derived from it, decoupled so a future subject type need not
      originate from a Claim.
    required: true
    ownership_boundary: >
      Verification Requirement (registration/verification/verification-requirements.yaml)
      is explicitly not a stored entity — it is computed from Claims at
      Verification Brief projection time. Verification Subject is
      therefore linked to the Claim it wraps, never to a stored
      "VerificationRequirement" record, because none exists.

  - id: verification_activity
    label: Verification Activity
    description: >
      A verification event performed against a Verification Subject.
      Time-bounded, evidence-generating, and repeatable. Classified by
      verification_method. Implements the "Field visit outcome model"
      identified as pending in knowledge_layer_roadmap.md Stage 4.
    required: true

  - id: field_observation
    label: Field Observation
    description: >
      A direct observation recorded during a Verification Activity.
      Implements part of the "Evidence collection model" identified as
      pending in knowledge_layer_roadmap.md Stage 4 — Field Observation
      is the record of what a verifier directly observed; where that
      observation corroborates or is corroborated by a document, it
      references the Evidence entity Registration already owns rather
      than defining a competing evidence concept.
    required: false

  - id: verification_finding
    label: Verification Finding
    description: >
      A verification conclusion derived from field observations and
      other verification inputs. Implements the "Claim confirmation
      model" identified as pending in knowledge_layer_roadmap.md Stage
      4 — the classification of what verification established about a
      Verification Subject.
    required: true
    ownership_boundary: >
      finding_status answers "what did we conclude"; verification_confidence
      answers "how sure are we of that conclusion." The two are
      structurally independent per verification-confidence.yaml and
      must never be collapsed into a single scale.

  - id: human_review
    label: Human Review
    description: >
      The record of a human reviewer examining a Verification Finding
      that was routed to review under an escalation_reason. Referenced
      by name throughout the taxonomy layer (escalation-reasons.yaml,
      review-decisions.yaml, verification-status.yaml) before being
      given entity-level structure here; does not redefine
      escalation_reason or review_decision, both of which remain fully
      owned by their taxonomy files.
    required: false

  - id: reverification_trigger
    label: Reverification Trigger
    description: >
      A condition indicating that future verification should occur.
      Implements the "Re-verification trigger model" identified as
      pending in knowledge_layer_roadmap.md Stage 4.
    required: false

  - id: verification_assignment
    label: Verification Assignment
    description: >
      The operational association between a Verification Subject (or
      set of related Verification Subjects on the same Case) and the
      Actor responsible for carrying out one or more Verification
      Activities against it. Implements the "Volunteer assignment
      model" identified as pending in knowledge_layer_roadmap.md Stage
      4, and gives instance structure to the assignment, scheduling,
      and queue_management workflow concepts already recognised as
      Verification-Operations-owned.
    required: true

design_notes:
  - decision: >
      human_review and verification_assignment were forward-referenced
      by name in the taxonomy layer and in workflow_concepts before
      being given entity-level structure.
    rationale: >
      Both were already forward-referenced by name in the completed
      taxonomy layer (human_review throughout escalation-reasons.yaml
      and review-decisions.yaml; assignment/scheduling/queue_management
      as declared workflow concepts) and are explicitly named as
      pending operational models in knowledge_layer_roadmap.md Stage 4.
      Defining them here closes an existing forward reference rather
      than inventing new domain scope. Per ADR-008, ownership of both
      is unambiguous: Verification Operations, and only Verification
      Operations, is the domain that produces verification knowledge
      and routes it through human review.
  - decision: >
      verification_subject.requirement_priority and
      verification_assignment.queue_priority (data-properties.yaml) are
      read-only echoes of a Registration-derived value, not
      independently owned attributes.
    rationale: >
      registration/verification/verification-requirements.yaml
      explicitly declares verification requirements as computed, not
      stored. Verification Operations must not re-derive or restate
      priority logic (that would violate ADR-008 single ownership by
      creating a second source of truth for priority). These
      properties exist purely so operational queue ordering has
      something to sort on without duplicating derivation logic.
  - decision: Evidence is referenced, never redefined, from field_observation.
    rationale: >
      Evidence is registration-owned. The "Evidence collection model"
      pending item in the roadmap is satisfied by field_observation's
      reference relationship to registration:evidence (see
      relationships.yaml), not by a new Verification-Operations-owned
      evidence entity.
