version: "1.0"
domain: Verification Operations
file: reasoning/verification-rules.yaml

purpose: >
  Inference rules for determining the finding_status of a verification_activity.
  Transforms explicit semantic alignment properties into a classified verification_finding.

scope: >
  Determines whether an activity resulted in a confirmed, partially_confirmed,
  unable_to_confirm, contradicted, or refuted finding based on FieldObservation alignment.

governance:
  governing_adr:
    - ADR-008
    - ADR-010

inputs:
  - entity: core:VerificationActivity
  - entity: core:FieldObservation
  - concept: taxonomy:verification-findings.yaml#finding_status

outputs:
  - entity: core:VerificationFinding
    property: finding_status

reasoning_rules:
  - rule_id: confirm_full_alignment
    description: The field observation fully supports the claim.
    condition: >
      activity.field_observation.observation_alignment == supports_claim
    outcome:
      finding_status: confirmed
    semantic_rationale: >
      When independent verification directly corroborates the registrant's claim without
      discrepancies, the central assertion is treated as confirmed.

  - rule_id: confirm_partial_alignment
    description: Core of the claim is supported but peripheral details or degree differ.
    condition: >
      activity.field_observation.observation_alignment == partially_supports_claim
    outcome:
      finding_status: partially_confirmed
    semantic_rationale: >
      Verification confirmed the central need or fact (e.g., household exists) but
      found semantic discrepancies in scale or composition.
    design_notes:
      - This must not be used if the core assertion itself is false.

  - rule_id: unable_to_confirm_inconclusive
    description: Activity completed but observation is inconclusive.
    condition: >
      activity.verification_status == completed AND
      activity.field_observation.observation_alignment == inconclusive
    outcome:
      finding_status: unable_to_confirm
    semantic_rationale: >
      The verifier performed the check, but the resulting semantic observation 
      is flagged as inconclusive.

  - rule_id: contradict_observation
    description: Observation conflicts with material elements of the claim.
    condition: >
      activity.field_observation.observation_alignment == contradicts_claim
    outcome:
      finding_status: contradicted
    semantic_rationale: >
      Significant semantic discrepancies were found that require human review.

  - rule_id: refute_core_assertion
    description: Observation proves the central claim is false.
    condition: >
      activity.field_observation.observation_alignment == refutes_claim
    outcome:
      finding_status: refuted
    semantic_rationale: >
      The strongest negative classification. The verification check established that
      the core assertion of the claim does not hold.
