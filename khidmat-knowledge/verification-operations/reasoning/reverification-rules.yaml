version: "1.0"
domain: Verification Operations
file: reasoning/reverification-rules.yaml

purpose: >
  Inference rules for raising a reverification_trigger when circumstances,
  evidence, or time dictate that a previously verified fact must be re-checked.

scope: >
  Maps temporal data, evidence freshness, and finding contradictions to
  reverification_trigger_type values, for the trigger types an existing
  ontology traversal supports. risk_escalation and
  case_updated_after_issuance remain valid reverification_trigger_type
  concepts (reverification-triggers.yaml) but have no rule below — see
  removed_rules for why.

governance:
  governing_adr:
    - ADR-008
    - ADR-010

inputs:
  - entity: verification_finding
  - entity: registration:evidence
  - concept: taxonomy:reverification-triggers.yaml#reverification_trigger_type
  - concept: taxonomy:time.yaml#waiting_and_grace_periods

outputs:
  - entity: reverification_trigger

reasoning_rules:
  - rule_id: trigger_evidence_expiring
    description: Evidence supporting a confirmed finding is expiring or expired.
    condition: >
      finding.finding_status in [confirmed, partially_confirmed] AND
      finding.field_observation.evidence.expiry_date IS NOT NULL AND
      current_date >= finding.field_observation.evidence.expiry_date
    outcome:
      reverification_trigger_type: evidence_expiring
    semantic_rationale: >
      Verification tied to time-limited evidence must be renewed when that
      evidence loses validity.
    notes: >
      Corrected traversal: verification_finding has no direct evidence edge.
      Evidence is reachable only via field_observation
      (verification_finding_derived_from_field_observation, then
      field_observation_corroborated_by_evidence — relationships.yaml).
      Freeze-audit fix: the condition also referenced
      evidence.temporal_status in [expiring_soon, expired]. No such
      property exists on registration:evidence, and this domain does not
      modify Registration's ontology to add one. registration:evidence does
      carry expiry_date (xsd:date). The condition is corrected to compare
      that existing date directly against current_date rather than an
      unsupported enum. This narrows the rule to "expired," the case
      expiry_date can actually support; the softer "expiring_soon"
      distinction shared/taxonomy/time.yaml#temporal_status draws is not
      reproducible without a property recording that threshold, and is not
      invented here.

  - rule_id: trigger_periodic_reassessment
    description: Standard time elapsed requiring routine reverification.
    condition: >
      current_date > (finding.recorded_at + reassessment_window)
    outcome:
      reverification_trigger_type: periodic_reassessment
    semantic_rationale: >
      Routine health-checks on long-term cases ensure the knowledge graph
      does not silently drift from reality.

  - rule_id: trigger_contradiction_detected
    description: A new contradiction was flagged on a previously settled claim.
    condition: >
      new_finding.contradiction_type != null AND
      new_finding.subject == prior_finding.subject
    outcome:
      reverification_trigger_type: contradiction_detected
    semantic_rationale: >
      Conflicts between past and present findings automatically trigger a dedicated
      reverification assignment to resolve the discrepancy.

removed_rules:
  - rule_id: trigger_risk_escalation
    removed_because: >
      Freeze-audit fix: the condition referenced case.risk_trend and
      case.risk_trend.updated_at. No relationship or property anywhere in
      the repository connects case (registration:case or
      case_management:case) to risk_trend or any Risk Domain concept — this
      domain's own relationships.yaml links risk_characterization to
      reverification_trigger (reverification_trigger_informed_by_risk_characterization),
      not to case, and that edge presupposes a trigger already exists
      rather than supplying a way to detect when to create one. No
      existing Registration or Case Management property carries an
      equivalent signal, and this domain does not modify Shared Risk,
      Registration, or Case Management to add one. Removing only the
      risk_trend clause and leaving
      "finding.finding_status in [confirmed, partially_confirmed]" would
      fire on every confirmed finding, which is not this rule's intent and
      would be a behavior change, not a fix — so the rule is removed
      entirely rather than partially. reverification_trigger_type:
      risk_escalation (reverification-triggers.yaml) remains a valid
      taxonomy concept and ontology-level relationship target; it is
      simply not currently reachable by an automated reasoning rule, the
      same status registrant_or_third_party_request already has among the
      six trigger types.

  - rule_id: trigger_case_updated_after_issuance
    removed_because: >
      Freeze-audit fix: the condition referenced case.updated_at. Neither
      registration:case nor case_management:case has an updated_at
      property or any equivalent last-modified timestamp anywhere in
      either domain's data-properties.yaml (case-management's case_timeline
      Value Object holds only case_note and follow_up, both free text with
      no timestamp field). No existing property supports this comparison,
      and this domain does not modify Registration or Case Management to
      add one. As with trigger_risk_escalation above, removing only the
      unsupported clause and leaving
      "activity.verification_status in [scheduled, in_progress]" would
      fire on every scheduled or in-progress activity, which is not this
      rule's intent — so the rule is removed entirely.
      reverification_trigger_type: case_updated_after_issuance
      (reverification-triggers.yaml) remains a valid taxonomy concept; it
      is simply not currently reachable by an automated reasoning rule.
