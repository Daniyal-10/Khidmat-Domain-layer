version: "1.0"
domain: Verification Operations
file: reasoning/escalation-rules.yaml

purpose: >
  Inference rules for raising an escalation_reason, thereby routing a verification
  finding or activity to mandatory human_review.

scope: >
  Maps verification states, findings, and confidence levels to escalation reasons.

governance:
  governing_adr:
    - ADR-008
    - ADR-010

inputs:
  - entity: verification_finding
  - entity: verification_activity
  - concept: taxonomy:escalation-reasons.yaml#escalation_reason

outputs:
  - trigger: human_review (via escalation_reason)

reasoning_rules:
  - rule_id: escalate_safety_concern
    description: Verifier withdrew due to unsafe conditions.
    condition: >
      activity.verification_status == could_not_complete AND
      activity.could_not_complete_reason == unsafe_conditions_at_arrival
    outcome:
      escalation_reason: safety_concern_at_visit
      human_review_required: true
    semantic_rationale: >
      A safety concern is the highest operational priority. It mandates immediate
      human review and must never be silently closed.

  - rule_id: escalate_contradictory_findings
    description: A refuted finding or conflicting finding is detected on a priority requirement.
    condition: >
      finding.contradiction_type != null OR
      finding.finding_status == refuted
    outcome:
      escalation_reason: contradictory_findings
      human_review_required: true
    semantic_rationale: >
      Resolving a direct contradiction requires human judgment to weigh evidence,
      especially if it could result in denial of service.

  - rule_id: escalate_low_confidence_priority
    description: A low-confidence finding is reached on a high-priority requirement.
    condition: >
      finding.verification_confidence == low AND
      finding.subject.requirement_priority == priority_1
    outcome:
      escalation_reason: low_confidence
      human_review_required: true
    semantic_rationale: >
      Priority 1 requirements (e.g., identity, vulnerability) require at least
      moderate confidence. Low confidence warrants review to authorize reverification
      or override.

  - rule_id: escalate_third_party_dispute
    description: An external dispute challenges a recorded finding.
    condition: >
      finding.contradiction_type == third_party_dispute
    outcome:
      escalation_reason: registrant_or_third_party_dispute
      human_review_required: true
    semantic_rationale: >
      Disputes from the community or the registrant themselves must be impartially
      reviewed by a human supervisor.
