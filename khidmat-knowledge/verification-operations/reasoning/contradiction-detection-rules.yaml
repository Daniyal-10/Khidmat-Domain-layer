version: "1.0"
domain: Verification Operations
file: reasoning/contradiction-detection-rules.yaml

purpose: >
  Inference rules for classifying the nature of a contradiction when a verification
  finding disagrees with the original claim or with another finding.

scope: >
  Determines the contradiction_type for any finding_status of contradicted or refuted.

governance:
  governing_adr:
    - ADR-008
    - ADR-010

inputs:
  - entity: core:VerificationFinding
  - entity: core:VerificationActivity
  - concept: taxonomy:verification-findings.yaml#contradiction_type

outputs:
  - entity: core:VerificationFinding
    property: contradiction_type

reasoning_rules:
  - rule_id: detect_observation_vs_claim
    description: A field observation conflicts with the original registration claim.
    condition: >
      finding.finding_status in [contradicted, refuted] AND
      activity.method == field_visit AND
      activity.field_observation.observation_alignment in [contradicts_claim, refutes_claim]
    outcome:
      contradiction_type: observation_vs_claim
    semantic_rationale: >
      The most common contradiction type, where the reality observed on the ground
      differs from the assertions made during registration.

  - rule_id: detect_finding_vs_finding
    description: A new verification finding conflicts with a previously recorded finding.
    condition: >
      finding.finding_status in [confirmed, partially_confirmed] AND
      EXISTS prior_finding WHERE
        prior_finding.subject == finding.subject AND
        prior_finding.finding_status in [contradicted, refuted]
    outcome:
      contradiction_type: finding_vs_finding
    semantic_rationale: >
      Two separate verification activities have produced conflicting results on the same
      subject, indicating either an error in one of the checks or a material change in circumstance.

  - rule_id: detect_third_party_dispute
    description: A community reference or institution disputes the claim.
    condition: >
      finding.finding_status in [contradicted, refuted] AND
      activity.method in [community_reference, institutional_verification] AND
      activity.field_observation.observation_alignment in [contradicts_claim, refutes_claim]
    outcome:
      contradiction_type: third_party_dispute
    semantic_rationale: >
      The contradiction stems from an external, independent third-party account rather
      than direct observation by the Khidmat AI verifier.
