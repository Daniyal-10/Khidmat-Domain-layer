version: "1.0"
domain: Verification Operations
file: reasoning/completeness-and-sufficiency-rules.yaml

purpose: >
  Inference rules for determining if a verification_assignment or case has
  achieved evidence sufficiency and completeness, or if gaps remain.

scope: >
  Evaluates aggregate verification quality and completeness for a given
  VerificationSubject.

governance:
  governing_adr:
    - ADR-008
    - ADR-010

inputs:
  - entity: core:VerificationAssignment
  - entity: core:VerificationSubject
  - entity: core:VerificationFinding
  - entity: registration:Evidence (via case_management:Case)

outputs:
  - insight: evidence_sufficiency
  - insight: verification_completeness

reasoning_rules:
  - rule_id: detect_incomplete_verification
    description: Mandatory verification activities for priority subjects are outstanding.
    condition: >
      EXISTS subject WHERE subject.requirement_priority == priority_1 AND
      NOT EXISTS finding WHERE finding.subject == subject AND
      finding.finding_status in [confirmed, partially_confirmed, refuted]
    outcome:
      verification_completeness: incomplete
    semantic_rationale: >
      A case cannot proceed if high-priority claims (e.g., identity, severe vulnerability)
      lack conclusive verification findings.

  - rule_id: detect_insufficient_evidence
    description: Verification findings exist but confidence is too low for the priority level.
    condition: >
      EXISTS finding WHERE finding.subject.requirement_priority == priority_1 AND
      finding.verification_confidence == low AND
      finding.contradiction_type == null
    outcome:
      evidence_sufficiency: insufficient
    semantic_rationale: >
      Low confidence on a priority requirement means the verification occurred,
      but the quality/certainty of the evidence collected is insufficient to rely on.
      More corroborating evidence is required.

  - rule_id: determine_sufficient_verification
    description: All priority subjects have medium or high confidence findings.
    condition: >
      FOR ALL subject IN case.subjects WHERE subject.requirement_priority == priority_1:
        EXISTS finding WHERE finding.subject == subject AND
        finding.finding_status == confirmed AND
        finding.verification_confidence in [medium, high]
    outcome:
      evidence_sufficiency: sufficient
      verification_completeness: complete
    semantic_rationale: >
      The core assertions of the registration claim have been corroborated
      with an acceptable level of operational trust.
