version: "1.0"
domain: Verification Operations
file: reasoning/confidence-composition-rules.yaml

purpose: >
  Inference rules for determining the verification_confidence of a finding.
  Evaluates the strength of the verification method, the corroboration of sources,
  and the quality of evidence.

scope: >
  Assigns a verification_confidence level (high, moderate, low, indeterminate)
  to a verification_finding.

governance:
  governing_adr:
    - ADR-008
    - ADR-010

inputs:
  - entity: verification_finding
  - entity: verification_activity
  - concept: taxonomy:verification-methods.yaml#verification_method
  - concept: taxonomy:verification-confidence.yaml#verification_confidence

outputs:
  - entity: verification_finding
    property: verification_confidence

reasoning_rules:
  - rule_id: confidence_high_direct_observation
    description: High confidence via direct field observation.
    condition: >
      activity.verification_method == home_visit AND
      finding.finding_status in [confirmed, refuted]
    outcome:
      verification_confidence: high
    semantic_rationale: >
      Direct observation by a verification actor is the gold standard for
      verifying physical reality (e.g., household composition, shelter condition).
    notes: >
      The original condition also required activity.actor.role ==
      trained_verifier. No such property exists anywhere in this domain's
      ontology or in shared/ontology/entities.yaml#actor — actor
      qualification is explicitly out of scope for Verification Operations
      (relationships.yaml: "does not define actor qualification, roles, or
      types — that remains a Volunteer Operations concern"). The clause is
      removed rather than left pointing at an undefined property; it should
      be reinstated once Volunteer Operations exposes a qualification/
      eligibility signal on shared:actor (see
      ontology_authority_matrix.md FLAG-006) that this rule can reference
      without inventing a new property here.

  - rule_id: confidence_high_corroborated_institutional
    description: High confidence via an institutional visit corroborated by evidence.
    condition: >
      activity.verification_method == institutional_visit AND
      count(activity.field_observation.evidence) > 0
    outcome:
      verification_confidence: high
    semantic_rationale: >
      Direct co-presence at a relevant institution (verification-methods.yaml),
      combined with at least one corroborating evidence record obtained during
      that visit, provides high certainty for the claim being checked.
    notes: >
      Freeze-audit fix: the original condition referenced
      evidence.source_type == official_institution and
      evidence.tamper_evident == true. Neither property exists on
      registration:evidence (registration/ontology/data-properties.yaml) —
      that entity's properties are evidence_id, linked_claim_id,
      evidence_type, evidence_subtype, availability, evidence_description,
      issuing_authority, issue_date, expiry_date, document_reference_number,
      subject_member_id, file_url. No existing registration:evidence
      property carries an equivalent official/tamper-evident distinction
      without inventing one, and this domain does not modify Registration's
      ontology. The condition is corrected to use the existing
      field_observation_corroborated_by_evidence relationship
      (relationships.yaml) — evidence presence, not an unsupported
      source-authenticity property — as the corroborating signal, consistent
      with how confidence_moderate_uncorroborated_remote below already uses
      the same relationship's absence.

  - rule_id: confidence_moderate_uncorroborated_remote
    description: Moderate confidence via a remote method without physical evidence.
    condition: >
      activity.verification_method in [document_verification, phone_verification] AND
      count(activity.field_observation.evidence) == 0
    outcome:
      verification_confidence: moderate
    semantic_rationale: >
      Remote methods provide useful signals but carry inherent identity and
      presence risks compared to physical visits.
    notes: >
      Outcome value corrected from the non-existent medium to the canonical
      moderate concept (verification-confidence.yaml). remote_interview is not
      a verification_methods concept; document_verification is the closest
      canonical remote method to the rule's original intent and is used here
      alongside the already-valid phone_verification.

  - rule_id: confidence_low_single_community_reference
    description: Low confidence via a single informal community reference.
    condition: >
      activity.verification_method == community_reference AND
      count(activity.field_observation.evidence) == 0
    outcome:
      verification_confidence: low
    semantic_rationale: >
      A single community reference without corroborating physical evidence is prone
      to bias or lack of full context. It yields low operational trust.

  - rule_id: confidence_indeterminate_unverifiable
    description: Indeterminate confidence for unable_to_confirm findings.
    condition: >
      finding.finding_status == unable_to_confirm
    outcome:
      verification_confidence: indeterminate
    semantic_rationale: >
      If the conclusion itself could not be reached, no reasoned confidence
      judgement has been composed. indeterminate (verification-confidence.yaml)
      is the honest placeholder for this case, not a fifth confidence level;
      the non-existent none value is retired.
