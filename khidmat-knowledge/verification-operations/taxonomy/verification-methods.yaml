metadata:
  file: verification-methods.yaml
  domain: Verification Operations
  layer: verification-operations/taxonomy
  status: Phase 4.1

purpose: >
  Defines the controlled vocabulary of methods by which a verification
  activity may be conducted. A verification method describes HOW a
  verification_subject (registration/verification/verification-requirements.yaml)
  is checked against reality — not what is being checked, and not what
  was concluded. What is checked is owned by Registration. What was
  concluded is owned by verification_finding_status
  (verification-findings.yaml). This file owns only the method of
  verification itself.

scope: >
  Verification methods used by Verification Operations to resolve a
  verification_requirement derived from a registration claim. Each
  method carries a directness classification distinguishing
  verification performed through direct co-presence with the
  beneficiary from verification performed through a third party,
  institution, or artifact.

out_of_scope: >
  This file does not define evidence types (see
  shared/taxonomy/document-types.yaml and
  registration/taxonomy/evidence.yaml), verification outcomes (see
  verification-findings.yaml), or verification workflow status (see
  verification-status.yaml). It does not prescribe which method must
  be used for which claim type — method recommendation is a reasoning
  concern, not a taxonomy concern.

governance:
  governing_adr:
    - ADR-008

cross_references:
  - registration/taxonomy/evidence.yaml
      Evidence types and subtypes referenced informally in
      typical_use notes below. This file does not redefine evidence
      vocabulary.
  - registration/taxonomy/claims.yaml
      Claim types (identity_claim, situation_claim, need_claim,
      household_claim) referenced informally in typical_use notes.
      This file does not redefine claim vocabulary.
  - registration/questioning/questioning-strategy.yaml#sensitive_topic_rules
      Safety-gated methods (e.g. domestic violence cases) must be
      selected consistent with the safe-contact protocol defined
      there. This file does not redefine safety rules.

directness_classification:
  description: >
    Whether the verifier is co-present with the beneficiary during
    verification (direct) or confirms the claim through a third
    party, institution, or artifact without direct observation of the
    beneficiary's actual living conditions (remote). Directness is a
    structural property of the method, not a judgement about its
    reliability — a remote method may still be highly reliable (a
    hospital confirming an admission record) and a direct method may
    still be limited (a home visit that catches only a snapshot of a
    fluctuating situation).
  values:
    - id: direct
      label: Direct
      description: >
        The verifier is physically co-present with the beneficiary or
        the beneficiary's living environment at the time of
        verification.
    - id: remote
      label: Remote
      description: >
        The verifier confirms the claim through a third party, an
        institution, a document, or a communication channel, without
        direct co-presence with the beneficiary or their living
        environment.

verification_methods:

  - id: home_visit
    label: Home Visit
    directness: direct
    description: >
      The verifier travels to the beneficiary's stated residence and
      observes the household and living conditions directly.
    typical_use: >
      Household composition claims, shelter needs, physical living
      condition claims, and any claim where the household's actual
      environment is the most direct source of confirmation.
    evidentiary_weight_note: >
      Generally the highest-confidence method for household
      composition and shelter conditions, since it does not depend on
      a third party's account. It is a single point-in-time
      observation and does not confirm conditions outside the visit
      window.

  - id: institutional_visit
    label: Institutional Visit
    directness: direct
    description: >
      The verifier travels to and observes conditions at an
      institution relevant to the claim — a hospital, school, clinic,
      or place of employment — rather than the beneficiary's
      residence.
    typical_use: >
      Medical needs (hospital or clinic visit), education needs
      (school visit), livelihood needs (place of employment visit).
    evidentiary_weight_note: >
      Direct co-presence at the institution, but the beneficiary
      themselves may not be present at the time of the visit.
      Confirms the institutional context of the claim rather than the
      beneficiary's household circumstances.

  - id: document_verification
    label: Document Verification
    directness: remote
    description: >
      The verifier examines a document produced by the registrant or
      obtained independently, without requiring co-presence with the
      beneficiary.
    typical_use: >
      Identity claims (national ID, birth certificate), situation
      claims (death certificate, eviction notice), need claims
      (medical documentation, school fee statements).
    evidentiary_weight_note: >
      Reliability depends entirely on the document's authenticity and
      currency (see shared/taxonomy/time.yaml#evidence_freshness).
      Does not confirm the beneficiary's current situation, only what
      the document states.

  - id: phone_verification
    label: Phone Verification
    directness: remote
    description: >
      The verifier confirms information through a phone call with the
      beneficiary, registrant, or a third party.
    typical_use: >
      Contact confirmation, safe-contact protocol cases where a home
      visit would be unsafe (see
      questioning-strategy.yaml#sensitive_topic_rules), preliminary
      confirmation ahead of a scheduled visit.
    evidentiary_weight_note: >
      Lower evidentiary weight than direct methods. Identity of the
      person on the call cannot be independently confirmed by voice
      alone. Appropriate as a primary method only where a safety or
      access constraint makes direct verification infeasible.

  - id: community_reference
    label: Community Reference
    directness: remote
    description: >
      The verifier confirms information through a named community
      member, religious leader, or neighbour with knowledge of the
      beneficiary's circumstances.
    typical_use: >
      Household composition corroboration, residency duration,
      character or circumstance corroboration where no institutional
      record exists.
    evidentiary_weight_note: >
      Reliability depends on the referee's actual proximity to the
      beneficiary's circumstances and their independence from the
      registrant. A single uncorroborated community reference is
      generally weaker evidence than a document or direct
      observation.

  - id: digital_verification
    label: Digital Verification
    directness: remote
    description: >
      The verifier confirms information through a digital record or
      platform — a government database, an institutional online
      portal, or a digital submission from the registrant (photo,
      video, digitally issued document).
    typical_use: >
      Digitally issued identity or benefit documents, photographic
      evidence of living conditions submitted by the registrant,
      digitally verifiable institutional records.
    evidentiary_weight_note: >
      Reliability depends on the integrity of the digital source.
      Registrant-submitted photos or videos carry lower evidentiary
      weight than an institutional digital record, since provenance
      and timing cannot be independently confirmed without further
      corroboration.

  - id: field_investigation
    label: Field Investigation
    directness: direct
    description: >
      An extended or multi-source direct verification effort
      undertaken when a single home or institutional visit is
      insufficient to resolve a contested or high-priority claim —
      combining direct observation with on-the-ground inquiry among
      multiple parties.
    typical_use: >
      Priority_1 requirements with contradictory findings, suspected
      fraud patterns under human review, or cases where prior
      verification attempts returned could_not_complete or
      unable_to_confirm.
    evidentiary_weight_note: >
      The most resource-intensive method. Reserved for cases where
      standard methods have not produced sufficient confidence, per
      escalation guidance (see escalation-reasons.yaml).

design_notes:
  - decision: Seven methods, not an exhaustive list
    rationale: >
      Mirrors the pattern established in
      shared/risk/taxonomy/hazard-categories.yaml (example_hazard_types are
      illustrative, not exhaustive) — methods here are the
      representative set NGOs use in humanitarian field operations.
      New methods may be added under this taxonomy without
      restructuring.
  - decision: Directness is a structural property, not a ranking
    rationale: >
      Consistent with the qualitative-only composition principle
      applied throughout the knowledge layer (ADR-010 precedent in
      the Risk Domain). Directness informs confidence composition
      (verification-confidence.yaml) but is not itself a confidence
      score.
  - decision: This file does not prescribe method-to-claim mappings
    rationale: >
      Method recommendation is a reasoning concern (a future
      reasoning module), not a taxonomy concern. Taxonomy defines the
      controlled vocabulary; reasoning modules apply it.