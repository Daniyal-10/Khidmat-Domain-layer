version: "1.0.0"
domain: verification_operations
file: taxonomy/review-decisions.yaml
status: active

purpose: >
  Defines the controlled vocabulary of decisions a human reviewer may
  reach when examining a verification_finding routed to human_review.
  This is the taxonomy-layer closure of the mandatory
  human-in-the-loop workflow: escalation-reasons.yaml defines why a
  finding reaches a reviewer; this file defines what the reviewer may
  decide once it does.

scope: >
  review_decision values covering approval, reverification,
  override, and further escalation, together with a reviewer
  independence note needed to keep the review actor structurally
  separate from the field actor whose finding is under review.

out_of_scope: >
  This file does not define the human_review entity itself (an
  ontology concern), does not define escalation_reason (see
  escalation-reasons.yaml), and does not define who is qualified to
  act as a reviewer — actor qualification is a Volunteer Operations
  concern referenced here only through the existing
  shared/ontology/entities.yaml#actor declaration. The immutability
  rule previously stated here now lives in
  ontology/lifecycle-constraints.yaml, per Canonical_Ontology_Schema.md §9.

governance:
  governing_adr:
    - ADR-008

namespaces:
  shared: shared
  registration: registration
  case_management: case_management

schemes:
  - id: review_decision
    label: Review Decision
    description: >
      The outcome of a human_review of a verification_finding. Every
      review reaches exactly one decision from this vocabulary. A
      review decision does not itself alter or overwrite the finding it
      reviews — consistent with the append-only pattern used throughout
      this knowledge layer, a review decision is recorded as a new,
      linked event (see ontology/lifecycle-constraints.yaml).
    concepts:
      - id: approved
        label: Approved
        description: >
          The reviewer accepts the finding as recorded. The
          verification_requirement it resolves may proceed to closure.

      - id: sent_back_for_reverification
        label: Sent Back for Reverification
        description: >
          The reviewer does not accept the finding as sufficient to
          close the requirement and directs that the underlying
          verification_subject be checked again, typically through a
          different verification_method or a different actor than the
          original activity used.
        typical_use: >
          A low-confidence finding on a priority_1 requirement is sent
          back with a direction to use a direct method rather than the
          remote method originally used.

      - id: overridden
        label: Overridden
        description: >
          The reviewer substitutes their own conclusion for the field
          actor's proposed finding_status, based on information or
          judgement available to the reviewer but not reflected in the
          original finding.
        note: >
          An overridden decision does not delete or edit the original
          finding — it is recorded as a superseding review event that
          references the original. The original finding, the field
          actor who proposed it, and the reviewer's overriding
          rationale all remain part of the permanent audit trail.

      - id: escalated_further
        label: Escalated Further
        description: >
          The reviewer does not have sufficient authority, information,
          or confidence to reach a decision, and routes the finding to
          a higher-level reviewer or a specialist.
        typical_use: >
          A suspected_fraud_pattern escalation that a first-level
          supervisor is not positioned to adjudicate alone.

      - id: rejected_pending_new_evidence
        label: Rejected Pending New Evidence
        description: >
          The reviewer determines the finding cannot be approved, sent
          back for straightforward reverification, or overridden with
          currently available information, and the verification_subject
          remains open pending evidence that does not yet exist (e.g.
          an institutional record that must be requested and awaited).

reviewer_role_constraint:
  description: >
    A structural note on reviewer independence. Recorded here because
    it directly shapes how review_decision values may be legitimately
    applied, though the constraint itself is an ontology-level
    relationship concern rather than a taxonomy value.
  constraint: >
    The actor recorded as reviewer for a given human_review must be a
    different actor instance than the actor who conducted the
    verification_activity or proposed the verification_finding under
    review. This preserves the independence of the human-in-the-loop
    check. Enforcement of this constraint is an ontology and
    governance concern — recorded as `notes:` fields on
    ontology/relationships.yaml's human_review_reviewed_by_actor and
    human_review_supersedes_human_review rows, since no closed
    semantic-constraints.yaml `type` fits a cross-relationship
    distinctness rule (see the note on those rows for why). It is
    noted here so that the review_decision vocabulary is not read in
    isolation from the independence requirement it presupposes.

references:
  - scheme: shared:actor
    relation: informs
    note: >
      The reviewer and the original field actor are both instances of
      actor, declared in shared/ontology/entities.yaml. This file does
      not redefine actor.
  - scheme: escalation_reason
    relation: constrains
    note: >
      A review_decision is always reached in response to an
      escalation raised under a reason defined in
      escalation-reasons.yaml. This file does not redefine escalation
      reasons.
  - scheme: registration:verification_requirement
    relation: informs
    note: >
      An approved finding closes the verification_requirement it
      resolves (registration/verification/verification-requirements.yaml).
      This file does not redefine requirement derivation.
  - scheme: case_management:case_note
    relation: informs
    note: >
      The append-only, addendum-only pattern for case notes (never
      replace, always add a new record) is the precedent this file's
      immutability treatment of review decisions follows. This file
      does not redefine case_note.

design_notes:
  - decision: Five decision values, not a binary approve/reject
    rationale: >
      A binary decision loses the operationally important distinction
      between "send it back for a straightforward repeat"
      (sent_back_for_reverification), "I know better and am
      substituting my own judgement" (overridden), "I cannot decide
      this myself" (escalated_further), and "I cannot decide this yet
      because the evidence to decide with does not exist"
      (rejected_pending_new_evidence). Each has a different
      operational next step.
  - decision: review_decision is immutable and append-only
    rationale: >
      Direct application of the pattern already established for
      case_note (case-management/ontology/) and need_assertion
      (needs-assessment's superseded_by pattern). A humanitarian audit
      trail must never allow a decision to be quietly rewritten;
      disagreement is itself data, not noise to be erased.
  - decision: Reviewer independence is noted here, not silently
      assumed
    rationale: >
      The Verification Operations discovery report raised this as an
      open question for the Human Owner rather than assuming an
      answer. Recording the constraint explicitly, flagged as
      ontology-level enforcement, keeps that open question visible
      rather than resolving it unilaterally inside a taxonomy file.
