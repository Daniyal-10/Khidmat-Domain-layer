version: "1.0.0"
domain: support_delivery
file: ontology/data-properties.yaml
status: active

data_properties:
  - id: event_state
    domain: delivery_event
    taxonomy_ref: delivery_state
    cardinality: { min: 1, max: 1 }

  - id: delivery_modality
    domain: delivery_event
    taxonomy_ref: delivery_modality
    cardinality: { min: 1, max: 1 }

  - id: constraint
    domain: delivery_event
    taxonomy_ref: delivery_constraint
    cardinality: { min: 0, max: unbounded }

  - id: actual_quantity_delivered
    domain: delivery_event
    datatype: xsd:integer
    cardinality: { min: 0, max: 1 }

  - id: exception
    domain: delivery_attempt
    taxonomy_ref: delivery_exception
    cardinality: { min: 0, max: unbounded }

  - id: proof_type
    domain: proof_of_delivery
    taxonomy_ref: proof_type
    cardinality: { min: 1, max: 1 }

  - id: proof_quality
    domain: proof_of_delivery
    taxonomy_ref: proof_quality
    cardinality: { min: 0, max: unbounded }

  - id: accountability_type
    domain: accountability_record
    taxonomy_ref: accountability_type
    cardinality: { min: 1, max: 1 }

  - id: escalation_trigger
    domain: operational_observation
    taxonomy_ref: escalation_trigger
    cardinality: { min: 0, max: unbounded }

  - id: metric
    domain: delivery_event
    taxonomy_ref: delivery_metric
    cardinality: { min: 0, max: unbounded }
