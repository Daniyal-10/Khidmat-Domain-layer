version: "1.1.0"
domain: support_delivery
file: ontology/entities.yaml
status: active

entities:
  - id: delivery_event
    label: Delivery Event
    description: >
      The fundamental unit of execution, representing the grouping, timing, scheduling,
      and occurrence of a delivery. May resolve one Case Plan or batch multiple plans.
    required: true
    notes: >
      Added per HKMP Stage 8D Governance Integration: a delivery_event may
      optionally be fulfilled_from one or more resource_allocation decisions
      (donor_resource:resource_allocation, ontology/relationships.yaml#delivery_event_fulfilled_from_resource_allocation),
      the Donor & Resource domain's pre-delivery reservation/commitment
      record. This is a reference only — resource_allocation remains
      exclusively owned by donor-resource/ontology/entities.yaml, and this
      entity's own definition, required cardinality, and existing
      relationships (fulfills case_plan, has_custody_transfer, etc.) are
      unchanged.

  - id: delivery_window
    label: Delivery Window
    description: >
      The valid timeframe for a delivery to occur, encompassing safe access windows,
      curfews, weather constraints, seasonal constraints, and appointments.
    required: true

  - id: delivery_attempt
    label: Delivery Attempt
    description: >
      An individual effort to complete a Delivery Event. Tracks friction and exceptions.
    required: false

  - id: proof_of_delivery
    label: Proof of Delivery
    description: >
      Evidence collected during the handover.
    required: true

  - id: operational_observation
    label: Operational Observation
    description: >
      An observation of the environment or beneficiary condition made by the delivery agent 
      during handover. Not a needs assessment.
    required: false

  - id: accountability_record
    label: Accountability Record
    description: >
      Captures beneficiary confirmation, operational feedback, complaints, or protected grievances 
      related strictly to the delivery event.
    required: false

  - id: custody_transfer
    label: Custody Transfer
    description: >
      A single link in the Chain of Custody, tracking the transfer of goods between custodians 
      before reaching the final beneficiary.
    required: false

  - id: community_representative
    label: Community Representative
    description: >
      A local leader receiving community-level assets.
    required: false

  - id: custodian
    label: Custodian
    description: >
      An intermediate handler in the chain of custody.
    required: false

