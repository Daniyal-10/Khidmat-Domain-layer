version: "1.0.0"
domain: support_delivery
file: ontology/lifecycle-constraints.yaml
status: active

constraints:
  - id: proof_of_delivery_mandatory
    type: transition_guard
    entity: delivery_event
    condition: "Transition to Delivered requires Proof of Delivery"
    description: Proof of Delivery is mandatory for transition to Delivered.

  - id: chain_of_custody_enforced
    type: state_update_rule
    entity: delivery_event
    condition: "Physical goods require custody transfer for state update"
    description: Chain of Custody is strictly enforced for physical goods; every transfer between custodians requires a state update.
