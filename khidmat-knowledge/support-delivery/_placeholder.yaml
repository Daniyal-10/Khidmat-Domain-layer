domain: support-delivery
maturity: level_2_placeholder
status: not_yet_active

scope: >
  This domain governs how approved interventions are physically delivered.
  It includes vendor relationships, delivery logistics, payment processing,
  and proof of delivery. It is entirely separate from registration.

concepts_this_domain_will_own:
  - delivery_task
  - vendor
  - payment_instruction
  - delivery_proof
  - escrow (if financial mechanism is used)

important_boundary_note: >
  Support request types in registration describe what is needed.
  Support delivery describes how it is provided.
  These are different concerns and must remain in different domains.

do_not_implement_until: >
  Case management domain is active and an intervention
  approval workflow exists.