version: "1.0.0"
domain: support_delivery
file: taxonomy/delivery-states.yaml
status: active

purpose: >
  Classifies the lifecycle states of a delivery event. Derived from Business Architecture Sec 8.

schemes:
  - id: delivery_state
    label: Delivery State
    description: The macro lifecycle of a delivery.
    concepts:
      - id: planned_grouped
        label: Planned / Grouped
        description: Event is structured, constraints applied.
      - id: dispatched
        label: Dispatched
        description: Assistance has left the origin and entered chain of custody.
      - id: arrived
        label: Arrived
        description: Agent is on-site.
      - id: handover_attempted
        label: Handover Attempted
        description: The interaction has begun.
      - id: delivered
        label: Delivered
        description: Handover is complete, PoD secured.
      - id: failed
        label: Failed
        description: Delivery aborted.
      - id: returned
        label: Returned
        description: Physical items returned to origin.
