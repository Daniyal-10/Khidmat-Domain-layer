version: "1.0.0"
domain: support_delivery
file: taxonomy/delivery-exceptions.yaml
status: active

purpose: >
  Classifies exceptions. Derived from Business Architecture Sec 12.

schemes:
  - id: delivery_exception
    label: Delivery Exception
    description: The specific reasons for failure or friction.
    concepts:
      - id: beneficiary_unavailable
        label: Beneficiary Unavailable
        description: Not home.
      - id: refused_assistance
        label: Refused Assistance
        description: Rejected by beneficiary.
      - id: proxy_unauthorized
        label: Proxy Unauthorized
        description: Handover rejected due to bad proxy.
      - id: beneficiary_relocated
        label: Beneficiary Relocated
        description: Migrated elsewhere.
      - id: beneficiary_deceased
        label: Beneficiary Deceased
        description: Died prior to delivery.
      - id: safety_incident
        label: Safety Incident
        description: Hostile environment.
      - id: roadblock
        label: Roadblock
        description: Physical barrier.
      - id: coerced_handover
        label: Coerced Handover
        description: Delivered under duress.
      - id: damaged_goods
        label: Damaged Goods
        description: Goods physically broken.
      - id: cold_chain_broken
        label: Cold Chain Broken
        description: Spoilage.
      - id: culturally_inappropriate
        label: Culturally Inappropriate
        description: Goods rejected on cultural grounds.
      - id: network_failure
        label: Network Failure
        description: Digital voucher dispatch failed.
