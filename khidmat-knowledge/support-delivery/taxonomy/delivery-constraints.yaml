version: "1.0.0"
domain: support_delivery
file: taxonomy/delivery-constraints.yaml
status: active

purpose: >
  Classifies constraints. Derived from Business Architecture Sec 9 and 10.

schemes:
  - id: delivery_constraint
    label: Delivery Constraint
    description: Requirements enforcing dignity, safety, accessibility, and operational viability.
    concepts:
      - id: child_safeguarding
        label: Child Safeguarding
        description: Handovers around unaccompanied minors require vetted personnel.
      - id: accessibility_inclusion
        label: Accessibility & Inclusion
        description: Must adapt to disability, language, and culture.
      - id: requires_unbranded_vehicle
        label: Requires Unbranded Vehicle
        description: For stigmatization risk.
      - id: anonymized_handover
        label: Anonymized Handover
        description: For extreme risk cases.
      - id: gender_matched_handover
        label: Gender-Matched Handover
        description: Dignity constraint for GBV cases.
      - id: cold_chain_required
        label: Cold Chain Required
        description: For perishables/vaccines.
      - id: urgent_dispatch
        label: Urgent Dispatch
        description: Acute needs.
      - id: neutrality_impartiality_independence
        label: Neutrality, Impartiality & Independence
        description: Must avoid partisan facilities and coercion.
