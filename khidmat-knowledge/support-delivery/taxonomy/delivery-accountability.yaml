version: "1.0.0"
domain: support_delivery
file: taxonomy/delivery-accountability.yaml
status: active

purpose: >
  Classifies accountability and escalation triggers. Derived from BA Sec 11, 14, 15.

schemes:
  - id: accountability_type
    label: Accountability Type
    description: The type of feedback record.
    concepts:
      - id: beneficiary_confirmation
        label: Beneficiary Confirmation
        description: Checking receipt.
      - id: operational_feedback
        label: Operational Feedback
        description: Routine input (e.g. wait was long).
      - id: complaint
        label: Complaint
        description: Formal dissatisfaction with quality.
      - id: protected_grievance
        label: Protected Grievance
        description: Severe allegation bypassing normal channels.

  - id: escalation_trigger
    label: Escalation Trigger
    description: Where observations are escalated.
    concepts:
      - id: needs_assessment
        label: Needs Assessment
        description: Newly discovered vulnerabilities.
      - id: case_management
        label: Case Management
        description: Reassessment of current plan.
      - id: protection
        label: Protection
        description: Immediate safeguarding threats.
      - id: verification
        label: Verification
        description: Suspected fraud.

  - id: delivery_metric
    label: Delivery Metric
    description: Conceptual metrics.
    concepts:
      - id: fulfillment
        label: Fulfillment
        description: Percentage handed over.
      - id: timeliness_delay
        label: Timeliness & Delay
        description: Adherence to window.
      - id: completion_vs_refusal
        label: Completion vs Refusal
        description: Handovers vs rejections.
      - id: spoilage
        label: Spoilage
        description: Broken cold chains, etc.
