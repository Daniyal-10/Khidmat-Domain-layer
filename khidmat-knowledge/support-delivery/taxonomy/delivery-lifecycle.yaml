version: "1.0.0"
domain: support_delivery
file: taxonomy/delivery-lifecycle.yaml
status: active

purpose: >
  Classifies the states a delivery event moves through and the 
  exceptions that can occur during handover.

schemes:
  - id: delivery_status
    label: Delivery Status
    description: >
      The macro lifecycle state of a Delivery Event.
    concepts:
      - id: dispatched
        label: Dispatched
        description: Goods or services have left the origin point.
      - id: arrived
        label: Arrived
        description: The delivery agent is at the location.
      - id: handover_attempted
        label: Handover Attempted
        description: An attempt to transfer assistance occurred.
      - id: delivered
        label: Delivered
        description: Assistance successfully transferred and verified.
      - id: failed
        label: Failed
        description: The delivery could not be completed.
      - id: returned
        label: Returned
        description: Goods were successfully returned to inventory.

  - id: delivery_exception_reason
    label: Delivery Exception Reason
    description: >
      Reasons why a delivery attempt failed.
    concepts:
      - id: beneficiary_unavailable
        label: Beneficiary Unavailable
        description: The required recipient was not present.
      - id: refused
        label: Refused
        description: The beneficiary declined the assistance.
      - id: damaged_goods
        label: Damaged Goods
        description: The assistance was unusable upon arrival.
      - id: safety_incident
        label: Safety Incident
        description: Unsafe conditions prevented the delivery.
