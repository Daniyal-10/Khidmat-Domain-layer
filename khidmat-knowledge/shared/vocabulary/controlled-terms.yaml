# domain: shared
# file: shared/vocabulary/controlled-terms.yaml
# status: placeholder
#
# This file will contain controlled terms that appear across multiple
# domain files and need a single authoritative source.
#
# The distinction from taxonomy/:
#   taxonomy/ contains classification hierarchies (IS-A relationships,
#   category trees, enumerable type sets that describe the domain).
#   controlled-terms.yaml contains short, precise value strings
#   that are used as field values across multiple domains
#   (e.g., status codes, standard units, canonical labels).
#
# Candidate future entries:
#   - Standard currency codes
#   - Standard language codes (for beneficiary.language)
#   - Canonical contact method types (phone, whatsapp, in_person)
#
# Do not add entries here until a term is used in two or more active domains.