version: "1.0.0"
domain: shared
file: taxonomy/organisations.yaml
status: active

purpose: >
  Organisation types referenced across Khidmat domains.
  Registration references organisations as sources of referrals
  and as institutional evidence sources.
  Future domains (programs, support delivery) will reference
  organisations as implementing partners.
  This file owns the shared classification vocabulary only.

schemes:
  - id: organisation_types
    label: Organisation Types
    description: >
      Types of organisations referenced across Khidmat domains as
      referral sources, evidence sources, or implementing partners.
      Detailed organisation ontology (relationships, accountability,
      program participation) is reserved for a future organisations domain.
    concepts:
      - id: hospital_or_clinic
        description: A hospital or medical clinic.
      - id: school_or_madrasa
        description: A school or madrasa.
      - id: mosque_or_religious_institution
        description: A mosque or other religious institution.
      - id: ngo_or_charity
        description: A non-governmental organisation or charity.
      - id: government_office
        description: A government office.
      - id: community_organisation
        description: A community-based organisation.
      - id: employer
        description: An employer organisation.
      - id: court_or_legal_authority
        description: A court or other legal authority.
