# =============================================================================
# Khidmat Shared Human Model — Health Conditions Ontology
# =============================================================================
ontology_version: "1.0"
authority: "shared/human-model/"
owner_domain: "Shared Human Model"
status: "Phase 2.4 — Active"
# ---------------------------------------------------------------------------
# Purpose: Defines a structured vocabulary of health conditions relevant to
#          humanitarian reasoning. Models conditions, their clinical properties,
#          their effects on human functioning, and their interaction with
#          lifecycle stages and family roles.
# Scope:   This file answers "what condition is this, what does it do to
#          a person, and how does it interact with their developmental stage
#          and family context?"
#          It does not answer "what should the system do about it?"
# Governing ADRs: ADR-007, ADR-008
# Cross-references:
#   shared/human-model/capabilities.yaml
#     Capability domains are referenced by domain_ref in affected_capability_domains.
#     This file defines the conditions that modify capabilities; capabilities.yaml
#     defines the capability concepts themselves.
#   shared/human-model/dependency.yaml
#     Dependency types are referenced by dependency_ref in triggered_dependency_types.
#     This file defines the conditions that create dependencies; dependency.yaml
#     defines the dependency relationship concepts.
#   shared/human-model/lifecycle-stages.yaml
#     Lifecycle stages are referenced by stage_ref in characteristic_lifecycle_manifestations.
#     This file describes how conditions manifest at each stage; lifecycle-stages.yaml
#     owns the stage definitions.
#   shared/human-model/family-structure.yaml
#     Family support roles are referenced by role_ref in family_role_impact.
#     This file describes how conditions affect family roles; family-structure.yaml
#     owns the role definitions.
# ---------------------------------------------------------------------------
health_conditions:

  # =========================================================================
  # PART 1: CONDITION CATEGORIES
  # =========================================================================
  # Seven top-level humanitarian reasoning categories.
  # Not mutually exclusive. A person may have conditions from multiple categories.
  # =========================================================================

  condition_categories:

    - id: nutritional
      name: Nutritional Conditions
      description: >
        Malnutrition and micronutrient deficiencies that impair physical
        development, immune function, cognitive capacity, and daily functioning.
        Nutritional conditions are particularly consequential in early lifecycle
        stages where developmental windows are sensitive and irreversible.
      scope: >
        Covers acute malnutrition (SAM, MAM), chronic malnutrition (stunting),
        and specific micronutrient deficiencies with functional consequences.

    - id: communicable
      name: Communicable Diseases
      description: >
        Infectious and parasitic diseases that can be transmitted between
        people or through vectors. Communicable diseases carry public health
        implications beyond the individual affected person.
      scope: >
        Covers respiratory infections, tuberculosis, HIV/AIDS, malaria,
        hepatitis, and diarrheal diseases prevalent in humanitarian contexts.

    - id: non_communicable
      name: Non-Communicable Diseases
      description: >
        Chronic physical conditions that are not transmissible and typically
        require sustained management. NCDs are increasingly prevalent in
        humanitarian populations and create long-term dependency burdens.
      scope: >
        Covers cardiovascular, metabolic, respiratory, renal, neurological,
        and oncological conditions relevant to humanitarian reasoning.

    - id: mental_behavioral
      name: Mental and Behavioral Health Conditions
      description: >
        Psychological, psychiatric, and substance-related conditions that
        affect cognition, emotion, behavior, and social functioning. These
        conditions are frequently underdisclosed and have cascading effects
        on family wellbeing and caregiving capacity.
      scope: >
        Covers depressive disorders, anxiety disorders, trauma-related
        disorders, psychotic disorders, and substance use disorders.

    - id: injury_trauma
      name: Injury and Trauma
      description: >
        Acute physical damage and its chronic consequences. Injuries may be
        sudden events or may result in permanent disability. Trauma includes
        both physical injury and the psychological sequelae of violent or
        catastrophic events.
      scope: >
        Covers traumatic brain injury, spinal cord injury, fractures, burns,
        amputation, and the physical consequences of violence or accident.

    - id: congenital_developmental
      name: Congenital and Developmental Conditions
      description: >
        Conditions present from birth or emerging in early development that
        create lifelong support needs. These conditions affect the person's
        developmental trajectory and create sustained dependency across the
        lifecycle.
      scope: >
        Covers congenital heart disease, intellectual disability, cerebral
        palsy, developmental delay, and congenital anomalies such as cleft
        lip and palate.

    - id: sensory_physical_disability
      name: Sensory and Physical Disabilities
      description: >
        Permanent or long-term impairments of sensory or physical function
        that constrain capability and may require assistive devices or
        environmental accommodation. Disabilities may be congenital or
        acquired through illness, injury, or degenerative process.
      scope: >
        Covers visual impairment, hearing impairment, physical disability
        affecting upper or lower limbs, and multiple co-occurring disabilities.

  # =========================================================================
  # PART 2: CONDITION FAMILIES
  # =========================================================================
  # Groupings of related conditions that share clinical characteristics,
  # treatment approaches, or capability impact patterns.
  # =========================================================================

  condition_families:

    - id: cardiovascular_diseases
      name: Cardiovascular Diseases
      category: non_communicable
      description: >
        Conditions affecting the heart and blood vessels. Share common risk
        factors (hypertension, diabetes, smoking, obesity) and frequently
        co-occur, compounding cardiovascular risk.
      shared_capability_impacts: [physical_mobility, independent_living, caregiving]
      note: >
        Cardiovascular conditions are a leading cause of adult mortality and
        disability in low-resource settings. Multiple cardiovascular conditions
        in the same person create compounding medication and management burden.

    - id: metabolic_disorders
      name: Metabolic Disorders
      category: non_communicable
      description: >
        Conditions affecting the body's metabolic regulation. Diabetes is the
        primary representative in humanitarian contexts. Frequently co-occurs
        with cardiovascular and renal conditions.
      shared_capability_impacts: [physical_mobility, cognitive_functioning, independent_living]
      note: >
        Metabolic disorders require sustained self-management. In resource-
        constrained settings, glycemic control is often poor, accelerating
        complication development.

    - id: respiratory_conditions
      name: Respiratory Conditions
      category: non_communicable
      description: >
        Chronic conditions affecting breathing and lung function. Includes
        asthma and chronic obstructive pulmonary disease. Environmental
        factors (air quality, altitude, extreme temperatures) significantly
        affect severity.
      shared_capability_impacts: [physical_mobility, employment, household_management]
      note: >
        Respiratory conditions are episodic — acute exacerbations may create
        temporary severe dependency even when baseline function is adequate.

    - id: neurological_conditions
      name: Neurological Conditions
      category: non_communicable
      description: >
        Conditions affecting the nervous system. Includes epilepsy and
        neurodegenerative disorders. Create variable capability impact depending
        on seizure control or disease progression.
      shared_capability_impacts: [cognitive_functioning, physical_mobility, independent_living, communication]
      note: >
        Neurological conditions carry high stigma in many contexts. Seizure
        disorders may prevent employment and social participation regardless
        of baseline capability between episodes.

    - id: renal_conditions
      name: Renal Conditions
      category: non_communicable
      description: >
        Conditions affecting kidney function. Chronic kidney disease is the
        primary representative. Frequently a complication of diabetes and
        hypertension. Creates high treatment dependency.
      shared_capability_impacts: [physical_mobility, independent_living, employment]
      note: >
        Kidney disease requires sustained medical management. In humanitarian
        contexts, dialysis access is often unavailable, making advanced
        CKD effectively terminal.

    - id: neurocognitive_disorders
      name: Neurocognitive Disorders
      category: non_communicable
      description: >
        Conditions causing progressive cognitive decline. Dementia is the
        primary representative. Creates sustained and intensifying caregiver
        dependency as the condition progresses.
      shared_capability_impacts: [cognitive_functioning, independent_living, decision_making, self_advocacy]
      note: >
        Neurocognitive disorders are among the highest caregiver-intensity
        conditions. The caregiver burden intensifies as the condition
        progresses, often exceeding the caregiver's own capacity.

    - id: mental_health_conditions
      name: Mental Health Conditions
      category: mental_behavioral
      description: >
        Psychological and psychiatric conditions affecting mood, cognition,
        perception, and behavior. Frequently underdisclosed. May affect the
        person's caregiving capacity even when their own physical needs are met.
      shared_capability_impacts: [social_participation, community_participation, self_advocacy, caregiving, employment]
      note: >
        Mental health conditions affect the person's ability to function in
        social and economic roles. A depressed caregiver may be physically
        present but unable to provide responsive care.

    - id: trauma_conditions
      name: Trauma Conditions
      category: injury_trauma
      description: >
        Conditions resulting from acute physical damage. Includes traumatic
        brain injury, spinal cord injury, fractures, burns, and amputation.
        Capability impact depends on the location and severity of the injury.
      shared_capability_impacts: [physical_mobility, cognitive_functioning, independent_living, vocational, employment]
      note: >
        Trauma conditions often have a clear before-and-after. The person
        may have had full capability before the injury and sustained
        permanent reduction after. This creates a distinct psychological
        and social adjustment trajectory.

    - id: congenital_conditions
      name: Congenital Conditions
      category: congenital_developmental
      description: >
        Conditions present from birth that affect structural or functional
        development. Includes congenital heart disease and congenital
        anomalies. May require surgical intervention in early life.
      shared_capability_impacts: [physical_mobility, cognitive_functioning, independent_living]
      note: >
        Congenital conditions create lifelong support needs. The family's
        understanding and acceptance of the condition significantly affects
        the child's developmental outcomes and educational access.

    - id: developmental_conditions
      name: Developmental Conditions
      category: congenital_developmental
      description: >
        Conditions affecting neurological or physical development in early
        childhood. Includes intellectual disability, cerebral palsy, and
        developmental delay. Create sustained dependency that does not resolve.
      shared_capability_impacts: [cognitive_functioning, physical_mobility, communication, independent_living, vocational]
      note: >
        Developmental conditions require sustained educational and therapeutic
        support. In resource-limited settings, these supports are often
        unavailable, leading to permanent capability gaps that might have
        been partially addressed with early intervention.

    - id: nutritional_conditions
      name: Nutritional Conditions
      category: nutritional
      description: >
        Conditions of inadequate or imbalanced nutrition. Includes acute
        malnutrition (SAM, MAM), chronic malnutrition (stunting), and
        micronutrient deficiencies. Affects development, immunity, and
        daily functioning.
      shared_capability_impacts: [physical_mobility, cognitive_functioning, independent_living, caregiving]
      note: >
        Nutritional conditions are reversible with appropriate intervention
        but may leave permanent deficits if untreated during critical
        developmental windows. The reversibility is time-sensitive.

    - id: infectious_diseases
      name: Infectious Diseases
      category: communicable
      description: >
        Infectious and parasitic diseases. Includes tuberculosis, HIV/AIDS,
        malaria, hepatitis, and acute respiratory and diarrheal infections.
        May be acute and self-limiting or chronic and sustained.
      shared_capability_impacts: [physical_mobility, employment, cognitive_functioning, household_management]
      note: >
        Infectious diseases range from acute and self-limiting (most
        diarrheal infections) to chronic and sustained (TB, HIV). The
        capability impact depends on the specific disease and its stage.

    - id: sensory_disabilities
      name: Sensory Disabilities
      category: sensory_physical_disability
      description: >
        Permanent or long-term impairments of vision or hearing. Create
        specific barriers to communication, information access, and mobility
        that are distinct from physical disability.
      shared_capability_impacts: [communication, literacy, physical_mobility, social_participation, employment]
      note: >
        Sensory disabilities are often accommodated with assistive devices
        (glasses, hearing aids) or environmental adaptations (sign language,
        Braille). The capability impact depends heavily on whether these
        accommodations are available.

    - id: physical_disabilities
      name: Physical Disabilities
      category: sensory_physical_disability
      description: >
        Permanent or long-term impairments of physical function affecting
        limbs or trunk. May be congenital or acquired through injury,
        illness, or degenerative process. Capability impact depends on
        which limbs are affected and whether assistive devices are available.
      shared_capability_impacts: [physical_mobility, independent_living, household_management, caregiving, employment]
      note: >
        Physical disability is highly variable. A lower limb disability may
        prevent walking but allow full cognitive and vocational capability.
        An upper limb disability may prevent manual work but allow full
        mobility. The capability model must be domain-specific, not global.

  # =========================================================================
  # PART 3: SPECIFIC CONDITIONS
  # =========================================================================
  # Individual condition definitions with full attribute schema.
  # Approximately 40 conditions covering the conditions referenced in
  # existing files plus the most common conditions in humanitarian contexts.
  # Extensible — new conditions can be added without restructuring.
  # =========================================================================

  specific_conditions:

    # -----------------------------------------------------------------------
    # NUTRITIONAL CONDITIONS
    # -----------------------------------------------------------------------

    - id: severe_acute_malnutrition
      name: Severe Acute Malnutrition (SAM)
      category: nutritional
      family: nutritional_conditions
      description: >
        A life-threatening condition of severe nutritional deficiency
        characterized by very low weight-for-height, visible severe wasting,
        or nutritional edema. SAM is a severe nutritional deficiency with high mortality risk.
        In children, SAM has developmental consequences that are distinct
        from adult malnutrition and may be irreversible if prolonged.
      body_systems_affected: [metabolic, immune, neurological, cardiovascular]
      typical_onset_pattern: any_age
      typical_progression: progressive_if_untreated
      treatability: manageable_with_treatment
      reversibility: reversible_with_treatment
      fatal_if_untreated: true
      disability_potential: high
      condition_caregiver_intensity: high
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: minimal
          impact_mechanism: >
            Severe wasting and muscle loss produce profound weakness.
            In infants, the impact is total physiological dependency.
          reversible_with_treatment: true
        - domain_ref: capabilities.yaml#cognitive_functioning
          typical_impact_level: minimal
          impact_mechanism: >
            In infants and young children, SAM during critical developmental
            windows produces lasting cognitive deficit even after nutritional
            recovery. In adults, acute deficiency impairs concentration and
            decision-making capacity.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#independent_living
          typical_impact_level: minimal
          impact_mechanism: >
            A person with SAM cannot self-provide. For infants and young
            children, the dependency is total and normative. For adults,
            SAM creates acute caregiving dependency that is not normative.
          reversible_with_treatment: true
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            SAM creates total caregiving dependency for feeding, hygiene,
            and safety supervision. In children this is normative; in adults
            it is an acquired dependency requiring active caregiver support.
          typically_temporary: true
        - dependency_ref: dependency.yaml#physical_support
          trigger_condition: >
            Severe weakness prevents independent movement. The person requires
            physical assistance for mobility, positioning, and transport.
          typically_temporary: true
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#infant
          manifestation: >
            SAM in infants is the most developmentally consequential form.
            Brain development is at its most rapid phase; deprivation produces
            irreversible deficit. The infant's vulnerability is inseparable
            from the caregiver's capacity to provide therapeutic nutrition.
        - stage_ref: lifecycle-stages.yaml#toddler
          manifestation: >
            SAM in toddlers produces stunting and developmental delay with
            lasting educational consequences. The window for catch-up growth
            is narrowing but not yet closed.
        - stage_ref: lifecycle-stages.yaml#adult
          manifestation: >
            SAM in adults is usually crisis-triggered rather than structural.
            Sudden food insecurity, displacement, or illness may produce
            acute malnutrition in an adult who was previously healthy. The
            condition is rapidly reversible with food and medical support.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver managing a child with SAM has intensified caregiving
            demands — therapeutic feeding regimens, frequent monitoring,
            emotional stress. The caregiver's own wellbeing directly affects
            the child's recovery trajectory.
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            An earner with SAM is unable to work. Adult SAM is typically
            a secondary consequence of another crisis (illness, displacement,
            bereavement) that has already disrupted the household economy.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#moderate_acute_malnutrition
          comorbidity_pattern: frequent
          compounding_effect: >
            SAM and MAM frequently occur sequentially or in different
            household members. A household with one child with SAM typically
            has other children with MAM or at risk of malnutrition.
        - condition_ref: health-conditions.yaml#diarrheal_disease
          comorbidity_pattern: frequent
          compounding_effect: >
            Diarrheal disease both causes and exacerbates SAM. Fluid and
            nutrient loss accelerates malnutrition; malnutrition increases
            infection severity and duration. The two create a dangerous
            feedback loop.
      environmental_interactions:
        - factor: food_insecurity
          effect: >
            SAM is directly caused by inadequate food access. In food-
            insecure households, SAM risk is structural rather than incidental.
        - factor: displacement
          effect: >
            Disruption of breastfeeding, loss of food stores, and unsanitary
            conditions in displacement camps increase SAM incidence and
            severity.
        - factor: extreme_heat
          effect: >
            Dehydration and heat stress compound the metabolic demands of
            malnutrition, accelerating deterioration.

    - id: moderate_acute_malnutrition
      name: Moderate Acute Malnutrition (MAM)
      category: nutritional
      family: nutritional_conditions
      description: >
        A condition of moderate nutritional deficiency characterized by
        low weight-for-height or mid-upper arm circumference below the
        healthy range. MAM is less immediately life-threatening than SAM
        but carries significant health risks and may progress to SAM if
        untreated. In children, MAM impairs growth and immune function.
      body_systems_affected: [metabolic, immune, developmental]
      typical_onset_pattern: any_age
      typical_progression: stable_or_progressive
      treatability: manageable_with_treatment
      reversibility: reversible_with_treatment
      fatal_if_untreated: false
      disability_potential: moderate
      condition_caregiver_intensity: moderate
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: partial
          impact_mechanism: >
            Reduced muscle mass and energy reserve limit physical endurance
            and activity capacity. In children, this may present as reduced
            play and exploration, which in turn affects developmental
            stimulation.
          reversible_with_treatment: true
        - domain_ref: capabilities.yaml#cognitive_functioning
          typical_impact_level: partial
          impact_mechanism: >
            In children, MAM is associated with reduced attention span,
            slower learning, and increased irritability. In adults, it
            produces fatigue and reduced cognitive performance.
          reversible_with_treatment: true
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Children with MAM require enhanced nutritional support and
            monitoring. Adults with MAM may need temporary assistance with
            physically demanding tasks during recovery.
          typically_temporary: true
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#infant
          manifestation: >
            MAM in infants indicates insufficient breast milk or inadequate
            complementary feeding. Requires assessment of caregiver capacity
            and feeding practices, not just food supply.
        - stage_ref: lifecycle-stages.yaml#school_age_child
          manifestation: >
            MAM in school-age children affects concentration, attendance,
            and academic performance. The educational impact is frequently
            overlooked because the child is not visibly severely ill.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            Managing MAM requires attention to feeding frequency, food
            quality, and growth monitoring. The burden is sustained but
            not as intensive as SAM management.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#severe_acute_malnutrition
          comorbidity_pattern: frequent
          compounding_effect: >
            MAM frequently progresses to SAM in resource-constrained
            settings where nutritional support is inadequate. The
            progression may be rapid during illness or food insecurity.
        - condition_ref: health-conditions.yaml#iron_deficiency_anemia
          comorbidity_pattern: frequent
          compounding_effect: >
            MAM and iron deficiency frequently co-occur, compounding
            fatigue, weakness, and cognitive impairment. The two conditions
            share dietary causes and may require simultaneous intervention.
      environmental_interactions:
        - factor: food_insecurity
          effect: >
            MAM is directly linked to inadequate dietary quality and quantity.
            In food-insecure households, MAM is a sentinel indicator of
            household nutritional failure.
        - factor: seasonal_illness
          effect: >
            MAM increases susceptibility to common infections, which in turn
            worsen nutritional status through reduced appetite and nutrient
            loss. The malnutrition-infection cycle is well-documented.

    - id: stunting
      name: Stunting (Chronic Malnutrition)
      category: nutritional
      family: nutritional_conditions
      description: >
        A condition of impaired linear growth and developmental potential
        resulting from chronic nutritional deficiency, repeated infection,
        or inadequate psychosocial stimulation during early childhood.
        Stunting is measured by low height-for-age. It reflects long-term
        nutritional and developmental deprivation rather than acute crisis.
      body_systems_affected: [developmental, metabolic, immune, neurological]
      typical_onset_pattern: early_childhood
      typical_progression: stable
      treatability: manageable_without_treatment
      reversibility: partially_reversible
      fatal_if_untreated: false
      disability_potential: moderate
      condition_caregiver_intensity: low
      affected_capability_domains:
        - domain_ref: capabilities.yaml#cognitive_functioning
          typical_impact_level: partial
          impact_mechanism: >
            Stunting is associated with reduced cognitive development,
            lower educational attainment, and reduced adult earnings.
            The cognitive impact is not fully reversible even after
            nutritional recovery, because critical developmental windows
            have been missed.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: functional
          impact_mechanism: >
            Stunted children may have reduced physical capacity for
            height-appropriate tasks but are typically mobile and active.
            The impact is primarily on growth potential rather than
            current mobility.
          reversible_with_treatment: partial
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#developmental
          trigger_condition: >
            Stunting indicates that the child's developmental environment
            has been inadequate. The child may require enhanced developmental
            support to partially compensate for the developmental deficit.
          typically_temporary: false
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#early_childhood
          manifestation: >
            Stunting is typically identified in early childhood when
            growth faltering becomes apparent. At this stage, some catch-up
            is possible with improved nutrition and reduced infection burden.
        - stage_ref: lifecycle-stages.yaml#school_age_child
          manifestation: >
            By school age, stunting is largely established. The child is
            shorter than peers and may have reduced cognitive and educational
            performance. The condition is now a marker of past deprivation
            rather than a current acute nutritional need.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            Stunting reflects chronic household conditions — food insecurity,
            poor feeding practices, repeated infection, or caregiver stress.
            The caregiver may not be the cause but is the pathway to
            improvement. Addressing stunting requires caregiver engagement.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#iron_deficiency_anemia
          comorbidity_pattern: frequent
          compounding_effect: >
            Stunting and anemia frequently co-occur, compounding fatigue,
            immune compromise, and cognitive impairment. The dietary
            interventions overlap.
      environmental_interactions:
        - factor: food_insecurity
          effect: >
            Stunting is a structural indicator of chronic household food
            insecurity. It does not respond to acute food aid alone.
        - factor: poor_sanitation
          effect: >
            Repeated diarrheal infection from poor sanitation is a major
            cause of stunting. Environmental conditions directly determine
            stunting prevalence.

    - id: iron_deficiency_anemia
      name: Iron Deficiency Anemia
      category: nutritional
      family: nutritional_conditions
      description: >
        A condition of inadequate iron resulting in reduced hemoglobin and
        impaired oxygen transport. Anemia produces fatigue, weakness, reduced
        cognitive function, and impaired immune response. It is the most
        common nutritional deficiency worldwide and is frequently asymptomatic
        or attributed to normal tiredness.
      body_systems_affected: [hematological, immune, neurological, cardiovascular]
      typical_onset_pattern: any_age
      typical_progression: stable_if_managed
      treatability: manageable_with_treatment
      reversibility: reversible_with_treatment
      fatal_if_untreated: false
      disability_potential: low
      condition_caregiver_intensity: low
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: functional
          impact_mechanism: >
            Fatigue and reduced exercise tolerance limit sustained physical
            activity. A person with anemia may be able to perform short tasks
            but cannot sustain demanding physical work.
          reversible_with_treatment: true
        - domain_ref: capabilities.yaml#cognitive_functioning
          typical_impact_level: functional
          impact_mechanism: >
            Reduced oxygen delivery to the brain impairs concentration,
            memory, and executive function. In children, anemia is
            associated with reduced school performance.
          reversible_with_treatment: true
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#physical_support
          trigger_condition: >
            Severe anemia may cause dizziness and fainting, creating a need
            for physical support during episodes of weakness.
          typically_temporary: true
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#adolescent
          manifestation: >
            Adolescent females are at elevated risk due to menstruation.
            Anemia in adolescent females is associated with fatigue that
            affects school attendance and academic performance.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            Anemia reduces work capacity through fatigue. An earner with
            anemia may be present at work but underperforming, reducing
            household income without a visible cause.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#moderate_acute_malnutrition
          comorbidity_pattern: frequent
          compounding_effect: >
            Anemia and MAM share dietary causes and frequently co-occur.
            The combination produces more severe fatigue than either alone.
      environmental_interactions:
        - factor: food_insecurity
          effect: >
            Anemia is strongly linked to dietary iron deficiency. In
            food-insecure households, anemia is frequently endemic rather
            than isolated.

    # -----------------------------------------------------------------------
    # COMMUNICABLE DISEASES
    # -----------------------------------------------------------------------

    - id: tuberculosis
      name: Tuberculosis
      category: communicable
      family: infectious_diseases
      description: >
        A chronic bacterial infection primarily affecting the lungs but
        capable of spreading to other organs. TB is transmissible through
        airborne droplets. It requires prolonged treatment
        and is a major cause of death in low-resource settings. Treatment
        interruption leads to drug resistance, which is significantly harder
        to treat.
      body_systems_affected: [respiratory, immune, metabolic, neurological]
      typical_onset_pattern: any_age
      typical_progression: progressive_if_untreated
      treatability: manageable_with_treatment
      reversibility: reversible_with_treatment
      fatal_if_untreated: true
      disability_potential: high
      condition_caregiver_intensity: moderate
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: partial
          impact_mechanism: >
            Pulmonary TB produces severe cough, fever, and weakness that
            limit physical activity. Extrapulmonary TB may affect joints,
            the spine, or the brain with corresponding physical limitations.
          reversible_with_treatment: true
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: partial
          impact_mechanism: >
            The prolonged treatment regimen, stigma, and physical weakness
            make sustained employment difficult. A person on TB treatment
            may be unable to work for several months.
          reversible_with_treatment: true
        - domain_ref: capabilities.yaml#household_management
          typical_impact_level: partial
          impact_mechanism: >
            Fatigue, cough, and the demands of daily medication administration
            reduce the person's capacity to manage household tasks.
          reversible_with_treatment: true
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Severe TB may require daily caregiving support for feeding,
            medication administration, and hygiene. During acute phases,
            the person may be bedbound.
          typically_temporary: true
        - dependency_ref: dependency.yaml#financial
          trigger_condition: >
            Prolonged treatment and inability to work create financial
            dependency. The household may lose the person's income for
            months while bearing the cost of medication and nutrition.
          typically_temporary: true
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#infant
          manifestation: >
            Infant TB is severe and often disseminated. It carries high
            mortality risk. The infant requires hospitalization or intensive
            home-based care. The condition is severe and demands urgent response.
        - stage_ref: lifecycle-stages.yaml#adult
          manifestation: >
            Adult TB is the most common form. It affects the primary earner
            in many households, creating simultaneous health, economic, and
            caregiving crises. The adult may continue working while symptomatic,
            delaying diagnosis and increasing transmission risk.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            TB in the primary earner removes income for months. The household
            must simultaneously manage the cost of treatment and the loss
            of earnings. This is one of the most structurally consequential
            infectious diseases for household economics.
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver with TB faces the dual burden of self-care and
            dependent care. The caregiver may be too weak to provide adequate
            care while needing care themselves. The risk of transmission to
            dependents is an additional concern.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#hiv_aids
          comorbidity_pattern: frequent
          compounding_effect: >
            HIV and TB are frequently co-occurring. HIV increases TB
            susceptibility and severity; TB accelerates HIV progression.
            Co-infection requires complex, prolonged treatment and carries
            elevated mortality.
        - condition_ref: health-conditions.yaml#diabetes_mellitus
          comorbidity_pattern: frequent
          compounding_effect: >
            Diabetes increases TB risk and reduces treatment response.
            TB worsens glycemic control. The combination requires careful
            management of both conditions simultaneously.
      environmental_interactions:
        - factor: overcrowding
          effect: >
            Overcrowded living conditions increase TB transmission risk
            within households. A single case in a crowded household often
            leads to multiple secondary cases.
        - factor: poor_ventilation
          effect: >
            Poor ventilation in homes and shelters creates environments
            where TB transmission is sustained.
        - factor: displacement
          effect: >
            Displacement camps with overcrowding and poor healthcare access
            are high-risk environments for TB outbreaks. Treatment interruption
            during displacement leads to drug resistance.

    - id: hiv_aids
      name: HIV/AIDS
      category: communicable
      family: infectious_diseases
      description: >
        A chronic viral infection that progressively compromises the immune
        system. Without treatment, HIV progresses to AIDS, characterized by
        severe immune deficiency and opportunistic infections. With treatment
        access, HIV is a manageable chronic condition. The key humanitarian
        concern is treatment access and adherence rather than the disease itself.
      body_systems_affected: [immune, neurological, metabolic, hematological]
      typical_onset_pattern: any_age
      typical_progression: stable_if_managed
      treatability: manageable_with_treatment
      reversibility: partially_reversible
      fatal_if_untreated: true
      disability_potential: high
      condition_caregiver_intensity: moderate
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: functional
          impact_mechanism: >
            Untreated HIV produces fatigue, weakness, and susceptibility to
            opportunistic infections that limit physical activity. With
            treatment, physical capability is typically maintained.
          reversible_with_treatment: true
        - domain_ref: capabilities.yaml#cognitive_functioning
          typical_impact_level: functional
          impact_mechanism: >
            HIV-associated neurocognitive disorder affects memory, attention,
            and processing speed, particularly in advanced untreated disease.
            Children with perinatal HIV may have developmental delays.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#social_participation
          typical_impact_level: partial
          impact_mechanism: >
            Stigma surrounding HIV frequently leads to social isolation,
            exclusion from community activities, and reduced social capital.
            The social impact may exceed the physical impact of the disease.
          reversible_with_treatment: false
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Untreated or advanced HIV may require caregiving support during
            opportunistic infections or complications. With treatment, this
            dependency is typically minimal or absent.
          typically_temporary: true
        - dependency_ref: dependency.yaml#financial
          trigger_condition: >
            Lifelong medication creates sustained financial burden. In
            resource-limited settings, the cost of ongoing treatment
            may be a significant household expense even when subsidized.
          typically_temporary: false
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#infant
          manifestation: >
            Perinatal HIV requires immediate prophylaxis and lifelong
            treatment. Without treatment, infant progression is rapid
            and mortality is high. The infant's survival depends entirely
            on maternal health and healthcare access.
        - stage_ref: lifecycle-stages.yaml#adolescent
          manifestation: >
            Adolescents with HIV face unique challenges of disclosure,
            adherence, and psychosocial integration. Non-adherence is
            common during adolescence, creating a window of elevated risk.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            An earner with untreated HIV faces progressive incapacity.
            With treatment, the earner can typically maintain employment.
            The key household risk is treatment interruption, not the disease
            itself.
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver with HIV may have reduced caregiving capacity during
            illness episodes or if treatment is interrupted. The risk of
            transmission to infants through breastfeeding is a critical
            concern requiring clinical guidance.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#tuberculosis
          comorbidity_pattern: frequent
          compounding_effect: >
            HIV and TB co-infection is common and lethal without treatment.
            Each disease accelerates the other. Treatment is complex and
            prolonged. Mortality is significantly elevated compared to either
            disease alone.
      environmental_interactions:
        - factor: displacement
          effect: >
            Displacement disrupts HIV treatment access, leading to treatment
            interruption, viral rebound, and immune deterioration. Maintaining
            treatment continuity during displacement is a critical challenge.
        - factor: healthcare_access_gap
          effect: >
            HIV management requires sustained healthcare access. In areas
            with limited healthcare, HIV progresses despite being medically
            manageable. The gap between medical possibility and access
            reality is the primary humanitarian concern.

    - id: malaria
      name: Malaria
      category: communicable
      family: infectious_diseases
      description: >
        A parasitic infection transmitted by mosquitoes. Malaria ranges
        from acute and self-limiting to severe and life-threatening,
        depending on the species, the person's immune status, and access to
        treatment. In endemic areas, repeated infection creates chronic
        anemia and developmental impairment in children.
      body_systems_affected: [hematological, neurological, metabolic, immune]
      typical_onset_pattern: any_age
      typical_progression: episodic
      treatability: curable
      reversibility: reversible_with_treatment
      fatal_if_untreated: true
      disability_potential: moderate
      condition_caregiver_intensity: low
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: partial
          impact_mechanism: >
            During acute episodes, malaria produces fever, weakness, and
            prostration that prevent all productive activity. Between
            episodes, capability is typically fully restored. Severe malaria
            may cause permanent neurological damage.
          reversible_with_treatment: true
        - domain_ref: capabilities.yaml#cognitive_functioning
          typical_impact_level: functional
          impact_mechanism: >
            Repeated malaria in children is associated with cognitive
            impairment and reduced school performance. Severe malaria
            with cerebral involvement may cause lasting neurological damage.
          reversible_with_treatment: partial
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            During acute episodes, the person requires caregiving support
            for feeding, hydration, and monitoring. Episodes are typically
            brief (days to a week) but may recur frequently.
          typically_temporary: true
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#infant
          manifestation: >
            Infant malaria is severe and carries high mortality. The infant
            has no acquired immunity. Congenital malaria (transmitted from
            mother) is a critical neonatal emergency.
        - stage_ref: lifecycle-stages.yaml#school_age_child
          manifestation: >
            School-age children in endemic areas experience repeated
            infections. Each episode causes school absence. Cumulative
            episodes produce anemia and cognitive impairment that affect
            educational attainment.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            Malaria in an earner causes sudden income loss during episodes.
            In endemic areas, households may experience multiple episodes
            per year, creating recurrent economic disruption.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#iron_deficiency_anemia
          comorbidity_pattern: frequent
          compounding_effect: >
            Malaria causes hemolysis and anemia. In endemic areas, anemia
            and malaria create a compounding cycle of weakness and
            susceptibility. Children with both conditions are particularly
            vulnerable.
      environmental_interactions:
        - factor: rainy_season
          effect: >
            Malaria transmission increases during and after rainy seasons
            when mosquito breeding sites multiply. Seasonal peaks are
            predictable and create predictable healthcare demand surges.
        - factor: poor_housing
          effect: >
            Housing without screens or proper roofing increases mosquito
            exposure. Poor housing is a structural risk factor for malaria
            that is addressable through shelter interventions.

    - id: acute_respiratory_infection
      name: Acute Respiratory Infection
      category: communicable
      family: infectious_diseases
      description: >
        Infections of the respiratory tract including pneumonia, bronchitis,
        and upper respiratory infections. ARI is the most common infectious
        cause of death in children under five globally. In adults, it is
        typically self-limiting but may be severe in the elderly or those
        with underlying conditions.
      body_systems_affected: [respiratory, immune, cardiovascular]
      typical_onset_pattern: any_age
      typical_progression: episodic
      treatability: curable
      reversibility: reversible_with_treatment
      fatal_if_untreated: true
      disability_potential: low
      condition_caregiver_intensity: low
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: functional
          impact_mechanism: >
            During acute infection, cough, fever, and weakness reduce
            physical activity capacity. In children, rapid breathing and
            chest indrawing are signs of severe pneumonia requiring
            urgent care. Recovery is typically complete.
          reversible_with_treatment: true
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Children with severe ARI require intensive caregiving support
            for feeding, hydration, and monitoring. Adults typically require
            only temporary rest and basic care.
          typically_temporary: true
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#infant
          manifestation: >
            Infant pneumonia is a leading cause of death. The infant's
            immature immune system and small airway size make respiratory
            infections particularly dangerous. Rapid deterioration is common.
        - stage_ref: lifecycle-stages.yaml#elderly
          manifestation: >
            Respiratory infections in the elderly are frequently severe and
            may precipitate decline in other systems. The elderly have
            reduced reserve capacity and may not recover to baseline after
            a severe respiratory infection.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A child with severe ARI requires intensive caregiver attention,
            often including night-time monitoring. Multiple children with
            ARI simultaneously may overwhelm the caregiver's capacity.
      common_comorbidities:
      environmental_interactions:
        - factor: cold_weather
          effect: >
            Respiratory infections increase during cold seasons when
            households are crowded indoors and ventilation is poor.
        - factor: overcrowding
          effect: >
            Overcrowded living conditions increase transmission of
            respiratory infections within households and shelters.

    - id: hepatitis
      name: Hepatitis (B and C)
      category: communicable
      family: infectious_diseases
      description: >
        Chronic viral infections of the liver. Hepatitis B and C are the
        most common forms in humanitarian contexts. Chronic hepatitis can
        progress to cirrhosis and liver cancer over decades. Many people
        with chronic hepatitis are asymptomatic for years, unaware of their
        infection.
      body_systems_affected: [hepatic, immune, hematological]
      typical_onset_pattern: any_age
      typical_progression: progressive
      treatability: manageable_with_treatment
      reversibility: partially_reversible
      fatal_if_untreated: true
      disability_potential: moderate
      condition_caregiver_intensity: low
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: functional
          impact_mechanism: >
            In advanced disease, fatigue, jaundice, and complications
            (ascites, variceal bleeding) limit physical capacity. In the
            chronic asymptomatic phase, capability is typically unaffected.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: functional
          impact_mechanism: >
            Hepatitis-related stigma may affect employment in some contexts.
            Advanced disease prevents physically demanding work.
          reversible_with_treatment: partial
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Advanced hepatitis with complications may require caregiving
            support. In the chronic phase, dependency is typically minimal.
          typically_temporary: false
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#adult
          manifestation: >
            Adult hepatitis is frequently asymptomatic and discovered
            incidentally or during screening. The long asymptomatic phase
            means the condition may be undetected for years, during which
            liver damage progresses silently.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            An earner with advanced hepatitis faces progressive incapacity.
            The long disease course means the household may experience
            gradual income erosion over years before the condition is
            even recognized.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#diabetes_mellitus
          comorbidity_pattern: occasional
          compounding_effect: >
            Diabetes and hepatitis together increase liver disease
            progression risk. Metabolic syndrome is a common background
            for both conditions.
      environmental_interactions:
        - factor: poor_sanitation
          effect: >
            Hepatitis A and E are transmitted through fecal-oral routes.
            Poor sanitation increases risk, though these are typically
            acute and self-limiting forms distinct from chronic B and C.

    - id: diarrheal_disease
      name: Diarrheal Disease (Acute)
      category: communicable
      family: infectious_diseases
      description: >
        Acute infections causing diarrhea, typically bacterial, viral, or
        parasitic in origin. Most episodes are self-limiting but can cause
        severe dehydration and death, particularly in infants and young
        children. Diarrheal disease is a major cause of child mortality
        globally and frequently co-occurs with malnutrition.
      body_systems_affected: [gastrointestinal, immune, metabolic, renal]
      typical_onset_pattern: any_age
      typical_progression: episodic
      treatability: curable
      reversibility: reversible_with_treatment
      fatal_if_untreated: true
      disability_potential: low
      condition_caregiver_intensity: low
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: functional
          impact_mechanism: >
            Dehydration and weakness limit physical activity during acute
            episodes. Recovery is typically rapid and complete with
            rehydration. Severe or prolonged episodes may cause lasting
            malnutrition and weakness.
          reversible_with_treatment: true
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Infants and young children with severe diarrhea require
            intensive oral rehydration therapy or IV fluids. The caregiver
            must provide frequent small volumes of fluid and monitor for
            dehydration signs.
          typically_temporary: true
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#infant
          manifestation: >
            Diarrheal disease in infants is a leading cause of death.
            Dehydration progresses rapidly in infants due to their small
            body water reserve. The infant's survival depends on rapid
            caregiver recognition and rehydration.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver managing a child with diarrhea must provide
            frequent rehydration, often while continuing other household
            tasks. Multiple children with diarrhea simultaneously may
            overwhelm the caregiver's capacity and create a household crisis.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#severe_acute_malnutrition
          comorbidity_pattern: frequent
          compounding_effect: >
            Diarrhea and malnutrition form a vicious cycle. Diarrhea
            causes nutrient loss and malabsorption; malnutrition increases
            infection severity and duration. The combination is lethal
            without intervention.
      environmental_interactions:
        - factor: poor_sanitation
          effect: >
            Inadequate sanitation and contaminated water are the primary
            causes of diarrheal disease. The condition is almost entirely
            preventable through clean water and sanitation.
        - factor: rainy_season
          effect: >
            Contamination of water sources during flooding increases
            diarrheal disease outbreaks. Seasonal peaks are predictable
            and create surges in healthcare demand.

    # -----------------------------------------------------------------------
    # NON-COMMUNICABLE DISEASES
    # -----------------------------------------------------------------------

    - id: diabetes_mellitus
      name: Diabetes Mellitus
      category: non_communicable
      family: metabolic_disorders
      description: >
        A chronic metabolic condition characterized by elevated blood glucose
        due to insufficient insulin production or impaired insulin action.
        Diabetes causes progressive damage to multiple organ systems including
        the eyes, kidneys, nerves, and cardiovascular system. Management requires
        sustained blood glucose control through medication, diet, and monitoring.
      body_systems_affected: [endocrine, cardiovascular, renal, neurological, ophthalmological]
      typical_onset_pattern: adulthood
      typical_progression: progressive
      treatability: manageable_with_treatment
      reversibility: irreversible
      fatal_if_untreated: true
      disability_potential: high
      condition_caregiver_intensity: moderate
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: partial
          impact_mechanism: >
            Peripheral neuropathy reduces sensation and proprioception in
            lower limbs, increasing fall risk and reducing safe mobility.
            Vascular disease may cause claudication and, in severe cases,
            amputation. Diabetic retinopathy reduces visual acuity.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#cognitive_functioning
          typical_impact_level: functional
          impact_mechanism: >
            Hypoglycemic episodes cause acute cognitive impairment.
            Chronic hyperglycemia is associated with gradual cognitive
            decline. The cognitive impact is variable and depends on
            glycemic control.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#independent_living
          typical_impact_level: partial
          impact_mechanism: >
            As complications progress, the person may require assistance
            with medication management, wound care, and mobility. Early
            stage diabetes typically permits full independent living.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: functional
          impact_mechanism: >
            Hypoglycemia can cause sudden incapacity during work hours.
            Complications may reduce capacity for physically demanding work.
            Most people with well-controlled diabetes maintain full employment.
          reversible_with_treatment: true
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#physical_support
          trigger_condition: >
            When peripheral neuropathy, retinopathy, or amputation reduces
            safe independent mobility. The dependency may be partial
            (assistance with outdoor tasks) or total (full mobility support).
          typically_temporary: false
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Advanced diabetes with complications may require daily caregiving
            for wound care, medication administration, and monitoring.
          typically_temporary: false
        - dependency_ref: dependency.yaml#financial
          trigger_condition: >
            Lifelong medication, monitoring supplies, and complication
            management create sustained financial burden. The condition
            is financially demanding even when the person is fully employed.
          typically_temporary: false
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#older_adult
          manifestation: >
            Older adults with diabetes frequently have multiple comorbidities
            (hypertension, cardiovascular disease, chronic kidney disease)
            that compound the management burden. Polypharmacy is common.
            Cognitive decline may reduce medication adherence. The combination
            of diabetes, reduced mobility, and cognitive change creates a
            high-risk profile for acute complications.
        - stage_ref: lifecycle-stages.yaml#elderly
          manifestation: >
            Elderly persons with diabetes are at high risk for hypoglycemia
            due to irregular eating patterns, renal impairment affecting
            medication clearance, and cognitive decline affecting self-
            management. Hypoglycemia in the elderly can cause falls, fractures,
            and cognitive events that may be mistaken for dementia.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            A primary earner with diabetes faces intermittent incapacity
            during hypoglycemic episodes or hospitalization for complications.
            The condition is usually compatible with continued employment but
            requires workplace accommodation and healthcare access. Chronic
            financial burden from medication may strain household resources.
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A primary caregiver with diabetes must manage their own condition
            while caregiving. Hypoglycemia can incapacitate the caregiver
            suddenly, creating a safety risk for dependents. The dual burden
            of self-management and caregiving is a known stressor. When
            complications develop, the caregiver may become unable to continue
            providing care.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#hypertension
          comorbidity_pattern: frequent
          compounding_effect: >
            Diabetes and hypertension together accelerate cardiovascular
            and renal damage. The management burden is more than additive —
            each condition worsens the other. Medication interactions increase
            polypharmacy risk. The combination significantly increases the
            likelihood of stroke, heart attack, and kidney failure.
        - condition_ref: health-conditions.yaml#chronic_kidney_disease
          comorbidity_pattern: frequent
          compounding_effect: >
            Diabetes is the leading cause of chronic kidney disease. Once
            both conditions are present, progression is accelerated and
            treatment options are constrained. The combination creates
            a high-intensity management burden.
        - condition_ref: health-conditions.yaml#coronary_artery_disease
          comorbidity_pattern: frequent
          compounding_effect: >
            Diabetes accelerates atherosclerosis and increases cardiovascular
            event risk. Coronary artery disease in a person with diabetes
            is typically more severe and has a worse prognosis than in a
            person without diabetes.
        - condition_ref: health-conditions.yaml#tuberculosis
          comorbidity_pattern: frequent
          compounding_effect: >
            Diabetes increases TB risk and reduces treatment response.
            TB worsens glycemic control. The combination requires careful
            management of both conditions simultaneously.
      environmental_interactions:
        - factor: extreme_heat
          effect: >
            Heat exacerbates dehydration and can destabilize blood glucose
            control. Elderly people with diabetes are at increased risk
            of heat-related illness due to reduced thirst sensation and
            impaired thermoregulation.
        - factor: food_insecurity
          effect: >
            Irregular food intake due to food insecurity creates a dangerous
            hypoglycemia risk for people on glucose-lowering medication.
            Food insecurity and diabetes management are structurally
            incompatible without careful program design.
        - factor: displacement
          effect: >
            Disruption of medication supply, dietary patterns, and
            healthcare access destabilizes diabetes control. People with
            diabetes are particularly vulnerable during displacement because
            their condition requires sustained management that emergency
            settings do not typically provide.

    - id: hypertension
      name: Hypertension
      category: non_communicable
      family: cardiovascular_diseases
      description: >
        A chronic condition of elevated blood pressure that damages the
        heart, blood vessels, kidneys, and brain over time. Hypertension
        is frequently asymptomatic and undetected for years. When untreated,
        it leads to stroke, heart attack, heart failure, and kidney disease.
        It is the most common NCD globally and a leading cause of death.
      body_systems_affected: [cardiovascular, renal, neurological, ophthalmological]
      typical_onset_pattern: adulthood
      typical_progression: progressive
      treatability: manageable_with_treatment
      reversibility: partially_reversible
      fatal_if_untreated: true
      disability_potential: moderate
      condition_caregiver_intensity: low
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: functional
          impact_mechanism: >
            Hypertension typically does not directly limit mobility in the
            early and middle stages. However, complications (stroke, heart
            failure, kidney failure) may cause severe physical limitation.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#cognitive_functioning
          typical_impact_level: functional
          impact_mechanism: >
            Chronic hypertension increases the risk of vascular dementia
            and stroke-related cognitive impairment. The cognitive impact
            is typically gradual and may not be recognized until advanced.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#independent_living
          typical_impact_level: functional
          impact_mechanism: >
            Early stage hypertension does not affect independent living.
            Complications may reduce independence significantly.
          reversible_with_treatment: partial
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#physical_support
          trigger_condition: >
            Physical support dependency is triggered by complications
            (stroke, heart failure) rather than by hypertension itself.
          typically_temporary: false
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Caregiving dependency is triggered by complications. The person
            with uncomplicated hypertension typically does not require caregiving.
          typically_temporary: false
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#adult
          manifestation: >
            Hypertension typically first appears in adulthood. In low-
            resource settings, it is frequently undetected until a complication
            (stroke, heart attack) occurs. The adult may be asymptomatic
            and unaware of the condition for years or decades.
        - stage_ref: lifecycle-stages.yaml#elderly
          manifestation: >
            Elderly persons frequently have long-standing hypertension
            with end-organ damage. The condition may be compounded by
            reduced medication adherence due to cognitive decline or
            polypharmacy confusion. Blood pressure may also be labile,
            increasing the risk of both high and low pressure events.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            Hypertension in an earner is typically asymptomatic and does
            not affect work capacity. The structural risk is the potential
            for sudden catastrophic complication (stroke, heart attack) that
            removes the earner permanently or for a prolonged period. The
            condition is a latent risk rather than a current incapacity.
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver with hypertension is typically able to continue
            caregiving. The risk is similar to that of the earner — sudden
            incapacitation from stroke or heart attack could abruptly remove
            caregiving capacity. The condition creates a structural
            fragility that is not visible in daily functioning.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#diabetes_mellitus
          comorbidity_pattern: frequent
          compounding_effect: >
            Hypertension and diabetes co-occur frequently and accelerate
            each other's complications. The combination is one of the most
            common comorbidity patterns in humanitarian settings and creates
            a high management burden.
        - condition_ref: health-conditions.yaml#chronic_kidney_disease
          comorbidity_pattern: frequent
          compounding_effect: >
            Hypertension is a leading cause of chronic kidney disease.
            Once both are present, each accelerates the other. The
            combination significantly increases cardiovascular risk.
        - condition_ref: health-conditions.yaml#stroke
          comorbidity_pattern: frequent
          compounding_effect: >
            Hypertension is the leading risk factor for stroke. A person
            with hypertension and other vascular risk factors (diabetes,
            smoking, obesity) has a markedly elevated stroke risk.
      environmental_interactions:
        - factor: extreme_heat
          effect: >
            Heat can exacerbate hypertension by causing dehydration and
            blood volume changes. Some antihypertensive medications impair
            heat tolerance, increasing the risk of heat-related illness.
        - factor: high_salt_diet
          effect: >
            High dietary salt intake worsens blood pressure control. In
            contexts where preserved foods are common or salt is the primary
            flavoring, dietary modification is difficult.
        - factor: stress
          effect: >
            Chronic stress elevates blood pressure and reduces medication
            adherence. Households in crisis (bereavement, displacement,
            financial shock) may experience acute blood pressure elevation.

    - id: coronary_artery_disease
      name: Coronary Artery Disease
      category: non_communicable
      family: cardiovascular_diseases
      description: >
        A condition of narrowed or blocked coronary arteries reducing blood
        flow to the heart muscle. Coronary artery disease causes chest pain
        (angina), heart attack, and heart failure. It is a leading cause of
        adult death globally. The condition typically develops over decades
        and may be silent until a major cardiac event occurs.
      body_systems_affected: [cardiovascular, metabolic, neurological]
      typical_onset_pattern: adulthood
      typical_progression: progressive
      treatability: manageable_with_treatment
      reversibility: partially_reversible
      fatal_if_untreated: true
      disability_potential: high
      condition_caregiver_intensity: moderate
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: partial
          impact_mechanism: >
            Reduced cardiac output limits exercise tolerance. Angina
            causes chest pain during exertion, limiting sustained physical
            activity. After a heart attack, cardiac rehabilitation may restore
            partial capacity but full recovery is not guaranteed.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: partial
          impact_mechanism: >
            Physical work capacity is reduced. After a heart attack, the
            person may be unable to return to previous work for months
            or may require permanent work modification. Sedentary work may
            still be possible.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#household_management
          typical_impact_level: functional
          impact_mechanism: >
            Household tasks requiring sustained physical effort may be
            difficult. The person may need to modify task patterns to
            avoid angina episodes.
          reversible_with_treatment: partial
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#physical_support
          trigger_condition: >
            During acute cardiac events (heart attack, unstable angina)
            the person requires immediate physical support and emergency
            transport. During recovery, physical support may be needed for
            mobility and daily tasks.
          typically_temporary: true
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Post-heart attack recovery requires caregiving support for
            medication management, activity monitoring, and emotional
            support. Chronic stable angina may not require ongoing caregiving.
          typically_temporary: true
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#adult
          manifestation: >
            Coronary artery disease typically presents in middle adulthood.
            The first manifestation may be a heart attack without prior
            warning. In low-resource settings, many people die from their
            first heart attack because emergency care is unavailable.
        - stage_ref: lifecycle-stages.yaml#elderly
          manifestation: >
            Elderly persons frequently have established coronary artery
            disease with reduced cardiac reserve. Symptoms may be atypical
            (confusion, weakness rather than chest pain) and may be
            mistaken for other conditions, delaying diagnosis.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            A heart attack in the primary earner removes income immediately
            and may prevent return to previous work permanently. The
            household faces both the health emergency and the economic
            crisis simultaneously. Even if the earner survives, cardiac
            recovery may require months of reduced or no work.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#diabetes_mellitus
          comorbidity_pattern: frequent
          compounding_effect: >
            Diabetes accelerates atherosclerosis and increases the severity
            of coronary artery disease. Coronary events in people with diabetes
            are typically more extensive and have worse outcomes.
        - condition_ref: health-conditions.yaml#hypertension
          comorbidity_pattern: frequent
          compounding_effect: >
            Hypertension and coronary artery disease share common vascular
            pathology. The combination increases the risk of both heart
            attack and stroke.
      environmental_interactions:
        - factor: extreme_heat
          effect: >
            Heat increases cardiac workload and may precipitate angina
            or heart attack in people with reduced coronary reserve.
            Elderly people with heart disease are at particular risk
            during heat waves.
        - factor: extreme_cold
          effect: >
            Cold causes vasoconstriction and increases blood pressure and
            cardiac workload, increasing the risk of cardiac events.

    - id: heart_failure
      name: Heart Failure
      category: non_communicable
      family: cardiovascular_diseases
      description: >
        A condition in which the heart cannot pump blood effectively to
        meet the body's needs. Heart failure causes fatigue, breathlessness,
        fluid accumulation, and reduced exercise tolerance. It is typically
        a progressive condition that develops after damage to the heart from
        coronary artery disease, hypertension, or other causes.
      body_systems_affected: [cardiovascular, respiratory, renal, metabolic]
      typical_onset_pattern: older_adulthood
      typical_progression: progressive
      treatability: manageable_with_treatment
      reversibility: partially_reversible
      fatal_if_untreated: true
      disability_potential: high
      condition_caregiver_intensity: high
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: minimal
          impact_mechanism: >
            Severe fatigue and breathlessness limit all physical activity.
            Even walking short distances may cause distress. Fluid
            accumulation in the legs and lungs further reduces mobility.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#independent_living
          typical_impact_level: minimal
          impact_mechanism: >
            The person may be unable to manage daily self-care activities
            without assistance. Medication complexity, fluid restriction,
            and symptom monitoring require sustained support.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: minimal
          impact_mechanism: >
            Heart failure typically prevents all but the most sedentary
            work. Physical exertion is limited by breathlessness and
            fatigue. Frequent hospitalization disrupts employment continuity.
          reversible_with_treatment: partial
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Heart failure requires daily caregiving support for medication
            management, fluid monitoring, dietary restriction, and
            symptom observation. As the condition progresses, the caregiving
            demand intensifies.
          typically_temporary: false
        - dependency_ref: dependency.yaml#physical_support
          trigger_condition: >
            Physical support is needed for mobility, bathing, and transport.
            The dependency increases as cardiac function declines.
          typically_temporary: false
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#older_adult
          manifestation: >
            Heart failure is most common in older adults. It frequently
            co-occurs with other conditions (hypertension, diabetes, kidney
            disease) creating a syndrome of progressive decline. The older
            adult may have reduced insight into their own worsening condition.
        - stage_ref: lifecycle-stages.yaml#elderly
          manifestation: >
            Elderly persons with heart failure are at high risk of acute
            decompensation from minor events (infection, dietary indiscretion,
            medication omission). Each decompensation may cause a stepwise
            decline in baseline function that is not fully recovered.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            Heart failure typically ends the person's earning capacity.
            The condition is progressive and the physical demands of most
            employment are incompatible with the disease. The household
            loses income permanently while gaining caregiving costs.
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver with heart failure cannot provide sustained physical
            care. The breathlessness and fatigue of heart failure make
            caregiving tasks physically impossible. The family may need to
            find a substitute caregiver or external support.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#hypertension
          comorbidity_pattern: frequent
          compounding_effect: >
            Hypertension is a leading cause of heart failure. Once heart
            failure develops, blood pressure management becomes more complex.
        - condition_ref: health-conditions.yaml#chronic_kidney_disease
          comorbidity_pattern: frequent
          compounding_effect: >
            Heart failure and kidney disease frequently co-occur and worsen
            each other (cardiorenal syndrome). Fluid management is difficult
            when both organs are failing.
      environmental_interactions:
        - factor: extreme_heat
          effect: >
            Heat increases fluid requirements and cardiac workload. People
            with heart failure are at high risk of decompensation during
            heat waves due to fluid imbalance and increased metabolic demand.
        - factor: extreme_cold
          effect: >
            Cold increases blood pressure and cardiac workload. Respiratory
            infections in cold weather are a common trigger for heart failure
            decompensation.

    - id: stroke
      name: Stroke (Cerebrovascular Accident)
      category: non_communicable
      family: cardiovascular_diseases
      description: >
        A sudden interruption of blood flow to the brain causing brain cell
        damage. Stroke may be ischemic (blocked vessel) or hemorrhagic
        (bleeding vessel). Stroke causes sudden, often severe, neurological
        disability including paralysis, speech loss, cognitive impairment,
        and swallowing difficulty. It causes sudden, severe neurological
        disability with lasting consequences.
      body_systems_affected: [neurological, cardiovascular, respiratory, gastrointestinal]
      typical_onset_pattern: adulthood
      typical_progression: stable_after_acute
      treatability: manageable_with_treatment
      reversibility: partially_reversible
      fatal_if_untreated: true
      disability_potential: high
      condition_caregiver_intensity: high
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: minimal
          impact_mechanism: >
            Hemiplegia or hemiparesis (one-sided paralysis or weakness) is
            common. The person may be unable to walk, stand, or transfer
            independently. Even with rehabilitation, many stroke survivors
            have permanent mobility limitation.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#cognitive_functioning
          typical_impact_level: partial
          impact_mechanism: >
            Cognitive impairment, memory loss, and executive dysfunction
            are common after stroke. The severity depends on the location
            and size of the brain damage. Some cognitive recovery is
            possible in the first months.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#communication
          typical_impact_level: partial
          impact_mechanism: >
            Aphasia (language impairment) is common after left-hemisphere
            stroke. The person may understand but not speak, or speak
            but not understand. Dysarthria (slurred speech) is also common.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#independent_living
          typical_impact_level: minimal
          impact_mechanism: >
            Stroke typically removes independent living capacity. The person
            requires assistance with personal care, feeding, mobility, and
            safety. Some recovery is possible with rehabilitation, but many
            survivors remain dependent.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: minimal
          impact_mechanism: >
            Stroke typically ends previous employment. Return to work is
            rare in the first year and uncommon thereafter. The person may
            need retraining for sedentary work if cognitive and communication
            functions are preserved.
          reversible_with_treatment: partial
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Stroke creates immediate and usually sustained caregiving
            dependency. The person requires assistance with activities of
            daily living, rehabilitation exercises, and safety monitoring.
          typically_temporary: false
        - dependency_ref: dependency.yaml#physical_support
          trigger_condition: >
            Physical support is required for mobility, transfers, bathing,
            and toileting. The dependency may be total (complete inability
            to move) or partial (assistance with some tasks).
          typically_temporary: false
        - dependency_ref: dependency.yaml#financial
          trigger_condition: >
            The earner's income is removed immediately. The household
            must bear the cost of care, medication, and rehabilitation
            without the earner's contribution. The financial impact is
            sudden and severe.
          typically_temporary: false
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#adult
          manifestation: >
            Stroke in a working-age adult is devastating. The person is
            typically the primary earner and caregiver. The sudden removal
            of their capacity creates an immediate household crisis. The
            psychological impact of sudden disability in a previously
            healthy adult is profound and frequently overlooked.
        - stage_ref: lifecycle-stages.yaml#elderly
          manifestation: >
            Stroke in the elderly is frequently compounded by pre-existing
            frailty, cognitive decline, and comorbidities. Recovery is
            slower and less complete than in younger adults. The elderly
            stroke survivor is at high risk of recurrent stroke and
            progressive decline.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            Stroke in the primary earner is one of the most structurally
            consequential health events for a family. The earner's income
            is removed immediately and often permanently. The family
            must simultaneously absorb the cost of care and the loss
            of earnings. This is a household-level catastrophe.
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            When the caregiver suffers a stroke, the dependents lose their
            primary source of care immediately. The stroke survivor may
            themselves become a dependent, creating a dependency reversal.
            The family must find substitute care for both the stroke
            survivor and the original dependents.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#hypertension
          comorbidity_pattern: frequent
          compounding_effect: >
            Hypertension is the leading cause of stroke. A person who has
            had a stroke typically has long-standing hypertension that
            requires intensified management to prevent recurrence.
        - condition_ref: health-conditions.yaml#diabetes_mellitus
          comorbidity_pattern: frequent
          compounding_effect: >
            Diabetes increases stroke risk and worsens stroke outcomes.
            People with diabetes who have strokes typically have larger
            infarcts and poorer recovery.
      environmental_interactions:
        - factor: extreme_heat
          effect: >
            Heat may increase the risk of stroke in people with vascular
            risk factors. Dehydration and hemoconcentration increase
            thrombosis risk.
        - factor: healthcare_access_gap
          effect: >
            Stroke is a time-critical emergency. In areas without rapid
            access to stroke care, the outcome is dramatically worse.
            The gap between medical possibility and access reality
            determines disability severity.

    - id: asthma
      name: Asthma
      category: non_communicable
      family: respiratory_conditions
      description: >
        A chronic inflammatory condition of the airways causing episodic
        wheezing, breathlessness, chest tightness, and cough. With treatment
        access, asthma is typically manageable. Acute severe attacks can be
        life-threatening. Between attacks, the person may have normal
        respiratory function.
      body_systems_affected: [respiratory, immune]
      typical_onset_pattern: childhood
      typical_progression: episodic
      treatability: manageable_with_treatment
      reversibility: partially_reversible
      fatal_if_untreated: true
      disability_potential: low
      condition_caregiver_intensity: low
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: functional
          impact_mechanism: >
            During acute attacks, the person is severely limited. Between
            attacks, physical capability is typically normal. Frequent
            attacks or severe persistent asthma may limit exercise tolerance.
          reversible_with_treatment: true
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: functional
          impact_mechanism: >
            Employment is typically maintained with proper management.
            Severe or poorly controlled asthma may limit work in dusty,
            cold, or physically demanding environments.
          reversible_with_treatment: true
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            During severe attacks, the person requires emergency care
            and support. Children with asthma require caregiver monitoring
            and medication administration. Between attacks, dependency is minimal.
          typically_temporary: true
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#school_age_child
          manifestation: >
            Asthma is one of the most common chronic conditions in children.
            It causes school absence, limits physical activity, and may
            affect social participation. Children with uncontrolled asthma
            have reduced educational attainment. The condition is frequently
            undertreated in low-resource settings due to medication cost.
        - stage_ref: lifecycle-stages.yaml#adult
          manifestation: >
            Adult asthma may be lifelong or may develop in adulthood
            (occupational asthma, allergic asthma). Adult-onset asthma
            is frequently misdiagnosed as recurrent respiratory infection.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            Asthma in an earner is typically compatible with continued
            employment. The structural risk is acute severe attack causing
            hospitalization and temporary income loss. Chronic undertreatment
            may lead to gradual work limitation.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#acute_respiratory_infection
          comorbidity_pattern: frequent
          compounding_effect: >
            Respiratory infections frequently trigger asthma exacerbations.
            A person with asthma who develops a respiratory infection
            is at risk of a severe attack requiring emergency care.
      environmental_interactions:
        - factor: air_pollution
          effect: >
            Air pollution (indoor cooking smoke, outdoor particulate matter)
            is a major trigger for asthma attacks and a cause of chronic
            airway inflammation. Improving household air quality is a key
            intervention.
        - factor: cold_weather
          effect: >
            Cold air triggers bronchospasm in many people with asthma.
            Winter months see increased asthma exacerbations.
        - factor: allergen_exposure
          effect: >
            Dust mites, pollen, mold, and animal dander trigger asthma
            in allergic individuals. Poor housing conditions increase
            indoor allergen exposure.

    - id: chronic_kidney_disease
      name: Chronic Kidney Disease
      category: non_communicable
      family: renal_conditions
      description: >
        A progressive loss of kidney function over months or years.
        Chronic kidney disease is typically asymptomatic in early stages
        and discovered through screening or when complications develop.
        Advanced CKD requires sustained medical management that is often unavailable in low-resource settings. In low-resource
        settings, advanced CKD is effectively terminal because dialysis
        access is unavailable.
      body_systems_affected: [renal, cardiovascular, hematological, metabolic, neurological]
      typical_onset_pattern: adulthood
      typical_progression: progressive
      treatability: manageable_with_treatment
      reversibility: partially_reversible
      fatal_if_untreated: true
      disability_potential: high
      condition_caregiver_intensity: high
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: partial
          impact_mechanism: >
            Fatigue, anemia, and fluid accumulation reduce physical
            capacity. Bone disease from CKD may cause pain and fractures.
            The person is typically able to walk but with limited endurance.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#cognitive_functioning
          typical_impact_level: partial
          impact_mechanism: >
            Uremia (toxin accumulation) affects concentration, memory,
            and sleep. Advanced CKD may cause uremic encephalopathy with
            confusion and reduced alertness. Cognitive symptoms improve
            with dialysis.
          reversible_with_treatment: true
        - domain_ref: capabilities.yaml#independent_living
          typical_impact_level: partial
          impact_mechanism: >
            As CKD advances, the person requires assistance with medication
            management, dietary restriction, and fluid monitoring. In the
            dialysis-dependent stage, daily life is structured around
            treatment sessions.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: partial
          impact_mechanism: >
            Fatigue and treatment demands limit work capacity. Dialysis
            requires multiple sessions per week, making full-time employment
            difficult. Many people with advanced CKD are unable to work.
          reversible_with_treatment: partial
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Advanced CKD requires sustained caregiving for medication
            management, dietary preparation, transport to treatment,
            and symptom monitoring. The caregiver burden is high and
            increases as the condition progresses.
          typically_temporary: false
        - dependency_ref: dependency.yaml#financial
          trigger_condition: >
            CKD treatment is expensive. In low-resource settings, the cost
            of medication and dialysis (if available) may exhaust household
            resources. The condition creates a sustained financial drain.
          typically_temporary: false
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#adult
          manifestation: >
            CKD in adults is frequently caused by diabetes or hypertension.
            The adult may be managing multiple chronic conditions
            simultaneously. The progressive nature of CKD means that the
            person and family must adapt to gradually increasing disability.
        - stage_ref: lifecycle-stages.yaml#elderly
          manifestation: >
            Elderly persons with CKD frequently have reduced physiological
            reserve and comorbidities that complicate management. The
            decision to initiate dialysis in the elderly is complex and
            may not improve quality of life. Conservative management
            (palliative care) is often appropriate.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            CKD progressively reduces earning capacity. The earner may
            continue working in early stages but must reduce or stop work
            as fatigue and treatment demands increase. The household
            experiences gradual income erosion over years.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#diabetes_mellitus
          comorbidity_pattern: frequent
          compounding_effect: >
            Diabetes is the leading cause of CKD. Once both conditions
            are present, progression is accelerated. The combination
            creates a high management burden with dietary restrictions
            for both conditions.
        - condition_ref: health-conditions.yaml#hypertension
          comorbidity_pattern: frequent
          compounding_effect: >
            Hypertension is a leading cause of CKD and is also a
            consequence of CKD. The two conditions form a vicious cycle
            that is difficult to break.
        - condition_ref: health-conditions.yaml#heart_failure
          comorbidity_pattern: frequent
          compounding_effect: >
            Heart failure and CKD frequently co-occur (cardiorenal
            syndrome). Each worsens the other. Fluid management is
            extremely difficult when both conditions are present.
      environmental_interactions:
        - factor: healthcare_access_gap
          effect: >
            CKD management requires sustained healthcare access for
            monitoring, medication, and eventually dialysis. In areas
            without dialysis facilities, advanced CKD is a terminal
            condition regardless of medical possibility.

    - id: epilepsy
      name: Epilepsy
      category: non_communicable
      family: neurological_conditions
      description: >
        A chronic neurological condition characterized by recurrent
        unprovoked seizures. Seizures are episodes of abnormal electrical
        activity in the brain causing temporary loss of consciousness,
        convulsions, or other neurological disturbances. With treatment access,
        epilepsy is manageable. In many low-resource settings, people with
        epilepsy are untreated and experience frequent seizures with
        significant social and physical consequences.
      body_systems_affected: [neurological, musculoskeletal, cardiovascular]
      typical_onset_pattern: any_age
      typical_progression: stable_if_managed
      treatability: manageable_with_treatment
      reversibility: partially_reversible
      fatal_if_untreated: true
      disability_potential: high
      condition_caregiver_intensity: moderate
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: functional
          impact_mechanism: >
            During seizures, the person is at risk of injury from falls.
            Between seizures, physical capability is typically normal.
            However, fear of seizures may limit the person's willingness
            to engage in activities that could be dangerous if a seizure
            occurred (swimming, heights, cooking with fire).
          reversible_with_treatment: true
        - domain_ref: capabilities.yaml#cognitive_functioning
          typical_impact_level: functional
          impact_mechanism: >
            Some treatment medications cause drowsiness and cognitive
            slowing. Frequent seizures may cause cumulative brain injury.
            However, most people with well-controlled epilepsy have normal
            cognitive function.
          reversible_with_treatment: true
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: partial
          impact_mechanism: >
            Uncontrolled epilepsy severely limits employment. Employers
            may refuse to hire people with epilepsy. Dangerous occupations
            (heights, water, machinery, driving) are unsuitable. With
            seizure control, many occupations are accessible.
          reversible_with_treatment: true
        - domain_ref: capabilities.yaml#social_participation
          typical_impact_level: partial
          impact_mechanism: >
            Stigma surrounding epilepsy is pervasive in many contexts.
            People with epilepsy may be excluded from marriage, education,
            and community participation. The social impact frequently
            exceeds the physical impact of the condition itself.
          reversible_with_treatment: false
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            During seizures, the person requires caregiver protection from
            injury and recovery support. People with uncontrolled epilepsy
            may require constant supervision. Children with epilepsy require
            caregiver medication administration and school communication.
          typically_temporary: true
        - dependency_ref: dependency.yaml#physical_support
          trigger_condition: >
            After a seizure, the person may be confused, weak, or injured
            and require physical assistance. During the postictal period,
            temporary physical support is needed.
          typically_temporary: true
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#infant
          manifestation: >
            Infantile seizures may indicate serious underlying brain
            abnormalities or metabolic disorders. Early-onset epilepsy
            requires urgent neurological evaluation. The seizures
            themselves may cause developmental regression.
        - stage_ref: lifecycle-stages.yaml#school_age_child
          manifestation: >
            School-age children with epilepsy face educational exclusion
            if teachers are unaware of how to manage seizures. Stigma
            from peers may cause social isolation. Medication side effects
            may affect concentration and school performance.
        - stage_ref: lifecycle-stages.yaml#adolescent
          manifestation: >
            Adolescents with epilepsy face the challenge of transitioning
            from parental medication management to self-management. Non-
            adherence is common during adolescence. The condition may
            affect driving eligibility, career choices, and social
            relationships at a critical identity-forming stage.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver for a child with uncontrolled epilepsy faces
            high anxiety and disrupted sleep. The caregiver must be
            constantly alert to seizure risk. The burden is sustained
            and psychologically demanding, even when the physical
            demands are intermittent.
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            An earner with epilepsy may lose employment due to seizures
            or employer discrimination. The unpredictability of seizures
            makes it difficult to maintain consistent work. Driving-
            dependent occupations are unsuitable.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#depression
          comorbidity_pattern: frequent
          compounding_effect: >
            Depression is common in people with epilepsy, both due to
            the psychological burden of the condition and as a side
            effect of some medications. Depression reduces
            medication adherence and quality of life.
      environmental_interactions:
        - factor: sleep_deprivation
          effect: >
            Sleep deprivation is a common seizure trigger. Households
            in crisis or displacement may have disrupted sleep patterns
            that increase seizure frequency.
        - factor: stress
          effect: >
            Physical and emotional stress can trigger seizures. Household
            crises, displacement, and bereavement may increase seizure
            frequency in susceptible individuals.

    - id: cancer
      name: Cancer (Selected Common Types)
      category: non_communicable
      family: non_communicable
      description: >
        A group of diseases characterized by uncontrolled cell growth
        and spread. In humanitarian contexts, the most common cancers
        are breast, cervical, lung, colorectal, and childhood leukemia.
        In low-resource settings, many cancers are diagnosed at advanced
        stages when treatment access is limited. Cancer creates a sustained,
        intensifying burden on the patient and family.
      body_systems_affected: [varies_by_type]
      typical_onset_pattern: any_age
      typical_progression: progressive
      treatability: manageable_with_treatment
      reversibility: partially_reversible
      fatal_if_untreated: true
      disability_potential: high
      condition_caregiver_intensity: high
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: partial
          impact_mechanism: >
            Cancer and its treatment
            cause fatigue, pain, weakness, and nausea that progressively
            limit physical activity. In advanced stages, the person may
            be bedbound. The trajectory is typically one of progressive
            decline.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#cognitive_functioning
          typical_impact_level: functional
          impact_mechanism: >
            Cognitive slowing from treatment affects
            memory, attention, and processing speed. Brain tumors directly
            affect cognition. The psychological burden of cancer also
            affects mental function.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#independent_living
          typical_impact_level: partial
          impact_mechanism: >
            As cancer progresses, the person requires increasing assistance
            with daily activities. During treatment, side effects may
            temporarily remove independence. In palliative stages, full
            dependency is common.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: minimal
          impact_mechanism: >
            Cancer treatment typically requires prolonged absence from
            work. Many people with cancer cannot return to previous
            employment. The financial impact is severe and sustained.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#social_participation
          typical_impact_level: partial
          impact_mechanism: >
            Cancer-related stigma, physical changes, and fatigue reduce
            social participation. Some cancers carry particular stigma
            (cervical cancer, lung cancer) that affects social standing.
          reversible_with_treatment: false
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Cancer requires sustained, intensifying caregiving. The
            caregiver must manage pain, nutrition, hygiene, emotional
            support, and treatment coordination. In advanced stages,
            the caregiving demand may exceed the caregiver's capacity.
          typically_temporary: false
        - dependency_ref: dependency.yaml#physical_support
          trigger_condition: >
            Physical support is needed for mobility, transfers, and
            daily activities as weakness progresses. The dependency
            increases over time.
          typically_temporary: false
        - dependency_ref: dependency.yaml#financial
          trigger_condition: >
            Cancer treatment is expensive. The household must bear the
            cost of medication, transport to treatment, and loss of the
            patient's income. The financial burden is typically the
            highest of any condition in the taxonomy.
          typically_temporary: false
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#school_age_child
          manifestation: >
            Childhood cancer (leukemia, brain tumors) requires intensive,
            prolonged treatment that disrupts education and development.
            The family must choose between treatment access (often far
            from home) and maintaining family life. The psychosocial
            impact on the child and siblings is profound.
        - stage_ref: lifecycle-stages.yaml#adult
          manifestation: >
            Adult cancer typically affects the primary earner. The
            household faces the simultaneous loss of income and the
            cost of treatment. The adult may delay seeking care due
            to economic concerns, leading to advanced-stage diagnosis
            and worse outcomes.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            Cancer in the primary earner removes income for months or
            years while the household bears treatment costs. The financial
            impact is typically catastrophic. Even after treatment, the
            earner may be unable to return to previous work. The household
            may be pushed into debt or poverty.
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver with cancer cannot continue providing care during
            treatment. The family must find substitute care for dependents
            while the caregiver is themselves a patient. The dual role
            reversal is structurally disruptive.
      environmental_interactions:
        - factor: healthcare_access_gap
          effect: >
            Cancer outcomes depend heavily on early detection and treatment
            access. In areas without oncology services, cancer is a death
            sentence regardless of the type. The gap between medical
            possibility and access reality is the primary humanitarian concern.
        - factor: displacement
          effect: >
            Displacement disrupts cancer treatment continuity. A person
            in the middle of treatment who is displaced may lose access
            to treatment and experience rapid deterioration.

    - id: dementia
      name: Dementia (Major Neurocognitive Disorder)
      category: non_communicable
      family: neurocognitive_disorders
      description: >
        A progressive, irreversible decline in cognitive function affecting
        memory, reasoning, language, judgment, and behavior. Dementia is
        not a specific disease but a syndrome caused by various brain
        disorders, most commonly Alzheimer's disease. The condition
        progresses from mild memory problems to complete dependency for
        all activities of daily living. It is a condition of advanced age
        but may occur earlier in some forms.
      body_systems_affected: [neurological, psychiatric, metabolic, cardiovascular]
      typical_onset_pattern: older_adulthood
      typical_progression: progressive
      treatability: manageable_without_treatment
      reversibility: irreversible
      fatal_if_untreated: true
      disability_potential: high
      condition_caregiver_intensity: high
      affected_capability_domains:
        - domain_ref: capabilities.yaml#cognitive_functioning
          typical_impact_level: minimal
          impact_mechanism: >
            Dementia is defined by progressive cognitive decline. Memory
            loss is the hallmark, but executive function, language,
            spatial orientation, and judgment are also affected. In late
            stages, the person may not recognize family members or understand
            language. The decline is irreversible.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#independent_living
          typical_impact_level: minimal
          impact_mechanism: >
            Dementia progressively removes independent living capacity.
            Early stages may allow independent living with supervision.
            Middle stages require assistance with finances, medication,
            and complex tasks. Late stages require full care for all
            activities of daily living.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#self_advocacy
          typical_impact_level: minimal
          impact_mechanism: >
            The person loses the capacity to advocate for their own
            interests, understand their rights, or navigate institutional
            systems. They become dependent on family or legal guardians
            for all formal interactions.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: partial
          impact_mechanism: >
            Physical mobility is typically preserved until late stages,
            but spatial disorientation and poor judgment create dangerous
            wandering behavior. The person may walk but become lost or
            injured. Falls are common due to poor judgment and coordination.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#communication
          typical_impact_level: partial
          impact_mechanism: >
            Language ability declines progressively. The person may
            struggle to find words, repeat phrases, or lose comprehension.
            In late stages, meaningful communication may be lost entirely.
          reversible_with_treatment: false
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Dementia creates sustained, intensifying caregiving dependency.
            In early stages, the dependency is partial (reminders, supervision).
            In late stages, it is total (feeding, bathing, toileting,
            mobility, safety). The caregiver burden is among the highest
            of any condition in this taxonomy.
          typically_temporary: false
        - dependency_ref: dependency.yaml#physical_support
          trigger_condition: >
            Physical support is needed for mobility, transfers, and
            safety supervision. The person may walk but requires constant
            accompaniment to prevent wandering and falls.
          typically_temporary: false
        - dependency_ref: dependency.yaml#decision_making
          trigger_condition: >
            Decision-making dependency is created as cognitive capacity
            declines. The family or legal guardian must assume authority
            over medical, financial, and personal decisions. This transition
            is often difficult and may create family conflict.
          typically_temporary: false
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#older_adult
          manifestation: >
            Dementia typically begins in older adulthood. The person
            may still be working or caring for grandchildren when symptoms
            begin. The early stage is frequently missed or attributed to
            normal aging. The family may not recognize the condition until
            significant functional decline has occurred.
        - stage_ref: lifecycle-stages.yaml#elderly
          manifestation: >
            Dementia is most prevalent in the elderly stage. The person
            is typically dependent for all activities of daily living.
            Comorbidities (frailty, falls, incontinence, malnutrition)
            are common. The person is at high risk of exploitation,
            abuse, and neglect. Underdisclosure of need is characteristic
            — the person cannot report their own needs accurately.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            Dementia places the highest sustained caregiver burden of any
            condition in this taxonomy. The caregiver must provide
            round-the-clock supervision, manage behavioral symptoms
            (agitation, wandering, aggression), and coordinate medical care.
            The caregiver's own health, employment, and social life are
            frequently sacrificed. Caregiver burnout is common and may lead
            to elder abuse or institutionalization.
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            An earner with dementia loses employment capacity in the
            early stages. The household loses income while simultaneously
            gaining caregiving costs. The financial impact is severe and
            sustained. In many contexts, the family must choose between
            work and caregiving, further reducing household income.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#depression
          comorbidity_pattern: frequent
          compounding_effect: >
            Depression frequently co-occurs with dementia, both as a
            reaction to cognitive decline and as part of the neurochemical
            changes. Depression in dementia is undertreated because it
            may be mistaken for dementia symptoms.
      environmental_interactions:
        - factor: unfamiliar_environment
          effect: >
            People with dementia are highly disoriented in unfamiliar
            environments. Displacement, relocation, or even hospitalization
            may cause severe confusion and behavioral deterioration (delirium
            on top of dementia). Familiar surroundings are protective.
        - factor: social_isolation
          effect: >
            Social isolation accelerates cognitive decline in dementia.
            The person benefits from social interaction and structured
            activities. Isolation removes these protective factors and
            may worsen behavioral symptoms.

    # -----------------------------------------------------------------------
    # MENTAL AND BEHAVIORAL HEALTH CONDITIONS
    # -----------------------------------------------------------------------

    - id: depression
      name: Depression
      category: mental_behavioral
      family: mental_health_conditions
      description: >
        A mental health condition characterized by persistent low mood,
        loss of interest, fatigue, sleep disturbance, and impaired
        concentration. Depression affects the person's ability to function
        in daily life, work, and relationships. It is common, frequently
        underdisclosed, and highly treatable. Depression in a caregiver
        directly affects the quality of care provided to dependents.
      body_systems_affected: [neurological, endocrine, immune, gastrointestinal]
      typical_onset_pattern: any_age
      typical_progression: episodic
      treatability: manageable_with_treatment
      reversibility: reversible_with_treatment
      fatal_if_untreated: false
      disability_potential: moderate
      condition_caregiver_intensity: moderate
      affected_capability_domains:
        - domain_ref: capabilities.yaml#social_participation
          typical_impact_level: partial
          impact_mechanism: >
            Depression causes withdrawal from social relationships and
            activities. The person may avoid community engagement, family
            gatherings, and social support networks. Social isolation
            worsens depression, creating a feedback loop.
          reversible_with_treatment: true
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: partial
          impact_mechanism: >
            Depression reduces work capacity through fatigue, poor
            concentration, and absenteeism. The person may be present
            at work but underperforming (presenteeism). Severe depression
            may prevent all work.
          reversible_with_treatment: true
        - domain_ref: capabilities.yaml#caregiving
          typical_impact_level: partial
          impact_mechanism: >
            A depressed caregiver may be physically present but emotionally
            unavailable. The quality of caregiving is reduced — the caregiver
            may be less responsive, less stimulating, and less attuned to
            the dependent's needs. This is a critical but frequently invisible
            household risk.
          reversible_with_treatment: true
        - domain_ref: capabilities.yaml#self_advocacy
          typical_impact_level: partial
          impact_mechanism: >
            Depression reduces the person's motivation and confidence to
            assert their needs, seek services, and navigate institutional
            systems. The person may not register for assistance they are
            entitled to because the effort feels overwhelming.
          reversible_with_treatment: true
        - domain_ref: capabilities.yaml#household_management
          typical_impact_level: partial
          impact_mechanism: >
            Depression reduces the capacity to organize, plan, and maintain
            the household. Basic tasks may feel insurmountable. Food
            preparation, hygiene, and scheduling may be neglected.
          reversible_with_treatment: true
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#emotional_support
          trigger_condition: >
            Depression creates emotional support dependency. The person
            relies on others for psychological safety, validation, and
            motivation. Without emotional support, the condition may worsen.
          typically_temporary: true
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Severe depression may require caregiving support for basic
            daily activities when the person is unable to initiate or
            complete tasks. The dependency is typically temporary and
            resolves with treatment.
          typically_temporary: true
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#adolescent
          manifestation: >
            Adolescent depression is frequently missed or attributed to
            normal teenage behavior. It affects school attendance,
            academic performance, and social development. Suicide risk is
            elevated in adolescent depression. The condition may be
            underdisclosed because the adolescent does not recognize it
            or does not trust adults with the information.
        - stage_ref: lifecycle-stages.yaml#adult
          manifestation: >
            Adult depression frequently presents during or after household
            crises (bereavement, displacement, job loss). The adult may
            not recognize their own depression, presenting instead with
            physical symptoms (fatigue, pain, sleep problems). The condition
            may be invisible to the household because the adult continues
            functioning at a reduced level.
        - stage_ref: lifecycle-stages.yaml#elderly
          manifestation: >
            Elderly depression is frequently mistaken for dementia or
            normal aging. The elderly person may not report sadness but
            instead presents with somatic complaints, withdrawal, or
            irritability. Elderly depression is undertreated and increases
            mortality from all causes.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A depressed caregiver is a critical household risk. The
            caregiver's own needs may prevent them from meeting the
            dependent's needs. The quality of developmental support for
            children and physical care for elderly dependents is reduced.
            The household may appear intact but be functionally impaired.
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            A depressed earner may lose employment or reduce income through
            absenteeism and underperformance. The economic impact is
            real but may be attributed to laziness or disinterest rather
            than illness. The earner may not seek help due to stigma.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#anxiety_disorder
          comorbidity_pattern: frequent
          compounding_effect: >
            Depression and anxiety frequently co-occur. The combination
            produces more severe functional impairment than either alone.
            Treatment of both conditions simultaneously is required.
        - condition_ref: health-conditions.yaml#post_traumatic_stress_disorder
          comorbidity_pattern: frequent
          compounding_effect: >
            PTSD and depression frequently co-occur after traumatic
            events. The combination produces severe emotional distress
            and functional impairment. The person may be overwhelmed
            by both re-experiencing and hopelessness simultaneously.
        - condition_ref: health-conditions.yaml#substance_use_disorder
          comorbidity_pattern: frequent
          compounding_effect: >
            Depression and substance use frequently co-occur, with each
            worsening the other. Substance use may be a self-medication
            attempt for depression. The combination complicates treatment
            and increases suicide risk.
      environmental_interactions:
        - factor: displacement
          effect: >
            Displacement, loss of home, and uncertainty are powerful
            triggers for depression. The psychological impact of displacement
            may persist long after physical safety is restored.
        - factor: bereavement
          effect: >
            Bereavement is a common trigger for depression, particularly
            when the deceased was a primary earner or caregiver. The
            loss creates both the emotional trigger for depression and
            the structural conditions that sustain it (economic stress,
            increased caregiving burden).

    - id: anxiety_disorder
      name: Anxiety Disorder
      category: mental_behavioral
      family: mental_health_conditions
      description: >
        A mental health condition characterized by excessive worry, fear,
        nervousness, and physical symptoms such as rapid heartbeat, sweating,
        and trembling. Anxiety disorders include generalized anxiety,
        panic disorder, and phobias. The condition may be persistent or
        episodic. It affects decision-making, social participation, and
        daily functioning. Anxiety is frequently underdisclosed and may be
        attributed to personality or temperament rather than illness.
      body_systems_affected: [neurological, endocrine, cardiovascular, gastrointestinal]
      typical_onset_pattern: any_age
      typical_progression: episodic
      treatability: manageable_with_treatment
      reversibility: reversible_with_treatment
      fatal_if_untreated: false
      disability_potential: moderate
      condition_caregiver_intensity: low
      affected_capability_domains:
        - domain_ref: capabilities.yaml#social_participation
          typical_impact_level: partial
          impact_mechanism: >
            Anxiety causes avoidance of social situations, community
            events, and public spaces. The person may be unable to attend
            social gatherings or engage in collective activities. Social
            isolation worsens anxiety.
          reversible_with_treatment: true
        - domain_ref: capabilities.yaml#self_advocacy
          typical_impact_level: partial
          impact_mechanism: >
            Anxiety impairs the ability to assert needs, challenge
            decisions, and navigate institutional systems. The person may
            avoid necessary interactions with authority figures or service
            providers due to fear of judgment or confrontation.
          reversible_with_treatment: true
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: functional
          impact_mechanism: >
            Anxiety may limit employment in roles requiring public
            interaction, decision-making under pressure, or travel.
            The person may underperform in job interviews or workplace
            social situations. However, many occupations remain accessible.
          reversible_with_treatment: true
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#emotional_support
          trigger_condition: >
            Anxiety creates emotional support dependency. The person
            relies on reassurance, accompaniment, and encouragement to
            engage with challenging situations. The support need is
            situation-specific rather than constant.
          typically_temporary: true
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#adolescent
          manifestation: >
            Adolescent anxiety frequently affects school attendance,
            social relationships, and academic performance. The adolescent
            may avoid school due to social anxiety or panic attacks.
            The condition may be attributed to shyness or behavioral
            problems rather than recognized as a mental health condition.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            An anxious caregiver may be overprotective or avoidant,
            affecting the dependent's development and safety. The caregiver's
            anxiety may be transmitted to children through modeling and
            overprotection. The impact on the household is subtle but real.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#depression
          comorbidity_pattern: frequent
          compounding_effect: >
            Anxiety and depression co-occur frequently. The combination
            produces more severe functional impairment and is more
            difficult to treat than either condition alone.
      environmental_interactions:
        - factor: displacement
          effect: >
            Displacement and uncertainty are powerful triggers for anxiety.
            The loss of familiar surroundings, routines, and social
            networks creates a context of pervasive uncertainty that
            sustains anxiety.

    - id: post_traumatic_stress_disorder
      name: Post-Traumatic Stress Disorder (PTSD)
      category: mental_behavioral
      family: mental_health_conditions
      description: >
        A mental health condition that develops after exposure to
        traumatic events such as violence, disaster, displacement, or
        accident. PTSD is characterized by intrusive memories,
        nightmares, avoidance of trauma reminders, hypervigilance, and
        emotional numbness. The condition significantly impairs daily
        functioning, relationships, and work capacity. PTSD is common in
        humanitarian populations but frequently underdiagnosed and
        undertreated.
      body_systems_affected: [neurological, endocrine, cardiovascular, immune]
      typical_onset_pattern: any_age
      typical_progression: stable_or_progressive
      treatability: manageable_with_treatment
      reversibility: partially_reversible
      fatal_if_untreated: false
      disability_potential: high
      condition_caregiver_intensity: low
      affected_capability_domains:
        - domain_ref: capabilities.yaml#social_participation
          typical_impact_level: partial
          impact_mechanism: >
            PTSD causes withdrawal from social situations and avoidance
            of trauma reminders. The person may avoid community gatherings,
            public spaces, or locations associated with the trauma. Social
            relationships are strained by emotional numbness and irritability.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: partial
          impact_mechanism: >
            PTSD may prevent employment in roles that trigger trauma
            memories or require sustained concentration. Sleep disturbance
            causes fatigue that reduces work capacity. Hypervigilance
            creates a distracting background of anxiety that impairs
            performance.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#caregiving
          typical_impact_level: partial
          impact_mechanism: >
            A caregiver with PTSD may be emotionally detached, irritable,
            or overprotective. The person's hypervigilance may be directed
            toward the dependent's safety in ways that are excessive and
            constraining. Trauma-related irritability may affect the quality
            of caregiver-dependent interaction.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#household_management
          typical_impact_level: functional
          impact_mechanism: >
            Sleep disturbance and concentration impairment reduce the
            capacity to manage household routines. The person may be
            preoccupied with trauma memories and unable to focus on
            daily tasks.
          reversible_with_treatment: partial
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#emotional_support
          trigger_condition: >
            PTSD creates sustained emotional support dependency. The
            person requires psychological safety, understanding, and
            patience from family members. Without support, symptoms may
            worsen and recovery is delayed.
          typically_temporary: true
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#school_age_child
          manifestation: >
            Children with PTSD may present with behavioral problems,
            bedwetting, nightmares, and school refusal rather than the
            adult symptom pattern. The condition may be misidentified as
            behavioral problems or developmental issues. Trauma in
            childhood affects brain development and has lasting consequences.
        - stage_ref: lifecycle-stages.yaml#adolescent
          manifestation: >
            Adolescents with PTSD are at high risk of substance use,
            self-harm, and risky behavior. The condition may be expressed
            through aggression, withdrawal, or risky conduct rather than
            explicit trauma reporting. The adolescent may not disclose
            the trauma due to shame or fear.
        - stage_ref: lifecycle-stages.yaml#adult
          manifestation: >
            Adult PTSD frequently follows displacement, violence, or
            disaster. The adult may be fully functional in some contexts
            but severely impaired in contexts that trigger trauma memories.
            The person may be a primary earner or caregiver whose capacity
            is suddenly disrupted by trauma triggers.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            PTSD in an earner may cause sudden work incapacity when
            trauma triggers are encountered. The impairment is not
            constant but may be severe and unpredictable. Employers
            may not understand or accommodate the condition.
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver with PTSD may have reduced emotional availability
            and may transmit trauma-related anxiety to dependents. The
            quality of care is compromised. The caregiver may also be
            triggered by caregiving situations that resemble the original
            trauma.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#depression
          comorbidity_pattern: frequent
          compounding_effect: >
            PTSD and depression frequently co-occur after trauma. The
            combination produces severe emotional distress and functional
            impairment. Both conditions must be addressed for recovery.
        - condition_ref: health-conditions.yaml#substance_use_disorder
          comorbidity_pattern: frequent
          compounding_effect: >
            Substance use is a common coping mechanism for PTSD symptoms.
            The combination creates additional health, social, and
            economic problems. Treatment must address both conditions.
      environmental_interactions:
        - factor: displacement
          effect: >
            Displacement is a major cause of PTSD in humanitarian populations.
            The trauma of losing home, witnessing violence, and experiencing
            uncertainty creates a high prevalence of PTSD in displaced
            communities. The condition may not emerge until months after
            the displacement event.
        - factor: domestic_violence
          effect: >
            Exposure to domestic violence is a major cause of PTSD,
            particularly for women and children. The trauma is sustained
            and repeated rather than a single event, creating complex PTSD.

    - id: psychotic_disorder
      name: Psychotic Disorder (Schizophrenia Spectrum)
      category: mental_behavioral
      family: mental_health_conditions
      description: >
        A severe mental health condition characterized by distorted thinking,
        hallucinations, delusions, and disorganized behavior. Psychotic
        disorders include schizophrenia, schizoaffective disorder, and
        delusional disorder. The condition typically develops in young
        adulthood and persists throughout life. With treatment, many
        people achieve significant symptom control. Without treatment,
        the condition causes severe disability and social exclusion.
      body_systems_affected: [neurological, metabolic, cardiovascular]
      typical_onset_pattern: young_adulthood
      typical_progression: relapsing_remitting
      treatability: manageable_with_treatment
      reversibility: partially_reversible
      fatal_if_untreated: false
      disability_potential: high
      condition_caregiver_intensity: high
      affected_capability_domains:
        - domain_ref: capabilities.yaml#cognitive_functioning
          typical_impact_level: partial
          impact_mechanism: >
            Psychotic disorders affect reasoning, judgment, and reality
            testing. The person may have difficulty organizing thoughts,
            planning, and making decisions. Cognitive impairment persists
            even when hallucinations and delusions are controlled.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#social_participation
          typical_impact_level: minimal
          impact_mechanism: >
            Social withdrawal is common. The person may be suspicious
            of others, believe they are being persecuted, or be unable
            to follow social conventions. Stigma surrounding psychotic
            disorders is severe and leads to profound social exclusion.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: minimal
          impact_mechanism: >
            Employment is typically severely limited. Even with treatment,
            cognitive impairment and social difficulties make sustained
            work challenging. The person may be capable of supervised,
            structured work but not independent competitive employment.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#independent_living
          typical_impact_level: partial
          impact_mechanism: >
            The person may be able to manage basic self-care with
            supervision but typically requires support for medication
            management, financial decisions, and safety. Without treatment,
            independent living is rarely possible.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#communication
          typical_impact_level: partial
          impact_mechanism: >
            Disorganized thinking may make communication difficult to
            follow. The person may talk about delusional beliefs or
            respond to internal stimuli (hallucinations), making
            conversation confusing for others.
          reversible_with_treatment: partial
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Psychotic disorders require sustained caregiving support for
            medication administration, daily activity supervision, and
            safety monitoring. During acute episodes, the caregiving demand
            is intense. Even in stable periods, the person requires ongoing
            support to maintain functioning.
          typically_temporary: false
        - dependency_ref: dependency.yaml#decision_making
          trigger_condition: >
            Decision-making capacity is frequently impaired during active
            psychosis. Even when symptoms are controlled, the person may
            need support for major financial, medical, and life decisions.
            Legal guardianship may be required in some cases.
          typically_temporary: false
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#young_adult
          manifestation: >
            Psychotic disorders typically first appear in young adulthood,
            a critical period for education, employment establishment, and
            family formation. The onset disrupts these developmental tasks
            at a formative stage. The young adult may be in the process of
            becoming economically independent when the condition removes that
            capacity.
        - stage_ref: lifecycle-stages.yaml#adult
          manifestation: >
            In adulthood, psychotic disorders cause sustained disability.
            The person may have been a functional earner or caregiver before
            onset. The family must adapt to a permanent change in the person's
            capacity. The impact on the household is structural and long-term.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            An earner who develops a psychotic disorder typically loses
            employment capacity permanently or for prolonged periods.
            The household must adapt to the loss of income while
            simultaneously managing the person's care needs and medication.
            The financial and caregiving burden is dual and sustained.
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver with a psychotic disorder is a critical household
            risk. The person's altered perception and judgment may create
            safety risks for dependents. The caregiver may be unable to
            respond appropriately to the dependent's needs. The family
            must find substitute care urgently.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#depression
          comorbidity_pattern: frequent
          compounding_effect: >
            Depression frequently co-occurs with psychotic disorders,
            either as a symptom of the condition or as a reaction to
            the disability and social exclusion it creates.
        - condition_ref: health-conditions.yaml#substance_use_disorder
          comorbidity_pattern: frequent
          compounding_effect: >
            Substance use is common in people with psychotic disorders,
            both as a coping mechanism and because substance use may
            trigger or worsen psychosis. The combination complicates
            treatment and increases hospitalization risk.
      environmental_interactions:
        - factor: stress
          effect: >
            Stress is a known trigger for psychotic episodes. Household
            crises, displacement, and bereavement may precipitate relapse
            in people with controlled psychotic disorders.
        - factor: social_isolation
          effect: >
            Social isolation worsens psychotic disorders. The person
            benefits from structured social interaction and supportive
            relationships. Isolation removes protective factors and may
            accelerate deterioration.

    - id: substance_use_disorder
      name: Substance Use Disorder
      category: mental_behavioral
      family: mental_health_conditions
      description: >
        A condition of compulsive use of alcohol or other substances despite
        harmful consequences. Substance use disorder affects physical health,
        mental health, social functioning, and economic capacity. It is
        frequently underdisclosed and may be hidden by the person and
        family. In humanitarian contexts, substance use may increase as a
        coping mechanism for trauma, displacement, and despair. The condition
        has significant family cascade effects when the affected person is
        a caregiver or earner.
      body_systems_affected: [neurological, hepatic, gastrointestinal, cardiovascular, immune, psychiatric]
      typical_onset_pattern: adolescence
      typical_progression: progressive
      treatability: manageable_with_treatment
      reversibility: partially_reversible
      fatal_if_untreated: true
      disability_potential: moderate
      condition_caregiver_intensity: moderate
      affected_capability_domains:
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: partial
          impact_mechanism: >
            Substance use reduces work capacity through absenteeism,
            impaired performance, and job loss. The person may be unable
            to maintain consistent employment. Income is frequently
            diverted to substance purchase, worsening household finances.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#household_management
          typical_impact_level: partial
          impact_mechanism: >
            The person may neglect household responsibilities, spend
            household resources on substances, and create an unstable
            home environment. Family conflict is common. Children in the
            household are affected by the chaos and neglect.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#caregiving
          typical_impact_level: partial
          impact_mechanism: >
            A caregiver with substance use disorder is frequently
            emotionally and physically unavailable. The quality of care
            is compromised. The caregiver may be impaired while caring for
            children, creating safety risks. Dependents may be exposed to
            unpredictable behavior and neglect.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#social_participation
          typical_impact_level: partial
          impact_mechanism: >
            Social relationships are strained by the person's behavior.
            The family may withdraw from community participation to hide
            the condition. The person may lose social capital and community
            support networks.
          reversible_with_treatment: partial
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            During acute intoxication or withdrawal, the person requires
            caregiving support. Chronic substance use may create sustained
            dependency when the person is unable to manage daily life.
          typically_temporary: true
        - dependency_ref: dependency.yaml#financial
          trigger_condition: >
            Substance use creates financial dependency through diversion
            of income to substance purchase and loss of employment. The
            household may be financially dependent on other family members
            or external support.
          typically_temporary: true
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#adolescent
          manifestation: >
            Adolescent substance use is frequently experimental but may
            progress to disorder. It affects school attendance, educational
            attainment, and social development. The adolescent may be
            exposed to substances in the context of peer pressure, trauma,
            or family modeling. Early intervention is critical.
        - stage_ref: lifecycle-stages.yaml#adult
          manifestation: >
            Adult substance use disorder frequently develops as a coping
            mechanism for stress, trauma, or displacement. The adult may
            be the primary earner or caregiver whose substance use creates
            household crisis. The condition may be hidden from the household
            for years before consequences become visible.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            An earner with substance use disorder diverts income to
            substances and loses employment through absenteeism. The
            household experiences both reduced income and increased
            expenses. The financial impact may be hidden for years if
            the earner maintains a facade of normal functioning.
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver with substance use disorder is a safeguarding
            concern. The dependent's safety and development are at risk.
            The caregiver may be impaired while responsible for children,
            creating a direct risk of harm. The condition may trigger
            child protection obligations.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#depression
          comorbidity_pattern: frequent
          compounding_effect: >
            Depression and substance use frequently co-occur, with each
            worsening the other. Substance use may be self-medication for
            depression. The combination increases suicide risk and reduces
            treatment response.
        - condition_ref: health-conditions.yaml#post_traumatic_stress_disorder
          comorbidity_pattern: frequent
          compounding_effect: >
            PTSD is a major risk factor for substance use disorder.
            Substances are used to cope with intrusive memories, nightmares,
            and hypervigilance. The combination is common in populations
            exposed to violence and displacement.
        - condition_ref: health-conditions.yaml#hepatitis
          comorbidity_pattern: frequent
          compounding_effect: >
            Substance use (particularly injection drug use) increases
            hepatitis B and C transmission risk. Alcohol use causes
            alcoholic liver disease. The combination of substance use
            and hepatitis creates accelerated liver damage.
      environmental_interactions:
        - factor: displacement
          effect: >
            Displacement and the associated trauma, loss, and uncertainty
            increase substance use as a coping mechanism. Displaced
            populations may have elevated rates of substance use disorder.
        - factor: unemployment
          effect: >
            Unemployment and idleness increase substance use risk. The
            person may use substances to fill time or cope with the
            psychological impact of job loss and economic hopelessness.

    # -----------------------------------------------------------------------
    # INJURY AND TRAUMA
    # -----------------------------------------------------------------------

    - id: traumatic_brain_injury
      name: Traumatic Brain Injury
      category: injury_trauma
      family: trauma_conditions
      description: >
        Brain damage caused by external force — blows to the head, falls,
        vehicle accidents, or violence. TBI ranges from mild (concussion)
        to severe (coma, permanent disability). The consequences depend
        on the location and severity of the brain damage. TBI may cause
        physical, cognitive, emotional, and behavioral changes. Recovery
        is variable and may be incomplete, particularly in severe cases.
      body_systems_affected: [neurological, musculoskeletal, endocrine, psychiatric]
      typical_onset_pattern: any_age
      typical_progression: stable_after_acute
      treatability: manageable_with_treatment
      reversibility: partially_reversible
      fatal_if_untreated: true
      disability_potential: high
      condition_caregiver_intensity: high
      affected_capability_domains:
        - domain_ref: capabilities.yaml#cognitive_functioning
          typical_impact_level: partial
          impact_mechanism: >
            TBI frequently affects memory, attention, executive function,
            and processing speed. The severity depends on the location and
            extent of brain damage. Some cognitive recovery occurs in the
            first months after injury, but severe deficits may be permanent.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: partial
          impact_mechanism: >
            Motor deficits, balance problems, and coordination difficulties
            may limit mobility. The person may require assistive devices
            or physical support. Some physical recovery is possible with
            rehabilitation.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#communication
          typical_impact_level: partial
          impact_mechanism: >
            Language and communication may be affected if the language
            centers of the brain are damaged. The person may have
            difficulty finding words, understanding language, or organizing
            speech. Social communication skills may also be affected.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#independent_living
          typical_impact_level: partial
          impact_mechanism: >
            The person may require assistance with daily activities
            depending on the severity of cognitive and physical deficits.
            Some people with TBI regain full independence; others require
            sustained support.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: partial
          impact_mechanism: >
            Employment capacity depends on the nature of the deficits.
            A person with cognitive impairment may be unable to return
            to previous work. A person with physical deficits may need
            workplace modification. Many people with TBI require vocational
            retraining.
          reversible_with_treatment: partial
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            TBI creates caregiving dependency that may be temporary or
            permanent. During the acute recovery phase, intensive caregiving
            is required. In severe cases, the dependency is lifelong.
          typically_temporary: true
        - dependency_ref: dependency.yaml#physical_support
          trigger_condition: >
            Physical support is needed for mobility, transfers, and safety
            during recovery. In severe cases, physical support dependency
            may be permanent.
          typically_temporary: true
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#infant
          manifestation: >
            Infant TBI (often from non-accidental injury or falls) is
            particularly dangerous because the developing brain is
            vulnerable. The consequences may not be apparent until
            developmental delays emerge in later months or years.
        - stage_ref: lifecycle-stages.yaml#school_age_child
          manifestation: >
            TBI in school-age children affects educational development.
            The child may have reduced attention, memory problems, and
            behavioral changes that affect school performance. The
            impact on education may be long-lasting even after physical
            recovery.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            TBI in an earner removes income during recovery and may
            prevent return to previous work permanently. The household
            must absorb the cost of care and rehabilitation while losing
            the earner's contribution. The financial impact is severe
            and may be permanent.
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver with TBI may be unable to continue providing care.
            The cognitive and behavioral changes from TBI may make the
            person emotionally unavailable, irritable, or unable to manage
            household routines. The family must find substitute care.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#depression
          comorbidity_pattern: frequent
          compounding_effect: >
            Depression is common after TBI, both due to the psychological
            impact of disability and as a direct neurochemical consequence
            of brain injury. Depression reduces rehabilitation engagement
            and worsens outcomes.
        - condition_ref: health-conditions.yaml#post_traumatic_stress_disorder
          comorbidity_pattern: frequent
          compounding_effect: >
            If the TBI was caused by a traumatic event (violence, accident,
            disaster), PTSD may co-occur. The combination of physical
            brain injury and psychological trauma creates complex,
            multi-dimensional disability.
      environmental_interactions:
        - factor: displacement
          effect: >
            Displacement increases the risk of violence, vehicle accidents,
            and falls in unfamiliar environments. TBI is a common injury
            in conflict and disaster settings. Healthcare access for TBI
            rehabilitation is typically unavailable in displacement.
        - factor: road_safety
          effect: >
            Road traffic accidents are a leading cause of TBI globally.
            Poor road safety infrastructure, overcrowded transport, and
            lack of helmet use increase TBI risk.

    - id: spinal_cord_injury
      name: Spinal Cord Injury
      category: injury_trauma
      family: trauma_conditions
      description: >
        Damage to the spinal cord causing loss of function below the level
        of injury. Spinal cord injury may cause paralysis (paraplegia or
        quadriplegia), loss of sensation, and loss of autonomic function
        (bladder, bowel, temperature regulation). The condition is permanent
        because the spinal cord does not regenerate. The impact depends on
        the level and completeness of the injury.
      body_systems_affected: [neurological, musculoskeletal, genitourinary, gastrointestinal, cardiovascular, respiratory]
      typical_onset_pattern: adulthood
      typical_progression: stable
      treatability: manageable_without_treatment
      reversibility: irreversible
      fatal_if_untreated: true
      disability_potential: high
      condition_caregiver_intensity: high
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: minimal
          impact_mechanism: >
            Paraplegia (lower limb paralysis) or quadriplegia (all four
            limb paralysis) removes independent mobility. The person requires
            a wheelchair or full physical support. The level of injury
            determines the extent of paralysis. Upper limb function may be
            preserved in paraplegia but is lost in quadriplegia.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#independent_living
          typical_impact_level: minimal
          impact_mechanism: >
            The person requires assistance with all activities of daily
            living — bathing, dressing, toileting, feeding, and transfers.
            In paraplegia, upper limb function may allow some independence
            with adaptations. In quadriplegia, full dependency is typical.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: minimal
          impact_mechanism: >
            Employment is severely limited. A person with paraplegia may
            be able to work in sedentary roles with accessibility
            accommodations. A person with quadriplegia is typically unable
            to work without significant assistive technology and support.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#household_management
          typical_impact_level: minimal
          impact_mechanism: >
            Household management is severely limited. The person cannot
            perform physical household tasks. Even with adaptations,
            the capacity to manage the household independently is
            significantly reduced.
          reversible_with_treatment: false
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Spinal cord injury creates permanent, total caregiving
            dependency for activities of daily living. The dependency
            is lifelong and does not diminish over time. The caregiver
            burden is among the highest of any condition in this taxonomy.
          typically_temporary: false
        - dependency_ref: dependency.yaml#physical_support
          trigger_condition: >
            Physical support dependency is total and permanent. The person
            requires physical assistance for all mobility, transfers, and
            positioning. In paraplegia, the dependency is lower limb focused.
            In quadriplegia, it is total body dependency.
          typically_temporary: false
        - dependency_ref: dependency.yaml#financial
          trigger_condition: >
            The person loses employment capacity and requires ongoing
            expenses for medical care, supplies, and assistive devices.
            The household faces permanent income loss and sustained costs.
            Financial dependency is lifelong.
          typically_temporary: false
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#young_adult
          manifestation: >
            Spinal cord injury in young adults typically follows accidents
            (vehicle, falls, violence). The person is in the process of
            establishing economic independence and family. The injury
            interrupts this trajectory permanently. The psychological
            impact of sudden permanent disability at a young age is profound.
        - stage_ref: lifecycle-stages.yaml#adult
          manifestation: >
            Adult spinal cord injury removes the person's capacity to
            fulfill their established family roles. An adult with paraplegia
            may be able to continue some cognitive and emotional roles
            but cannot fulfill physical caregiving or earning roles that
            require mobility.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            Spinal cord injury in the primary earner is catastrophic for
            household economics. The earner's income is removed permanently.
            The household must simultaneously bear the cost of care and
            assistive devices. The financial dependency is total and lifelong.
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            Spinal cord injury in the primary caregiver creates a total
            care gap. The caregiver becomes a dependent requiring full
            care themselves. The original dependents (children, elderly)
            lose their caregiver immediately. The family must find
            substitute care for both the injured caregiver and the original
            dependents.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#depression
          comorbidity_pattern: frequent
          compounding_effect: >
            Depression is extremely common after spinal cord injury due
            to the psychological impact of permanent disability and
            the loss of previous life roles. Depression reduces rehabilitation
            engagement and worsens quality of life.
      environmental_interactions:
        - factor: poor_housing
          effect: >
            Poor housing without wheelchair accessibility, proper bedding,
            or sanitation creates severe risks for people with spinal cord
            injury. Pressure injuries, infections, and social isolation are
            all exacerbated by inadequate housing.
        - factor: displacement
          effect: >
            Displacement is particularly dangerous for people with spinal
            cord injury. They cannot evacuate independently, require
            specialized transport, and lose access to their adapted
            living environment and care network. In emergency settings,
            they are among the most vulnerable populations.
        - factor: extreme_heat
          effect: >
            People with spinal cord injury have impaired thermoregulation
            below the level of injury. They are at high risk of heat
            illness because they cannot sweat or regulate body temperature
            effectively in the affected body regions.

    - id: fracture_orthopedic_trauma
      name: Fracture and Orthopedic Trauma
      category: injury_trauma
      family: trauma_conditions
      description: >
        Broken bones and joint injuries from accidents, falls, or violence.
        Fractures range from simple breaks that heal completely to complex
        injuries with permanent deformity or disability. The impact depends
        on the bone involved, the severity of the break, and the quality
        of treatment. Inadequate treatment may lead to malunion (healing
        in wrong position), nonunion (failure to heal), or chronic pain.
      body_systems_affected: [musculoskeletal, neurological, cardiovascular]
      typical_onset_pattern: any_age
      typical_progression: stable_after_acute
      treatability: manageable_with_treatment
      reversibility: partially_reversible
      fatal_if_untreated: false
      disability_potential: moderate
      condition_caregiver_intensity: moderate
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: partial
          impact_mechanism: >
            Fractures of weight-bearing bones (femur, tibia, pelvis)
            prevent walking. Upper limb fractures prevent manual tasks.
            The impact is temporary during healing but may be permanent
            if treatment is inadequate or complications occur.
          reversible_with_treatment: true
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: partial
          impact_mechanism: >
            Employment is disrupted during healing and rehabilitation.
            A person with a manual labor job may be unable to work for
            months. Inadequate healing may prevent return to previous work.
          reversible_with_treatment: true
        - domain_ref: capabilities.yaml#independent_living
          typical_impact_level: partial
          impact_mechanism: >
            During healing, the person may require assistance with
            daily activities. Lower limb fractures prevent self-care
            for toileting and bathing. Upper limb fractures prevent
            feeding and dressing. Independence is typically restored
            after healing.
          reversible_with_treatment: true
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#physical_support
          trigger_condition: >
            Physical support is needed during the healing period for
            mobility, transfers, and daily activities. The dependency
            is typically temporary but may be prolonged if healing is
            delayed or complications occur.
          typically_temporary: true
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Caregiving is needed during the healing period for wound
            care, medication, and daily activity assistance. The duration
            depends on the fracture location and healing quality.
          typically_temporary: true
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#elderly
          manifestation: >
            Fractures in elderly persons (particularly hip fractures)
            carry high mortality and disability risk. The elderly have
            reduced bone healing capacity and are at risk of complications
            (pneumonia, blood clots, pressure injuries). A hip fracture
            often marks the beginning of progressive functional decline.
        - stage_ref: lifecycle-stages.yaml#school_age_child
          manifestation: >
            Fractures in children typically heal well but may disrupt
            education and play. Long bone fractures in children require
            careful management to avoid growth plate damage that could
            cause limb length discrepancy.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            A fracture in the primary earner removes income during the
            healing period. If the fracture heals poorly, the earner may
            be unable to return to manual work permanently. The financial
            impact is temporary or permanent depending on healing quality.
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver with a fracture cannot provide physical care for
            dependents during the healing period. The family must find
            substitute care. The duration of this gap depends on the
            fracture location and healing speed.
      common_comorbidities:
      environmental_interactions:
        - factor: poor_housing
          effect: >
            Poor housing with slippery floors, inadequate lighting, and
            unsafe stairs increases fall risk. Falls are a leading cause
            of fractures, particularly in elderly persons and children.
        - factor: displacement
          effect: >
            Displacement increases accident risk due to unfamiliar
            environments, unsafe transport, and construction activities.
            Fracture treatment may be unavailable in displacement settings,
            leading to malunion and permanent disability.

    - id: burns
      name: Burns
      category: injury_trauma
      family: trauma_conditions
      description: >
        Tissue damage caused by heat, chemicals, electricity, or radiation.
        Burns range from minor superficial injuries to life-threatening
        full-thickness burns affecting large body areas. Severe burns
        cause permanent scarring, contractures (tightening of skin and
        joints), and functional impairment. Infection is a major risk
        in the healing period. Burns are a common injury in households
        with open cooking fires and unsafe electrical wiring.
      body_systems_affected: [integumentary, musculoskeletal, cardiovascular, immune, respiratory]
      typical_onset_pattern: any_age
      typical_progression: stable_after_acute
      treatability: manageable_with_treatment
      reversibility: partially_reversible
      fatal_if_untreated: true
      disability_potential: high
      condition_caregiver_intensity: high
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: partial
          impact_mechanism: >
            Burns over joints cause contractures that limit movement.
            Large burns may require skin grafting and prolonged immobilization.
            The person may lose joint mobility permanently even after healing.
            Hand burns are particularly disabling for manual tasks.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#independent_living
          typical_impact_level: partial
          impact_mechanism: >
            During the acute healing phase, the person requires intensive
            care for wound management, pain control, and nutrition. After
            healing, contractures and scarring may limit self-care capacity.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: partial
          impact_mechanism: >
            Employment is disrupted during the prolonged healing period.
            Hand and face burns may prevent return to previous work.
            Visible scarring may cause discrimination in employment.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#social_participation
          typical_impact_level: partial
          impact_mechanism: >
            Visible burn scars cause stigma and social exclusion. The
            person may withdraw from social participation due to shame
            or discrimination. Children with burn scars may face bullying
            and school exclusion.
          reversible_with_treatment: false
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Severe burns require intensive, prolonged caregiving for wound
            care, nutrition, pain management, and rehabilitation. The
            caregiving demand is among the highest of acute injuries and
            may persist for months.
          typically_temporary: true
        - dependency_ref: dependency.yaml#physical_support
          trigger_condition: >
            Physical support is needed during the healing period when
            the person is immobilized and in pain. After healing, physical
            support may be needed for mobility if contractures have developed.
          typically_temporary: true
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#infant
          manifestation: >
            Infant burns frequently occur from hot liquids, fires, or
            heating devices. Infant skin is thin and burns deeply even
            with brief exposure. Infant burns carry high mortality and
            require specialized care. Scarring may affect growth and
            development.
        - stage_ref: lifecycle-stages.yaml#school_age_child
          manifestation: >
            Burns in school-age children frequently occur from playing
            near fires or cooking areas. The psychological impact of
            scarring and disfigurement is significant at this age. School
            reintegration after severe burns requires social and
            educational support.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver for a person with severe burns faces months of
            intensive wound care, nutrition support, and rehabilitation
            assistance. The caregiver may be unable to work or care for
            other dependents during this period. The burden is sustained
            and exhausting.
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            An earner with severe burns cannot work during the healing
            period. The healing period is prolonged (weeks to months). The
            household loses income while bearing care costs. If
            contractures develop, the earner may be unable to return to
            manual work permanently.
      environmental_interactions:
        - factor: open_cooking_fire
          effect: >
            Open cooking fires are a leading cause of burns in low-resource
            settings. Children and women are at highest risk due to
            proximity to cooking areas. Improved cooking stoves and safe
            cooking practices reduce burn risk.
        - factor: unsafe_electricity
          effect: >
            Poor electrical wiring and unsafe electrical devices cause
            electrical burns. These burns are often deep and may cause
            hidden internal damage. They are preventable through electrical
            safety measures.

    - id: amputation
      name: Amputation
      category: injury_trauma
      family: trauma_conditions
      description: >
        The surgical or traumatic removal of a limb or part of a limb.
        Amputation may result from trauma, infection, vascular disease,
        or diabetes complications. The impact depends on which limb is
        amputated and at what level. Lower limb amputation affects
        walking; upper limb amputation affects manual tasks. With
        prosthetics and rehabilitation, many people regain significant
        function. Without prosthetics, the disability is permanent and severe.
      body_systems_affected: [musculoskeletal, neurological, cardiovascular, integumentary]
      typical_onset_pattern: adulthood
      typical_progression: stable
      treatability: manageable_without_treatment
      reversibility: irreversible
      fatal_if_untreated: false
      disability_potential: high
      condition_caregiver_intensity: moderate
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: partial
          impact_mechanism: >
            Lower limb amputation prevents walking without a prosthesis
            or assistive device. With a prosthesis, many people regain
            functional mobility. Without a prosthesis, the person uses
            a wheelchair or crutches with limited mobility. Upper limb
            amputation does not affect walking but prevents manual tasks.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#independent_living
          typical_impact_level: partial
          impact_mechanism: >
            Independence depends on the level of amputation and availability
            of assistive devices. A person with a below-knee amputation and
            a prosthesis may achieve full independence. A person with an
            above-knee amputation or no prosthesis may require assistance
            with daily activities.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: partial
          impact_mechanism: >
            Employment capacity depends on the amputation level and the
            nature of the work. A lower limb amputation may prevent manual
            labor and standing work. A desk-based job may still be accessible.
            Upper limb amputation prevents manual work but may not affect
            sedentary employment.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#household_management
          typical_impact_level: partial
          impact_mechanism: >
            Household tasks requiring the missing limb are difficult or
            impossible without adaptations. Lower limb amputation affects
            tasks requiring standing or walking. Upper limb amputation
            affects tasks requiring grasping or manipulation.
          reversible_with_treatment: false
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#physical_support
          trigger_condition: >
            Physical support dependency depends on the amputation level
            and prosthetic availability. A person without a prosthesis
            requires physical support for transfers and mobility. With
            a prosthesis, dependency may be minimal.
          typically_temporary: false
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Caregiving needs depend on the level of amputation and the
            person's adaptation. During the post-amputation rehabilitation
            period, caregiving is intensive. Long-term caregiving needs
            vary widely.
          typically_temporary: true
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#adult
          manifestation: >
            Amputation in working-age adults is typically due to trauma
            (road accidents, violence, work injuries) or diabetes
            complications. The adult loses their previous physical work
            capacity. Vocational rehabilitation is essential for economic
            recovery but frequently unavailable.
        - stage_ref: lifecycle-stages.yaml#elderly
          manifestation: >
            Elderly amputation (typically due to diabetes or vascular
            disease) is frequently followed by rapid functional decline.
            The elderly person may not be able to use a prosthesis
            effectively due to balance problems and reduced strength.
            The risk of the other limb being amputated is high.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            Amputation in an earner removes manual work capacity. The
            earner may need retraining for sedentary work. Without
            vocational rehabilitation, the earner may be permanently
            unemployed. The household loses income and may gain
            caregiving costs.
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver with a lower limb amputation may be unable to
            perform physical caregiving tasks (lifting, carrying, running
            after children). A caregiver with an upper limb amputation
            may be unable to prepare food, dress children, or manage
            hygiene tasks. The caregiving role is compromised.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#diabetes_mellitus
          comorbidity_pattern: frequent
          compounding_effect: >
            Diabetes is a leading cause of amputation due to peripheral
            vascular disease and neuropathy. A person with diabetes-related
            amputation frequently has multiple comorbidities and is at
            high risk of further complications.
      environmental_interactions:
        - factor: displacement
          effect: >
            Displacement increases trauma risk (violence, accidents)
            and disrupts prosthetic services. A person with an amputation
            who is displaced may lose their prosthesis and be unable to
            access replacement or repair services.
        - factor: healthcare_access_gap
          effect: >
            Prosthetic services and rehabilitation are frequently
            unavailable in low-resource settings. A person with an
            amputation may have permanent disability simply because
            prosthetic and rehabilitation services are inaccessible,
            not because the amputation itself is untreatable.

    # -----------------------------------------------------------------------
    # CONGENITAL AND DEVELOPMENTAL CONDITIONS
    # -----------------------------------------------------------------------

    - id: congenital_heart_disease
      name: Congenital Heart Disease
      category: congenital_developmental
      family: congenital_conditions
      description: >
        Structural abnormalities of the heart present from birth. The
        severity ranges from minor defects that cause no symptoms to
        severe defects that cause heart failure, cyanosis (bluish skin),
        and death without surgery. Many congenital heart defects can be
        corrected or palliated with surgery. In low-resource settings,
        children with severe defects may not survive infancy without
        surgical intervention.
      body_systems_affected: [cardiovascular, respiratory, metabolic, neurological]
      typical_onset_pattern: birth
      typical_progression: stable_or_progressive
      treatability: manageable_with_treatment
      reversibility: partially_reversible
      fatal_if_untreated: true
      disability_potential: high
      condition_caregiver_intensity: high
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: partial
          impact_mechanism: >
            Children with severe congenital heart disease have reduced
            exercise tolerance, poor growth, and fatigue. They may be
            unable to keep up with peers in physical play. After
            successful surgery, many children achieve normal physical
            capacity. Without surgery, the limitation is progressive.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#cognitive_functioning
          typical_impact_level: functional
          impact_mechanism: >
            Chronic low oxygen levels (cyanosis) may impair brain
            development. Children with uncorrected severe defects may
            have reduced cognitive development. After correction, catch-up
            development is possible but may be incomplete.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#independent_living
          typical_impact_level: functional
          impact_mechanism: >
            Children with congenital heart disease require caregiver
            management of medication, feeding, and activity restriction.
            After successful surgery, independence is typically achieved.
            Without surgery, the dependency is sustained and may increase
            as the condition worsens.
          reversible_with_treatment: partial
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Children with congenital heart disease require sustained
            caregiving for medication administration, feeding (frequent
            small feeds due to poor tolerance), activity monitoring,
            and medical appointment coordination. The caregiving demand
            is high and may intensify if the child develops complications.
          typically_temporary: false
        - dependency_ref: dependency.yaml#financial
          trigger_condition: >
            Surgical correction requires significant expense. In low-resource
            settings, the cost of surgery and travel to a cardiac center
            may be beyond the household's capacity. The financial
            dependency is often the barrier to treatment rather than the
            medical impossibility.
          typically_temporary: false
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#infant
          manifestation: >
            Congenital heart disease is typically diagnosed in infancy
            when cyanosis, poor feeding, or failure to thrive becomes
            apparent. The infant requires urgent evaluation. Without
            intervention, severe defects cause heart failure and death
            in the first months of life.
        - stage_ref: lifecycle-stages.yaml#school_age_child
          manifestation: >
            School-age children with uncorrected defects have reduced
            exercise tolerance, poor growth, and may be unable to attend
            school regularly. After successful surgery, most children
            can attend school and participate in normal activities with
            some restrictions.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver for a child with congenital heart disease faces
            sustained, high-intensity caregiving demands. The caregiver
            must manage frequent feeding, medication, and activity
            restrictions. The emotional burden of knowing the child needs
            surgery that may be unaffordable is profound. The caregiver
            may be unable to work or care for other children.
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            An earner with congenital heart disease is typically a child
            or young adult who has not yet entered the workforce. The
            condition affects future earning potential rather than current
            income. However, the cost of treatment may divert household
            resources from other needs.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#developmental_delay
          comorbidity_pattern: frequent
          compounding_effect: >
            Children with severe congenital heart disease frequently have
            developmental delay due to chronic hypoxia and reduced
            physical activity. The combination of cardiac and developmental
            needs increases the caregiving burden.
      environmental_interactions:
        - factor: altitude
          effect: >
            High altitude reduces oxygen availability and worsens cyanosis
            in children with congenital heart disease. Children with
            severe defects may be unable to live at high altitude.
        - factor: healthcare_access_gap
          effect: >
            Congenital heart disease outcomes depend entirely on surgical
            access. In areas without pediatric cardiac surgery, children
            with severe defects face inevitable mortality. The gap between
            medical possibility and access reality is the primary humanitarian
            concern.

    - id: intellectual_disability
      name: Intellectual Disability
      category: congenital_developmental
      family: developmental_conditions
      description: >
        A condition of significantly below-average intellectual functioning
        and limited adaptive behavior, present from early childhood and
        persisting throughout life. Intellectual disability affects learning,
        reasoning, problem-solving, and the ability to perform daily activities
        independently. The severity ranges from mild (can learn practical
        skills and achieve partial independence) to profound (requires total
        care). The condition is permanent and not curable, though education
        and support can significantly improve functioning.
      body_systems_affected: [neurological, developmental]
      typical_onset_pattern: early_childhood
      typical_progression: stable
      treatability: manageable_without_treatment
      reversibility: irreversible
      fatal_if_untreated: false
      disability_potential: high
      condition_caregiver_intensity: high
      affected_capability_domains:
        - domain_ref: capabilities.yaml#cognitive_functioning
          typical_impact_level: minimal
          impact_mechanism: >
            Intellectual disability is defined by reduced cognitive capacity.
            The person has limited ability to learn, reason, plan, and
            solve problems. The degree of limitation varies by severity.
            Mild intellectual disability permits learning of practical
            skills; profound intellectual disability prevents all independent
            cognitive function.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#independent_living
          typical_impact_level: partial
          impact_mechanism: >
            The capacity for independent living depends on severity.
            A person with mild intellectual disability may achieve partial
            independence with support. A person with severe intellectual
            disability requires full assistance with all activities of
            daily living. The dependency is lifelong and does not change.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#communication
          typical_impact_level: partial
          impact_mechanism: >
            Communication ability varies widely. Some people with
            intellectual disability have fluent speech; others are
            non-verbal. Communication may require augmentative methods.
            The key consideration is that the person has a right to
            communicate and be understood, regardless of their communication mode.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#vocational
          typical_impact_level: partial
          impact_mechanism: >
            Vocational capacity depends on severity. People with mild
            intellectual disability can perform structured, supervised
            work. People with moderate intellectual disability may
            perform simple tasks in sheltered settings. People with
            severe or profound disability are typically unable to work.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#self_advocacy
          typical_impact_level: minimal
          impact_mechanism: >
            Self-advocacy capacity is limited. The person may be unable
            to understand their rights, navigate institutional systems,
            or protect themselves from exploitation. Legal guardianship
            or supported decision-making is typically required.
          reversible_with_treatment: false
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Intellectual disability creates lifelong caregiving dependency.
            The intensity depends on severity. Even people with mild
            intellectual disability require sustained support for complex
            tasks (finances, healthcare navigation, legal matters). The
            dependency is permanent and does not diminish over time.
          typically_temporary: false
        - dependency_ref: dependency.yaml#decision_making
          trigger_condition: >
            Decision-making dependency is created by the condition itself.
            The person requires support for major life decisions. In some
            cases, legal guardianship is required. The dependency is
            lifelong and may intensify as the person's parents age and
            can no longer provide support.
          typically_temporary: false
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#infant
          manifestation: >
            Intellectual disability is rarely diagnosed in infancy unless
            there are severe associated physical abnormalities. The infant
            may have delayed developmental milestones. Early identification
            allows early intervention that can improve developmental outcomes.
        - stage_ref: lifecycle-stages.yaml#early_childhood
          manifestation: >
            Intellectual disability becomes apparent in early childhood
            when developmental milestones are missed. The child requires
            early educational and therapeutic intervention to maximize
            developmental potential. In resource-limited settings, these
            interventions are frequently unavailable.
        - stage_ref: lifecycle-stages.yaml#school_age_child
          manifestation: >
            School-age children with intellectual disability require
            special education or significant classroom support. In
            mainstream schools without support, the child may be excluded,
            bullied, or simply left behind. Educational access is a
            critical determinant of future functioning.
        - stage_ref: lifecycle-stages.yaml#adult
          manifestation: >
            Adults with intellectual disability face challenges in
            employment, independent living, and social participation.
            The transition from parental care to adult services is
            frequently unsupported. The adult may be capable of
            supervised work but lack access to appropriate opportunities.
        - stage_ref: lifecycle-stages.yaml#elderly
          manifestation: >
            Elderly persons with intellectual disability frequently
            outlive their parents who were their lifelong caregivers.
            The loss of parental support creates a crisis if no substitute
            care arrangement exists. The elderly person with intellectual
            disability is at high risk of institutionalization or neglect.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver for a person with intellectual disability provides
            lifelong care that does not diminish over time. The caregiver's
            own aging, illness, or death creates a structural crisis for
            the dependent. The family must plan for substitute care, which
            is frequently unavailable or unaffordable. The caregiver burden
            is among the highest and most sustained of any condition.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#epilepsy
          comorbidity_pattern: frequent
          compounding_effect: >
            Epilepsy is common in people with intellectual disability,
            particularly in severe cases. The combination creates additional
            safety risks and caregiving demands. Seizure management may
            be complicated by the person's limited ability to report
            symptoms or adhere to medication regimens.
        - condition_ref: health-conditions.yaml#cerebral_palsy
          comorbidity_pattern: frequent
          compounding_effect: >
            Intellectual disability and cerebral palsy frequently co-occur.
            The combination creates both cognitive and physical limitations
            that compound the caregiving burden and the person's dependency.
      environmental_interactions:
        - factor: educational_access_gap
          effect: >
            The functioning of a person with intellectual disability is
            heavily influenced by access to education and training.
            In contexts without special education or inclusive schooling,
            the person's potential is unrealized and the disability
            impact is magnified.
        - factor: social_stigma
          effect: >
            Stigma surrounding intellectual disability leads to social
            exclusion, reduced educational access, and limited employment
            opportunities. The social environment creates disability
            beyond the biological condition itself.

    - id: cerebral_palsy
      name: Cerebral Palsy
      category: congenital_developmental
      family: developmental_conditions
      description: >
        A group of permanent movement disorders caused by abnormal brain
        development or early brain injury. Cerebral palsy affects muscle
        tone, coordination, and movement. It may also affect sensation,
        vision, hearing, and cognition. The condition is non-progressive
        — the brain damage does not worsen — but the physical effects
        may change over time as the person grows. Cerebral palsy is
        lifelong and requires sustained therapeutic and caregiving support.
      body_systems_affected: [neurological, musculoskeletal, sensory, gastrointestinal]
      typical_onset_pattern: early_childhood
      typical_progression: stable
      treatability: manageable_without_treatment
      reversibility: irreversible
      fatal_if_untreated: false
      disability_potential: high
      condition_caregiver_intensity: high
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: minimal
          impact_mechanism: >
            Cerebral palsy causes a wide range of mobility limitations
            from mild gait abnormalities to complete inability to walk.
            The person may use a wheelchair, walker, or other assistive
            devices. Spasticity and contractures may worsen over time
            despite the condition being non-progressive.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#independent_living
          typical_impact_level: partial
          impact_mechanism: >
            Independent living capacity depends on the severity of motor
            impairment and the presence of associated cognitive deficits.
            A person with mild cerebral palsy and normal cognition may
            achieve independent living with adaptations. A person with
            severe cerebral palsy requires full assistance for all activities.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#communication
          typical_impact_level: partial
          impact_mechanism: >
            Speech may be affected by motor control problems affecting
            the muscles of speech production. The person may have normal
            language understanding but difficulty expressing themselves
            verbally. Augmentative communication methods may be needed.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#cognitive_functioning
          typical_impact_level: functional
          impact_mechanism: >
            Cognitive function is frequently normal in cerebral palsy,
            but intellectual disability may co-occur. The physical
            disability should not be assumed to indicate cognitive
            impairment. Assessment of cognitive function is essential.
          reversible_with_treatment: false
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#physical_support
          trigger_condition: >
            Physical support dependency is typically permanent and
            depends on the severity of motor impairment. The person may
            require assistance for mobility, transfers, positioning, and
            daily activities. The dependency does not change over time
            but may increase as the person grows and their body changes.
          typically_temporary: false
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Caregiving dependency is permanent and sustained. The caregiver
            must manage feeding (some children with cerebral palsy have
            swallowing difficulties), positioning, hygiene, medication,
            and therapeutic exercises. The caregiving demand is high and
            does not diminish as the child grows.
          typically_temporary: false
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#infant
          manifestation: >
            Cerebral palsy is typically diagnosed in infancy when
            developmental motor delays become apparent. The infant may
            have abnormal muscle tone (too stiff or too floppy) and
            delayed motor milestones. Early identification allows early
            intervention that can improve outcomes.
        - stage_ref: lifecycle-stages.yaml#school_age_child
          manifestation: >
            School-age children with cerebral palsy require educational
            support, assistive devices, and accessible environments. The
            child may be cognitively capable but physically unable to
            access standard education. Exclusion from school is common
            in resource-limited settings.
        - stage_ref: lifecycle-stages.yaml#adult
          manifestation: >
            Adults with cerebral palsy face the challenge of transitioning
            from pediatric to adult services. The physical effects of the
            condition may worsen with age (pain, fatigue, contractures)
            even though the brain damage is non-progressive. Employment
            access is limited by physical barriers and employer attitudes.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver for a child with cerebral palsy provides sustained,
            high-intensity physical care. The caregiver must manage lifting,
            positioning, feeding assistance, and therapeutic exercises.
            The physical demands of caregiving may injure the caregiver's
            own back and joints. The caregiver may be unable to work or
            care for other children. The burden is lifelong and intensifies
            as the child grows heavier.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#intellectual_disability
          comorbidity_pattern: frequent
          compounding_effect: >
            Intellectual disability co-occurs in a significant proportion
            of people with cerebral palsy. The combination of physical
            and cognitive limitations creates a higher dependency burden
            than either condition alone.
        - condition_ref: health-conditions.yaml#epilepsy
          comorbidity_pattern: frequent
          compounding_effect: >
            Epilepsy is common in cerebral palsy. Seizures add safety
            risks and caregiving demands to the already high burden of
            physical care.
        - condition_ref: health-conditions.yaml#visual_impairment
          comorbidity_pattern: frequent
          compounding_effect: >
            Visual impairment is common in cerebral palsy due to brain
            damage affecting visual processing. The combination of motor
            and visual impairment significantly limits the person's
            interaction with the environment.
      environmental_interactions:
        - factor: physical_accessibility
          effect: >
            The functioning of a person with cerebral palsy is heavily
            dependent on physical accessibility. Inaccessible environments
            (stairs, narrow doorways, uneven terrain) create barriers
            that magnify the disability. Simple environmental modifications
            can significantly improve function.
        - factor: therapeutic_access
          effect: >
            Physical therapy, occupational therapy, and assistive devices
            are essential for maximizing function in cerebral palsy. In
            areas without these services, the person's potential is
            unrealized and the disability impact is magnified.

    - id: developmental_delay
      name: Developmental Delay
      category: congenital_developmental
      family: developmental_conditions
      description: >
        A condition in which a child achieves developmental milestones
        (motor, speech, cognitive, social) later than expected. Developmental
        delay may be global (affecting all domains) or specific (affecting
        one domain). It may be caused by genetic conditions, prematurity,
        malnutrition, environmental deprivation, or unknown factors. Some
        children with developmental delay catch up to their peers; others
        have persistent deficits. Early identification and intervention are
        critical for improving outcomes.
      body_systems_affected: [neurological, developmental]
      typical_onset_pattern: early_childhood
      typical_progression: stable_or_improving
      treatability: manageable_without_treatment
      reversibility: partially_reversible
      fatal_if_untreated: false
      disability_potential: moderate
      condition_caregiver_intensity: moderate
      affected_capability_domains:
        - domain_ref: capabilities.yaml#cognitive_functioning
          typical_impact_level: partial
          impact_mechanism: >
            Developmental delay affects the acquisition of age-appropriate
            cognitive skills. The child may have reduced language,
            reasoning, and learning capacity compared to peers. With
            early intervention, many children show significant improvement.
            Without support, the gap between the child and peers may widen.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#communication
          typical_impact_level: partial
          impact_mechanism: >
            Speech and language development may be delayed. The child
            may communicate through gestures, sounds, or limited words
            rather than fluent speech. Early language stimulation can
            significantly improve outcomes.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: partial
          impact_mechanism: >
            Motor developmental delay affects sitting, standing, walking,
            and fine motor skills. The child may require physical therapy
            and assistive devices to achieve mobility milestones.
          reversible_with_treatment: partial
        - domain_ref: capabilities.yaml#social_participation
          typical_impact_level: partial
          impact_mechanism: >
            Social and play skills may be delayed, affecting the child's
            ability to interact with peers. The child may be excluded
            from play and social activities, which further reduces
            developmental stimulation.
          reversible_with_treatment: partial
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#developmental
          trigger_condition: >
            Developmental delay creates developmental dependency on the
            caregiver for stimulation, engagement, and structured learning.
            The caregiver must provide enhanced developmental support that
            goes beyond basic caregiving. The quality of caregiver
            engagement directly affects the child's developmental trajectory.
          typically_temporary: false
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            The child with developmental delay may require additional
            caregiving support for activities that peers can do independently.
            The caregiver may need to assist with feeding, dressing, and
            toileting beyond the typical age for these skills.
          typically_temporary: true
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#toddler
          manifestation: >
            Developmental delay is typically first noticed in the toddler
            period when motor and language milestones are missed. The
            toddler may not walk or speak when expected. Early identification
            allows early intervention during a critical developmental window.
        - stage_ref: lifecycle-stages.yaml#early_childhood
          manifestation: >
            In early childhood, the gap between the delayed child and peers
            becomes more apparent. The child may be unable to participate
            in preschool activities. Early educational intervention can
            significantly improve outcomes. Without intervention, the child
            may enter school unprepared and fall further behind.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver for a child with developmental delay must provide
            enhanced stimulation, structured play, and developmental
            activities beyond normal caregiving. The caregiver may need
            to learn therapeutic techniques and advocate for services.
            The burden is sustained but may decrease if the child catches up.
            The caregiver may blame themselves or face family stigma.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#stunting
          comorbidity_pattern: frequent
          compounding_effect: >
            Stunting and developmental delay frequently co-occur. Chronic
            malnutrition impairs brain development and reduces the child's
            capacity to benefit from developmental stimulation. The
            combination requires both nutritional and developmental intervention.
        - condition_ref: health-conditions.yaml#iron_deficiency_anemia
          comorbidity_pattern: frequent
          compounding_effect: >
            Iron deficiency anemia impairs cognitive development and
            increases irritability, reducing the child's engagement with
            developmental activities. Correcting anemia may improve
            developmental progress.
      environmental_interactions:
        - factor: psychosocial_deprivation
          effect: >
            Environmental deprivation (lack of stimulation, caregiver
            unavailability, neglect) is a major cause of developmental
            delay. The condition may be reversible if the deprivation
            is addressed early. This distinguishes environmental developmental
            delay from biological causes.
        - factor: therapeutic_access
          effect: >
            Access to early intervention services (physical therapy,
            speech therapy, special education) significantly determines
            outcomes. In areas without these services, developmental delay
            is more likely to result in permanent disability.

    - id: cleft_lip_palate
      name: Cleft Lip and Palate
      category: congenital_developmental
      family: congenital_conditions
      description: >
        A congenital condition in which the lip and/or roof of the mouth
        do not fuse properly during fetal development. Cleft lip and palate
        affect feeding, speech, hearing, and appearance. The condition is
        correctable with surgery, typically in the first year of life for
        the lip and in early childhood for the palate. Without surgery,
        the child faces feeding difficulties, speech problems, ear infections,
        and social stigma. In low-resource settings, many children do not
        receive timely surgical correction.
      body_systems_affected: [craniofacial, auditory, gastrointestinal, respiratory]
      typical_onset_pattern: birth
      typical_progression: stable
      treatability: manageable_with_treatment
      reversibility: partially_reversible
      fatal_if_untreated: false
      disability_potential: moderate
      condition_caregiver_intensity: moderate
      affected_capability_domains:
        - domain_ref: capabilities.yaml#communication
          typical_impact_level: partial
          impact_mechanism: >
            Cleft palate affects speech production. The person may have
            hypernasal speech that is difficult to understand. After
            surgical correction and speech therapy, most people achieve
            intelligible speech. Without treatment, communication is
            permanently impaired.
          reversible_with_treatment: true
        - domain_ref: capabilities.yaml#social_participation
          typical_impact_level: partial
          impact_mechanism: >
            Visible facial difference and speech difficulties cause social
            stigma and exclusion. Children with uncorrected clefts may
            be bullied, excluded from play, and denied educational
            opportunities. The social impact may exceed the physical impact.
          reversible_with_treatment: true
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Infants with cleft lip and palate require specialized feeding
            techniques and frequent ear infection monitoring. After surgery,
            the caregiving demand reduces. The dependency is temporary
            but intense in the first years of life.
          typically_temporary: true
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#infant
          manifestation: >
            Cleft lip and palate is visible at birth. The infant requires
            specialized feeding support and monitoring for ear infections.
            Surgical correction is possible but frequently delayed in
            low-resource settings. Delays worsen speech and feeding outcomes.
        - stage_ref: lifecycle-stages.yaml#school_age_child
          manifestation: >
            School-age children with uncorrected clefts face severe social
            stigma and educational exclusion. Even after surgical correction,
            speech therapy may be needed. Children who receive timely surgery
            and therapy typically achieve normal speech and social integration.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver for an infant with cleft lip and palate must learn
            specialized feeding techniques and manage the emotional burden
            of the child's visible difference. The family may face stigma
            and blame from the community. After surgery, the caregiving
            burden decreases significantly.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#hearing_impairment
          comorbidity_pattern: frequent
          compounding_effect: >
            Children with cleft palate frequently have hearing problems
            due to recurrent ear infections and fluid accumulation. The
            hearing impairment compounds the communication difficulty and
            may affect language development.
      environmental_interactions:
        - factor: surgical_access
          effect: >
            The outcome of cleft lip and palate depends entirely on timely
            surgical access. In areas without surgical services, the child
            faces permanent disability from a condition that is fully
            correctable with surgery. The humanitarian gap is access, not
            medical capability.
        - factor: social_stigma
          effect: >
            Social stigma surrounding cleft lip and palate is severe in many
            cultures. The child may be hidden, excluded, or blamed. The
            family may experience shame and social isolation. The social
            environment creates disability beyond the physical condition.

    # -----------------------------------------------------------------------
    # SENSORY AND PHYSICAL DISABILITIES
    # -----------------------------------------------------------------------

    - id: visual_impairment
      name: Visual Impairment
      category: sensory_physical_disability
      family: sensory_disabilities
      description: >
        A permanent or long-term reduction in vision that is not correctable
        by glasses or contact lenses. Visual impairment ranges from partial
        sight (low vision) to total blindness. The condition may be
        congenital or acquired through disease, injury, or degenerative
        process. The impact depends on the degree of vision loss, the age
        of onset, and the availability of assistive devices and training.
      body_systems_affected: [ophthalmological, neurological]
      typical_onset_pattern: any_age
      typical_progression: stable
      treatability: manageable_without_treatment
      reversibility: irreversible
      fatal_if_untreated: false
      disability_potential: high
      condition_caregiver_intensity: low
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: partial
          impact_mechanism: >
            Visual impairment reduces safe mobility, particularly in
            unfamiliar environments. The person may require a cane,
            guide assistance, or a guide dog. With training and familiar
            environments, many people with visual impairment achieve
            functional mobility. Outdoor mobility in unsafe environments
            is particularly challenging.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#communication
          typical_impact_level: partial
          impact_mechanism: >
            Visual impairment affects reading, facial expression recognition,
            and non-verbal communication. The person may use Braille, screen
            readers, or audio formats for reading. Spoken communication is
            typically unaffected. The person may miss visual cues in social
            interaction.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#literacy
          typical_impact_level: partial
          impact_mechanism: >
            Reading requires adaptation (Braille, audio, large print).
            In low-resource settings, these adaptations are frequently
            unavailable. The person may be unable to access written
            information, forms, or educational materials.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: partial
          impact_mechanism: >
            Employment is constrained by the nature of the work and the
            availability of accommodations. Many occupations are accessible
            to people with visual impairment. However, in contexts where
            accommodations are unavailable, employment may be severely
            limited. Blindness is frequently a barrier to employment in
            low-resource settings.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#social_participation
          typical_impact_level: partial
          impact_mechanism: >
            Social participation may be reduced due to mobility barriers,
            difficulty recognizing people, and social stigma. The person
            may be excluded from activities that assume sight. With support
            and inclusion, many people with visual impairment maintain
            active social lives.
          reversible_with_treatment: false
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#physical_support
          trigger_condition: >
            Physical support dependency depends on the degree of vision
            loss and the environment. A person with total blindness in
            a familiar home environment may have minimal physical support
            needs. The same person in an unfamiliar or unsafe environment
            may require full physical support for mobility.
          typically_temporary: false
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#infant
          manifestation: >
            Congenital visual impairment affects the infant's developmental
            trajectory. The infant cannot learn through visual observation
            and must develop through tactile and auditory means. Early
            stimulation and intervention are critical for developmental
            outcomes. The caregiver must provide enhanced verbal and
            tactile engagement.
        - stage_ref: lifecycle-stages.yaml#school_age_child
          manifestation: >
            School-age children with visual impairment require accessible
            educational materials and inclusive teaching methods. In
            mainstream schools without support, the child may be unable
            to participate. Educational exclusion is common in low-resource
            settings. Special schools are rare and may require family separation.
        - stage_ref: lifecycle-stages.yaml#elderly
          manifestation: >
            Elderly persons with visual impairment (typically from cataracts,
            glaucoma, or macular degeneration) face compounding challenges.
            Visual impairment in the elderly increases fall risk, reduces
            independence, and accelerates social isolation. The condition
            may be correctable (cataracts) but the elderly person may not
            have access to surgery.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            Visual impairment in an earner may reduce employment capacity
            depending on the occupation. In many contexts, blindness is
            equated with total incapacity and the person is denied
            employment regardless of actual capability. The structural
            impact is as much social as physical.
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver with visual impairment may be able to provide
            emotional and verbal care but may have difficulty with tasks
            requiring visual monitoring (watching a mobile toddler,
            identifying illness signs, preparing food safely). The impact
            on caregiving depends on the specific tasks and the degree of
            vision loss.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#diabetes_mellitus
          comorbidity_pattern: frequent
          compounding_effect: >
            Diabetes is a leading cause of acquired visual impairment
            (diabetic retinopathy). The combination of diabetes and visual
            impairment creates a high management burden because the person
            must manage their diabetes with reduced visual capacity for
            medication reading, glucose monitoring, and injection administration.
      environmental_interactions:
        - factor: physical_environment
          effect: >
            The impact of visual impairment is heavily determined by the
            physical environment. Unsafe environments (unmarked obstacles,
            open drains, uneven paths) create severe barriers. Simple
            environmental modifications (tactile markings, clear pathways,
            audible signals) can dramatically improve function.
        - factor: healthcare_access_gap
          effect: >
            Many causes of visual impairment are treatable (cataracts,
            refractive errors, corneal conditions). In areas without eye
            care, people suffer permanent blindness from conditions that
            are correctable with simple surgery or glasses. The humanitarian
            gap is access, not medical impossibility.

    - id: hearing_impairment
      name: Hearing Impairment
      category: sensory_physical_disability
      family: sensory_disabilities
      description: >
        A permanent or long-term reduction in hearing that is not correctable
        by medical intervention. Hearing impairment ranges from mild
        (difficulty hearing quiet sounds) to profound (total deafness).
        The condition may be congenital or acquired through infection,
        injury, noise exposure, or aging. The impact depends on the degree
        of hearing loss, the age of onset, and the availability of hearing
        aids, sign language, and educational support.
      body_systems_affected: [auditory, neurological, speech]
      typical_onset_pattern: any_age
      typical_progression: stable
      treatability: manageable_without_treatment
      reversibility: partially_reversible
      fatal_if_untreated: false
      disability_potential: moderate
      condition_caregiver_intensity: low
      affected_capability_domains:
        - domain_ref: capabilities.yaml#communication
          typical_impact_level: partial
          impact_mechanism: >
            Hearing impairment affects spoken communication. The person
            may have difficulty understanding speech, particularly in noisy
            environments. With hearing aids, communication may be functional.
            Without hearing aids, the person may rely on lip-reading, sign
            language, or written communication. The communication barrier
            is environmental as much as individual — it depends on whether
            others are willing to adapt their communication.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#language
          typical_impact_level: partial
          impact_mechanism: >
            Children with congenital hearing impairment require early
            language exposure (sign language or auditory stimulation) to
            develop language. Without early language access, the child
            may have permanent language deprivation with cascading
            cognitive and social consequences. Adults with acquired hearing
            loss retain their language but may struggle with communication access.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#social_participation
          typical_impact_level: partial
          impact_mechanism: >
            Social participation is reduced when communication barriers
            prevent interaction. The person may avoid social situations
            where they cannot follow conversations. Isolation and loneliness
            are common, particularly in older adults with hearing loss.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: functional
          impact_mechanism: >
            Many occupations are accessible to people with hearing impairment.
            However, in contexts where communication accommodations are
            unavailable, employment may be limited. The person may be
            denied employment due to perceived communication limitations
            rather than actual incapacity.
          reversible_with_treatment: false
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#emotional_support
          trigger_condition: >
            Hearing impairment, particularly in older adults, increases
            social isolation and emotional support needs. The person may
            feel excluded from family conversations and community activities.
            Emotional support from family members who can communicate
            effectively is important for wellbeing.
          typically_temporary: false
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#infant
          manifestation: >
            Congenital hearing impairment is rarely detected in infancy
            without screening. The infant appears normal but does not
            respond to sound. Early detection (before 6 months) allows
            early language intervention that significantly improves
            outcomes. Without early detection, the child may experience
            language deprivation during the critical language acquisition window.
        - stage_ref: lifecycle-stages.yaml#school_age_child
          manifestation: >
            School-age children with hearing impairment require educational
            support — hearing aids, FM systems, sign language interpretation,
            or placement in inclusive or special schools. In mainstream
            schools without support, the child is unable to follow instruction
            and falls behind academically. Educational exclusion is common.
        - stage_ref: lifecycle-stages.yaml#elderly
          manifestation: >
            Age-related hearing loss (presbycusis) is common and progressive.
            The elderly person may gradually withdraw from social
            interaction, leading to isolation and cognitive decline. Hearing
            loss in the elderly is frequently dismissed as normal aging and
            not addressed, accelerating social and cognitive deterioration.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver with hearing impairment may have difficulty
            responding to an infant's cries, hearing a child's calls for
            help, or detecting danger sounds. The impact on caregiving
            depends on the degree of hearing loss and the availability
            of visual or vibratory monitoring alternatives.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#cleft_lip_palate
          comorbidity_pattern: frequent
          compounding_effect: >
            Children with cleft palate frequently have hearing problems
            due to recurrent ear infections and fluid accumulation. The
            combination of hearing impairment and speech difficulties
            creates a severe communication barrier.
        - condition_ref: health-conditions.yaml#cerebral_palsy
          comorbidity_pattern: frequent
          compounding_effect: >
            Hearing impairment co-occurs in some children with cerebral
            palsy. The combination of motor and hearing impairment limits
            the child's interaction with the environment and requires
            multi-modal communication approaches.
      environmental_interactions:
        - factor: noise_exposure
          effect: >
            Occupational and environmental noise exposure causes hearing
            impairment. People working in noisy environments (construction,
            manufacturing, agriculture) without hearing protection are at
            risk of noise-induced hearing loss.
        - factor: healthcare_access_gap
          effect: >
            Many causes of hearing impairment are preventable or treatable
            (ear infections, ear wax, perforations). In areas without
            ear care, people suffer permanent hearing loss from conditions
            that are correctable with simple interventions. The
            humanitarian gap is access, not medical impossibility.

    - id: lower_limb_physical_disability
      name: Lower Limb Physical Disability
      category: sensory_physical_disability
      family: physical_disabilities
      description: >
        A permanent or long-term impairment of lower limb function that
        limits walking, standing, or lower body movement. The condition
        may be congenital, caused by neurological conditions (cerebral palsy,
        polio, spina bifida), or acquired through injury, amputation, or
        disease. The impact depends on the degree of impairment and the
        availability of assistive devices (prosthetics, orthotics, wheelchairs,
        crutches) and environmental accessibility.
      body_systems_affected: [musculoskeletal, neurological, integumentary]
      typical_onset_pattern: any_age
      typical_progression: stable
      treatability: manageable_without_treatment
      reversibility: irreversible
      fatal_if_untreated: false
      disability_potential: high
      condition_caregiver_intensity: moderate
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: minimal
          impact_mechanism: >
            Lower limb disability prevents or severely limits walking.
            The person may use a wheelchair, crutches, or prosthesis.
            With proper assistive devices and accessible environments,
            many people achieve functional mobility. Without assistive
            devices, the person may be unable to move independently.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#independent_living
          typical_impact_level: partial
          impact_mechanism: >
            Independence depends on the environment. In an accessible
            home, the person may manage most daily activities independently.
            In an inaccessible environment, the person requires assistance
            for basic activities like bathing, toileting, and moving around
            the home. The disability is as much environmental as individual.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: partial
          impact_mechanism: >
            Employment is constrained by physical accessibility of the
            workplace and the nature of the work. Sedentary work is typically
            accessible. Manual labor and standing work are not. In contexts
            where workplace accommodations are unavailable, employment may
            be severely limited.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#household_management
          typical_impact_level: partial
          impact_mechanism: >
            Household tasks requiring standing, walking, or carrying
            are difficult. The person may be unable to perform tasks like
            cooking at a standard stove, fetching water, or cleaning.
            Environmental adaptations (lowered counters, seated work
            spaces) can enable household management.
          reversible_with_treatment: false
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#physical_support
          trigger_condition: >
            Physical support dependency depends on the degree of impairment
            and assistive device availability. A person with a prosthesis
            may have minimal physical support needs. A person without
            assistive devices in an inaccessible environment may require
            total physical support for all mobility.
          typically_temporary: false
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Caregiving needs depend on the environment and the person's
            capacity for self-care. In accessible settings, caregiving
            needs may be minimal. In inaccessible settings, the person
            may require daily assistance for basic activities.
          typically_temporary: false
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#school_age_child
          manifestation: >
            School-age children with lower limb disability require
            accessible school environments and inclusive education. In
            schools without accessibility, the child may be unable to
            attend or may be excluded from physical activities. Peer
            social integration depends on the school's inclusive culture.
        - stage_ref: lifecycle-stages.yaml#adult
          manifestation: >
            Adults with lower limb disability face employment barriers
            and environmental exclusion. The adult may be capable of
            productive work but denied access due to inaccessible
            workplaces and transport. Social participation is limited
            by inaccessible public spaces and transport.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            An earner with lower limb disability may be unable to perform
            manual labor but capable of sedentary work. The employment
            barrier is frequently environmental (inaccessible workplaces,
            transport) rather than individual incapacity. The household
            loses income if the earner cannot access suitable employment.
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver with lower limb disability may have difficulty
            performing physical caregiving tasks (lifting, carrying,
            running after children). However, the caregiver may be fully
            capable of emotional care, supervision, and communication.
            The impact depends on the specific caregiving tasks required.
      common_comorbidities:
      environmental_interactions:
        - factor: physical_accessibility
          effect: >
            The impact of lower limb disability is overwhelmingly determined
            by physical accessibility. Ramps, level surfaces, accessible
            transport, and adapted facilities enable independent function.
            Stairs, uneven terrain, and inaccessible transport create
            total dependence. The disability is primarily environmental.
        - factor: assistive_device_availability
          effect: >
            The availability of wheelchairs, prosthetics, and orthotics
            determines functional capacity. In low-resource settings,
            many people with lower limb disability lack assistive devices
            and are effectively imprisoned in their homes.

    - id: upper_limb_physical_disability
      name: Upper Limb Physical Disability
      category: sensory_physical_disability
      family: physical_disabilities
      description: >
        A permanent or long-term impairment of upper limb function that
        limits grasping, manipulation, or fine motor tasks. The condition
        may be congenital, caused by neurological conditions (cerebral palsy,
        stroke), or acquired through injury, amputation, or disease. Upper
        limb disability affects eating, dressing, hygiene, writing, and
        manual work. The impact depends on the degree of impairment and the
        availability of assistive devices and environmental adaptations.
      body_systems_affected: [musculoskeletal, neurological, integumentary]
      typical_onset_pattern: any_age
      typical_progression: stable
      treatability: manageable_without_treatment
      reversibility: irreversible
      fatal_if_untreated: false
      disability_potential: high
      condition_caregiver_intensity: moderate
      affected_capability_domains:
        - domain_ref: capabilities.yaml#independent_living
          typical_impact_level: partial
          impact_mechanism: >
            Upper limb disability affects self-care tasks requiring
            grasping and manipulation — eating, dressing, bathing,
            toileting. A person with one functional hand can typically
            manage self-care with adaptations. A person with no functional
            hands requires assistance for most self-care tasks. Assistive
            devices (adapted utensils, button hooks, reachers) can
            significantly improve independence.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: partial
          impact_mechanism: >
            Manual occupations are inaccessible. However, many sedentary
            occupations are accessible with minor accommodations. The
            employment barrier depends on the occupation and the availability
            of workplace accommodations. A person with upper limb disability
            may be fully capable of intellectual, communicative, and
            supervisory work.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#household_management
          typical_impact_level: partial
          impact_mechanism: >
            Household tasks requiring manual dexterity (cooking, cleaning,
            laundry, food preparation) are affected. The person may be
            unable to perform these tasks without assistance or adaptations.
            A person with one functional hand can typically manage with
            adaptations. A person with no functional hands requires help.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#caregiving
          typical_impact_level: partial
          impact_mechanism: >
            A caregiver with upper limb disability may be unable to perform
            physical caregiving tasks (lifting, dressing, feeding). However,
            the caregiver may be fully capable of emotional support,
            supervision, and verbal guidance. The impact depends on the
            specific caregiving tasks required.
          reversible_with_treatment: false
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Caregiving needs depend on the degree of impairment and the
            availability of assistive devices. A person with one
            functional hand typically requires minimal caregiving. A
            person with bilateral upper limb impairment requires daily
            assistance for eating, dressing, and hygiene.
          typically_temporary: false
        - dependency_ref: dependency.yaml#physical_support
          trigger_condition: >
            Physical support is typically minimal for upper limb disability
            because lower limb mobility is usually preserved. The person
            can typically walk and move independently. Physical support
            may be needed for specific tasks like carrying objects or
            using stairs with handrail limitations.
          typically_temporary: false
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#school_age_child
          manifestation: >
            School-age children with upper limb disability face challenges
            in writing, drawing, and manipulative classroom activities.
            The child may require assistive devices, adapted writing
            tools, or a scribe. Without accommodations, the child may
            be unable to complete schoolwork and may fall behind academically.
        - stage_ref: lifecycle-stages.yaml#adult
          manifestation: >
            Adults with upper limb disability may be fully capable of
            cognitive and supervisory work but excluded from manual labor.
            The employment barrier is occupational rather than global.
            The person may require vocational guidance to identify
            accessible occupations.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_earner
          impact_description: >
            An earner with upper limb disability may be unable to perform
            manual labor but capable of sedentary or supervisory work.
            In manual economies, the employment impact is severe. In
            service or knowledge economies, the impact may be minimal.
            The structural impact depends on the local economic context.
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver with upper limb disability may be unable to perform
            physical caregiving tasks (lifting, dressing, feeding). However,
            the caregiver may be fully capable of emotional care,
            supervision, and household management tasks that do not require
            manual dexterity. The impact depends on the specific tasks.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#cerebral_palsy
          comorbidity_pattern: frequent
          compounding_effect: >
            Upper limb impairment frequently co-occurs with cerebral palsy.
            The combination of upper limb motor impairment and potential
            cognitive or visual impairment creates a complex disability
            profile requiring multi-faceted support.
      environmental_interactions:
        - factor: assistive_device_availability
          effect: >
            The availability of adapted utensils, writing aids, prosthetics,
            and environmental controls significantly determines function.
            In low-resource settings, many people with upper limb disability
            lack these devices and are unable to perform daily tasks
            independently.
        - factor: physical_environment
          effect: >
            Simple environmental modifications (lever handles instead of
            knobs, adapted kitchen tools, accessible storage) can enable
            independent function. Without these adaptations, the person
            may require assistance for tasks they could perform independently.

    - id: multiple_disabilities
      name: Multiple Disabilities
      category: sensory_physical_disability
      family: physical_disabilities
      description: >
        The co-occurrence of two or more significant disabilities that create
        a combined impact greater than the sum of individual impacts.
        Multiple disabilities may involve any combination of physical,
        sensory, cognitive, and communication impairments. The interaction
        between disabilities creates unique challenges that are not
        addressed by services designed for single disabilities. The
        caregiving burden is typically the highest of any condition category.
      body_systems_affected: [multiple_systems]
      typical_onset_pattern: any_age
      typical_progression: varies_by_condition
      treatability: manageable_without_treatment
      reversibility: irreversible
      fatal_if_untreated: false
      disability_potential: high
      condition_caregiver_intensity: high
      affected_capability_domains:
        - domain_ref: capabilities.yaml#physical_mobility
          typical_impact_level: minimal
          impact_mechanism: >
            Multiple disabilities frequently include physical mobility
            impairment. The combination of physical limitation with other
            impairments (visual, cognitive, communication) creates a
            compounded mobility barrier. For example, a person who cannot
            walk and cannot see faces compounding challenges in navigating
            independently.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#cognitive_functioning
          typical_impact_level: minimal
          impact_mechanism: >
            Multiple disabilities frequently include cognitive impairment.
            The combination of cognitive limitation with physical or sensory
            impairment means the person may be unable to use compensatory
            strategies that a person with a single disability might employ.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#communication
          typical_impact_level: minimal
          impact_mechanism: >
            Multiple disabilities frequently include communication impairment.
            The person may be unable to speak, hear, or use manual communication.
            Communication may require specialized augmentative methods and
            significant caregiver interpretation. The communication barrier
            is severe and may prevent the person from expressing needs,
            preferences, or distress.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#independent_living
          typical_impact_level: minimal
          impact_mechanism: >
            Independent living is typically impossible with multiple
            disabilities. The person requires comprehensive assistance
            for all activities of daily living. The dependency is total
            and lifelong.
          reversible_with_treatment: false
        - domain_ref: capabilities.yaml#employment
          typical_impact_level: minimal
          impact_mechanism: >
            Employment is typically impossible without significant
            support and specialized sheltered work environments. The
            person may be unable to perform any productive work independently.
            However, with appropriate support, some people with multiple
            disabilities can perform structured, supervised tasks.
          reversible_with_treatment: false
      triggered_dependency_types:
        - dependency_ref: dependency.yaml#caregiving
          trigger_condition: >
            Multiple disabilities create the highest caregiving dependency
            of any condition. The caregiver must provide comprehensive
            assistance for all activities of daily living, communication
            support, medical management, and safety monitoring. The caregiving
            demand is total, lifelong, and does not diminish over time.
          typically_temporary: false
        - dependency_ref: dependency.yaml#physical_support
          trigger_condition: >
            Physical support dependency is total. The person requires
            assistance for all mobility, transfers, positioning, and physical
            tasks. The dependency is permanent and intensifies as the
            person grows or ages.
          typically_temporary: false
      characteristic_lifecycle_manifestations:
        - stage_ref: lifecycle-stages.yaml#infant
          manifestation: >
            Infants with multiple disabilities are frequently identified
            early due to multiple visible or functional abnormalities. The
            infant requires intensive, multi-disciplinary care. The family's
            emotional and economic burden begins immediately and is sustained.
        - stage_ref: lifecycle-stages.yaml#school_age_child
          manifestation: >
            School-age children with multiple disabilities require
            specialized education, therapeutic services, and comprehensive
            care. Inclusive education is typically impossible without
            significant support. Special schools are rare and may require
            family separation. The child may be excluded from education entirely.
        - stage_ref: lifecycle-stages.yaml#adult
          manifestation: >
            Adults with multiple disabilities face the challenge of
            transitioning from parental care to adult services. The
            parents who have been lifelong caregivers may be aging and
            unable to continue. The adult may have no employment capacity
            and no independent living capacity. The risk of institutionalization
            or neglect is high when parental care ends.
      family_role_impact:
        - role_ref: family-structure.yaml#support_roles.primary_caregiver
          impact_description: >
            A caregiver for a person with multiple disabilities provides
            the highest-intensity, most sustained caregiving of any
            condition. The caregiver's own life, health, employment, and
            social relationships are frequently sacrificed. The caregiver
            may be unable to work or care for other children. The family
            may be impoverished by the caregiving demands. When the caregiver
            ages or becomes ill, there is frequently no substitute care
            available, creating a crisis.
      common_comorbidities:
        - condition_ref: health-conditions.yaml#intellectual_disability
          comorbidity_pattern: frequent
          compounding_effect: >
            Intellectual disability frequently co-occurs with physical
            and sensory disabilities. The combination creates a higher
            dependency burden than any single disability. The person's
            ability to learn compensatory strategies is reduced.
        - condition_ref: health-conditions.yaml#epilepsy
          comorbidity_pattern: frequent
          compounding_effect: >
            Epilepsy is common in people with multiple disabilities,
            particularly those with neurological involvement. Seizures add
            safety risks and caregiving demands to an already high burden.
      environmental_interactions:
        - factor: comprehensive_service_access
          effect: >
            The functioning of a person with multiple disabilities depends
            on access to comprehensive services — medical, therapeutic,
            educational, social, and respite care. In low-resource settings,
            these services are typically unavailable. The person and family
            are left to manage alone. The disability impact is magnified
            by the absence of support services rather than by the conditions
            themselves.
        - factor: physical_accessibility
          effect: >
            Physical accessibility is essential for people with multiple
            disabilities who use wheelchairs or require assistance. Inaccessible
            environments imprison the person in their home and prevent
            participation in education, healthcare, and community life.

  # =========================================================================
  # PART 4: CONDITION ATTRIBUTES REFERENCE
  # =========================================================================
  # Formal definitions of the attribute vocabulary used in Part 3.
  # These are the controlled values for condition properties.
  # =========================================================================

  condition_attributes_reference:

    typical_onset_pattern:
      description: The lifecycle stage or age period when the condition typically first appears.
      values:
        - id: birth
          label: Birth
          description: Present at birth or diagnosed immediately after birth.
        - id: infancy
          label: Infancy
          description: First year of life.
        - id: early_childhood
          label: Early Childhood
          description: Ages 1–5 years.
        - id: childhood
          label: Childhood
          description: Ages 5–12 years.
        - id: adolescence
          label: Adolescence
          description: Ages 12–18 years.
        - id: young_adulthood
          label: Young Adulthood
          description: Ages 18–25 years.
        - id: adulthood
          label: Adulthood
          description: Ages 25–60 years.
        - id: older_adulthood
          label: Older Adulthood
          description: Ages 60–75 years.
        - id: any_age
          label: Any Age
          description: Can occur at any point across the lifecycle.
      note: >
        These are typical patterns, not absolute rules. Conditions may
        occur outside their typical onset pattern. The pattern informs
        lifecycle-aware risk reasoning but does not restrict diagnosis.

    typical_progression:
      description: The natural history of the condition without intervention.
      values:
        - id: improving
          label: Improving
          description: The condition typically resolves or improves spontaneously over time.
        - id: stable
          label: Stable
          description: The condition remains at a consistent level without significant change.
        - id: stable_if_managed
          label: Stable if Managed
          description: The condition remains stable with appropriate management but may progress without it.
        - id: stable_after_acute
          label: Stable After Acute
          description: The condition is acute initially, then stabilizes at a residual level.
        - id: progressive
          label: Progressive
          description: The condition worsens over time in the absence of effective intervention.
        - id: progressive_if_untreated
          label: Progressive if Untreated
          description: The condition worsens without treatment but may be stabilized or reversed with treatment.
        - id: episodic
          label: Episodic
          description: The condition occurs in discrete episodes with recovery or partial recovery between episodes.
        - id: relapsing_remitting
          label: Relapsing-Remitting
          description: The condition alternates between periods of activity and remission.
        - id: stable_or_improving
          label: Stable or Improving
          description: The condition may remain stable or improve with intervention; the trajectory is variable.
        - id: stable_or_progressive
          label: Stable or Progressive
          description: The condition may remain stable or worsen; the trajectory is unpredictable.
      note: >
        Progression describes the biological trajectory. The actual
        trajectory for a specific person depends on treatment access,
        comorbidities, and environmental factors. The Risk Domain uses
        this attribute as an input to trajectory prediction.

    treatability:
      description: The potential for medical or therapeutic intervention to alter the condition's course or severity.
      values:
        - id: curable
          label: Curable
          description: The condition can be eliminated with appropriate treatment. Full recovery is possible.
        - id: manageable_with_treatment
          label: Manageable with Treatment
          description: The condition cannot be cured but can be controlled or significantly improved with sustained treatment. The person can maintain function with ongoing management.
        - id: manageable_without_treatment
          label: Manageable without Treatment
          description: The condition cannot be cured but can be managed through supportive care, environmental adaptation, or rehabilitation without ongoing medical intervention.
        - id: unpreventable
          label: Unpreventable
          description: The condition cannot be prevented or reversed. Management focuses on comfort and quality of life.
        - id: terminal
          label: Terminal
          description: The condition will result in death regardless of intervention. Management focuses on palliation and quality of life.
      note: >
        Treatability is a clinical property, not an operational instruction.
        It informs reasoning about whether absence of treatment represents
        a gap or a structural reality. A curable condition without treatment
        access is a different risk profile from a terminal condition.

    reversibility:
      description: Whether the condition's effects can be undone, and under what conditions.
      values:
        - id: reversible_spontaneously
          label: Reversible Spontaneously
          description: The condition resolves without intervention.
        - id: reversible_with_treatment
          label: Reversible with Treatment
          description: The condition resolves or improves significantly with appropriate intervention.
        - id: partially_reversible
          label: Partially Reversible
          description: Some aspects of the condition improve with intervention, but permanent effects remain.
        - id: irreversible
          label: Irreversible
          description: The condition and its effects are permanent and cannot be undone.
      note: >
        Reversibility informs capability trajectory reasoning. A reversible
        condition with treatment access suggests a temporary capability gap.
        An irreversible condition suggests a permanent adaptation need.

    disability_potential:
      description: The likelihood that the condition will cause permanent functional limitation if not properly managed.
      values:
        - id: none
          label: None
          description: The condition does not typically cause permanent disability.
        - id: low
          label: Low
          description: The condition rarely causes permanent disability; most people recover fully.
        - id: moderate
          label: Moderate
          description: The condition may cause permanent disability in some cases, particularly without treatment or with complications.
        - id: high
          label: High
          description: The condition frequently causes permanent disability, even with treatment. The disability may be severe.
      note: >
        Disability potential is a population-level estimate, not a prediction
        for an individual. The Risk Domain uses this as an input to
        disability risk assessment, not as a definitive outcome.

    condition_caregiver_intensity:
      description: The typical intrinsic demand a condition places on family caregivers, independent of the specific household situation.
      values:
        - id: none
          label: None
          description: The condition does not typically require caregiving support.
        - id: low
          label: Low
          description: The condition requires minimal caregiving — occasional assistance or monitoring.
        - id: moderate
          label: Moderate
          description: The condition requires regular caregiving — daily assistance with some tasks or sustained monitoring.
        - id: high
          label: High
          description: The condition requires intensive, sustained caregiving — daily assistance with multiple tasks, constant monitoring, or total care.
      note: >
        This attribute describes the condition's intrinsic demand, not
        the actual burden experienced by a specific caregiver. The actual
        burden depends on the caregiver's own capacity, the number of
        dependents, and the availability of support. See family-structure.yaml
        for situational caregiver burden assessment.

    comorbidity_pattern:
      description: The frequency with which two conditions co-occur.
      values:
        - id: frequent
          label: Frequent
          description: The two conditions co-occur in a significant proportion of cases. Screening for one should prompt consideration of the other.
        - id: occasional
          label: Occasional
          description: The two conditions co-occur in some cases but are not strongly associated.
        - id: rare
          label: Rare
          description: The two conditions occasionally co-occur but the association is not clinically significant.

