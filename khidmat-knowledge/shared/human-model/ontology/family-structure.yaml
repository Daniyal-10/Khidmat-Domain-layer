# =============================================================================
# Khidmat Shared Human Model — Family Structure Ontology
# =============================================================================
ontology_version: "1.1"
authority: "shared/human-model/"
owner_domain: "Shared Human Model"
status: "Phase 2.3 — Active"
# -----------------------------------------------------------------------------
# Purpose:        Defines the authoritative vocabulary for family as a
#                 first-class humanitarian entity.
#                 A family is a social and support structure — the network
#                 of persons connected through kinship, caregiving, marriage,
#                 guardianship, or recognised relationships — through which
#                 care, resources, decisions, and obligations flow.
#                 This is NOT the household (which is a physical and economic
#                 unit of co-residence). A family spans households. Members
#                 of the same family may live apart. The family persists
#                 through displacement, migration, and loss.
# Scope:          This file answers "who are these people to each other,
#                 what obligations and support relationships exist between
#                 them, and what is the structure through which the family
#                 functions as a unit?"
#                 It does not answer "what should the system do?" (operational
#                 domains), "what risk does this family face?" (risk domain),
#                 or "what has changed over time?" (beneficiary lifecycle).
# Governing ADRs: ADR-007, ADR-008
# Cross-references:
#   shared/human-model/taxonomy/lifecycle-stages.yaml
#     Lifecycle stages are referenced here to characterise the family's
#     developmental context. That file owns stage definitions.
#   shared/human-model/taxonomy/dependency.yaml
#     Dependency types are referenced here when characterising support
#     relationships between family members. That file owns type definitions.
#   shared/human-model/taxonomy/capabilities.yaml
#     Capability domains are referenced here when characterising role
#     requirements and family member contributions. That file owns
#     capability definitions.
#   registration/ontology/attributes.yaml
#     The household entity in registration owns head_of_household as a
#     registration-specific attribute. This file owns primary_earner and
#     related family responsibility concepts — these are distinct.
# =============================================================================

# -----------------------------------------------------------------------------
# Additive canonical entity index, added per Phase 1.2 domain completion pass.
# This does not redefine or restructure the rich model below (family_entity,
# family_member, kinship_roles, support_roles, etc. keep their existing
# definitions exactly as authored) — it exists solely to make `family` and
# `family_member` addressable by id, so that other domains can reference this
# concept via a relationship, closing the gap this file's own boundary_notes
# describe ("reasoning must reference families") but which, prior to this
# pass, no relationship in the repository did. Full canonicalization of this
# file's richer structure (kinship_roles, support_roles,
# family_responsibility_concepts, etc. as their own addressable entities)
# remains a larger, separate migration, not undertaken here.
# -----------------------------------------------------------------------------

entities:
  - id: family
    label: Family
    description: >
      The primary social unit within which humanitarian need is generated,
      absorbed, and transmitted — the network of persons connected through
      kinship, caregiving, marriage, guardianship, or recognised
      relationships. Distinct from Household: a family spans households,
      persists through displacement and loss, and is defined by
      relationships and obligations, not co-residence. See family_entity
      below for the full structural model.

  - id: family_member
    label: Family Member
    description: >
      An individual person who is a member of a family, carrying a kinship
      role, one or more support roles, and a lifecycle stage. References the
      persistent Person (shared:person) via its person_reference attribute —
      see family_member below.

# -----------------------------------------------------------------------------
# FOUNDATIONAL DISTINCTION: FAMILY VS HOUSEHOLD
# This distinction is the most critical conceptual boundary in this file.
# It must be understood before any concept in this file is applied.
# -----------------------------------------------------------------------------

foundational_distinction:
  family:
    definition: >
      A social and support unit of persons connected through kinship,
      caregiving, marriage, guardianship, or other recognised relationships.
      The family is defined by relationships and obligations — not by
      physical co-location.
    persistence: >
      The family exists before, during, and after any registration event.
      It persists through displacement, migration, bereavement, and
      household reconfiguration. A member who has migrated is still
      part of the family. A deceased member shaped the family and their
      absence continues to shape it.
    geographic_scope: >
      Family members may be co-resident or geographically dispersed.
      The family as a unit is not constrained by a single address.
    defining_characteristic: >
      Relationships and obligations. A person is a family member because
      of who they are to each other — not because of where they sleep.

  household:
    definition: >
      The unit of persons who share a physical living space and pool
      resources for daily living. The household is defined by co-residence
      and shared economy.
    persistence: >
      The household is a snapshot — it describes who is present at a
      given address at a given time. It can be reconfigured by members
      arriving or departing.
    geographic_scope: >
      A single shared living space.
    defining_characteristic: >
      Co-residence and shared economy. A person is a household member
      because of where they live and who they share resources with.

  relationship_between_the_two: >
    A family typically has one or more households. Members of the same
    family may live in different households. A household may contain
    members of more than one family (extended family configurations).
    The family's support network — who provides income, care, decisions,
    and emotional support — is determined by the family structure, not
    only by who is present in the household at registration time.
    Registrations capture households. Reasoning must reference families.

  boundary_note: >
    This file owns family concepts. The household entity is owned by
    the registration domain's ontology. These must not be merged.
    The risk domain (when active) will model how family configuration
    interacts with household vulnerability. That work belongs there.


# =============================================================================
# PART 1: THE FAMILY ENTITY
# =============================================================================

family_entity:

  description: >
    The family is the primary social unit within which humanitarian
    need is generated, absorbed, and transmitted. A person in distress
    is rarely in distress alone — their family is implicated. A family
    with adequate internal support capacity absorbs shocks differently
    from one without it.
    The family entity captures what the family is, who is in it,
    and how it is structured. It does not capture what the family needs
    or what should be done about it.

  family_identity:
    description: >
      The persistent identity of the family as a unit across time and
      events. A family has continuity even as its composition, location,
      and circumstances change.
    attributes:
      family_name_or_identifier:
        description: >
          The name or identifier by which this family is known.
          In many South Asian contexts this is a shared family name.
          In some contexts it is a household head's name by which the
          family is locally identified. Free text — do not force a format.
        required: false
        note: >
          A family can be identified without a formal family name.
          Identification may be contextual — "the family in the blue
          house near the mosque" is a valid identifier in the field.
      family_origin:
        description: >
          The community, village, or place the family is originally from.
          Relevant for displaced families whose social networks and
          support structures are tied to a geographic origin.
        required: false
      family_continuity_status:
        description: >
          Whether the family is currently intact as it was constituted
          before any recent disrupting event. This records structural
          change in the family, not emotional state.
        values:
          - id: intact
            label: Intact
            description: >
              The family is constituted as it was before any recent
              disrupting event. No significant loss of membership
              has occurred recently.
          - id: disrupted
            label: Disrupted
            description: >
              The family has recently lost a member through death,
              displacement, migration, separation, or legal action.
              The family structure has changed in a way that affects
              the support and dependency configuration.
          - id: reconstituted
            label: Reconstituted
            description: >
              The family has reformed following disruption — through
              remarriage, return of a migrant member, adoption of a
              dependent, or formal guardianship arrangement.
          - id: fragmented
            label: Fragmented
            description: >
              Members of the family are dispersed across locations
              and the family is not currently functioning as a
              coordinated support unit. Geographic fragmentation
              or relational breakdown has disrupted the functioning
              of the family as a whole.
        required: false
        note: >
          This attribute describes the family's structural reality.
          It does not classify need or severity. Intact families may
          still have acute needs. Fragmented families may have residual
          support that partially compensates.

  family_composition:
    description: >
      The members of the family and their relationships to each other.
      Composition captures who is in the family, not only who is
      present in the household at registration.
    attributes:
      total_family_size:
        description: >
          The total count of persons who are considered members of this
          family, regardless of whether they are co-resident.
        required: false
        note: >
          This may exceed the household size. A family of seven may
          have five members co-resident and two members working in
          another city. All seven are family members.
      resident_member_count:
        description: >
          The count of family members who are currently co-resident
          in the primary household.
        required: false
      non_resident_member_count:
        description: >
          The count of family members who are part of the family but
          not currently co-resident. These members may still be part
          of the family's support network.
        required: false
      members:
        description: >
          The list of family members with their roles and relationships.
          See family_member below for the member schema.
        required: true
        minimum: 1

  family_lifecycle_stage:
    description: >
      The developmental stage of the family as a unit — not of any
      individual member, but of the family's collective developmental
      context. A family with a newborn infant is in a different
      structural reality from a family with adolescent children,
      even if the parents are the same age.
      This is a family-level concept. It is derived from the composition
      of the family but is not reducible to any single member's stage.
    values:
      - id: family_formation
        label: Family Formation
        description: >
          A recently formed family unit — newly married couple,
          newly established household, early partnership. Typically
          characterised by limited accumulated resources and developing
          support networks.
        characteristic_context: >
          Low accumulated assets. Social networks in formation.
          Economic base being established. High vulnerability to
          early shocks before resilience has developed.
      - id: early_parenting
        label: Early Parenting
        description: >
          Family with infants and toddlers. One or more adults are
          managing the total dependency requirements of very young
          children. Caregiving demand is at its highest relative to
          the number of capable adults.
        characteristic_context: >
          Maximum caregiving dependency load. Employment of one or
          more adults may be constrained by caregiving demands.
          Developmental stakes are highest — deprivation in this
          stage has lasting consequences for children.
      - id: active_parenting
        label: Active Parenting
        description: >
          Family with school-age children and/or adolescents. Children
          are in education or approaching educational transitions.
          Educational investment obligations are active.
        characteristic_context: >
          Educational fee obligations. School schedule constrains
          family mobility and decision-making. Children are old
          enough to contribute to household tasks but remain
          financially and legally dependent. Educational dropout
          risk is present in economically constrained households.
      - id: established_family
        label: Established Family
        description: >
          Family with adult or near-adult children. Younger generation
          may be transitioning into economic contribution. Older
          generation may be approaching reduced earning capacity.
        characteristic_context: >
          Potential for intergenerational economic contribution.
          Children may support parents financially. Educational
          obligations for younger members may overlap with
          increasing health management needs for older members.
      - id: multigenerational
        label: Multigenerational
        description: >
          Family spans three or more generations in active relationship.
          Typically involves grandparents, parents, and children
          in overlapping dependency and support relationships.
          The sandwich generation dynamic is present: adult members
          may carry simultaneous caregiving obligations for both
          children and ageing parents.
        characteristic_context: >
          Complex dependency chains. Multiple simultaneous caregiving
          obligations. Decision-making authority may be distributed
          across generations in ways that affect whose consent is
          needed and who speaks for the family.
      - id: elderly_couple_or_individual
        label: Elderly Couple or Individual
        description: >
          Family unit is primarily composed of elderly persons.
          Adult children, if any, are no longer co-resident.
          The family may depend on adult children at a distance
          for financial or practical support.
        characteristic_context: >
          Increasing physical dependency. Reduced independent income.
          Social network shrinking through bereavement of peers.
          Vulnerability to isolation if adult children are absent
          or non-contributing.
      - id: single_parent
        label: Single Parent
        description: >
          One adult caregiver with one or more dependent children.
          Arises through bereavement, separation, abandonment, or
          migration of a partner.
        characteristic_context: >
          Full caregiving and earning obligations concentrated in
          one person. No internal adult to share the dependency load.
          Particularly acute when children are very young.
          Time and physical capacity are the binding constraints.
      - id: child_headed
        label: Child-Headed
        description: >
          The de facto head of the family is a minor or young person
          who has assumed adult responsibilities in the absence of
          capable adult family members.
        characteristic_context: >
          Safeguarding concern present by definition. Legal and
          practical authority do not match. The child-head is
          simultaneously a dependent and a provider.
          Requires special reasoning treatment.
    required: false
    note: >
      A family may transition between stages. Bereavement can move
      a family from established_family to single_parent in one event.
      The lifecycle stage is assessed at the time of registration.


# =============================================================================
# PART 2: FAMILY MEMBER
# =============================================================================

family_member:
  description: >
    An individual person who is a member of this family.
    Each family member has a kinship role (who they are to the family),
    one or more support roles (what they contribute or receive), and
    a lifecycle stage (their developmental context).
    A family member may hold multiple roles simultaneously.

  member_attributes:

    person_reference:
      description: >
        A reference to the person entity for this family member.
        In registration contexts, this will reference the beneficiary
        or a household member. Across future domains, this will reference
        the persistent Person entity.
      required: true

    kinship_role:
      description: >
        The relationship this person has to the family as a social unit.
        Not the relationship to the registrant — the relationship to
        the family itself.
      see: kinship_roles below
      required: true

    support_roles:
      description: >
        The support roles this person currently holds within the family.
        A person may hold more than one support role simultaneously.
        Example: A grandmother may be both a primary caregiver
        and a financial dependent.
      see: support_roles below
      required: false
      cardinality: zero_to_many

    lifecycle_stage:
      description: >
        The lifecycle stage of this individual family member.
        References shared/human-model/taxonomy/lifecycle-stages.yaml.
        Determines the developmental context and characteristic
        dependencies of this member.
      required: false
      values_ref: shared/human-model/taxonomy/lifecycle-stages.yaml#lifecycle_stages

    residency_status:
      description: >
        Whether this family member is currently co-resident in the
        primary household or living elsewhere.
      values:
        - id: co_resident
          label: Co-Resident
          description: Currently living in the same household
        - id: non_resident_contributing
          label: Non-Resident, Contributing
          description: >
            Living elsewhere but actively providing support to the
            household — financial remittances, periodic caregiving,
            or other contributions.
        - id: non_resident_not_contributing
          label: Non-Resident, Not Contributing
          description: >
            Living elsewhere and not currently providing active support.
            This does not mean the relationship is severed — only that
            the practical support flow is absent.
        - id: location_unknown
          label: Location Unknown
          description: >
            The member's current location is not known to the family.
            May indicate displacement, migration with lost contact,
            or detention.
        - id: deceased
          label: Deceased
          description: >
            The member has died. Recorded because the absence of a
            deceased member — particularly a primary earner, primary
            caregiver, or decision-maker — is a structurally significant
            fact about the family. The family continues after the death;
            the gap the deceased leaves behind shapes the family's
            current configuration.
      required: false

    contribution_status:
      description: >
        Whether this family member is currently able to contribute
        to the family's support capacity in their primary role.
      values:
        - id: active
          label: Active
          description: >
            Contributing in their primary role at expected capacity.
        - id: reduced
          label: Reduced
          description: >
            Contributing but at significantly less than expected capacity
            due to illness, injury, displacement, unemployment, or
            other circumstance.
        - id: inactive
          label: Inactive
          description: >
            Not currently contributing in their primary role.
            Cause may be temporary (illness) or structural (unemployment,
            displacement).
        - id: not_applicable
          label: Not Applicable
          description: >
            This member is a dependent and has no expected primary
            contribution. Their value to the family is not economic
            or caregiving — they are the recipients of care.
      required: false


# =============================================================================
# PART 3: KINSHIP ROLES
# =============================================================================

kinship_roles:
  description: >
    Kinship roles define who a person is to the family in terms of
    biological, legal, or socially recognised relationships.
    These are relational facts, not positional assignments.
    A person may hold more than one kinship role where family
    configurations allow (e.g., an adopted child has both adoptive
    and, in some contexts, birth family relationships).

  note_on_vocabulary: >
    Kinship vocabulary is culturally variable. These roles represent
    the conceptual positions in the family structure. Local terminology
    will differ. The ontology records the structural role, not the
    local term.

  roles:

    - id: father
      label: Father
      description: >
        The male parent — biological, adoptive, or legally recognised.
        In many South Asian household configurations the father is also
        the primary earner and formal head of household, though this
        must not be assumed.
      common_support_roles:
        - primary_earner
        - decision_maker
        - financial_provider
      note: >
        When the father is absent — through death, migration, displacement,
        or separation — his absence creates a structural gap in the family's
        support configuration that must be understood, not merely noted.

    - id: mother
      label: Mother
      description: >
        The female parent — biological, adoptive, or legally recognised.
        In many contexts the mother is the primary caregiver and the
        primary manager of the household economy, regardless of whether
        she earns income.
      common_support_roles:
        - primary_caregiver
        - household_manager
        - educational_supervisor
      note: >
        Mother's wellbeing is frequently underdisclosed in registration
        contexts where the mother is the registrant. Her own needs may
        be presented as the family's needs or not presented at all.

    - id: child
      label: Child
      description: >
        A person who is the son or daughter of another family member,
        regardless of age. An adult child is still a child in kinship
        terms. Age and lifecycle stage determine the support relationship,
        not the kinship role.
      note: >
        A child who has reached adulthood may transition from dependent
        to contributor roles within the family. A child who remains
        a minor retains dependent status with legal implications.

    - id: son
      label: Son
      description: >
        A male child of the family. Registered separately from the
        generic child role where gender is relevant to reasoning
        (inheritance, educational investment expectations, livelihood
        pathways vary by gender in many South Asian contexts).
      common_support_roles:
        - dependent (if minor)
        - contributor or primary_earner (if adult)

    - id: daughter
      label: Daughter
      description: >
        A female child of the family. Registered separately from the
        generic child role where gender is relevant to reasoning
        (marriage obligations, education investment, protection risks
        vary by gender in many South Asian contexts).
      common_support_roles:
        - dependent (if minor)
        - caregiver or contributor (if adult, in many contexts)
      note: >
        Adolescent daughters in financially constrained households
        carry specific vulnerability profiles related to early marriage
        and educational discontinuation. These are not modelled here
        but the role concept creates the foundation for that reasoning.

    - id: spouse
      label: Spouse
      description: >
        A person in a legally or socially recognised partnership with
        another family member. Spouse relationships carry mutual support
        obligations and often create shared financial and caregiving
        commitments.
      note: >
        Widowhood — loss of a spouse — is one of the most significant
        structural disruptions to a family's support configuration.
        The surviving spouse loses both a co-provider and often a
        co-caregiver simultaneously.

    - id: husband
      label: Husband
      description: >
        The male spouse. Registered separately where role-specific
        reasoning is relevant to support configuration.

    - id: wife
      label: Wife
      description: >
        The female spouse. Registered separately where role-specific
        reasoning is relevant to support configuration.
      note: >
        In many South Asian contexts a wife who has lost her husband
        faces not only economic loss but reduction in social standing,
        decision-making authority, and family support network access.
        These structural consequences of widowhood exceed the immediate
        financial impact.

    - id: grandparent
      label: Grandparent
      description: >
        Parent of a parent within the family. Grandparents may be
        dependents (receiving care and financial support from adult
        children) or contributors (providing caregiving for grandchildren,
        providing income from pension or assets, providing household
        management support).
      note: >
        The dual role of grandparent — simultaneously dependent and
        caregiver — is particularly significant in South Asian family
        structures and in households where adult children have migrated.

    - id: grandfather
      label: Grandfather
      description: Male grandparent.

    - id: grandmother
      label: Grandmother
      description: >
        Female grandparent. In many configurations, the grandmother
        is the de facto primary caregiver for grandchildren while
        adult parents work or migrate. Her caregiving capability
        is a critical household asset; its reduction through illness
        or age affects multiple household members.

    - id: sibling
      label: Sibling
      description: >
        Brother or sister of another family member. Sibling relationships
        carry variable support obligations depending on birth order,
        gender norms, and economic position. An older sibling may be
        the de facto head of a household following parent loss.

    - id: brother
      label: Brother

    - id: sister
      label: Sister

    - id: guardian
      label: Guardian
      description: >
        A person who holds legal or de facto responsibility for the
        care and decision-making of a minor or incapacitated family
        member, without necessarily being a biological parent.
        Guardianship may be formal (legally appointed) or informal
        (socially recognised within the family and community).
      legal_dimension: >
        Formal guardianship creates legal obligations and authority.
        Informal guardianship creates social obligations and authority.
        Both are real in the domain. The distinction matters for
        verification of consent and for child protection.
      common_support_roles:
        - primary_caregiver
        - decision_maker
        - educational_supervisor
      note: >
        When no guardian can be identified for a minor, this is a
        safeguarding gap — not merely a data gap. The family structure
        model must be able to represent the absence of a guardian as
        a structurally significant fact.

    - id: uncle
      label: Uncle
      description: >
        Parent's brother or spouse's brother. In many South Asian family
        structures, an uncle may assume guardianship or financial
        responsibility for a sibling's children following bereavement.

    - id: aunt
      label: Aunt
      description: >
        Parent's sister or spouse's sister. May assume caregiving
        responsibility for nieces and nephews following bereavement.

    - id: in_law
      label: In-Law
      description: >
        A person related through marriage rather than blood. In-law
        relationships carry significant support obligations in many
        South Asian cultural contexts. A mother-in-law may be both
        a household authority figure and a dependent. A father-in-law
        may control household economic decisions.
      note: >
        In-law relationships are often invisible in registration
        but structurally significant. Who controls household decisions
        and who receives or provides care is frequently shaped by
        in-law dynamics.

    - id: extended_family_member
      label: Extended Family Member
      description: >
        A family member beyond the immediate nuclear or three-generational
        structure — cousins, second-degree relatives, community members
        treated as family. Extended family members may provide or receive
        support and their inclusion in the family's support network
        is a resilience factor.

    - id: foster_or_informal_dependent
      label: Foster or Informal Dependent
      description: >
        A person who is not biologically or legally related but who
        has been taken into the family and is being cared for as a
        family member. Common in cases of community bereavement where
        orphaned children are absorbed by relatives or neighbours.

    - id: deceased_member
      label: Deceased Member
      description: >
        A person who was a family member and has died.
        Recorded because the structural role they held — as primary
        earner, primary caregiver, decision-maker — creates a
        structural gap whose effect on the current family configuration
        is a present fact, not a historical one.
      note: >
        A deceased primary earner does not stop being relevant to the
        family's situation the moment they die. Their absence is the
        situation. Recording the deceased member and their former role
        makes it possible to reason about what has been lost, not
        only about what remains.


# =============================================================================
# PART 4: SUPPORT ROLES
# =============================================================================

support_roles:
  description: >
    Support roles define the functional position a family member holds
    in the family's support and dependency structure. These are operational
    roles — what the person does or receives within the family system.
    A person may hold more than one support role simultaneously.
    Support roles are distinct from kinship roles.
    A grandmother (kinship) may be a primary caregiver (support role)
    and a financial dependent (support role) at the same time.
    Support roles are also distinct from capability. A person may have
    high caregiving capability but not currently occupy the primary
    caregiver support role if another family member holds that position.

  note_on_multiplicity: >
    Multiple family members may hold the same support role simultaneously.
    Two parents may share the primary caregiver role. Multiple adult
    children may be co-contributors. The family is a system of overlapping
    roles, not a hierarchy of exclusive positions.

  roles:

    # =========================================================
    # EARNER AND ECONOMIC ROLES
    # =========================================================

    - id: primary_earner
      label: Primary Earner
      description: >
        The family member who is the main source of income or economic
        resources for the household. When this member's earning capacity
        is disrupted — through illness, injury, job loss, death, or
        displacement — the family's economic foundation is directly affected.
      dependency_type_ref: >
        Family members who rely on this person have financial dependency
        (see shared/human-model/taxonomy/dependency.yaml#financial).
      disruption_significance: >
        Loss of the primary earner is one of the most structurally
        consequential events for a family. It simultaneously removes
        income, may remove a decision-maker, and may remove a caregiver
        depending on whether other roles were also held by the same person.
      note: >
        The primary earner is not necessarily the head of household
        or the decision-maker. These are separate roles even when they
        happen to be held by the same person.

    - id: secondary_earner
      label: Secondary Earner
      description: >
        A family member who contributes income but is not the primary
        source. Secondary earners provide resilience: if the primary
        earner is disrupted, the secondary earner may partially compensate.
        A family with no secondary earner has a more fragile earning structure.

    - id: non_earning_contributor
      label: Non-Earning Contributor
      description: >
        A family member who does not earn income but contributes
        economically through services whose market equivalent has value —
        childcare, domestic management, food production, elder care.
        The contribution is real even without monetisation.
      note: >
        In registration contexts, non-earning contributors are frequently
        invisible because economic contribution is equated with paid work.
        Their loss or incapacitation has real economic consequences that
        the family may not initially recognise or report as economic need.

    - id: remittance_sender
      label: Remittance Sender
      description: >
        A non-resident family member who sends financial support to the
        household from another location. The remittance relationship
        is a form of financial dependency where the provider is geographically
        distant. Disruption to this member — through illness, job loss,
        or lost contact — removes income without the family having any
        direct way to address it.
      note: >
        Remittance-dependent families have a specific vulnerability profile.
        The income source is outside the household's direct reach.
        Disruption cannot be addressed by local action alone.

    - id: financial_dependent
      label: Financial Dependent
      description: >
        A family member who relies on other family members for their
        financial needs — whether co-resident or not. Minors are financial
        dependents by definition. Elderly members without pension or
        assets are frequently financial dependents. Adults temporarily
        out of work are situational financial dependents.
      dependency_type_ref: >
        shared/human-model/taxonomy/dependency.yaml#financial


    # =========================================================
    # CAREGIVING ROLES
    # =========================================================

    - id: primary_caregiver
      label: Primary Caregiver
      description: >
        The family member who provides the main caregiving support
        to one or more dependents in the household. This person is
        responsible for the daily physical, developmental, and
        emotional care of the dependent(s).
      dependency_type_ref: >
        Dependents rely on this person for caregiving dependency
        (shared/human-model/taxonomy/dependency.yaml#caregiving) and may also
        have developmental dependency
        (shared/human-model/taxonomy/dependency.yaml#developmental).
      disruption_significance: >
        Loss of the primary caregiver simultaneously removes support
        from all dependents they were caring for. Each dependent
        is affected individually; the structural impact is multiplied
        by the number of dependents.
      note: >
        When the primary caregiver and primary earner are the same person,
        a single disruption event simultaneously removes both economic
        and caregiving support from the household. This is the most acute
        structural configuration from a dependency chain perspective.

    - id: secondary_caregiver
      label: Secondary Caregiver
      description: >
        A family member who provides caregiving support in addition
        to the primary caregiver, or who provides care in specific
        domains (school transport, medical care coordination, emotional
        support) while the primary caregiver handles daily physical care.
        The secondary caregiver provides resilience: if the primary
        caregiver is disrupted, the secondary caregiver can partially
        compensate.

    - id: care_recipient
      label: Care Recipient
      description: >
        A family member who receives caregiving from another family member.
        Includes infants, young children, elderly members, and adults
        with illness or disability. The term is neutral — receiving care
        is not a deficit, it is a relational position in the family's
        support structure.


    # =========================================================
    # DECISION-MAKING ROLES
    # =========================================================

    - id: decision_maker
      label: Decision Maker
      description: >
        The family member whose authority is recognised within the family
        for significant decisions — major expenditures, healthcare choices,
        educational decisions, consent to external interventions.
        Decision-making authority may be formal (legal guardianship) or
        informal (cultural household authority).
      dependency_type_ref: >
        Family members whose decisions are made by this person have
        decision-making dependency
        (shared/human-model/taxonomy/dependency.yaml#decision_making).
      note: >
        The decision-maker is not necessarily the registered head of
        household. In many South Asian configurations, decision-making
        authority may rest with a father-in-law, an elder brother, or
        a family council rather than the person who presents for
        registration. This has direct consequences for whose consent
        is required for interventions.

    - id: co_decision_maker
      label: Co-Decision Maker
      description: >
        A family member who shares decision-making authority with the
        primary decision maker. Many families operate by consensus
        between spouses, or between parents and grandparents.
        Co-decision making is a resilience factor: if one decision
        maker is absent, the other may hold authority.

    - id: legal_guardian
      label: Legal Guardian
      description: >
        A family member who holds formal legal authority over the
        decisions and welfare of a minor or incapacitated person.
        Legal guardianship is formally different from de facto
        caregiving: a legal guardian may not be the physical caregiver,
        and a physical caregiver may not be the legal guardian.
      note: >
        In the absence of a legal guardian for a minor, child protection
        obligations are triggered. The family structure model must be
        able to represent this gap explicitly.


    # =========================================================
    # EDUCATIONAL ROLES
    # =========================================================

    - id: educational_sponsor
      label: Educational Sponsor
      description: >
        The family member who is responsible for and finances the
        education of one or more children in the family. In many
        families this is the primary earner. In some configurations
        it may be a specific family member (uncle, older sibling)
        who has taken on this responsibility.
      note: >
        When the educational sponsor's capacity is disrupted, the
        children's educational continuity is directly at risk. The
        educational sponsor concept makes this dependency explicit
        without embedding the reasoning about what happens when it fails.

    - id: educational_supervisor
      label: Educational Supervisor
      description: >
        The family member who manages the day-to-day educational
        responsibilities of children — school attendance, homework
        support, school communication, teacher relationships.
        In many households this is the mother, regardless of whether
        she is the educational sponsor.
      note: >
        The distinction between educational sponsor (who pays) and
        educational supervisor (who manages the daily educational life)
        is important. A family may have an intact educational sponsor
        but a disrupted educational supervisor, still placing children's
        education at risk.

    - id: educational_dependent
      label: Educational Dependent
      description: >
        A family member who is currently enrolled in or expected to
        be enrolled in formal education and who depends on the family
        for the financial and logistical support to continue.


    # =========================================================
    # HOUSEHOLD MANAGEMENT ROLES
    # =========================================================

    - id: household_manager
      label: Household Manager
      description: >
        The family member who organises and coordinates the domestic
        environment — food procurement and preparation, hygiene,
        domestic scheduling, and resource allocation within the home.
        This role is operationally essential; its absence is immediately
        felt even when the household has adequate financial resources.
      note: >
        Household management is real work. When the household manager
        is disrupted — through illness, bereavement, displacement —
        the household's ability to function does not maintain itself.
        This is frequently not recognised as a gap until conditions
        visibly deteriorate.


    # =========================================================
    # DEPENDENCY CHAIN ROLES
    # =========================================================

    - id: sole_dependent
      label: Sole Dependent
      description: >
        A family member who is the only person in a dependent position
        in the household. When a family has only one dependent, the
        dependency burden is lower than when multiple dependents rely
        on the same set of providers.

    - id: high_needs_dependent
      label: High-Needs Dependent
      description: >
        A dependent family member whose care requirements are
        significantly greater than typical for their lifecycle stage —
        due to severe disability, serious illness, complex medical needs,
        or acute developmental delay. A high-needs dependent places
        disproportionate demands on the caregiver's time, physical
        capacity, and emotional resources.
      note: >
        A family with a high-needs dependent and a single caregiver
        has a structurally concentrated vulnerability that the dependency
        burden count alone does not capture. This role concept exists
        to make that distinction expressible.


# =============================================================================
# PART 5: SUPPORT RELATIONSHIPS
# =============================================================================

support_relationships:
  description: >
    A support relationship is a directional flow of support between
    two family members. It captures who provides what to whom.
    Support relationships make the family's internal support network
    explicit and traceable.
    They are distinct from dependency types (which define the nature of
    reliance) and from support roles (which define functional positions).
    A support relationship is the instantiation of a dependency at the
    person-to-person level: it names the provider, the recipient,
    the type of support, and the current status of that relationship.

  relationship_attributes:
    provider:
      description: >
        The family member providing the support in this relationship.
      required: true

    recipient:
      description: >
        The family member receiving the support in this relationship.
      required: true

    support_type:
      description: >
        The type of support flowing through this relationship.
        References the dependency type vocabulary in dependency.yaml
        for the type concept, applied here at the person-to-person level.
      values:
        - financial
        - caregiving
        - developmental
        - physical_support
        - decision_making
        - emotional_support
        - educational
        - household_management
      values_ref: shared/human-model/taxonomy/dependency.yaml#dependency_types
      required: true

    relationship_status:
      description: >
        Whether this support relationship is currently functioning.
      values:
        - id: active
          label: Active
          description: Support is being provided at expected level.
        - id: disrupted
          label: Disrupted
          description: >
            Support is not currently being provided, or is significantly
            reduced from the expected level, due to a disrupting event
            or circumstance.
        - id: at_risk
          label: At Risk
          description: >
            The support relationship is currently functioning but the
            provider's capacity is at risk of disruption.
        - id: absent
          label: Absent
          description: >
            The support relationship no longer exists — because the
            provider has died, migrated, or separated from the family.
            This is distinct from disrupted: absent means the provider
            is gone; disrupted means the provider is present but unable
            to provide.
      required: false

    disruption_reason:
      description: >
        If the relationship status is disrupted or absent, a brief
        description of the cause. Free text. Examples: death of provider,
        provider hospitalised, provider lost employment, provider displaced.
      required: false
      required_when: relationship_status in [disrupted, absent]

    substitute_provider:
      description: >
        If the primary support relationship is disrupted or absent,
        the family member (if any) who is partially or wholly
        substituting for the original provider.
      required: false
      note: >
        A substitute provider may be providing the same type of support
        at lower quality or smaller quantity. Recording the substitute
        prevents the gap from being assessed as total when it is partial.


# =============================================================================
# PART 6: FAMILY RESPONSIBILITY CONCEPTS
# =============================================================================

family_responsibility_concepts:
  description: >
    Family responsibilities are obligations that bind family members
    to each other — formal or informal, legal or cultural. They determine
    what is expected of family members and, when unmet, create structural
    gaps in the family's support configuration.

  financial_obligation:
    description: >
      An expected financial contribution from one family member to
      another or to the family as a whole.
    examples:
      - A father's obligation to provide for minor children
      - An adult son's obligation to support elderly parents
      - A remittance obligation from a migrant worker to the household
    obligation_status:
      - being_met
      - partially_met
      - not_being_met
      - obligation_holder_incapacitated
      - obligation_holder_absent
    note: >
      An unmet financial obligation is a gap in the family's support
      structure, not necessarily a moral failure. The obligation holder
      may be unable to meet it due to their own circumstances.

  caregiving_obligation:
    description: >
      An expected caregiving contribution from one family member to
      a dependent member of the family.
    examples:
      - A mother's obligation to provide daily care for an infant
      - An adult daughter's obligation to care for an ill parent
      - A guardian's obligation to ensure a child's safety and welfare
    obligation_status:
      - being_met
      - partially_met
      - not_being_met
      - obligation_holder_incapacitated
      - obligation_holder_absent

  educational_obligation:
    description: >
      An expected commitment from one or more family members to
      support a child's education — financially, logistically, or
      through direct supervision.
    examples:
      - Parents' obligation to enrol and maintain children in school
      - A guardian's obligation to ensure educational continuity
      - An educational sponsor's obligation to pay fees
    obligation_status:
      - being_met
      - partially_met
      - at_risk
      - not_being_met

  protection_obligation:
    description: >
      An expected commitment from a family member with authority or
      capacity to protect a dependent or vulnerable member from harm.
    examples:
      - A guardian's obligation to protect a minor from exploitation
      - A spouse's obligation not to perpetrate harm against the other
      - A sibling's obligation to support a vulnerable younger sibling
    note: >
      When the protection obligation is violated — as in domestic violence
      — the obligation holder becomes the source of risk rather than
      the source of protection. This inverts the expected support
      relationship and is a structurally significant fact.


# =============================================================================
# PART 7: FAMILY-LEVEL ATTRIBUTES
# =============================================================================

family_level_attributes:
  description: >
    Attributes that characterise the family as a whole — not reducible
    to any single member but derived from the family's composition and
    structure.

  dependency_burden:
    description: >
      A structural count of the number of dependent family members
      relative to the number of family members with capacity to provide.
      This is not a score. It is a structural characterisation.
    attributes:
      total_dependents:
        description: >
          Count of family members in any dependent position
          (financial, caregiving, or both).
        required: false
      total_capable_providers:
        description: >
          Count of family members who are actively able to contribute
          to providing for the family's needs in any support role.
        required: false
      single_provider_household:
        description: >
          Whether all providing functions are concentrated in a single
          family member. When true, this is the most structurally
          fragile configuration: any disruption to that single provider
          simultaneously removes all provider capacity.
        type: boolean
        required: false
      high_needs_dependent_present:
        description: >
          Whether the family includes a member classified as a
          high-needs dependent. When true, the effective dependency
          burden exceeds what the raw count represents.
        type: boolean
        required: false

  earning_structure:
    description: >
      The distribution of earning capacity within the family.
    attributes:
      primary_earner_present:
        type: boolean
        required: false
      primary_earner_sole_earner:
        type: boolean
        description: >
          Whether the primary earner is the only earner in the family.
          When true, the family has no secondary earner to provide
          resilience against income disruption.
        required: false
      remittance_dependent:
        type: boolean
        description: >
          Whether any portion of the family's income comes from a
          non-resident remittance sender.
        required: false
      remittance_as_primary_income:
        type: boolean
        description: >
          Whether remittance is the family's primary income source.
          Particularly fragile: income source is geographically
          inaccessible if disrupted.
        required: false

  caregiving_structure:
    description: >
      The distribution of caregiving capacity within the family.
    attributes:
      primary_caregiver_present:
        type: boolean
        required: false
      primary_caregiver_sole_caregiver:
        type: boolean
        description: >
          Whether the primary caregiver is the only caregiver in
          the family. No substitute caregiver exists.
        required: false
      primary_caregiver_also_primary_earner:
        type: boolean
        description: >
          Whether the same person holds both the primary caregiver
          and primary earner roles. When true, a single disruption
          event removes both earning and caregiving capacity simultaneously.
          This is the most structurally concentrated dependency configuration.
        required: false

  decision_making_structure:
    description: >
      How decision-making authority is distributed within the family.
    attributes:
      decision_maker_present:
        type: boolean
        required: false
      decision_making_configuration:
        values:
          - id: sole_authority
            label: Sole Authority
            description: >
              One person holds recognised decision-making authority
              for the family. No co-decision maker exists.
          - id: shared_authority
            label: Shared Authority
            description: >
              Two or more family members share recognised decision-making
              authority (spouses, parents with grandparents, family council).
          - id: external_authority
            label: External Authority
            description: >
              Decision-making authority rests primarily with a family member
              who is not co-resident — an elder, a patriarch in another
              city, a formal guardian elsewhere.
          - id: authority_vacuum
            label: Authority Vacuum
            description: >
              No recognised decision-maker can be identified. This is a
              structurally significant gap, particularly when decisions
              must be made about interventions for dependents.
        required: false

  educational_investment_obligations:
    description: >
      Whether the family currently has active educational obligations
      that represent financial and logistical commitments.
    attributes:
      children_in_education:
        type: boolean
        required: false
      count_in_education:
        description: >
          Number of family members currently enrolled in or expected
          to be enrolled in formal education.
        required: false
      educational_sponsorship_stable:
        type: boolean
        description: >
          Whether the educational sponsor's capacity to continue
          supporting education is currently stable.
        required: false
      educational_continuity_at_risk:
        type: boolean
        description: >
          Whether any family member's educational continuity is
          currently at risk due to financial, logistical, or
          structural family circumstances.
        required: false
      note: >
        Educational continuity at risk is not educational need.
        It is a structural family attribute. The reasoning about
        what to do about it belongs to operational domains.

  family_support_network:
    description: >
      The family's access to support from beyond its immediate members.
      Extended family, community networks, and institutional relationships
      that provide resilience against disruption.
    attributes:
      extended_family_support_available:
        type: boolean
        description: >
          Whether relatives beyond the immediate family are available
          and willing to provide support if needed.
        required: false
      community_network_available:
        type: boolean
        description: >
          Whether the family has community connections — mosque,
          neighbourhood, professional networks — that represent
          a source of informal support.
        required: false
      institutional_support_existing:
        type: boolean
        description: >
          Whether the family currently receives any formal institutional
          support — government benefit, NGO support, pension.
        required: false
      network_disrupted_by_displacement:
        type: boolean
        description: >
          Whether the family's support network has been disrupted
          by displacement. A displaced family may have high social
          participation capability but no active local support network
          because their network is geographically left behind.
        required: false


# =============================================================================
# PART 8: FAMILY CONTINUITY AND DISRUPTION
# =============================================================================

family_continuity:
  description: >
    The family persists through events. This section defines concepts
    for understanding how the family's structure and functioning has
    changed as a result of disrupting events.
    These are structural facts, not emotional states.

  disruption_events:
    description: >
      Events that have changed the family's composition or support structure.
    event_types:
      - id: bereavement
        label: Bereavement
        description: >
          Death of a family member. The structural significance depends
          on which support roles the deceased held.
        structurally_significant_when:
          - deceased was primary earner
          - deceased was primary caregiver
          - deceased was sole decision maker
          - deceased was the only available guardian for a minor
        note: >
          Bereavement of a family member who held no active support role —
          a distant elderly relative with no economic or caregiving
          contribution — has different structural significance from
          bereavement of a primary earner. The ontology must preserve
          the ability to distinguish these.

      - id: migration
        label: Migration
        description: >
          A family member has moved to another location — within the
          country or internationally — for work or other reasons.
          Migration may strengthen the family financially (if the migrant
          sends remittances) or weaken it structurally (if the migrant
          was a caregiver or decision-maker without a substitute).

      - id: displacement
        label: Displacement
        description: >
          The family or part of the family has been forced to leave
          its location. Displacement severs the family from its support
          network, community connections, and institutional relationships.
          It may separate family members from each other.

      - id: separation
        label: Separation
        description: >
          A family member has left the family unit through separation
          or abandonment — spouse departure, parent abandonment of
          children, or a family member cutting ties.
          Distinct from migration in that the person has not left to
          contribute to the family but has removed themselves from
          the family's support structure.

      - id: incapacitation
        label: Incapacitation
        description: >
          A family member has lost the capacity to fulfil their support
          role due to serious illness, injury, or disability.
          The person remains in the family but can no longer provide
          what they previously provided.

      - id: detention_or_legal_crisis
        label: Detention or Legal Crisis
        description: >
          A family member is detained, imprisoned, or subject to legal
          proceedings that prevent them from fulfilling their support role.

      - id: family_breakdown
        label: Family Breakdown
        description: >
          The family unit has fragmented through internal conflict,
          domestic violence, or irreconcilable relational breakdown.
          Distinct from separation in that multiple relationships
          within the family are affected simultaneously.

  disruption_chain:
    description: >
      A disruption to one family member propagates through the family's
      support structure to affect other members. This concept names
      the chain of impact without modelling the severity.
      The chain is a structural fact; its consequence is a reasoning task
      for operational and risk domains.
    attributes:
      disrupted_member_role:
        description: >
          The support role that was disrupted by the event.
          What the family has lost the capacity for.
      affected_recipients:
        description: >
          The family members who were relying on the disrupted support
          relationship and who are now exposed by its absence.
      partial_substitution_available:
        type: boolean
        description: >
          Whether any family member or external party can partially
          substitute for the disrupted role.


# =============================================================================
# PART 9: DESIGN DECISIONS AND BOUNDARY NOTES
# =============================================================================

design_decisions:

  - decision: Family is not reducible to the household
    rationale: >
      Registrations capture household-level information.
      Family-level understanding requires knowing who is in the family
      beyond those present in the household, and what roles and
      obligations connect them. The two concepts must remain separate
      for the reasoning layer to work correctly.

  - decision: Deceased members are recorded
    rationale: >
      A deceased primary earner or caregiver continues to shape the
      family's current situation. Their absence is the situation.
      Treating death as a complete removal of the person from the
      family model loses the structural information about what has been
      lost. Deceased members are recorded with their former roles.

  - decision: Support roles allow multiplicity
    rationale: >
      Real families do not assign exclusive roles. A grandmother can be
      caregiver and financial dependent simultaneously. A mother can be
      primary earner, primary caregiver, and household manager. The
      ontology must reflect this reality without forcing artificial
      singularity.

  - decision: No scores, no severity in this file
    rationale: >
      This file models structure. Severity, risk, and vulnerability are
      downstream reasoning concerns for the risk domain. A family with
      a sole provider and multiple dependents is structurally described
      here. Whether that structure is dangerous depends on context
      that risk domain reasoning applies. That reasoning does not belong here.

  - decision: Disruption chain is structural, not causal
    rationale: >
      The disruption chain concept records which support relationships
      are affected by which events. It does not model what will happen
      to the family as a result. That is the risk domain's work.
      The structural chain is a fact; the consequence is a prediction.

  - decision: Educational roles are first-class
    rationale: >
      The client specifically wants the system to reason about
      educational investment and educational dependency. Educational
      sponsor and educational supervisor are distinct roles that
      capture distinct failure modes. When the educational sponsor
      loses capacity, fees cannot be paid. When the educational
      supervisor is disrupted, school attendance fails even if fees
      are paid. Both matter and they can fail independently.

  - decision: Cultural authority roles are modelled without prescription
    rationale: >
      In-law authority, elder authority, and family council authority
      are real in South Asian family structures. The ontology records
      that decision-making authority may rest with a non-resident or
      in-law family member. It does not prescribe this as correct or
      incorrect. The model reflects reality so that reasoning can
      account for it.

boundary_notes:

  - What this file does NOT own:
    - Risk factors (shared/risk/ — Stage 3, not yet active)
    - Vulnerability scoring (risk domain)
    - Intervention recommendations (case management domain)
    - Household entity attributes (registration domain)
    - Lifecycle stage definitions (lifecycle-stages.yaml)
    - Dependency type definitions (dependency.yaml)
    - Capability domain definitions (capabilities.yaml)
    - Health condition vocabulary (health-conditions.yaml — not yet created)

  - What this file owns that nothing else owns:
    - Family entity and family identity concepts
    - Kinship roles
    - Support roles
    - Support relationships (person-to-person)
    - Family responsibility concepts
    - Family-level structural attributes
    - Family continuity and disruption concepts
    - Disruption chain concept


# =============================================================================
# PART 10: FUTURE ONTOLOGY OPPORTUNITIES
# =============================================================================

future_ontology_opportunities:

  - opportunity: Family resilience model
    description: >
      A family's ability to absorb a disruption and recover.
      Resilience is a function of: number of capable providers,
      strength of extended family network, financial reserves,
      presence of secondary earner, shared decision-making authority.
      This requires both this file and the risk domain to be active.
      Belongs in shared/risk/ when that domain activates.

  - opportunity: Family decision-making authority mapping
    description: >
      A formal model of who holds authority over which decisions within
      the family. This becomes important when interventions require
      consent — whose consent is needed, who must be engaged, whose
      authority supersedes whose. Currently modelled in broad terms here.
      A detailed decision authority model may be needed for the case
      management and legal domain.

  - opportunity: Intergenerational support chain modelling
    description: >
      A model of how support flows across three or more generations
      simultaneously. The sandwich generation dynamic — adult children
      providing simultaneously for their own children and their ageing
      parents — is a common configuration that creates compounded burden.
      This is gestured at in the multigenerational family lifecycle stage
      but deserves a more formal model when the risk domain activates.

  - opportunity: Family-community boundary
    description: >
      The distinction between family members and community members who
      function as family is currently handled through the
      extended_family_member and foster_or_informal_dependent kinship roles.
      When the community context domain activates, the boundary between
      family support network and community support network will require
      formal modelling.

  - opportunity: Health condition impact on family structure
    description: >
      When health-conditions.yaml is created, health conditions should
      be able to reference family support roles. A chronic illness in the
      primary earner has different structural significance than the same
      illness in a financial dependent. The connection between condition
      and role is a reasoning opportunity that requires both files.

  - opportunity: Family lifecycle transitions
    description: >
      Families move through lifecycle stages. A family forming is not
      a family in early parenting. A family in active parenting becomes
      established. These transitions are structurally significant — the
      support obligations and dependency configurations change.
      The beneficiary lifecycle domain (Stage 7) is the right place to
      model transitions over time. This file models the stage concepts;
      that domain will model the transitions.