# =============================================================================
# Khidmat Risk Domain — Protective Factors Ontology
# =============================================================================
ontology_version: "1.0"
authority: "shared/risk/"
owner_domain: "Risk Domain"
status: "Phase 3.2 — Active"
# -----------------------------------------------------------------------------
# Purpose:        Defines the authoritative taxonomy of Protective Factors
#                 as first-class concepts in the Risk Domain. A Protective
#                 Factor is a positively characterised, independently
#                 observable characteristic of a person, family, or household
#                 that actively reduces the likelihood or severity of harm
#                 when a hazard is encountered.
#                 Protective Factors are not the logical negations of Risk
#                 Factors. They are not the same as Resilience. They are not
#                 interventions. They are not capability assessments restated.
#                 They are what IS present and protective — now, in this
#                 household, assessable in this conversation.
# Scope:          This file answers "what specific, observable characteristic
#                 is present that actively buffers this household against harm?"
#                 It does not answer "how resilient is this household overall?"
#                 (household-resilience.yaml), "what risk does this household
#                 face?" (risk.yaml), or "what should be done?" (Case
#                 Management, Stage 5).
# Governing ADRs: ADR-007, ADR-008, ADR-010, ADR-011, ADR-012
# Cross-references:
#   shared/human-model/ontology/family-structure.yaml
#     Structural attributes referenced by attribute_ref. This file does
#     not redefine family structural concepts.
#   shared/human-model/taxonomy/capabilities.yaml
#     Capability domains referenced by domain_ref. Where a specific
#     capability level actively buffers against a hazard category, this
#     file names that connection using the qualifying_level field. This
#     file does not redefine capability concepts.
#   shared/human-model/taxonomy/dependency.yaml
#     Dependency types referenced by dependency_ref where the confirmed
#     availability of a provider constitutes a protective condition.
#   shared/human-model/taxonomy/health-conditions.yaml
#     Conditions referenced by condition_ref. The treatability attribute
#     is used by value only. This file does not redefine conditions.
#   shared/risk/taxonomy/hazard-categories.yaml
#     Hazard categories referenced in hazard_categories_moderated fields.
#   shared/risk/ontology/household-resilience.yaml
#     Household Resilience composes from Protective Factors defined here.
#     The dependency is one-directional: this file supplies concepts
#     upward to Resilience and does not reference household-resilience.yaml.
#   shared/risk/ontology/vulnerability.yaml
#     Vulnerability and Protective Factors are parallel inputs to Risk
#     composition in risk.yaml. They are symmetric, not inverse.
#     This file does not reference vulnerability.yaml.
# =============================================================================

# -----------------------------------------------------------------------------
# FOUNDATIONAL DISTINCTION
# -----------------------------------------------------------------------------

foundational_distinction:

  what_a_protective_factor_is: >
    A Protective Factor is a positively characterised, independently
    observable characteristic of a person, family, or household whose
    presence actively reduces the likelihood that a hazard encounter
    causes harm, or reduces the severity of that harm when it occurs.
    A Protective Factor is something that IS — a real, present condition —
    not something that is merely absent, not something that is planned,
    and not something that the system will provide.

  what_a_protective_factor_is_not:

    not_an_inverse: >
      A Protective Factor is not the logical negation of a Risk Factor.
      "No secondary income source" is a Risk Factor contributor.
      The Protective Factor is not "secondary income source not absent"
      — it is "income redundancy: a second independent income stream
      is active and contributing." The distinction is not semantic. An
      absent Risk Factor does not guarantee the presence of the
      corresponding Protective Factor. A household may have no sole-
      earner risk (because the primary earner is unemployed and there
      is no earner at all) without having the income redundancy protective
      factor. Positive characterisation is what distinguishes a Protective
      Factor from a risk assessment that came back negative.

    not_resilience: >
      Resilience is the household's composite, dynamic capacity to absorb,
      adapt to, and recover from adversity — owned by
      household-resilience.yaml. A Protective Factor is atomic and
      observable. Resilience is composed from Protective Factors and
      other household characteristics. "Adaptive capacity" and "recovery
      capacity" are Resilience concepts. "Income redundancy from an active
      secondary earner" is a Protective Factor. The file that defines the
      concept is household-resilience.yaml for the former; this file for
      the latter.

    not_an_intervention: >
      An intervention is something the system provides or facilitates.
      A Protective Factor is something that already exists independently
      of any Khidmat activity. A household currently receiving food
      assistance from Khidmat is not protected by a Protective Factor
      from this domain — it is receiving an intervention. A household
      with a documented community grain store they contribute to and
      draw from independently holds a different and genuine Protective
      Factor.

    not_a_capability_restated: >
      Full or functional capability levels in any domain are owned and
      defined by capabilities.yaml. This file does not restate them.
      Where a specific capability level actively buffers against a named
      hazard category, this file names the connection using the Capability
      Reference pattern — referencing the owning file and qualifying level
      — rather than redefining the capability concept.

    not_a_community_level_asset: >
      Area-level service coverage, geographic protective features, and
      community-level infrastructure belong to the Community Context
      Domain (Stage 8, not yet active). This file owns only household-
      assessable protective conditions — those that can be surfaced and
      confirmed during a registration conversation about this specific
      household.

  atomicity_test: >
    A valid Protective Factor passes the atomicity test: it describes a
    single, observable condition that is either present or not present
    in this household at the time of registration. If confirming the
    factor requires composing or inferring from multiple other conditions,
    it is not an atomic Protective Factor — it is either a Resilience
    concept or a descriptor that belongs in another file. The atomicity
    test is the primary enforcement mechanism against Protective Factors
    drifting into the Resilience domain.

  registration_assessability_test: >
    A valid Protective Factor must be assessable from a registration
    conversation with the household. If confirming the factor requires
    community-level data, longitudinal observation across multiple
    registrations, or inferential modelling that cannot be grounded in
    what the household reports, it is out of scope for this file at
    Stage 3.

# -----------------------------------------------------------------------------
# DESIGN NOTES
# -----------------------------------------------------------------------------

design_notes:

  composition_role: >
    Protective Factors are direct input suppliers to Household Resilience
    (household-resilience.yaml). The composition chain within the Risk
    Domain is:
      Risk Factors       → compose into → Vulnerability
      Protective Factors → compose into → Household Resilience
      (Vulnerability + Resilience + Exposure + Hazard) → compose into → Risk
    This file sits at the same level as risk-factors.yaml. It is not
    derived from or dependent on that file. It does not reference
    vulnerability.yaml or risk.yaml.

  no_level_scale: >
    Protective Factors do not carry a level scale (strong/moderate/weak).
    Whether a factor is present is determined by its qualifying condition.
    The quality of a factor's presence — how stable, how secure — is
    expressed through the qualifying condition and the basis text recorded
    at assessment time. A level scale would constitute a scoring approach
    inconsistent with the qualitative-only principle governing this domain.

  positive_characterisation: >
    Every Protective Factor in this file is written as a positive
    description of what IS present. This is an architectural requirement,
    not a stylistic choice. Protective Factors written as negations (no
    authority vacuum, no sole earner dependency) are risk factor
    assessments that came back negative. They do not constitute positive
    protective assets and must not be recorded as such.

  new_concept_ownership: >
    Three concepts in this file have no prior owner anywhere in the
    knowledge layer: financial_buffer, livelihood_diversity, and
    treatment_continuity_active. These are defined here for the first
    time and must be declared in ontology_authority_matrix.md as Risk
    Domain concepts owned by this file. All other Protective Factors
    reference concepts owned by the Shared Human Model, using the
    reference patterns specified in risk-domain-governance.md.

  hazard_moderation: >
    Each Protective Factor records the hazard categories it most directly
    moderates. This moderation relationship is directional guidance for
    household-resilience.yaml and risk.yaml — it identifies which hazard-
    specific risk calculations are affected when this factor is present.
    It does not assert the factor has no relevance to other hazard
    categories; secondary categories are listed where the relationship is
    meaningful. Primary indicates the strongest, most direct moderation.

  provider_dependency: >
    Several Protective Factors depend on an identified provider being
    active and contributing. An existing provider who is currently
    inactive does not constitute a confirmed Protective Factor. The
    qualifying conditions make this explicit for each relevant factor.
    A provider who exists in principle but has not been active recently
    is a theoretical asset, not a present protective condition.

# -----------------------------------------------------------------------------
# PROTECTIVE FACTOR CATEGORIES
# -----------------------------------------------------------------------------

protective_factor_categories:
  description: >
    Groupings of related protective factors sharing a common structural
    domain. Categories are organisational — they do not constitute
    independent assessable dimensions. A household may have factors from
    multiple categories simultaneously.

  categories:

    - id: economic_stability
      name: Economic Stability Factors
      description: >
        Protective factors arising from the structure and diversity of
        the household's economic resources. These factors moderate the
        impact of economic hazards and provide a bridge that allows the
        household to absorb income disruptions without immediate harm
        to basic needs.
      primary_hazard_category: economic
      secondary_hazard_categories: [environmental, social_protection]

    - id: caregiving_strength
      name: Caregiving Strength Factors
      description: >
        Protective factors arising from the availability and capability
        of caregivers within the household and family. These factors
        moderate the consequences of caregiving dependency concentration
        and buffer dependents against caregiver disruption.
      primary_hazard_category: health_epidemiological
      secondary_hazard_categories: [social_protection]

    - id: authority_and_decision_making
      name: Authority and Decision-Making Factors
      description: >
        Protective factors arising from the distribution and stability
        of decision-making authority within the family. These factors
        moderate the household's capacity to take protective action when
        it matters — particularly for medical consent, relocation, and
        access to formal services.
      primary_hazard_category: social_protection
      secondary_hazard_categories: [legal_administrative, health_epidemiological]

    - id: support_networks
      name: Support Network Factors
      description: >
        Protective factors arising from the household's access to informal
        and formal external support — family, community, and institutional.
        These factors provide a buffer that operates outside the household's
        own internal configuration.
      primary_hazard_category: social_protection
      secondary_hazard_categories: [economic, health_epidemiological]

    - id: educational_stability
      name: Educational Stability Factors
      description: >
        Protective factors arising from the current stability of education
        for household members of educational age. These factors moderate
        the risk of educational exclusion and the vulnerability patterns
        — child labour displacement, early marriage, foreclosed livelihood
        pathways — that follow educational discontinuity.
      primary_hazard_category: social_protection
      secondary_hazard_categories: [economic]

    - id: capability_assets
      name: Capability Asset Factors
      description: >
        Protective factors arising from the presence of specific capability
        levels that actively buffer against particular hazard categories.
        These factors reference capability domains owned by capabilities.yaml
        — they do not redefine capability concepts.
      primary_hazard_category: legal_administrative
      secondary_hazard_categories: [social_protection, health_epidemiological]

    - id: health_management
      name: Health Management Factors
      description: >
        Protective factors arising from the active management of health
        conditions that are clinically manageable with treatment. These
        factors address the gap between a condition's treatability
        (defined in health-conditions.yaml) and whether treatment is
        actually being received and maintaining a stable trajectory.
      primary_hazard_category: health_epidemiological
      secondary_hazard_categories: []

# -----------------------------------------------------------------------------
# PROTECTIVE FACTORS
# -----------------------------------------------------------------------------

protective_factors:

  # ===========================================================================
  # CATEGORY: ECONOMIC STABILITY
  # ===========================================================================

  # ---------------------------------------------------------------------------
  - id: income_redundancy
    name: Income Redundancy
    category: economic_stability
    description: >
      A secondary earner within the household or family is currently
      active and contributing income. The household's economic base is not
      entirely concentrated in a single earner. If the primary earner's
      capacity is disrupted — through illness, injury, job loss, or
      displacement — the secondary earner provides a partial economic
      bridge. The protective value is not that the secondary income equals
      the primary; it is that any continuing income source reduces the
      speed at which the household reaches destitution and extends the
      window for seeking recovery or external support.
    protective_mechanism: >
      Income redundancy reduces the household's structural single point
      of economic failure. A disruption that would simultaneously remove
      all household income in a sole-earner configuration removes only
      part of the income here. The remaining income, even if insufficient
      alone, extends the period before destitution and gives the household
      time to seek employment, contact support networks, or access
      assistance. It does not eliminate economic vulnerability — it
      moderates its immediacy and reduces the likelihood that a disruption
      triggers an irreversible cascade.
    source_type: structural_attribute
    attribute_ref: "family-structure.yaml#earning_structure"
    qualifying_condition: >
      primary_earner_sole_earner is false AND at least one secondary earner
      is recorded with contribution_status: active. A secondary earner who
      exists but holds contribution_status: inactive or contribution_status:
      reduced does not qualify — the protection requires active contribution,
      not the existence of a person who could theoretically earn.
    provider_dependency:
      depends_on_active_provider: true
      provider_note: >
        The protective value of income redundancy collapses if the secondary
        earner becomes inactive. Assess contribution_status at the time of
        registration, not merely the existence of a secondary earner role
        in the household composition.
    hazard_categories_moderated:
      primary: [economic]
      secondary: [social_protection]
      moderation_note: >
        Moderates economic hazard by reducing the immediacy of income
        disruption consequences. Moderates social protection hazard by
        reducing the financial pressure that drives exploitative protective
        decisions — early marriage of adolescent daughters, withdrawal of
        children from school to contribute income — in economically
        constrained households.
    ontology_notes:
      - References family-structure.yaml's earning_structure. Does not
        introduce a new concept — it names the protective significance
        of an existing structural attribute when the qualifying condition
        is met.
      - This is the positive counterpart to the sole_earner_no_secondary_income
        vulnerability contributor in vulnerability.yaml. It is not its
        logical negation — it requires active contribution, not merely
        the absence of sole-earner status. A household with two earners
        both currently inactive has neither the risk factor nor the
        protective factor.

  # ---------------------------------------------------------------------------
  - id: financial_buffer
    name: Financial Buffer
    category: economic_stability
    description: >
      The household holds accumulated savings, liquid assets, or economic
      reserves that provide a material bridge between an income disruption
      event and the point at which external support is accessed or a new
      income source is established. The buffer is the household's own,
      independently accumulated resource — not a transfer in progress, not
      an intervention, not a debt. It may take the form of cash savings,
      livestock that can be sold, stored grain above subsistence level,
      jewellery held as a financial asset, or equivalent forms of liquid
      or readily realisable household wealth. The scale matters less than
      the existence and accessibility of the asset.
    protective_mechanism: >
      A financial buffer creates temporal resilience: the household can
      continue meeting basic needs for a period following an income
      disruption without immediate deterioration. This window allows the
      household to seek new employment, activate support networks, or
      register for assistance without being forced into irreversible crisis
      decisions — selling productive assets at distress prices, withdrawing
      children from school to contribute income, entering debt at exploitative
      rates. The absence of any financial buffer is precisely what makes
      income disruption immediately catastrophic rather than serious. The
      buffer does not prevent the disruption; it prevents the disruption
      from immediately becoming irreversible.
    source_type: new_concept
    definition: >
      Financial buffer is defined here for the first time as a Risk Domain
      concept. It describes accumulated, household-owned economic reserves
      sufficient to meet basic household needs for a non-trivial period
      following income disruption. The concept is distinct from income
      (ongoing earnings), from financial dependency (reliance on another's
      income), from livelihood diversity (the structural independence of
      income sources), and from institutional support (external transfers).
      No existing file in the knowledge layer owns this concept.
      This file is its authoritative owner.
      See new_concept_declarations for authority matrix registration.
    qualifying_condition: >
      The household possesses liquid or readily realisable assets sufficient
      to sustain basic household needs for a meaningful period beyond a
      disruption event. The household can identify these assets during
      registration when asked. A buffer that is entirely inaccessible —
      held by another person, in an inaccessible location, subject to a
      legal dispute, or culturally unavailable to the registrant — does
      not qualify. The test is practical: if the primary earner lost income
      today, does the household have something of its own to draw on while
      seeking recovery?
    provider_dependency:
      depends_on_active_provider: false
      provider_note: >
        Financial buffer is a household asset, not a provider relationship.
        Its protective value is stable as long as the buffer is intact and
        accessible. The relevant assessment is whether the buffer currently
        exists and whether the household has control over it.
    hazard_categories_moderated:
      primary: [economic]
      secondary: [environmental, social_protection]
      moderation_note: >
        Moderates economic hazard by providing a bridge between disruption
        and recovery or external support. Moderates environmental hazard
        by enabling rapid expenditure on shelter repair, alternative
        accommodation, or emergency needs without deferring to credit.
        Moderates social protection hazard by reducing the desperation
        conditions under which exploitative decisions are made in the
        immediate aftermath of a shock.
    ontology_notes:
      - This is a new concept defined for the first time in this file.
        Must be registered in ontology_authority_matrix.md as a Risk
        Domain concept owned by protective-factors.yaml.
      - Financial buffer is not equivalent to wealth. A household with
        modest savings accessible at the time of need holds a financial
        buffer. A household with substantial assets that are illiquid,
        inaccessible, held by another party, or subject to dispute does not.
      - The scale of the buffer is not classified at this level — the Risk
        Domain does not impose a minimum threshold in this file. Its
        presence as a meaningful, accessible household resource is the
        qualifying condition. Household-resilience.yaml may account for
        the relative magnitude of the buffer in composing overall
        resilience; this file defines only its presence as a protective
        factor.

  # ---------------------------------------------------------------------------
  - id: livelihood_diversity
    name: Livelihood Diversity
    category: economic_stability
    description: >
      The household generates income or material resources from two or more
      sources that are sufficiently independent that the failure of one does
      not automatically eliminate the others. The diversity is structural —
      the household's economic base is not exposed to a single failure mode.
      Sources may include different employment sectors (one household member
      in agriculture, another in skilled trade), different income types
      (wages and self-employment activity), or different seasonal cycles
      (a harvest-linked income and a year-round skill-based income stream).
      The independence of the failure modes is what constitutes the
      protective condition, not merely the count of income sources.
    protective_mechanism: >
      Livelihood diversity reduces the household's exposure to sector-
      specific, occupation-specific, or season-specific economic shocks.
      When income sources are structurally independent, a disruption
      affecting one source — a crop failure, a construction off-season,
      a sector-specific market contraction — leaves the other source
      intact. The household maintains partial income flow that prevents
      immediate destitution and preserves the option to seek support or
      rebuild rather than making irreversible crisis decisions.
      Diversity is not the same as having two earners: two earners in
      the same industry working for the same employer have identical
      economic exposure. The independence of sources from each other's
      failure modes is the operative protective concept.
    source_type: new_concept
    definition: >
      Livelihood diversity is defined here for the first time as a Risk
      Domain concept. It describes the structural independence of a
      household's income or resource sources such that a single sector-
      specific, occupation-specific, or seasonal shock does not simultaneously
      eliminate all sources. It is distinct from income_redundancy (which
      addresses whether more than one person earns) because it addresses
      whether the sources are independently exposed to economic hazard.
      A household with two earners in the same occupation faces identical
      sector-specific economic hazard — it has income redundancy without
      livelihood diversity. A household with one earner in agriculture
      and another in skilled trade has both. No existing file in the
      knowledge layer owns this concept.
      This file is its authoritative owner.
      See new_concept_declarations.
    qualifying_condition: >
      The household has at least two active income or material resource
      sources that are independently exposed to economic hazard — such
      that the disruption of one due to seasonal pattern, sector-specific
      shock, or occupation-specific event does not automatically reduce or
      eliminate the other. The independence of failure modes, not the
      count of sources, is the qualifying criterion. Both sources must be
      currently active and contributing.
    provider_dependency:
      depends_on_active_provider: true
      provider_note: >
        Both sources must be currently active to constitute the protective
        factor. A previously diverse livelihood that has been reduced to one
        active source by a recent disruption no longer qualifies. Assess at
        the time of registration which sources are currently generating
        income or resources.
    hazard_categories_moderated:
      primary: [economic]
      secondary: []
      moderation_note: >
        Moderates economic hazard specifically arising from sector-specific,
        occupation-specific, or seasonal disruption. A household with
        livelihood diversity is structurally more resilient to economic
        shocks that affect one sector or seasonal cycle without affecting
        another. This factor has no meaningful secondary moderation
        relationship — its protection is specific to the economic domain.
    ontology_notes:
      - This is a new concept defined for the first time in this file.
        Must be registered in ontology_authority_matrix.md.
      - The relationship between livelihood_diversity and income_redundancy
        is one of intersection, not hierarchy. A household may have one
        without the other. A complete economic protective factor picture
        requires assessing both independently.
      - Livelihood diversity is assessed at the household level, not per
        earner. The question is whether the household's aggregate income
        structure is diversified, not whether any individual earner has
        diverse income streams.

  # ===========================================================================
  # CATEGORY: CAREGIVING STRENGTH
  # ===========================================================================

  # ---------------------------------------------------------------------------
  - id: caregiver_redundancy
    name: Caregiver Redundancy
    category: caregiving_strength
    description: >
      A secondary caregiver within the household or family is identified,
      available, and currently active — capable of providing care for
      household dependents if the primary caregiver becomes unavailable.
      The household's caregiving function is not entirely concentrated in
      a single person. A grandmother who regularly provides care alongside
      a mother constitutes a secondary caregiver. An aunt living nearby
      who is available, known to the dependents, and has a current and
      active relationship with the household may constitute one. A named
      but geographically remote family member who has not provided care
      recently does not.
    protective_mechanism: >
      Caregiver redundancy prevents the total collapse of dependent care
      following a disruption to the primary caregiver. For households
      with infants, young children, or elderly dependents with minimal
      independent living capability, the complete absence of a functioning
      caregiver is immediately life-affecting. A secondary caregiver does
      not need to match the primary caregiver's capacity — they provide
      partial care continuity that bridges the gap between a disruption
      and recovery or external support. The bridge is what is protective.
    source_type: structural_attribute
    attribute_ref: "family-structure.yaml#caregiving_structure"
    qualifying_condition: >
      primary_caregiver_sole_caregiver is false AND at least one secondary
      caregiver is recorded with contribution_status: active AND the
      secondary caregiver has the physical proximity and established
      relationship with the dependents to provide care if called upon
      within a reasonable timeframe. A person who exists as a potential
      caregiver but who lacks either the proximity or the current
      relationship with the dependents does not qualify.
    provider_dependency:
      depends_on_active_provider: true
      provider_note: >
        The secondary caregiver's own health, capability, and availability
        are prerequisites for this factor to be protective. A secondary
        caregiver who is themselves elderly with declining physical reserve,
        or who carries their own high-dependency household, may not
        constitute a reliable caregiver redundancy. Assess the secondary
        caregiver's current capacity, not merely their existence.
    hazard_categories_moderated:
      primary: [health_epidemiological]
      secondary: [social_protection]
      moderation_note: >
        Moderates health and epidemiological hazard by ensuring that
        dependent care does not collapse if the primary caregiver becomes
        ill, injured, or otherwise incapacitated. Moderates social
        protection hazard by maintaining adult protective presence for
        dependents — particularly children — when the primary caregiver
        is unavailable.
    ontology_notes:
      - References family-structure.yaml's caregiving_structure. Does not
        introduce a new concept.
      - This is the positive counterpart to caregiving_dependency_single_provider
        in vulnerability.yaml. It requires active secondary care provision,
        not merely the absence of sole-caregiver status. A household with
        two named caregivers both of whom are currently inactive does not
        hold this protective factor.

  # ---------------------------------------------------------------------------
  - id: caregiver_capability_adequate
    name: Caregiver Capability Adequate for Dependent Needs
    category: caregiving_strength
    description: >
      The primary caregiver's assessed caregiving capability is at the
      full or functional level relative to the specific care demands of
      the dependents in this household. The caregiver can meet the physical,
      developmental, and emotional care needs of those in their care without
      significant gaps under current conditions. The assessment is not
      against an ideal standard — it is against what this household's
      dependents currently require. A caregiver who is adequate for the
      demands of one moderately dependent elderly parent may not be adequate
      for the simultaneous demands of an infant and two young children.
      The qualifying condition captures both elements.
    protective_mechanism: >
      Adequate caregiver capability is the foundation on which all dependent
      wellbeing rests, particularly for infants, toddlers, and persons with
      minimal independent living capability. Where caregiving capability is
      genuinely adequate, the developmental trajectory of young children is
      protected, the physical needs of dependent elderly members are met,
      and the household is not generating a downstream vulnerability signal
      from a capability gap in its most structurally critical role. This
      factor is most significant in households where the caregiver is also
      the sole caregiver — caregiver_redundancy is absent, but this factor
      moderates the consequence of that concentration.
    source_type: capability_reference
    domain_ref: "capabilities.yaml#caregiving"
    qualifying_level: functional
    qualifying_condition: >
      The primary caregiver's caregiving capability is assessed at full
      or functional using the four-level scale in capabilities.yaml,
      AND the caregiving_burden_level attribute in capabilities.yaml
      does not indicate that the current demand is straining or exceeding
      the caregiver's capacity. Both conditions must hold. A caregiver
      with functional base capability who is simultaneously managing four
      high-need dependents may have adequate individual capability but
      insufficient capacity given the demand. The factor does not confirm
      when the demand is straining capacity, regardless of the base
      capability level.
    provider_dependency:
      depends_on_active_provider: true
      provider_note: >
        This factor describes the primary caregiver's current capability
        at the point of registration. It is time-sensitive — illness,
        mental health deterioration, bereavement, or significant new life
        demand can alter caregiving capability. The factor must be
        reassessed at each registration event and is not assumed to persist
        from prior assessments.
    hazard_categories_moderated:
      primary: [health_epidemiological]
      secondary: [social_protection]
      moderation_note: >
        Moderates health and epidemiological hazard by ensuring dependents
        receive adequate developmental stimulation, physical care, and
        timely illness recognition. Moderates social protection hazard
        by maintaining the protective adult presence that reduces dependent
        vulnerability to neglect, exploitation, and harm.
    ontology_notes:
      - References capabilities.yaml#caregiving and uses its four-level
        scale by value (full or functional). Does not redefine the
        capability concept.
      - The assessment of this factor requires attention to caregiving_burden_level
        in capabilities.yaml, not only the base capability level. High
        demand can negate adequate individual capability, and both must
        be assessed before this factor is confirmed.
      - This factor is most significant in the absence of caregiver_redundancy.
        A household with a sole caregiver and adequate caregiving capability
        is in a structurally different position from one with a sole caregiver
        and a caregiving capability gap — even though both lack redundancy.

  # ===========================================================================
  # CATEGORY: AUTHORITY AND DECISION-MAKING
  # ===========================================================================

  # ---------------------------------------------------------------------------
  - id: distributed_decision_making_authority
    name: Distributed Decision-Making Authority
    category: authority_and_decision_making
    description: >
      Decision-making authority within the family is held by more than one
      person — either through a shared_authority or co_decision_maker
      configuration as defined in family-structure.yaml — or is formally
      held by an identified and currently accessible legal guardian where
      a dependent requires legal representation. When a significant decision
      must be made about medical care, relocation, consent for a protective
      intervention, or a financial commitment, there is more than one
      person with the authority and standing to make or meaningfully
      contribute to that decision.
    protective_mechanism: >
      Distributed decision-making authority prevents the decision-making
      vacuum that arises when a sole authority holder is incapacitated,
      absent, deceased, or is themselves the source of the threat requiring
      a protective decision. For households with minor children, elderly
      members with cognitive decline, or adults requiring medical consent,
      the inability to make authorised decisions is a structural blocking
      point — no intervention can proceed without it. Distribution of
      authority is what allows protective decisions to continue when the
      primary authority holder cannot act. It is also a structural protection
      against the household's decision-making capacity being held hostage
      to one person's availability or intent.
    source_type: structural_attribute
    attribute_ref: "family-structure.yaml#decision_making_structure"
    qualifying_condition: >
      decision_making_configuration is shared_authority OR
      decision_making_configuration is co_decision_maker AND both
      authority holders are currently accessible and able to act.
      Where decision_making_configuration is external_authority, this
      factor qualifies only if the external authority holder is reliably
      reachable and their authority is legally or socially recognised in
      the household's current location — not merely historically. A
      co-decision-making configuration in which one holder has migrated,
      is detained, or is deceased effectively collapses to sole authority
      and does not constitute this protective factor.
    provider_dependency:
      depends_on_active_provider: true
      provider_note: >
        Both or all identified authority holders must be currently
        accessible. Authority distribution that exists structurally but
        not practically — one holder in another city with no reliable
        communication, one holder in detention — does not constitute this
        protective factor.
    hazard_categories_moderated:
      primary: [social_protection]
      secondary: [legal_administrative, health_epidemiological]
      moderation_note: >
        Moderates social protection hazard by distributing authority such
        that no single person's incapacity, absence, or harmful intent
        can block protective action for household members. Moderates
        legal and administrative hazard by ensuring decisions required
        for service access and consent can be made when needed. Moderates
        health hazard by ensuring medical consent can be provided when one
        authority holder is unavailable.
    ontology_notes:
      - References family-structure.yaml's decision_making_structure. Does
        not introduce a new concept.
      - This factor is most significant in households with minor children,
        persons with cognitive impairment, or elderly members requiring
        medical decisions — contexts where the inability to provide
        authorised consent is immediately blocking.
      - This is the positive counterpart to both the
        decision_making_dependency_authority_vacuum vulnerability contributor
        and the authority_vacuum_structural contributor in vulnerability.yaml.
        It requires active, distributed authority — not merely the absence
        of a formally declared vacuum.

  # ===========================================================================
  # CATEGORY: SUPPORT NETWORKS
  # ===========================================================================

  # ---------------------------------------------------------------------------
  - id: extended_family_support_active
    name: Extended Family Support Active
    category: support_networks
    description: >
      Relatives beyond the immediate household are available to provide
      support and have an established, currently active relationship with
      the household that makes their support functionally available in a
      crisis. The support may be economic (sharing resources, emergency
      financial contribution), physical (providing care when the household's
      own caregiver is unable), or social (information, advocacy, emotional
      support). The key qualifying element is that the relationship is
      current — not historically present, not geographically severed, not
      dependent on communication that has lapsed.
    protective_mechanism: >
      Extended family support extends the household's effective resource
      base and caregiving capacity beyond what the household itself
      contains. In crisis conditions, an active extended family network
      is frequently the first and most immediate source of support —
      faster and more contextually appropriate than institutional channels,
      and available before formal registration is complete. The household
      with active extended family support has a buffer that operates before
      external services are engaged and that continues to operate alongside
      them. Its absence is often what makes a crisis catastrophic rather
      than manageable.
    source_type: structural_attribute
    attribute_ref: "family-structure.yaml#family_support_network"
    qualifying_condition: >
      extended_family_support_available is true AND the support relationship
      is currently active — evidenced by recent exchange or by a confirmed,
      ongoing relationship in which support would be provided if needed
      within a reasonable timeframe. Extended family members who exist but
      have had no contact with the household in a significant period, who
      have explicitly withdrawn from the support relationship, or who are
      themselves in crisis and unable to support, do not qualify.
    provider_dependency:
      depends_on_active_provider: true
      provider_note: >
        Extended family support can be severed by displacement, conflict,
        bereavement, or geographic separation. Assess whether the network
        has been geographically disrupted (network_disrupted_by_displacement
        in family-structure.yaml) before confirming this factor. A network
        that was active before displacement may be entirely unavailable in
        the current location even when family members remain alive.
    hazard_categories_moderated:
      primary: [social_protection]
      secondary: [economic, health_epidemiological]
      moderation_note: >
        Moderates social protection hazard by providing informal protective
        presence, information networks, and emotional buffering. Moderates
        economic hazard by providing informal financial support and resource
        sharing during income disruption. Moderates health hazard by
        providing supplementary caregiving capacity when the household's
        own caregiving capacity is reduced.
    ontology_notes:
      - References family-structure.yaml#family_support_network. Does not
        introduce a new concept.
      - The displacement interaction is critical. A household with strong
        extended family support before displacement may have lost that
        support entirely. network_disrupted_by_displacement is the relevant
        attribute to verify before confirming this factor for recently
        displaced households.

  # ---------------------------------------------------------------------------
  - id: community_network_active
    name: Community Network Active
    category: support_networks
    description: >
      The household has current, active connections to community structures
      — religious organisations, neighbourhood networks, professional or
      trade associations, women's groups, farmers' cooperatives, or
      equivalent community formations — through which it can access
      information, mutual support, and informal protection in a crisis.
      The network must be current and specific to the household's present
      location and context, not a historical connection to a community
      from which the household is now separated.
    protective_mechanism: >
      Community networks provide information, resources, and informal
      protection that extend beyond the household's and extended family's
      own capacity. A household embedded in an active community network
      receives earlier warning of hazards, faster informal support when a
      crisis occurs, and the social capital that enables access to both
      informal and formal support channels. Social isolation — the extreme
      absence of this factor — is a documented amplifier of vulnerability
      across all hazard categories. The network's protective value is not
      what it directly provides; it is the range of possibilities it makes
      accessible that a socially isolated household cannot reach.
    source_type: structural_attribute
    attribute_ref: "family-structure.yaml#family_support_network"
    qualifying_condition: >
      community_network_available is true AND the household is currently
      participating in or connected to at least one identifiable community
      structure in their current location. The connection must be active —
      a household that recently arrived in a new area and has not yet formed
      community connections does not qualify even if the family has high
      social participation capability in general. This factor is location-
      and context-specific. It is confirmed by the household's ability to
      name a current community connection, not by an assessment of general
      sociability.
    provider_dependency:
      depends_on_active_provider: false
      provider_note: >
        Community networks are collective structures rather than individual
        providers. The relevant assessment is whether the household is
        currently embedded in a functioning network in their present
        location, not whether a specific individual is available.
    hazard_categories_moderated:
      primary: [social_protection]
      secondary: [environmental, health_epidemiological, economic]
      moderation_note: >
        Moderates social protection hazard through informal monitoring,
        social accountability, and mutual protective presence. Moderates
        environmental hazard through community information-sharing and
        collective response capacity. Moderates health hazard through
        community health information and informal care support. Moderates
        economic hazard through informal credit, resource-sharing, and
        labour exchange networks.
    ontology_notes:
      - References family-structure.yaml#family_support_network. Does not
        introduce a new concept.
      - This factor is strictly household-assessable and current-location-
        specific. It does not assess community-level service infrastructure
        or coverage, which belong to Stage 8. A household may report active
        community connections; what those connections consist of and whether
        they are currently functioning is within scope for registration.
      - Displaced households frequently lack this factor entirely upon
        initial registration, even when they held strong community networks
        at their origin location. The absence of this factor in a recently
        displaced household is a structural gap created by the displacement
        event, not an individual failing.

  # ---------------------------------------------------------------------------
  - id: institutional_support_active
    name: Institutional Support Currently Active
    category: support_networks
    description: >
      The household is currently receiving formal support from an
      institutional source — a government benefit, pension, disability
      allowance, widow's allowance, formal food assistance programme, or
      an NGO programme — that is currently functioning and providing its
      intended benefit. The support is active at the time of registration,
      not merely applied for, historically received, or approved but not
      yet disbursed.
    protective_mechanism: >
      Active institutional support provides a baseline resource floor that
      reduces the household's exposure to the most acute consequences of
      economic disruption. It represents a formalised, predictable resource
      that does not depend on the goodwill of family or community members
      and does not require reciprocity. It functions as a structural economic
      floor beneath the household's own resources — a floor that operates
      regardless of the household's informal network status and that
      provides predictable recurrence rather than crisis-triggered response.
    source_type: structural_attribute
    attribute_ref: "family-structure.yaml#family_support_network"
    qualifying_condition: >
      institutional_support_existing is true AND the institution is currently
      operational and the household is currently receiving its intended
      benefit. An institutional support arrangement that has lapsed, been
      suspended, is under review, or is contingent on documentation the
      household does not currently possess does not qualify. Active Khidmat-
      provided interventions do not qualify as this protective factor —
      the factor records independently-sourced institutional support, not
      support Khidmat is currently providing to this case.
    provider_dependency:
      depends_on_active_provider: false
      provider_note: >
        Institutional support is provided by an organisation, not an
        individual. Its continuity depends on institutional functioning
        rather than individual availability. The relevant assessment is
        whether the programme is operational, the household's access is
        current, and the benefit is currently being received.
    hazard_categories_moderated:
      primary: [economic]
      secondary: [health_epidemiological, legal_administrative]
      moderation_note: >
        Moderates economic hazard by providing a resource floor that
        reduces the immediacy of income disruption consequences. Moderates
        health hazard where the institutional support is health-related
        (nutrition programmes, healthcare access schemes, disability support).
        Moderates legal and administrative hazard where the institutional
        relationship provides documentation or formal recognition of the
        household's entitlement status.
    ontology_notes:
      - References family-structure.yaml#family_support_network. Does not
        introduce a new concept.
      - >
        The exclusion of Khidmat-provided interventions from this factor
        is deliberate and architectural. Protective Factors record conditions
        present independently of Khidmat's activity. Including active Khidmat
        interventions as protective factors would create a circular dependency:
        risk assessment would be moderated by the intervention designed to
        address the risk. The two must remain independent.

  # ===========================================================================
  # CATEGORY: EDUCATIONAL STABILITY
  # ===========================================================================

  # ---------------------------------------------------------------------------
  - id: educational_continuity_stable
    name: Educational Continuity Stable
    category: educational_stability
    description: >
      Children or adolescents in the household who are of educational age
      are currently enrolled in and regularly attending education, AND the
      educational sponsorship arrangement — who finances fees, who manages
      school attendance, who supports the educational process — is stable
      and not currently at risk. Educational continuity is stable when both
      the supply side (school access, fees covered, transport manageable)
      and the demand side (the child's actual attendance, the household's
      current prioritisation of education over alternatives) are functioning.
      Both must hold for the factor to be confirmed.
    protective_mechanism: >
      Educational continuity protects children and adolescents from the
      compounding vulnerability of educational exclusion — the documented
      shift toward child labour, the acceleration of early marriage risk
      for adolescent females in financially constrained households, the
      loss of the peer social network that school provides, and the
      foreclosure of adult livelihood pathways that depend on educational
      attainment. This factor is assessed at a point in time: the household
      is currently maintaining it. It does not guarantee future continuity —
      it records a present protective condition.
    source_type: structural_attribute
    attribute_ref: "family-structure.yaml#educational_investment_obligations"
    qualifying_condition: >
      children_in_education is true AND educational_sponsorship_stable is
      true AND educational_continuity_at_risk is false. All three conditions
      must hold simultaneously. A household with enrolled children but an
      unstable sponsorship arrangement (fees unpaid, sponsor's capacity
      disrupted) does not qualify. A household where children are nominally
      enrolled but attendance is irregular due to household demands does
      not qualify. The factor requires that both the structural support for
      education and the child's actual attendance are currently functioning.
    provider_dependency:
      depends_on_active_provider: true
      provider_note: >
        Educational continuity depends on the educational sponsor's ongoing
        capacity. Assess educational_sponsorship_stable as a prerequisite.
        A sponsor whose income has been disrupted or whose capacity to
        maintain fee payments is at risk removes the structural foundation
        of this protective factor even before the child's attendance is
        visibly affected. The factor lags the sponsorship disruption by
        the fee payment cycle.
    hazard_categories_moderated:
      primary: [social_protection]
      secondary: [economic]
      moderation_note: >
        Moderates social protection hazard by maintaining the protective
        structure of school attendance — the social supervision, peer
        network, and adult-monitored environment that reduce exploitation
        and protection risk, particularly for adolescent females. Moderates
        economic hazard by maintaining the household's investment in future
        livelihood pathways that reduce long-term economic vulnerability.
    ontology_notes:
      - References family-structure.yaml#educational_investment_obligations.
        Does not introduce a new concept.
      - >
        This factor directly formalises the reasoning implication in
        lifecycle-stages.yaml#school_age_child: "educational continuity is
        the primary developmental stake of this stage." The lifecycle stage
        vocabulary names the importance; this factor records when it is
        currently protected.
      - This factor is structurally inapplicable to households with no
        school-age or adolescent members. It must not be recorded as absent
        for households where it is not applicable — it is not assessed.

  # ===========================================================================
  # CATEGORY: CAPABILITY ASSETS
  # ===========================================================================

  # ---------------------------------------------------------------------------
  - id: self_advocacy_functional
    name: Self-Advocacy Capability Functional or Above
    category: capability_assets
    description: >
      The primary adult spokesperson for the household — the registrant
      or the person who will interact with institutions on the household's
      behalf — has self-advocacy capability assessed at the functional or
      full level. They can manage institutional interactions required for
      service access, assert entitlements when challenged by gatekeeping,
      navigate standard bureaucratic processes without requiring a proxy
      or dedicated advocate, and seek redress when treated unfairly.
      The household has someone who can represent it effectively in the
      formal settings where protective services are accessed.
    protective_mechanism: >
      Self-advocacy capability is what converts formal entitlements into
      actual access. A household entitled to a service that cannot navigate
      the institutional process required to claim it has no practical
      protection from that entitlement. Functional self-advocacy means the
      household can access protective services, assert rights under pressure,
      challenge gatekeeping decisions, and pursue assistance through
      standard channels without requiring external facilitation for every
      interaction. This is particularly protective in legal and administrative
      hazard contexts where formal processes must be navigated to maintain
      documentation, legal status, and formally-gated service access.
    source_type: capability_reference
    domain_ref: "capabilities.yaml#self_advocacy"
    qualifying_level: functional
    qualifying_condition: >
      The person who will perform institutional navigation on behalf of
      the household has self_advocacy capability assessed at functional
      or full using the four-level scale in capabilities.yaml. The
      assessment is of the specific person who will actually perform
      that function — not merely anyone in the household who theoretically
      holds this capability. If the person with functional self-advocacy
      is not the person who will interact with institutions, the factor
      does not apply.
    provider_dependency:
      depends_on_active_provider: true
      provider_note: >
        Self-advocacy capability is a personal capability of a specific
        individual. If the person holding this capability is unavailable
        — through illness, displacement, detention, or bereavement — the
        protective factor lapses for the household until another person
        with this capability takes on the institutional representation role.
    hazard_categories_moderated:
      primary: [legal_administrative]
      secondary: [social_protection, health_epidemiological]
      moderation_note: >
        Moderates legal and administrative hazard by enabling the household
        to navigate documentation, legal status, and formal processes
        without requiring dedicated external facilitation. Moderates social
        protection hazard by enabling the household to assert rights and
        seek formal support when protection is needed. Moderates health
        hazard by enabling the household to access health services and
        advocate for appropriate care when standard processes present
        barriers.
    ontology_notes:
      - References capabilities.yaml#self_advocacy and uses the four-level
        scale by value (functional or full). Does not redefine the capability
        concept.
      - >
        The minimal self_advocacy vulnerability contributor in vulnerability.yaml
        captures the risk when this capability is absent. This factor captures
        the positive protective value when it is present. The two are not
        symmetric: the vulnerability contributor fires at minimal; this
        protective factor fires at functional or above. The gap between
        minimal and functional is the critical operational space.

  # ===========================================================================
  # CATEGORY: HEALTH MANAGEMENT
  # ===========================================================================

  # ---------------------------------------------------------------------------
  - id: treatment_continuity_active
    name: Treatment Continuity Active for Manageable Condition
    category: health_management
    description: >
      A household member with a health condition rated
      manageable_with_treatment in health-conditions.yaml is currently
      receiving appropriate treatment for that condition, and that treatment
      is functioning to maintain the person's condition at a stable or
      controlled level rather than allowing it to progress toward its
      disability potential. The treatment is active and accessible to this
      household at the time of registration. This factor addresses a
      specific gap: health-conditions.yaml defines what is clinically
      possible; this factor records whether that possibility is being
      realised.
    protective_mechanism: >
      The disability_potential of a manageable condition is its clinical
      trajectory without adequate treatment. Treatment continuity is what
      converts a high-disability-potential condition from an active
      deterioration risk into a managed, stable state. A person with
      diabetes, hypertension, tuberculosis, HIV, epilepsy, or a severe
      mental health condition who is receiving appropriate, continuous
      treatment occupies a structurally different risk position from one
      with the same condition and no treatment access. The condition is the
      same; the active risk trajectory is not. This protective factor does
      not cure the condition — it records that the household is successfully
      managing it now.
    source_type: new_concept
    definition: >
      Treatment continuity active is defined here for the first time as
      a Risk Domain concept. It describes the state in which a person
      with a health condition rated manageable_with_treatment has currently
      active treatment that is functioning to maintain stable condition and
      is not at immediate risk of interruption. The concept closes a specific
      gap: health-conditions.yaml records clinical possibility (treatability);
      the registration domain records healthcare as a need category when
      access is absent. Neither owns the positive protective state of
      confirmed, functioning treatment continuity. This file is its
      authoritative owner.
      See new_concept_declarations.
    qualifying_condition: >
      A household member has a condition with treatability:
      manageable_with_treatment in health-conditions.yaml AND is currently
      receiving treatment that is accessible, ongoing, and functioning to
      maintain stable or controlled status AND no immediate supply chain,
      financial, or access disruption to that treatment has been identified.
      Treatment that has lapsed, been interrupted, is no longer accessible,
      or is at known immediate risk of interruption does not qualify — that
      scenario indicates the condition's disability_potential is now on an
      active trajectory and the protective factor has lapsed.
    provider_dependency:
      depends_on_active_provider: false
      provider_note: >
        Treatment continuity depends on healthcare access remaining intact,
        not on an individual provider being available. The relevant assessment
        is whether the treatment itself is accessible and ongoing. Disruption
        of healthcare access through displacement, supply failure, or cost
        barrier removes this protective factor; that scenario constitutes
        an active health epidemiological hazard exposure for the household.
    hazard_categories_moderated:
      primary: [health_epidemiological]
      secondary: []
      moderation_note: >
        Moderates health and epidemiological hazard by preventing the active
        progression of a manageable condition toward its disability potential.
        The condition's disability_potential in health-conditions.yaml
        describes the risk trajectory without treatment; this factor records
        that the treatment barrier has been overcome and the trajectory is
        currently controlled. The moderation is condition-specific and
        does not extend to other hazard categories.
    ontology_notes:
      - This is a new concept defined for the first time in this file.
        Must be registered in ontology_authority_matrix.md as a Risk
        Domain concept owned by protective-factors.yaml.
      - >
        This factor applies only to conditions with treatability:
        manageable_with_treatment. It does not apply to conditions rated
        curable (where the relevant question is whether the cure has been
        achieved), manageable_without_treatment (where treatment continuity
        is not the operative variable), or irreversible.
      - This factor interacts directly with the high_disability_potential_condition
        contributor in vulnerability.yaml. When a condition with high
        disability potential is present and treatment continuity is active,
        the vulnerability contribution from the condition is moderated.
        That moderation is computed in household-resilience.yaml and risk.yaml,
        not here. This file defines only that the protective condition is present.
      - Treatment continuity is structurally fragile in displacement,
        humanitarian crisis, and resource-constrained settings. Its presence
        at registration must not be assumed to persist — it must be
        re-assessed at each registration event. Displacement is the
        most common and most immediate cause of treatment interruption for
        manageable conditions in humanitarian contexts.

# -----------------------------------------------------------------------------
# NEW CONCEPT DECLARATIONS
# Concepts defined for the first time in this file.
# Each must be registered in ontology_authority_matrix.md.
# No file in the knowledge layer owned these concepts before this file.
# -----------------------------------------------------------------------------

new_concept_declarations:

  - concept_id: financial_buffer
    concept_name: Financial Buffer
    authoritative_file: "shared/risk/taxonomy/protective-factors.yaml"
    owner_domain: Risk Domain
    introduced: "Phase 3.2"
    rationale: >
      No existing file defines accumulated household economic reserves as a
      structured protective concept. family-structure.yaml defines earner
      roles and earning structure; capabilities.yaml defines economic
      management capability. Neither captures the existence of a savings or
      asset buffer — the household's own accumulated economic reserve — as
      a household-level protective attribute with structured vocabulary.
      This concept fills that gap.
    authority_matrix_action_required: >
      Add entry to ontology_authority_matrix.md under Risk Domain concepts
      table, declaring protective-factors.yaml as authoritative file.

  - concept_id: livelihood_diversity
    concept_name: Livelihood Diversity
    authoritative_file: "shared/risk/taxonomy/protective-factors.yaml"
    owner_domain: Risk Domain
    introduced: "Phase 3.2"
    rationale: >
      family-structure.yaml models who earns (earner roles and earning
      structure). capabilities.yaml models what individuals are capable of
      in employment and enterprise. Neither models the structural independence
      of income sources as a household-level protective characteristic.
      Livelihood diversity captures whether the household's income structure
      is diversified across independently-failing modes — a concept distinct
      from the count of earners or any individual's capability profile.
    authority_matrix_action_required: >
      Add entry to ontology_authority_matrix.md under Risk Domain concepts
      table, declaring protective-factors.yaml as authoritative file.

  - concept_id: treatment_continuity_active
    concept_name: Treatment Continuity Active
    authoritative_file: "shared/risk/taxonomy/protective-factors.yaml"
    owner_domain: Risk Domain
    introduced: "Phase 3.2"
    rationale: >
      health-conditions.yaml defines what is clinically possible
      (treatability). The registration domain records healthcare as a need
      category when access is absent. Neither owns the positive state in
      which a person with a manageable condition is currently receiving
      functioning treatment and maintaining a stable health trajectory.
      This concept closes the gap between clinical possibility and current
      operational reality for managed conditions.
    authority_matrix_action_required: >
      Add entry to ontology_authority_matrix.md under Risk Domain concepts
      table, declaring protective-factors.yaml as authoritative file.

# -----------------------------------------------------------------------------
# DESIGN DECISIONS
# -----------------------------------------------------------------------------

design_decisions:

  - decision: Twelve protective factors across seven categories, not a
      broader set
    rationale: >
      Scope was constrained by two tests — atomicity and registration
      assessability — applied during architecture review. Factors that
      failed the atomicity test (adaptive capacity, recovery capacity,
      household cohesion as composite assessments) belong to
      household-resilience.yaml. Factors that failed the registration
      assessability test (community-level service coverage, geographic
      protective features, area-level infrastructure) belong to the
      Community Context Domain (Stage 8). The twelve factors that remain
      are each independently observable from a registration conversation
      and each describes a single present condition rather than a
      composition of conditions.

  - decision: No Protective Factor level scale
    rationale: >
      Consistent with the qualitative-only principle governing the entire
      Risk Domain. Whether a protective factor is present is determined
      by its qualifying condition. The quality of presence — how stable,
      how secure — is expressed in the qualifying condition text and the
      basis recorded at assessment time. A level scale would constitute
      a de facto scoring approach. Household-resilience.yaml uses the
      presence and pattern of protective factors in composing overall
      resilience; that composition remains qualitative.

  - decision: Positive characterisation throughout, not logical negation
    rationale: >
      Every factor is written as a description of what IS present and
      protective. This is an architectural requirement, not stylistic
      preference. Protective Factors written as absences are risk factor
      assessments that came back negative — not positive protective assets.
      Positive characterisation is what distinguishes an identified
      Protective Factor from an absent Risk Factor, and the distinction
      matters for the Resilience composition logic in household-resilience.yaml.

  - decision: Three new concepts defined here; all others reference existing
      files by established patterns
    rationale: >
      ADR-008 requires single ownership. Before defining a new concept,
      the question is whether any existing file already owns it. The
      ownership audit during architecture review confirmed that nine of
      the twelve factors reference existing concepts owned by
      family-structure.yaml and capabilities.yaml, and that three —
      financial_buffer, livelihood_diversity, and treatment_continuity_active
      — have no prior owner anywhere in the knowledge layer. Only the three
      unowned concepts are defined here. The remaining nine reference
      authoritative files using the patterns from risk-domain-governance.md.

  - decision: provider_dependency is an explicit field, not implied
    rationale: >
      Several protective factors depend on an identified provider being
      active and contributing. Making this explicit prevents the factors
      from being assessed as present when the provider exists in principle
      but is not currently active. An existing-but-inactive provider is
      a theoretical asset, not a present protective condition. The
      architecture review identified this as a required field because
      "a secondary caregiver exists" and "a secondary caregiver is
      currently active and available" are structurally different claims.

  - decision: Khidmat-provided interventions excluded from
      institutional_support_active
    rationale: >
      Protective Factors record conditions that exist independently of
      Khidmat's activity. Including active Khidmat interventions as
      protective factors would create a circular dependency in reasoning:
      risk assessment would be moderated by the intervention designed to
      address the risk. The concepts must remain independent. Active
      Khidmat interventions are recorded in the registration and case
      management domains.

  - decision: Hazard moderation relationships are directional guidance,
      not exclusive attribution
    rationale: >
      Each protective factor lists primary and secondary hazard categories
      it most directly moderates. These are guidance signals for
      household-resilience.yaml and risk.yaml's composition logic —
      which hazard-specific calculations are most affected when this
      factor is present. They are not exclusive claims. A factor that
      primarily moderates economic hazard may still have indirect
      relevance to social protection hazard. The primary/secondary
      distinction preserves precision without claiming exhaustiveness.

# -----------------------------------------------------------------------------
# ONTOLOGY NOTES
# -----------------------------------------------------------------------------

ontology_notes:
  - Protective Factors are assessed at a single point in time. They are
    not permanent labels. A household with income redundancy today may
    lose it if the secondary earner loses employment. A household with
    treatment continuity active today may lose it if healthcare access
    is disrupted by displacement. All factors must be re-assessed at
    each registration event and are not assumed to persist from prior
    assessments.
  - The open-world assumption applies throughout this file. A factor not
    examined during registration is unknown, not absent. Registrations
    conducted under time pressure or with limited conversation may not
    explore all factor categories. Unassessed factors must not be recorded
    as absent — they must be recorded as unknown or not assessed.
  - >
    Protective Factors are inputs to household-resilience.yaml's composition.
    They are not outputs of resilience assessment — they are the building
    blocks from which resilience is composed. The dependency is
    one-directional: this file supplies concepts upward to Resilience and
    does not reference household-resilience.yaml.
  - The structural parallel to vulnerability.yaml's contributor pattern
    is intentional. Vulnerability is composed from named contributors with
    source references and qualifying conditions. Protective Factors follow
    the same structural pattern. This consistency enables household-resilience.yaml
    and risk.yaml to compose from both inputs in a coherent and architecturally
    uniform way.
  - >
    No Protective Factor constitutes a guarantee of safety. A household
    with all twelve factors present still faces hazards and vulnerability.
    Protective Factors moderate risk — they do not eliminate it. The
    composed Risk assessment in risk.yaml is the product of all four inputs:
    Hazard, Exposure, Vulnerability, and Resilience. Protective Factors
    improve the Resilience input; they cannot neutralise severe Vulnerability
    or acute Exposure independently.
  - >
    Three concepts introduced in this file must be registered in
    ontology_authority_matrix.md before this file is considered fully
    governed: financial_buffer, livelihood_diversity, and
    treatment_continuity_active. Until that registration occurs, those
    concepts are defined here but not formally declared in the governance
    layer. The new_concept_declarations section above records the
    registration requirement with the specific action required.