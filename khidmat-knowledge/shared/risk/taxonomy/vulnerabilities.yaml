# =============================================================================
# Khidmat Risk Domain — Universal Vulnerability Taxonomy
# =============================================================================
# Purpose: Defines universally applicable humanitarian vulnerability concepts
#          that represent latent susceptibility to harm.
# Origin: Added per RFC v1.0 Wave 5.
# =============================================================================

schemes:
  - id: humanitarian_vulnerability
    label: Universal Humanitarian Vulnerability
    description: >
      A closed vocabulary of globally recognized humanitarian vulnerabilities.
    concepts:
      - id: unaccompanied_minor
        label: Unaccompanied Minor
        description: >
          A child who has been separated from both parents and other relatives and is not being cared for by an adult who, by law or custom, is responsible for doing so.
        
      - id: separated_child
        label: Separated Child
        description: >
          A child who has been separated from both parents, or from their previous legal or customary primary caregiver, but not necessarily from other relatives.

      - id: female_headed_household
        label: Female-Headed Household
        description: >
          A household in which an adult female is the sole or main income producer and decision-maker, often correlating with structural and economic vulnerabilities in crisis settings.

      - id: child_headed_household
        label: Child-Headed Household
        description: >
          A household in which a minor is the sole or main decision-maker and provider.

      - id: elderly_headed_household
        label: Elderly-Headed Household
        description: >
          A household in which an elderly person is the primary provider or decision-maker, often caring for younger dependents.
