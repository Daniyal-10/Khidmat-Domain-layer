# =============================================================================
# Khidmat Risk Domain — Protection Indicator Taxonomy
# =============================================================================
ontology_version: "1.0"
authority: "shared/risk/"
owner_domain: "Risk Domain"
status: "Phase 3.3 — Active"
# -----------------------------------------------------------------------------
# Purpose:        Defines a small, closed vocabulary of observable behavioural
#                 and circumstantial indicators associated with exploitation,
#                 trafficking, and coercion. An indicator is something an
#                 officer or volunteer can directly observe or elicit during
#                 a conversation — it is not a conclusion that exploitation,
#                 trafficking, or coercion has occurred.
# Scope:          This file answers "what specific, observable signal was
#                 present?" It does not answer "what kind of hazard is this?"
#                 (hazard-categories.yaml, which this file's indicators
#                 belong under by hazard_category_ref), "how vulnerable is
#                 this person?" (vulnerability.yaml), "was this indicator
#                 observed in this case?" (an instance-level fact — owned by
#                 whichever domain holds case data; see boundary_note), or
#                 "what should be done about it?" (Case Management, Stage 5,
#                 and immediate operational safeguarding referral, which sit
#                 outside the knowledge layer entirely).
# Governing ADRs: ADR-007, ADR-008, ADR-013
# Origin:         Added per Stage 3B (Registration Intelligence — Canonical
#                 Protection Indicator Enrichment), closing the single
#                 genuine gap identified by the Stage 3A Registration
#                 Intelligence Audit: hazard-categories.yaml names
#                 child_exploitation_or_trafficking only as one illustrative,
#                 non-enumerated example_hazard_type under social_protection;
#                 no controlled vocabulary existed for the recurring,
#                 recognisable behavioural pattern experienced officers use
#                 to decide when a case warrants specialised safeguarding
#                 referral.
# Cross-references:
#   shared/risk/taxonomy/hazard-categories.yaml
#     Owns the hazard category itself (social_protection). This file's
#     indicators reference that category by hazard_category_ref and do not
#     redefine, restate, or duplicate the category's own scope or
#     seasonality notes.
#   registration/taxonomy/situations.yaml
#     Owns trigger_events (bereavement, displacement, domestic_violence,
#     etc.). Exploitation/trafficking/coercion is deliberately NOT added as
#     a new trigger_event there: unlike domestic_violence, which is typically
#     named directly by a registrant or is unambiguous once observed, this
#     pattern is recognised from an accumulation of indirect signals, not a
#     single named event a registrant reports. The indicator vocabulary
#     belongs here, at the Risk Domain's concept layer; whether a specific
#     indicator was observed in a specific case is an instance-level fact,
#     recorded on registration's situation entity
#     (registration/ontology/data-properties.yaml#protection_indicators_observed),
#     consistent with this domain's "concept and instance are separate"
#     design principle (see shared/risk/README.md).
# =============================================================================

boundary_note: >
  This file owns the indicator vocabulary only — a closed set of specific,
  independently observable signals. It deliberately does NOT own:
    - the hazard category these indicators belong under (owned by
      hazard-categories.yaml; referenced here by hazard_category_ref)
    - any conclusion that exploitation, trafficking, or coercion has
      occurred — an indicator is a prompt for care and possible referral,
      not an accusation or a finding
    - whether a specific indicator was observed in a specific case (an
      instance-level fact; see Origin note above)
    - referral workflow, safeguarding escalation procedure, or what an
      officer should do once an indicator is recorded (operational and
      Case Management concerns, outside the knowledge layer)
    - country-specific legal definitions of trafficking or exploitation
      (per ADR-022, this vocabulary is deliberately jurisdiction-neutral;
      legal classification is a matter for referral partners, not this
      taxonomy)
  This boundary exists so that a small, stable, humanitarian-recognition
  vocabulary can be added without pulling case-instance data, workflow, or
  legal-classification concerns into the Risk Domain's concept layer.

# -----------------------------------------------------------------------------
# INDICATOR VOCABULARY
# -----------------------------------------------------------------------------

protection_indicator_schemes:

  - id: exploitation_and_coercion_indicators
    label: Exploitation and Coercion Indicators
    hazard_category_ref: "hazard-categories.yaml#social_protection"
    description: >
      Specific, independently observable signals during a registration or
      field conversation that experienced humanitarian officers recognise as
      warranting closer attention and, where the pattern accumulates,
      specialised safeguarding referral. Each indicator is deliberately
      narrow and behavioural — something seen or heard, not something
      inferred about a person's character or history. No single indicator
      is sufficient on its own to conclude exploitation, trafficking, or
      coercion; the humanitarian judgement of how many, and which
      combination, warrants escalation is reasoning and operational
      behaviour, not part of this vocabulary.
    concepts:

      - id: coached_or_rehearsed_testimony
        label: Coached or Rehearsed Testimony
        description: >
          The person's account, particularly of a sensitive or traumatic
          event, is delivered with a fluency and consistency of exact
          phrasing that is atypical of how genuinely distressing material
          is normally recounted, or another person present visibly
          monitors and directs the answers given.

      - id: evasive_or_inconsistent_travel_or_work_account
        label: Evasive or Inconsistent Travel or Work Account
        description: >
          The circumstances of how the person came to be at their current
          location, or the nature of work they describe doing, are
          described vaguely, inconsistently across retelling, or with
          visible reluctance disproportionate to the rest of the
          conversation.

      - id: inability_to_confirm_basic_relationship_or_household_facts
        label: Inability to Confirm Basic Relationship or Household Facts
        description: >
          A person accompanying or claiming a relationship to the
          registrant (guardian, employer, relative) cannot answer basic,
          expected questions about the household or relationship history
          that a genuine relationship would ordinarily make known.

      - id: age_or_identity_document_inconsistent_with_presentation
        label: Age or Identity Document Inconsistent with Presentation
        description: >
          A presented identity document's stated age or identity appears
          materially inconsistent with the person's physical presentation
          or the account given, beyond the ordinary variation covered by
          registration's age_estimated attribute.

      - id: third_party_controls_documents_communication_or_earnings
        label: Third Party Controls Documents, Communication, or Earnings
        description: >
          Another person present holds the registrant's identity documents,
          answers on their behalf, controls their phone or communication,
          or is described as receiving or managing the registrant's
          earnings in a manner the registrant cannot independently confirm
          or access.

      - id: restricted_movement_or_constant_accompaniment
        label: Restricted Movement or Constant Accompaniment
        description: >
          The registrant is unable to attend, speak, or move independently
          of a specific accompanying person at any point in the
          conversation, or indicates they are not permitted to travel,
          work, or communicate without that person's permission.

# -----------------------------------------------------------------------------
# DESIGN DECISIONS
# -----------------------------------------------------------------------------

design_decisions:

  - decision: A dedicated file, not an extension of hazard-categories.yaml
    rationale: >
      hazard-categories.yaml's own stated purpose is category-level
      classification ("what kind of hazard is this"), and its boundary_note
      explicitly excludes instance-level and granular indicator content to
      keep Stage 3 and Stage 8 from building two versions of the same
      concept. A closed behavioural-indicator vocabulary is a genuinely
      different concept from a hazard category — the same distinction this
      domain already drew when it elevated Protective Factor into its own
      file (protective-factors.yaml) rather than folding it into an
      existing one "as an undefined residual category" (see
      shared/risk/README.md's File Structure rationale). This file follows
      that same precedent rather than inventing a new one.

  - decision: Six indicators, deliberately closed
    rationale: >
      Consistent with the Stage 3A audit's own framing of "a small, closed
      vocabulary" — this is not an open enumeration inviting indefinite
      growth. Each of the six is a globally-recognised, jurisdiction-neutral
      behavioural signal (consistent with ADR-022's canonical-concept
      principle), not a country-specific legal category. Extending this
      list in future is expected to be rare and requires the same
      architectural review as any other Risk Domain concept addition.

  - decision: No new registration trigger_event
    rationale: >
      registration/taxonomy/situations.yaml#trigger_events names events a
      registrant typically reports directly and unambiguously once it
      surfaces (bereavement, displacement, domestic_violence). Exploitation
      and trafficking are recognised from an accumulation of indirect,
      externally-observed signals rather than a single reported event, so
      the vocabulary belongs at the indicator level, referenced from
      registration's situation entity as an instance-level fact, not as a
      new trigger_event value.

  - decision: No severity, escalation, or referral logic defined here
    rationale: >
      Consistent with this domain's "produces signals; does not act on
      them" design principle (shared/risk/README.md). What combination of
      indicators warrants what response is reasoning and operational
      behaviour for a later stage, not a property of the indicator concept
      itself.
