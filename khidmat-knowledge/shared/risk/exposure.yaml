# =============================================================================
# Khidmat Risk Domain — Exposure Ontology
# =============================================================================
ontology_version: "1.0"
authority: "shared/risk/"
owner_domain: "Risk Domain"
status: "Phase 3.0 — Active"
# -----------------------------------------------------------------------------
# Purpose:        Defines Exposure as a first-class concept: the relationship
#                 between a person, family, or household and a hazard
#                 category describing the degree to which they are
#                 positioned to encounter it. Exposure is independent of
#                 whether the person/household would actually be harmed if
#                 the hazard became active — that is Vulnerability's
#                 concern.
# Scope:          This file answers "how likely is this household to
#                 encounter this hazard?" It does not answer "what kind of
#                 hazard is this?" (hazard-categories.yaml) or "how badly
#                 would they be affected if they encountered it?"
#                 (vulnerability.yaml).
# Governing ADRs: ADR-007, ADR-008
# Cross-references:
#   shared/risk/hazard-categories.yaml
#     Exposure always relates to a hazard_category_ref defined there.
#   shared/risk/vulnerability.yaml
#     Vulnerability and Exposure are deliberately separate. A household can
#     have high exposure and low vulnerability (a well-resourced household
#     next to a flood-prone river) or low exposure and high vulnerability
#     (a fragile household far from any known hazard but unable to
#     withstand even a minor disruption).
# =============================================================================

foundational_distinction:
  exposure:
    definition: >
      The degree to which a person, family, or household is positioned to
      encounter a given hazard category — through geographic proximity,
      occupational activity, or situational circumstance. Exposure is a
      fact about positioning relative to a hazard, not a fact about how
      that positioning would translate into harm.
    independent_of: >
      Whether the person/household has the capacity to withstand the
      hazard if encountered. That is Vulnerability.
  hazard:
    definition: >
      What kind of harm is possible (owned by hazard-categories.yaml).
      Hazard is the "what"; Exposure is the "how likely to encounter it."
  vulnerability:
    definition: >
      How badly the person/household would be affected if exposure became
      actual harm (owned by vulnerability.yaml). Vulnerability is the
      "how badly affected"; Exposure is the "how likely to encounter it."
  why_this_distinction_matters: >
    Conflating exposure and vulnerability produces incorrect reasoning.
    Two households next to the same flood-prone river have identical
    exposure. If one has savings, an accessible second floor, and a
    secondary earner, and the other has none of these, their risk differs
    sharply — not because their exposure differs, but because their
    vulnerability does. Without separating the two concepts, "lives near
    a flood-prone river" and "would be devastated by a flood" collapse
    into a single undifferentiated judgment.

# =============================================================================
# PART 1: EXPOSURE DIMENSIONS
# =============================================================================

exposure_dimensions:
  description: >
    The distinct ways a person or household can be positioned relative to
    a hazard. A single household may have exposure through more than one
    dimension simultaneously.

  dimensions:

    - id: geographic_physical
      label: Geographic / Physical Proximity
      description: >
        Exposure arising from where the household is physically located —
        proximity to a flood plain, a fault line, an area of civil unrest,
        or an area with poor healthcare access.
      typical_hazard_categories: [environmental, health_epidemiological,
                                   social_protection]
      note: >
        This dimension is informed by, but does not require, the
        geographic hierarchy reserved for Community Context (Stage 8).
        At the case level, it can be recorded qualitatively from what the
        household reports during registration (e.g., "near the river,"
        "in a low-lying area") without a formal geographic model.

    - id: occupational
      label: Occupational Exposure
      description: >
        Exposure arising from the nature of a household member's work —
        outdoor agricultural labour exposed to extreme heat, informal
        sector work with no income protection, or occupations with
        elevated injury risk.
      typical_hazard_categories: [environmental, economic, injury_trauma]
      note: >
        References the earner's occupation as captured in registration's
        free-text income_sources field. Does not require a formal
        occupational taxonomy to exist.

    - id: situational
      label: Situational / Circumstantial Exposure
      description: >
        Exposure arising from a specific current circumstance rather than
        a stable location or occupation — being newly displaced and
        therefore unfamiliar with local hazards, being a single woman
        head-of-household in a context with elevated protection risk, or
        having an undocumented legal status that increases administrative
        hazard exposure.
      typical_hazard_categories: [social_protection, legal_administrative,
                                   environmental]
      note: >
        Frequently arises directly from a registration trigger_event
        (displacement, domestic_violence, legal_crisis) — see Registration
        Reference pattern in risk-domain-governance.md.

# =============================================================================
# PART 2: EXPOSURE LEVEL
# =============================================================================

exposure_level:
  description: >
    A qualitative classification of how directly a person/household is
    positioned relative to a hazard. Not a probability estimate, not a
    score — a structured judgment band.
  values:
    - id: direct
      label: Direct
      description: >
        The household is currently and directly positioned to encounter
        the hazard — living on a known flood plain during flood season,
        a household member currently working in conditions of known
        occupational hazard.
    - id: proximate
      label: Proximate
      description: >
        The household is near enough to the hazard that encounter is
        plausible under foreseeable conditions, though not currently
        active — living near but not on a flood plain, in an area with
        a documented history of the hazard recurring.
    - id: distal
      label: Distal
      description: >
        The household has some relationship to the hazard category but
        encounter would require an additional unlikely event — general
        regional risk without specific local indicators.
    - id: none_identified
      label: None Identified
      description: >
        No exposure to this hazard category has been identified for this
        household. Absence of identification is not the same as confirmed
        absence — see ontology_notes below.

# =============================================================================
# PART 3: EXPOSURE ENTITY (CONCEPT LAYER)
# =============================================================================

exposure_entity:
  description: >
    The schema for recording an exposure relationship. This is the
    concept-layer schema. Instance-level exposure facts for a specific
    case belong to whichever domain holds case data.
  attributes:
    hazard_category_ref:
      description: Reference to a category defined in hazard-categories.yaml
      required: true
    exposure_dimension:
      description: Which exposure_dimensions entry applies
      values_ref: exposure.yaml#exposure_dimensions
      required: true
    exposure_level:
      description: The qualitative exposure_level classification
      values_ref: exposure.yaml#exposure_level
      required: true
    basis:
      description: >
        Free text describing what in the case supports this exposure
        classification — e.g., "registrant reports living adjacent to
        the river that flooded last monsoon."
      required: false
    seasonality_relevant:
      description: >
        Whether this exposure relates to a hazard category whose
        seasonality flag (hazard-categories.yaml) is true and whether the
        current registration timing is plausibly within or approaching
        that pattern, stated qualitatively.
      required: false

ontology_notes:
  - Exposure is assessed per hazard category, not globally. A household
    may have direct exposure to one hazard category and none identified
    for another.
  - "None identified" reflects the limits of what was discussed during
    registration, not a confirmed absence of exposure. This mirrors the
    open-world assumption that governs the rest of the knowledge layer.
  - Exposure does not imply harm. It is a necessary but not sufficient
    condition for risk — Risk (risk.yaml) requires Exposure to be
    composed with Vulnerability and moderated by Resilience.
  - Multiple exposure dimensions to the same hazard category compound the
    overall exposure judgment but are recorded as separate entries, not
    merged into one.

design_decisions:
  - decision: Exposure is recorded per hazard category, not as a single
      household-level attribute
    rationale: >
      A household can be highly exposed to flooding and have no
      meaningful exposure to legal/administrative hazard. Collapsing
      exposure into one household-level judgment would lose this
      differentiation and make the eventual Risk composition meaningless.
  - decision: No numeric exposure score
    rationale: >
      Consistent with the qualitative-only principle applied throughout
      this domain and the Shared Human Model.