# =============================================================================
# Khidmat Risk Domain — Hazard Category Taxonomy
# =============================================================================
ontology_version: "1.0"
authority: "shared/risk/"
owner_domain: "Risk Domain"
status: "Phase 3.0 — Active"
# -----------------------------------------------------------------------------
# Purpose:        Defines the qualitative classification of hazard categories
#                 relevant to humanitarian reasoning. A hazard category
#                 describes WHAT KIND of harm a risk factor or exposure
#                 relates to. It does NOT describe WHERE or WHEN that harm
#                 might occur.
# Scope:          This file answers "what kind of hazard is this?" It does
#                 not answer "is this hazard present in this location right
#                 now?" — that is geographic/temporal instantiation, and it
#                 is explicitly out of scope. See boundary_note below.
# Governing ADRs: ADR-007, ADR-008, ADR-013
# Cross-references:
#   shared/risk/exposure.yaml
#     Exposure relates a person/household to a hazard category by
#     hazard_category_ref. This file owns the category; exposure.yaml owns
#     the relationship.
#   shared/risk/risk-factors.yaml
#     Environmental/structural risk factors with no other persistence owner
#     reference a hazard category here.
# =============================================================================

boundary_note: >
  This file owns hazard CATEGORIES only — a qualitative classification of
  what kind of harm is possible. It deliberately does not own:
    - geographic hierarchy (district, block, village)
    - dates or seasonal calendars
    - area-level hazard presence ("this village is currently flood-affected")
  Those are Community Context Domain concerns (Stage 8, not yet active).
  The `seasonality` field on each category below is a qualitative,
  non-geographic note only — it states whether a hazard category TENDS to
  have a seasonal pattern, not WHEN or WHERE that pattern applies for any
  specific household. This boundary was set explicitly during architecture
  review to prevent Stage 3 and Stage 8 from independently building two
  versions of the same seasonal calendar. See risk-domain-governance.md.

hazard_categories:

  # ---------------------------------------------------------------------------
  - id: environmental
    name: Environmental Hazard
    description: >
      Hazards arising from physical and natural conditions — weather events,
      geological events, climate extremes, and degraded living conditions
      that pose a risk to safety, shelter, or health independent of any
      single triggering event.
    example_hazard_types:
      - flooding
      - drought
      - extreme_heat
      - extreme_cold
      - cyclone_or_storm
      - landslide
      - structural_housing_inadequacy
    seasonality:
      typically_seasonal: true
      qualitative_note: >
        Many environmental hazards follow a recurring seasonal pattern
        (monsoon flooding, summer heat extremes, winter cold exposure).
        The specific timing and geographic extent of that pattern is not
        modelled here — see boundary_note.
    relevant_capacity_inputs:
      - lifecycle stage (elderly and infant stages carry disproportionate
        physiological vulnerability to temperature extremes, per
        lifecycle-stages.yaml)
      - shelter adequacy (registration's shelter need taxonomy)
      - physical mobility capability (capabilities.yaml)

  # ---------------------------------------------------------------------------
  - id: economic
    name: Economic Hazard
    description: >
      Hazards arising from disruption to income, employment, market
      conditions, or financial stability — independent of any specific
      health or environmental event.
    example_hazard_types:
      - job_market_contraction
      - price_inflation_of_essentials
      - debt_trap_conditions
      - loss_of_primary_income_source
      - seasonal_income_gap
    seasonality:
      typically_seasonal: true
      qualitative_note: >
        Agricultural and informal-labour income is frequently seasonal
        (harvest cycles, construction off-seasons). The specific calendar
        for a given livelihood type and location is not modelled here.
    relevant_capacity_inputs:
      - earning structure (family-structure.yaml — single earner vs.
        multiple earners)
      - employment and vocational capability (capabilities.yaml)
      - financial dependency concentration (dependency.yaml)

  # ---------------------------------------------------------------------------
  - id: health_epidemiological
    name: Health and Epidemiological Hazard
    description: >
      Hazards arising from disease outbreak, healthcare access disruption,
      or conditions that elevate the likelihood of illness or injury
      independent of any pre-existing diagnosed condition.
    example_hazard_types:
      - communicable_disease_outbreak
      - healthcare_access_disruption
      - sanitation_and_water_quality_failure
      - malnutrition_risk_conditions
    seasonality:
      typically_seasonal: true
      qualitative_note: >
        Several communicable diseases referenced in health-conditions.yaml
        (malaria, diarrheal disease, acute respiratory infection) have
        documented seasonal transmission patterns. The calendar itself is
        not modelled here.
    relevant_capacity_inputs:
      - health condition presence and disability_potential
        (health-conditions.yaml)
      - lifecycle stage (infant and elderly stages carry elevated
        physiological vulnerability)
      - caregiving capacity (capabilities.yaml, family-structure.yaml)

  # ---------------------------------------------------------------------------
  - id: social_protection
    name: Social and Protection Hazard
    description: >
      Hazards arising from violence, exploitation, family breakdown,
      discrimination, or loss of protective relationships — independent of
      environmental or economic conditions.
    example_hazard_types:
      - domestic_violence
      - child_exploitation_or_trafficking
      - elder_abuse_or_neglect
      - early_or_forced_marriage
      - social_exclusion_or_discrimination
      - family_separation
    seasonality:
      typically_seasonal: false
      qualitative_note: >
        Social and protection hazards do not follow a predictable seasonal
        pattern in the way environmental or epidemiological hazards do,
        though specific triggers (school exam periods, festival or wedding
        seasons) may locally elevate certain risks. Not modelled here.
    relevant_capacity_inputs:
      - guardian and decision-making structure (family-structure.yaml)
      - self-advocacy and communication capability (capabilities.yaml)
      - lifecycle stage (adolescent stage carries the most pronounced
        gender-differentiated protection risk per lifecycle-stages.yaml)

  # ---------------------------------------------------------------------------
  - id: legal_administrative
    name: Legal and Administrative Hazard
    description: >
      Hazards arising from documentation gaps, legal status uncertainty,
      eviction or tenancy risk, or exposure to administrative or legal
      processes that could result in loss of rights, residence, or access
      to services.
    example_hazard_types:
      - undocumented_or_uncertain_legal_status
      - eviction_or_tenancy_insecurity
      - pending_legal_proceedings
      - loss_of_identity_documentation
    seasonality:
      typically_seasonal: false
      qualitative_note: >
        Legal and administrative hazards are generally not seasonal,
        though specific deadlines (lease renewal, court dates, benefit
        re-registration windows) create time-bound exposure. These are
        case-specific facts, not category-level seasonal patterns.
    relevant_capacity_inputs:
      - documentation status (registration's beneficiary attributes)
      - self-advocacy capability (capabilities.yaml)
      - institutional support availability (family-structure.yaml
        family_support_network)

design_decisions:

  - decision: Five categories, not a finer-grained taxonomy
    rationale: >
      Five categories mirror the affected_domains structure already in
      registration/taxonomy/situations.yaml (economic, health, social,
      environmental, legal_and_documentation), with health split into
      health_epidemiological here to separate forward-looking disease/
      access hazards from the already-diagnosed condition vocabulary
      owned by health-conditions.yaml. This keeps the hazard category
      taxonomy small, stable, and aligned with concepts registration
      already uses, rather than inventing a parallel and divergent
      classification.

  - decision: example_hazard_types are illustrative, not exhaustive
    rationale: >
      Following the precedent set by health-conditions.yaml's remediation
      (avoid exhaustive enumeration that becomes a maintenance burden),
      each category lists representative hazard types rather than a
      closed list. New hazard types may be added under an existing
      category without requiring a new category.

  - decision: seasonality is qualitative and category-level only
    rationale: >
      This is the direct implementation of the architecture review's
      Decision 3 (Hazard Category ownership vs. Hazard Instantiation
      ownership). A boolean plus a qualitative note gives Stage 3 enough
      to reason "this hazard category tends to recur seasonally, and the
      conversation indicates the season is approaching" without requiring
      the geographic hierarchy that does not yet exist.