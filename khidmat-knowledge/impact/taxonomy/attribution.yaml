version: "1.0.0"
domain: impact
file: taxonomy/attribution.yaml
status: active

purpose: >
  Classifies how outcomes are linked to interventions, including external factors,
  shocks, and unintended consequences. Recognizes the complex multi-actor reality
  of humanitarian impact.

schemes:
  - id: attribution_type
    label: Attribution Type
    description: >
      PROVISIONAL: Pending ratification of ADR on Attribution vs Contribution.
      The degree to which an outcome can be causally linked to Khidmat.
    concepts:
      - id: direct_causation
        description: The intervention directly and solely caused the outcome.
      - id: partial_attribution
        description: The intervention was a necessary but not sufficient cause.
      - id: unlinked
        description: The outcome occurred independently of the intervention.

  - id: contribution_type
    label: Contribution Type
    description: >
      PROVISIONAL: Pending ratification of ADR on Attribution vs Contribution.
      Acknowledging Khidmat's role in a complex multi-actor environment.
    concepts:
      - id: primary_actor
        description: Khidmat drove the majority of the change.
      - id: supporting_actor
        description: Khidmat supported a change led by another entity.
      - id: marginal_role
        description: Khidmat was present but had minimal effect on the outcome.

  - id: confounding_factor
    label: Confounding Factor
    description: >
      External variables that independently alter the outcome trajectory.
    concepts:
      - id: government_policy
        description: Changes in local or national laws and support.
      - id: economic_fluctuation
        description: Inflation, market crashes, or sudden booms.
      - id: demographic_shift
        description: Migration or rapid population changes in the area.

  - id: contextual_shock
    label: Contextual Shock
    description: >
      PROVISIONAL: Pending activation of the external shock/context domain. Do not duplicate ownership.
      Systemic events that mask or erase the intervention's impact.
    concepts:
      - id: natural_disaster
        description: Floods, earthquakes, or severe weather events.
      - id: conflict_outbreak
        description: Sudden onset of war or severe civil unrest.
      - id: health_crisis
        description: Pandemics or localized disease outbreaks.

  - id: spillover_effect
    label: Spillover Effect
    description: >
      PROVISIONAL: Pending ratification of ADR on Spillover Scope.
      The measured impact of an intervention on non-beneficiaries.
    concepts:
      - id: positive_spillover
        description: Non-beneficiaries also improved due to the intervention.
      - id: negative_exclusion
        description: Non-beneficiaries worsened or faced inflation/scarcity.
      - id: market_distortion
        description: Local economic structures were warped by aid influx.

  - id: unintended_consequence
    label: Unintended Consequence
    description: >
      Results of the intervention that were not planned.
    concepts:
      - id: iatrogenic_harm
        description: The intervention directly caused new vulnerabilities.
      - id: dependency_creation
        description: Beneficiaries became reliant on continuous aid.
      - id: serendipitous_benefit
        description: An unexpected positive outcome was discovered.
