version: "1.0.0"
domain: impact
file: taxonomy/outcomes.yaml
status: active

purpose: >
  Classifies the nature, scope, and durability of the outcomes achieved.
  Focuses on the long-term changes observed in the ecosystem.

schemes:
  - id: outcome_type
    label: Outcome Type
    description: >
      The scope or level of the system affected by the outcome.
    concepts:
      - id: individual
        description: Changes in personal wellbeing.
      - id: household
        description: Changes affecting the entire living unit.
      - id: community
        description: Systemic changes across a localized group.
      - id: programme
        description: Aggregate success or failure of an initiative.
      - id: system
        description: Broad changes to institutions or markets.

  - id: persistence_horizon
    label: Persistence Horizon
    description: >
      The expected or observed durability of the outcome.
    concepts:
      - id: temporary
        description: Outcome is expected to fade shortly after intervention ends.
      - id: sustained
        description: Outcome persists for a significant longitudinal period.
      - id: irreversible
        description: Outcome represents a permanent systemic change.

  - id: outcome_decay
    label: Outcome Decay
    description: >
      The rate or pattern of gradual loss of a positive outcome.
    concepts:
      - id: rapid_decay
        description: Benefits lost almost immediately after closure.
      - id: gradual_decay
        description: Benefits slowly diminish over months or years.
      - id: no_decay
        description: Benefits remain completely stable over time.

  - id: relapse
    label: Relapse
    description: >
      Classification of a reversion to baseline states.
    concepts:
      - id: full_relapse
        description: Complete reversion to the baseline state or worse.
      - id: partial_relapse
        description: Noticeable decline but still better than baseline.
      - id: prevented_relapse
        description: Indicators threatened to decline but were stabilized.
