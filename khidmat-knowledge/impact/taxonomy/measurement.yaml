version: "1.0.0"
domain: impact
file: taxonomy/measurement.yaml
status: active

purpose: >
  Classifies the mechanics of measurement, including timing, confidence, and epistemic quality.
  Focuses on the metadata surrounding a measurement event to establish validity.

schemes:
  - id: measurement_classification
    label: Measurement Classification
    description: >
      The broad category of a measurement event.
    concepts:
      - id: primary_data_collection
        description: Data collected directly for the purpose of this evaluation.
      - id: secondary_data_use
        description: Data repurposed from other existing sources.

  - id: measurement_timing
    label: Measurement Timing
    description: >
      When the measurement occurs relative to the intervention lifecycle.
    concepts:
      - id: baseline
        description: The state recorded before intervention begins.
      - id: endline
        description: The state recorded immediately upon intervention completion.
      - id: longitudinal
        description: Follow-up surveys conducted over time after closure.

  - id: epistemic_type
    label: Epistemic Type
    description: >
      The nature of the knowledge claim being made in the measurement.
    concepts:
      - id: factual_observation
        description: Direct observation of objective reality.
      - id: beneficiary_perception
        description: The subjective feeling or opinion of the beneficiary.
      - id: inferred_conclusion
        description: A conclusion drawn logically from other proxy evidence.

  - id: evidence_quality
    label: Evidence Quality
    description: >
      The reliability of the evidence supporting a measurement.
    concepts:
      - id: high_reliability
        description: Triangulated, verified data from independent sources.
      - id: medium_reliability
        description: Single-source verifiable data or highly consistent self-reports.
      - id: low_reliability
        description: Unverified self-reports or contradictory proxy indicators.


  - id: measurement_confidence
    label: Measurement Confidence
    description: >
      The overall epistemic weight applied to the evaluation based on data validity.
    concepts:
      - id: definitive
        description: Measurement is considered a conclusive fact.
      - id: indicative
        description: Measurement suggests a trend but is not absolute.
      - id: speculative
        description: Measurement is a best guess based on limited data.
