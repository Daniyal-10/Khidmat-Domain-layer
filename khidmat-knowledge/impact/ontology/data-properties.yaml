version: "1.1.0"
domain: impact
file: data-properties.yaml
status: active
data_properties:
  - id: outcome_indicator
    domain: measurement
    taxonomy_ref: outcome_indicator
    cardinality: { min: 1, max: 1 }
    notes: >
      Deferred at Phase 1.4 Canonical Taxonomy Completion. The
      outcome-indicator vocabulary itself is explicitly listed as "Planned
      (declared and sequenced, not yet delivered)" in
      KHIDMAT_BUSINESS_LOGIC_BLUEPRINT_V1.md §16 — authoring it now would
      mean inventing business-specific outcome categories ahead of the
      Blueprint's own sequencing, the same reason
      registration/taxonomy/support-interventions.yaml remains empty.
  - id: epistemic_type
    domain: measurement
    taxonomy_ref: epistemic_type
    cardinality: { min: 1, max: 1 }
  # impact_score has been removed as it is a reasoning-derived score,
  # which makes it a Runtime/Reasoning object under ADR-023 §19.
  # It is intentionally deferred to the future Runtime/Instance-State Schema.
  - id: proxy_bias
    domain: measurement
    datatype: xsd:string
    cardinality: { min: 0, max: 1 }
  - id: persistence_horizon
    domain: impact_evaluation
    taxonomy_ref: persistence_horizon
    cardinality: { min: 0, max: 1 }
