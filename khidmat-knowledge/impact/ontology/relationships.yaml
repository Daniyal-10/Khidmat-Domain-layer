version: "1.0.0"
domain: impact
file: relationships.yaml
status: active
namespaces:
  case_management: "https://khidmat.org/ontology/case_management"
  needs_assessment: "https://khidmat.org/ontology/needs_assessment"
  volunteer_operations: "https://khidmat.org/ontology/volunteer_operations"
relationships:
  - id: impact_evaluates_case
    from: impact_evaluation
    relationship: evaluates_case
    to: case_management:case
    cardinality: { min: 1, max: 1 }
  - id: impact_contains_measurement
    from: impact_evaluation
    relationship: contains
    to: measurement
    cardinality: { min: 1, max: unbounded }
    notes: "Requires promotion to Shared Vocabulary before repository freeze."
  - id: impact_has_baseline_measurement
    from: impact_evaluation
    relationship: has_baseline_measurement
    to: measurement
    cardinality: { min: 0, max: 1 }
  - id: impact_has_endline_measurement
    from: impact_evaluation
    relationship: has_endline_measurement
    to: measurement
    cardinality: { min: 0, max: 1 }
  - id: impact_has_longitudinal_measurement
    from: impact_evaluation
    relationship: has_longitudinal_measurement
    to: measurement
    cardinality: { min: 0, max: unbounded }
  - id: measurement_baseline_derived_from
    from: measurement
    relationship: baseline_derived_from
    to: needs_assessment:assessment_session
    cardinality: { min: 0, max: 1 }
  - id: measurement_evaluated_by
    from: measurement
    relationship: evaluated_by
    to: volunteer_operations:volunteer_profile
    cardinality: { min: 0, max: 1 }
  # External shock reference to community_context:external_shock was removed.
  # This reference is intentionally deferred pending upstream domain activation
  # as no canonical entity currently exists in Community Context or Shared Risk.
