domain: community-context
maturity: level_2_placeholder
status: not_yet_active

scope: >
  This placeholder formally captures the community-context scope areas that
  are deliberately deferred from the initial taxonomy release. These include:
  - Population & Demographics (migration, displacement, transient populations)
  - Economy & Livelihoods (market integration level, financial inclusion)
  - Governance & Institutions (governance structure, decision authority)
  - Social Context (social cohesion, exclusion dynamics, ethnic/caste dynamics, vulnerable populations)
  - Culture (language, gender norms, customs)
  - Safety & Security (conflict, crime, political instability, unsafe routes)
  - Public Health Context (endemic disease, environmental health baseline)

concepts_this_domain_will_own:
  - population_and_demographics
  - market_integration_and_financial_inclusion
  - governance_and_institutions
  - social_context_and_exclusion
  - culture_and_customs
  - safety_and_security
  - public_health_context

do_not_implement_until: >
  The operational requirements for safety/security routing, cultural
  appropriateness matching, or advanced demographic modeling are prioritized
  by the Volunteer Operations or Support Delivery domains.
