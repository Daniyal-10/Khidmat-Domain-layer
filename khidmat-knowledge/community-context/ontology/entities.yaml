version: "1.0.0"
domain: community_context
file: community-context/ontology/entities.yaml
status: active

namespaces:
  # Upstream definitions imported for cross-domain boundaries
  shared_org: "shared/taxonomy/organisations.yaml"
  shared_human: "shared/human-model/ontology/entities.yaml"

entities:

  - id: community
    label: Community
    description: >
      The central social, economic, and spatial aggregation unit. Represents the collective 
      environment, livelihood base, and systemic conditions shared by its residents.
    required: true
    ownership_boundary: >
      Owns the macro-level systemic patterns of the population. Does NOT own
      individual beneficiary data or tracking (which belongs to Registration/Beneficiary Lifecycle).
    notes: >
      Scalar/coded properties authored in data-properties.yaml: community_id;
      livelihood_pattern decomposed into primary_production_pattern,
      secondary_production_pattern, services_and_trade_pattern,
      wage_labor_pattern; settlement_form; seasonal_events decomposed into
      climatic_phase_events, agricultural_cycle_events,
      socio_economic_cycle_events, hydrological_phase_events (Migration Plan
      D-CC6a).

  - id: geographic_area
    label: Geographic Area
    description: >
      The immutable spatial boundary that anchors the community, natural resources, 
      and built infrastructure. 
    required: true
    ownership_boundary: >
      Owns pure spatial dimensions, hierarchies, and terrain.
    notes: >
      Scalar/coded properties authored in data-properties.yaml: area_id;
      geographic_level; physical_environment decomposed into terrain,
      climate_zone, water_availability, land_use, remoteness;
      physical_accessibility; hazards decomposed into
      hydrological_hazard_exposure, geological_hazard_exposure,
      climatological_hazard_exposure, anthropogenic_hazard_exposure
      (Migration Plan D-CC6a).

  - id: built_infrastructure
    label: Built Infrastructure
    description: >
      Physical, constructed facilities within the community geography.
    required: false
    ownership_boundary: >
      Owns the physical building/facility (e.g., clinic). Does NOT own the formal
      organization running it (which belongs to shared_org) or the delivery of aid.
    notes: >
      Scalar/coded properties authored in data-properties.yaml: infrastructure_id;
      infrastructure_type; essential_service decomposed into
      health_and_medical_service, wash_service, food_and_nutrition_service,
      education_and_childcare_service, protection_and_legal_service,
      financial_and_livelihood_service, shelter_and_community_service (Migration
      Plan D-CC6a). The operating-organization relationship is expressed in
      relationships.yaml (built_infrastructure_operated_by_organization); it is
      not repeated here.

  - id: natural_resource
    label: Natural Resource
    description: >
      Shared, naturally occurring environmental assets utilized by the community.
    required: false
    ownership_boundary: >
      Strictly distinct from built infrastructure. Owns natural spaces and resources only.
    notes: >
      Scalar/coded properties authored in data-properties.yaml: resource_id,
      resource_type.

  - id: transportation_network_asset
    label: Transportation Network Asset
    description: >
      A hub, terminal, route, or crossing point for transit (edges and nodes).
    required: false
    ownership_boundary: >
      Exclusively owns vehicular and pedestrian transit infrastructure.
    notes: >
      Scalar/coded properties authored in data-properties.yaml: asset_id;
      asset_type decomposed into road_type, water_transport_type,
      rail_or_air_type, connectivity_bottleneck_type, terminal_facility_type,
      mutually exclusive (Migration Plan D-CC6b). `surface_condition` remains
      an open Content Gap Log item — no taxonomy scheme anywhere in this domain
      enumerates surface-condition concept values, so authoring it requires
      inventing new taxonomy content, not mechanical inference.

  - id: local_collective
    label: Local Collective
    description: >
      A community-native, informal, or semi-formal body (e.g., council of elders).
    required: false
    ownership_boundary: >
      Distinct from formal statutory organizations (shared_org). Owns the collective
      entity type, NOT the membership of specific individuals (shared_human).
    notes: >
      Scalar/coded properties authored in data-properties.yaml: collective_id;
      collective_type decomposed into civic_governance_type,
      economic_livelihood_collective_type, social_demographic_group_type,
      mutual_aid_welfare_group_type, mutually exclusive (Migration Plan
      D-CC6b). Membership is expressed in relationships.yaml
      (local_collective_composed_of_members); it is not repeated here.
