version: "1.0.0"
domain: community_context
file: community-context/ontology/semantic-constraints.yaml
status: active

# ====================================================================
# Semantic Constraints (Ontology Invariants)
# ====================================================================
# Target-neutral structural facts only (Canonical_Ontology_Schema.md §9).
# How each row renders into OWL/SHACL/LPG is entirely a generator concern —
# no hand-authored OWL functional syntax is stored here.
#
# Four rows previously in this file were relocated, per
# docs/architecture/Community_Context_Migration_Plan.md Decisions D-CC1–D-CC3:
#   - infrastructure_organization_reference: dropped (redundant with the
#     relationships.yaml `to:` field on built_infrastructure_operated_by_organization).
#   - collective_human_reference: moved to ontology/lifecycle-constraints.yaml
#     (lifecycle semantics, not a structural graph fact).
#   - no_operational_workflows: moved to community-context-governance.md
#     (a governance boundary statement, not a graph-structural fact).
#   - geographic_area_anti_recursion: moved to `notes:` fields on the affected
#     relationships.yaml rows (no closed §9 constraint `type` fits
#     irreflexivity/asymmetry; not invented under schedule pressure).
#
# Two rows were added under Phase 4 (Decision D-CC6b, data-properties.yaml):
# `transportation_asset_type_exclusive` and `local_collective_type_exclusive`
# use the closed vocabulary's existing `mutually_exclusive` type to state that
# an entity decomposed into sibling scheme-properties (D-CC6b) may populate at
# most one of them per instance.

constraints:

  - id: community_requires_geography
    type: cardinality
    property: located_in
    entities: [community, geographic_area]
    parameters: { min: 1, max: 1 }
    notes: >
      Every Community MUST belong to exactly one GeographicArea. A community
      cannot exist in the graph without a spatial anchor.

  - id: collective_requires_community
    type: cardinality
    property: represents
    entities: [local_collective, community]
    parameters: { min: 1, max: 1 }
    notes: >
      A LocalCollective MUST represent exactly one Community. An unanchored
      informal collective is invalid.

  - id: built_vs_natural
    type: disjoint
    property: rdf:type
    entities: [built_infrastructure, natural_resource]
    parameters: {}
    notes: >
      BuiltInfrastructure MUST NOT be classified as NaturalResource. The two
      classes are mutually exclusive. `property: rdf:type` is used because
      class disjointness constrains class membership itself, not a bound
      domain property — mirroring how OWL's own DisjointClasses axiom needs no
      property (Migration Plan D-CC3).

  - id: transportation_asset_type_exclusive
    type: mutually_exclusive
    property: road_type
    entities: [transportation_network_asset]
    parameters:
      with: [water_transport_type, rail_or_air_type, connectivity_bottleneck_type, terminal_facility_type]
    notes: >
      At most one of road_type, water_transport_type, rail_or_air_type,
      connectivity_bottleneck_type, terminal_facility_type may be populated on
      a single transportation_network_asset instance (Migration Plan D-CC6b —
      these five properties decompose one mutually-exclusive classification
      across five sibling taxonomy schemes).

  - id: local_collective_type_exclusive
    type: mutually_exclusive
    property: civic_governance_type
    entities: [local_collective]
    parameters:
      with: [economic_livelihood_collective_type, social_demographic_group_type, mutual_aid_welfare_group_type]
    notes: >
      At most one of civic_governance_type, economic_livelihood_collective_type,
      social_demographic_group_type, mutual_aid_welfare_group_type may be
      populated on a single local_collective instance (Migration Plan D-CC6b).
