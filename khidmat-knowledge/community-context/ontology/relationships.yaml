version: "1.0.0"
domain: community_context
file: community-context/ontology/relationships.yaml
status: active

namespaces:
  shared_org: "shared/ontology/entities.yaml"
  shared_human: "shared/ontology/entities.yaml"

# shared_org retargeted per Phase 1.1A Canonical Semantic Foundation: Organisation
# is now a canonical entity in shared/ontology/entities.yaml (Shared Core), not
# merely a classification scheme in shared/taxonomy/organisations.yaml. The
# organisation-type classification remains owned by the taxonomy file; this
# namespace resolves to the entity relationships below actually reference.
#
# shared_human retargeted per Phase 1.2 domain completion pass: the canonical
# Person and Household entities live in shared/ontology/entities.yaml (Shared
# Core), not shared/human-model/ontology/entities.yaml, which does not exist —
# local_collective_composed_of_members below was an unresolvable reference
# until this retarget. The rich Human Model content (lifecycle stages,
# capabilities, dependency, family structure) remains owned by
# shared/human-model/, referenced separately where needed.

relationships:

  # -------------------------------------------------------------------------
  # Internal Domain Relationships (Within Community Context)
  # -------------------------------------------------------------------------

  - id: community_located_in_geographic_area
    from: community
    relationship: located_in
    to: geographic_area
    cardinality: { min: 1, max: 1 }
    inverse: geographic_area_contains_community
    notes: >
      Anchors the social and economic entity to its physical, immutable geography.
      geographic_area must not reference itself recursively through located_in/
      contains (irreflexive, asymmetric).

  - id: geographic_area_contains_community
    from: geographic_area
    relationship: contains
    to: community
    cardinality: { min: 0, max: unbounded }
    inverse: community_located_in_geographic_area
    notes: >
      Inverse of community_located_in_geographic_area.
      A geographic area can encompass multiple communities depending on resolution.
      geographic_area must not reference itself recursively through located_in/
      contains (irreflexive, asymmetric).

  - id: community_utilizes_built_infrastructure
    from: community
    relationship: utilizes
    to: built_infrastructure
    cardinality: { min: 0, max: unbounded }
    inverse: built_infrastructure_serves_community

  - id: built_infrastructure_serves_community
    from: built_infrastructure
    relationship: serves
    to: community
    cardinality: { min: 0, max: unbounded }
    inverse: community_utilizes_built_infrastructure
    notes: >
      Inverse of community_utilizes_built_infrastructure.
      Infrastructure (e.g., a regional hospital) may serve multiple communities.

  - id: community_utilizes_natural_resource
    from: community
    relationship: utilizes
    to: natural_resource
    cardinality: { min: 0, max: unbounded }
    inverse: natural_resource_supports_community

  - id: natural_resource_supports_community
    from: natural_resource
    relationship: supports
    to: community
    cardinality: { min: 0, max: unbounded }
    inverse: community_utilizes_natural_resource
    notes: >
      Inverse of community_utilizes_natural_resource.
      A large natural resource (like a river or forest) can support multiple communities.

  - id: community_connected_by_transportation
    from: community
    relationship: connected_by
    to: transportation_network_asset
    cardinality: { min: 0, max: unbounded }
    inverse: transportation_network_asset_connects_community

  - id: transportation_network_asset_connects_community
    from: transportation_network_asset
    relationship: connects
    to: community
    cardinality: { min: 0, max: unbounded }
    inverse: community_connected_by_transportation
    notes: >
      Inverse of community_connected_by_transportation.
      A single transit route typically connects multiple communities.

  - id: community_represented_by_local_collective
    from: community
    relationship: represented_by
    to: local_collective
    cardinality: { min: 0, max: unbounded }
    inverse: local_collective_represents_community
    notes: >
      A community may have multiple informal or semi-formal bodies acting on its
      behalf (e.g., council of elders).

  - id: local_collective_represents_community
    from: local_collective
    relationship: represents
    to: community
    cardinality: { min: 1, max: 1 }
    inverse: community_represented_by_local_collective
    notes: >
      Inverse of community_represented_by_local_collective.
      A collective typically arises from and represents a single community base.

  - id: built_infrastructure_located_in_geographic_area
    from: built_infrastructure
    relationship: located_in
    to: geographic_area
    cardinality: { min: 1, max: 1 }
    inverse: geographic_area_contains_built_infrastructure

  - id: geographic_area_contains_built_infrastructure
    from: geographic_area
    relationship: contains
    to: built_infrastructure
    cardinality: { min: 0, max: unbounded }
    inverse: built_infrastructure_located_in_geographic_area
    notes: >
      geographic_area must not reference itself recursively through located_in/
      contains (irreflexive, asymmetric).

  - id: transportation_network_asset_located_in_geographic_area
    from: transportation_network_asset
    relationship: located_in
    to: geographic_area
    cardinality: { min: 1, max: unbounded }
    inverse: geographic_area_contains_transportation
    notes: >
      Networks span multiple areas; an area contains multiple segments.

  - id: geographic_area_contains_transportation
    from: geographic_area
    relationship: contains
    to: transportation_network_asset
    cardinality: { min: 0, max: unbounded }
    inverse: transportation_network_asset_located_in_geographic_area
    notes: >
      geographic_area must not reference itself recursively through located_in/
      contains (irreflexive, asymmetric).

  - id: natural_resource_located_in_geographic_area
    from: natural_resource
    relationship: located_in
    to: geographic_area
    cardinality: { min: 1, max: unbounded }
    inverse: geographic_area_contains_natural_resource
    notes: >
      Large natural resources can span multiple geographic areas.

  - id: geographic_area_contains_natural_resource
    from: geographic_area
    relationship: contains
    to: natural_resource
    cardinality: { min: 0, max: unbounded }
    inverse: natural_resource_located_in_geographic_area
    notes: >
      geographic_area must not reference itself recursively through located_in/
      contains (irreflexive, asymmetric).

  # -------------------------------------------------------------------------
  # External / Upstream Imports (Cross-Domain Relationships)
  # -------------------------------------------------------------------------

  - id: built_infrastructure_operated_by_organization
    from: built_infrastructure
    relationship: operated_by
    to: shared_org:organisation
    cardinality: { min: 0, max: 1 }
    notes: >
      Links a physical facility to a formal statutory organization.
      Ownership of the physical facility is Community Context; ownership of the
      formal organisation is Shared Taxonomy. This row's `to:` already fixes the
      allowed range — no separate constraint row restates it.

  - id: local_collective_composed_of_members
    from: local_collective
    relationship: composed_of
    to: shared_human:person
    cardinality: { min: 0, max: unbounded }
    notes: >
      Links the collective entity to individual human members.
      Ownership of the collective is Community Context; ownership of the person is
      Shared Human Model.
