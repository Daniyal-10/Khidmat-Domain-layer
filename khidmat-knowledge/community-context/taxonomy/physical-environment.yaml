# Khidmat Knowledge Layer — Community Context Taxonomy
# Domain: Community Context
# File: physical-environment.yaml
# Purpose: Defines the physical and environmental baseline of a geographic area, supporting logistics and risk reasoning without defining the risks themselves.

domain: community_context
taxonomy: physical_environment
version: 1.0.0

concepts:
  terrain:
    description: "The primary physical geography and topography of the area."
    type: enum
    values:
      - id: flat_plains
        label: "Flat Plains"
        description: "Level or gently rolling land."
      - id: mountainous
        label: "Mountainous"
        description: "High elevation with steep gradients and rugged topography."
      - id: hilly
        label: "Hilly"
        description: "Moderate elevation changes and rolling topography."
      - id: riverine
        label: "Riverine / Riparian"
        description: "Land adjacent to a river or stream, often characterized by distinct hydrological features."
      - id: coastal
        label: "Coastal"
        description: "Land adjacent to the sea or ocean."
      - id: arid_desert
        label: "Arid / Desert"
        description: "Extremely dry land with sparse natural vegetation."

  climate_zone:
    description: "The long-term weather pattern characteristic of the area."
    type: enum
    values:
      - id: tropical
        label: "Tropical"
        description: "Consistently warm with high humidity and heavy rainfall."
      - id: arid
        label: "Arid"
        description: "Dry, with little precipitation."
      - id: temperate
        label: "Temperate"
        description: "Moderate temperatures with distinct seasons."
      - id: alpine
        label: "Alpine / Highland"
        description: "Cool to cold temperatures characteristic of high altitudes."

  water_availability:
    description: "The natural baseline of surface and groundwater presence."
    type: enum
    values:
      - id: abundant
        label: "Abundant"
        description: "Readily available surface water or high water table year-round."
      - id: seasonal
        label: "Seasonal"
        description: "Water availability fluctuates significantly depending on the season."
      - id: scarce
        label: "Scarce"
        description: "Chronically limited natural water resources requiring deep extraction or importation."

  land_use:
    description: "The primary human modification and utilization of the land."
    type: enum
    values:
      - id: dense_urban
        label: "Dense Urban"
        description: "Highly built-up area with minimal open space."
      - id: peri_urban
        label: "Peri-Urban"
        description: "Transition zone between urban and rural, often undergoing rapid development."
      - id: agricultural
        label: "Agricultural"
        description: "Land primarily used for farming, grazing, or livestock."
      - id: forested
        label: "Forested / Wild"
        description: "Primarily natural vegetation with minimal settlement footprint."

  remoteness:
    description: "The degree of geographical isolation relative to major hubs."
    type: enum
    values:
      - id: highly_connected
        label: "Highly Connected"
        description: "Immediate access to major transportation arteries and urban hubs."
      - id: accessible
        label: "Accessible"
        description: "Connected by standard road networks, reachable without specialized logistics."
      - id: isolated
        label: "Isolated"
        description: "Significant distance from hubs, requiring extended travel time on secondary routes."
      - id: remote
        label: "Remote / Hard-to-Reach"
        description: "Extreme isolation, requiring specialized transport or multi-day travel."



alignment_notes:
  - constraint: "This taxonomy models the physical reality, NOT the hazard. 'Riverine' is a terrain; 'Flood' is a hazard. 'Mountainous' is terrain; 'Landslide' or 'Earthquake' is a hazard. Hazards remain strictly in `shared/risk/taxonomy/hazard-categories.yaml`."
  - constraint: "C2 remediation: The `logistics_constraints` category was removed to eliminate semantic duplication with `accessibility.yaml#physical_accessibility`. `physical-environment.yaml` now strictly owns pure physical geography (terrain, climate, water, land use, remoteness), while `accessibility.yaml` canonically owns access mode classifications and physical access constraints."
