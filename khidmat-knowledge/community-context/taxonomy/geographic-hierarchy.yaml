version: "1.0.0"
domain: community_context
file: community-context/taxonomy/geographic-hierarchy.yaml
status: active

# Purpose: Defines the spatial and administrative boundaries used to group and locate communities.

schemes:
  - id: geographic_level
    label: Geographic Level
    description: >
      The classification of a spatial boundary, ranging from broad administrative
      regions to highly localized settlements.
    concepts:
      - id: country
        label: "Country"
        description: "The national boundary, used for international deployments, overarching policy context, and national-level risk factors."
      - id: region
        label: "Region / State / Province"
        description: "The highest administrative division, used for large-scale coordination and macroeconomic context."
      - id: district
        label: "District"
        description: "A primary administrative subdivision, typically where major government services and tertiary infrastructure are headquartered."
      - id: block
        label: "Block / Sub-District / Tehsil"
        description: "An intermediate administrative unit grouping multiple villages or towns, often the focal point for programmatic interventions."
      - id: cluster
        label: "Cluster"
        description: "An operational geographic level representing a grouping of multiple villages, settlements, or neighbourhoods used for humanitarian planning and service delivery."
      - id: municipality
        label: "Municipality / Town"
        description: "An urban or semi-urban local government area with dense infrastructure."
      - id: village
        label: "Village"
        description: "A rural settlement with defined boundaries, typically governed by a village council."
      - id: ward
        label: "Ward"
        description: "An electoral or administrative subdivision of a municipality or village council."
      - id: neighbourhood
        label: "Neighbourhood / Settlement / Hamlet"
        description: "An organically defined, highly localized settlement or cluster of households sharing immediate physical proximity, often smaller than an administrative ward."

  - id: boundary_type
    label: Boundary Type
    description: >
      The nature of the geographic area's boundary definition.
    concepts:
      - id: administrative
        label: "Administrative"
        description: "Officially demarcated by government authorities."
      - id: organic
        label: "Organic / Community-Defined"
        description: "Defined by social consensus, natural geography, or shared identity rather than official government maps."
      - id: operational
        label: "Operational"
        description: "Defined specifically for humanitarian or service delivery purposes (e.g., a distribution zone)."

# Cross-domain relationship to shared/taxonomy/locations.yaml (location_precision,
# location_stability): this domain's geographic_level scheme is the structured
# hierarchy shared/taxonomy/locations.yaml's own header defers to future domains
# ("Future domains will extend this file... Do not add those here until those
# domains are active"). No CURIE is minted here — the repository-wide manifest
# (Finding R-1) and ratified base IRI (C-2) do not exist yet
# (Repository_Migration_Methodology.md §3); a `references:` entry is added once
# they do (deferred: cross-domain CURIE linking, pending a repository-wide manifest).

alignment_notes:
  - "This taxonomy integrates with `shared/taxonomy/locations.yaml`, which defines location precision (e.g., area_only). Community Context provides the structured hierarchy that `shared/locations` can reference for area definitions."
  - "C3 remediation (this sprint): `informal_settlement` / camp was removed as a geographic level. Settlement formality is an orthogonal concept owned by `settlement-types.yaml`. An informal settlement or camp occupies a standard hierarchy level (typically village, neighbourhood, or cluster) and its informality is expressed via its settlement type."
  - "Adheres to ADR-008. Ownership is strictly within Community Context. Household entities in the Shared Domain will reference these areas via ontology, not redefine them."
