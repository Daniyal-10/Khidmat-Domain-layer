version: "1.0.0"
domain: community_context
file: community-context/taxonomy/seasonal-events.yaml
status: active

# ============================================================================
# Purpose: Model recurring seasonal and cyclical phenomena that influence
#          community life, livelihoods, accessibility, and service delivery.
# Scope: This taxonomy strictly classifies cyclical environmental and socio-economic
#        events. It does NOT model hazards, sudden disasters, individual risk,
#        or operational responses.
#
# ADR Validation:
# - ADR-008 (Single Ownership): Ensures clear separation from the Risk domain.
#   A "heavy precipitation season" is an expected seasonal event here, while a
#   "flood" is a hazard owned by Risk.
# - ADR-022 (Regional Localization): Uses globally recognized, canonical concepts
#   (e.g., `primary_harvest_season`) rather than regional terminology (e.g.,
#   Kharif/Rabi, Boro/Aman).
# ============================================================================

schemes:
  - id: climatic_phase
    label: Climatic Phase
    description: >
      Classification of recurring meteorological and climatic seasons.
    concepts:
      - id: heavy_precipitation_season
        label: "Heavy Precipitation Season"
        description: "Period characterized by prolonged or intense rainfall (e.g., monsoon, wet season)."
      - id: dry_season
        label: "Dry Season"
        description: "Period characterized by consistently low precipitation and high evaporation."
      - id: extreme_temperature_season
        label: "Extreme Temperature Season"
        description: "Period characterized by severe seasonal heat or cold (e.g., peak summer, deep winter)."
      - id: transitional_season
        label: "Transitional Season"
        description: "Shoulder periods between major climatic phases (e.g., spring thaw, autumn)."

  - id: agricultural_cycle
    label: Agricultural Cycle
    description: >
      Classification of the recurring phases of agrarian economies.
    concepts:
      - id: land_preparation_and_planting
        label: "Land Preparation And Planting"
        description: "Period of intensive agricultural labor involving tilling, sowing, and planting."
      - id: growing_season
        label: "Growing Season"
        description: "Period of crop maturation; often corresponds with a lull in direct agricultural labor demand."
      - id: primary_harvest_season
        label: "Primary Harvest Season"
        description: "Peak period of crop gathering, characterized by high labor demand and incoming capital."
      - id: lean_season
        label: "Lean Season"
        description: "Period before harvest when food stocks are lowest and agricultural employment is scarce."
      - id: post_harvest_processing
        label: "Post Harvest Processing"
        description: "Period focused on storage, processing, and market selling."

  - id: socio_economic_cycle
    label: Socio Economic Cycle
    description: >
      Classification of recurring societal and economic shifts tied to the calendar.
    concepts:
      - id: labor_migration_departure
        label: "Labor Migration Departure"
        description: "Period when community members leave for seasonal or circular wage labor elsewhere."
      - id: labor_migration_return
        label: "Labor Migration Return"
        description: "Period when seasonal wage laborers return to the community."
      - id: pastoral_migration_season
        label: "Pastoral Migration Season"
        description: "Period of seasonal movement of livestock and herders (transhumance) seeking pasture or water."
      - id: peak_commercial_or_tourism_season
        label: "Peak Commercial Or Tourism Season"
        description: "Period of intense local economic activity, significantly altering local labor demand, prices, and resource strain."
      - id: academic_year_commencement
        label: "Academic Year Commencement"
        description: "Start of the primary school year, often requiring sudden financial outlay for fees and supplies."
      - id: major_cultural_or_religious_season
        label: "Major Cultural Or Religious Season"
        description: "Period of significant observance affecting labor availability, markets, and household expenditure."

  - id: hydrological_phase
    label: Hydrological Phase
    description: >
      Classification of recurring changes in water bodies and ground saturation.
    concepts:
      - id: peak_water_level
        label: "Peak Water Level"
        description: "Period when rivers, lakes, and ground saturation are at their highest."
      - id: low_water_level
        label: "Low Water Level"
        description: "Period when water sources run low, potentially impacting transport or drinking access."
      - id: freeze_and_thaw_cycle
        label: "Freeze And Thaw Cycle"
        description: "Periods where waterways or ground freeze, and subsequently thaw, heavily altering physical accessibility."

alignment_notes:
  - "The `agricultural_cycle` strictly avoids regional terms like 'Kharif', 'Rabi', or 'Monsoon', adhering to ADR-022 to remain globally applicable."
  - "A `heavy_precipitation_season` (Taxonomy: Community Context) is a predictable environmental reality. A `flood` or `cyclone` (Taxonomy: Risk) is a destructive realization of a hazard. This maintains the strict ADR-008 boundary between Context and Risk."
  - "`lean_season` is a fundamental socio-economic reality across global agricultural communities and is critical for reasoning about predictable livelihood and nutritional vulnerabilities without modeling the vulnerability directly in this file."
