# ============================================================================
# Domain: Community Context
# Context: Taxonomy
# File: livelihood-patterns.yaml
#
# Purpose: Model the dominant, persistent livelihood systems and economic 
#          activity patterns that define a community's macro-economy.
# Scope: This taxonomy strictly classifies the *community-level economic base* 
#        (e.g., `subsistence_agriculture`, `nomadic_pastoralism`). It explicitly 
#        does NOT model an individual beneficiary's employment status, household 
#        income, poverty levels, or individual commercial businesses.
#
# ADR Validation:
# - ADR-008 (Single Ownership): Community Context owns the macro-economic pattern 
#   of the area. The Registration and Shared Human Model domains own the specific 
#   employment status and income vulnerability of the individual household.
# - ADR-022 (Regional Localization): Uses globally recognized, canonical concepts 
#   (e.g., `informal_retail_and_trading`) avoiding region-specific colloquialisms.
#
# Ontology Compatibility:
# These values will serve as property ranges for `LivelihoodProfile` or 
# `Community` entities in `community-context/ontology.yaml`.
#
# Reasoning Compatibility:
# Enables powerful forward-chaining rules. For example, if a community is heavily 
# reliant on `subsistence_agriculture` and a `drought_sensitive_zone` (from 
# community-hazards), the AI can infer extreme baseline livelihood fragility.
#
# RDF/OWL Compatibility:
# Designed as flat enumerations to map perfectly to `owl:NamedIndividual` or 
# standard literal enums, preserving Directed Acyclic Graph (DAG) integrity.
# ============================================================================

livelihood_patterns:
  primary_production_and_extraction:
    description: Classification of livelihoods reliant on the direct extraction or cultivation of natural resources.
    values:
      - subsistence_agriculture: "Farming focused primarily on household consumption with minimal surplus for market."
      - commercial_cash_crop_agriculture: "Farming focused primarily on generating market surplus and cash income."
      - nomadic_or_semi_nomadic_pastoralism: "Livelihood based on livestock rearing requiring seasonal or continuous movement for pasture."
      - sedentary_livestock_rearing: "Livestock rearing integrated with settled farming or commercial feedlots."
      - artisanal_or_subsistence_fishing: "Small-scale fishing focused on household consumption or local markets."
      - commercial_fishing_or_aquaculture: "Large-scale fishing or controlled aquatic farming focused on commercial markets."
      - artisanal_mining_or_extraction: "Small-scale, often informal, extraction of minerals, timber, or stone."
      - foraging_and_wildcrafting: "Reliance on gathering wild plants, timber, or non-timber forest products."

  secondary_production_and_manufacturing:
    description: Classification of livelihoods reliant on the processing or manufacturing of goods.
    values:
      - traditional_artisan_production: "Small-scale, often household-based, crafting of goods (e.g., textiles, pottery)."
      - informal_manufacturing_and_processing: "Unregulated, small-scale industrial processing (e.g., brick making, food processing)."
      - formal_industrial_manufacturing: "Employment within regulated, large-scale industrial factories."

  services_and_trade:
    description: Classification of livelihoods reliant on commerce, transport, and service provision.
    values:
      - informal_retail_and_trading: "Unregulated buying and selling of goods, often in street markets or informal structures."
      - formal_retail_and_commerce: "Regulated commercial businesses operating from permanent structures."
      - transport_and_logistics_labor: "Livelihoods based on moving goods or people (e.g., drivers, porters, boatmen)."
      - tourism_and_hospitality_services: "Livelihoods heavily reliant on seasonal or continuous visitor influx."
      - domestic_or_care_labor: "Paid employment providing household, caretaking, or domestic services."

  wage_labor_and_employment_patterns:
    description: Classification of the structural nature of community labor engagement.
    values:
      - daily_or_casual_wage_labor: "Heavy reliance on irregular, short-term, or day-to-day employment without job security."
      - seasonal_agricultural_labor: "Reliance on agricultural wage labor heavily dictated by the agrarian calendar."
      - formal_salaried_employment: "Reliance on stable, regulated employment with public or large private institutions."
      - circular_labor_migration: "Systemic pattern where a significant portion of the workforce migrates seasonally for wage labor and returns."

alignment_notes:
  - "The `wage_labor_and_employment_patterns` class models the *systemic labor pattern* of the community, not the employment status of a single person (which belongs in Registration)."
  - "By categorizing `nomadic_or_semi_nomadic_pastoralism`, the taxonomy seamlessly integrates with `pastoral_migration_season` in `seasonal-events.yaml` to allow robust temporal and spatial reasoning."
  - "`circular_labor_migration` captures the macroeconomic reality of remittance-dependent communities, a critical factor in global humanitarian contexts, adhering strictly to ADR-022."
