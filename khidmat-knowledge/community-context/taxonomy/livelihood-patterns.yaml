version: "1.0.0"
domain: community_context
file: community-context/taxonomy/livelihood-patterns.yaml
status: active

# ============================================================================
# Purpose: Model the dominant, persistent livelihood systems and economic
#          activity patterns that define a community's macro-economy.
# Scope: This taxonomy strictly classifies the *community-level economic base*
#        (e.g., `subsistence_agriculture`, `nomadic_pastoralism`). It explicitly
#        does NOT model an individual beneficiary's employment status, household
#        income, poverty levels, or individual commercial businesses.
#
# ADR Validation:
# - ADR-008 (Single Ownership): Community Context owns the macro-economic pattern
#   of the area. The Registration and Shared Human Model domains own the specific
#   employment status and income vulnerability of the individual household.
# - ADR-022 (Regional Localization): Uses globally recognized, canonical concepts
#   (e.g., `informal_retail_and_trading`) avoiding region-specific colloquialisms.
# ============================================================================

schemes:
  - id: primary_production_and_extraction
    label: Primary Production And Extraction
    description: >
      Classification of livelihoods reliant on the direct extraction or cultivation of natural resources.
    concepts:
      - id: subsistence_agriculture
        label: "Subsistence Agriculture"
        description: "Farming focused primarily on household consumption with minimal surplus for market."
      - id: commercial_cash_crop_agriculture
        label: "Commercial Cash Crop Agriculture"
        description: "Farming focused primarily on generating market surplus and cash income."
      - id: nomadic_or_semi_nomadic_pastoralism
        label: "Nomadic Or Semi Nomadic Pastoralism"
        description: "Livelihood based on livestock rearing requiring seasonal or continuous movement for pasture."
      - id: sedentary_livestock_rearing
        label: "Sedentary Livestock Rearing"
        description: "Livestock rearing integrated with settled farming or commercial feedlots."
      - id: artisanal_or_subsistence_fishing
        label: "Artisanal Or Subsistence Fishing"
        description: "Small-scale fishing focused on household consumption or local markets."
      - id: commercial_fishing_or_aquaculture
        label: "Commercial Fishing Or Aquaculture"
        description: "Large-scale fishing or controlled aquatic farming focused on commercial markets."
      - id: artisanal_mining_or_extraction
        label: "Artisanal Mining Or Extraction"
        description: "Small-scale, often informal, extraction of minerals, timber, or stone."
      - id: foraging_and_wildcrafting
        label: "Foraging And Wildcrafting"
        description: "Reliance on gathering wild plants, timber, or non-timber forest products."

  - id: secondary_production_and_manufacturing
    label: Secondary Production And Manufacturing
    description: >
      Classification of livelihoods reliant on the processing or manufacturing of goods.
    concepts:
      - id: traditional_artisan_production
        label: "Traditional Artisan Production"
        description: "Small-scale, often household-based, crafting of goods (e.g., textiles, pottery)."
      - id: informal_manufacturing_and_processing
        label: "Informal Manufacturing And Processing"
        description: "Unregulated, small-scale industrial processing (e.g., brick making, food processing)."
      - id: formal_industrial_manufacturing
        label: "Formal Industrial Manufacturing"
        description: "Employment within regulated, large-scale industrial factories."

  - id: services_and_trade
    label: Services And Trade
    description: >
      Classification of livelihoods reliant on commerce, transport, and service provision.
    concepts:
      - id: informal_retail_and_trading
        label: "Informal Retail And Trading"
        description: "Unregulated buying and selling of goods, often in street markets or informal structures."
      - id: formal_retail_and_commerce
        label: "Formal Retail And Commerce"
        description: "Regulated commercial businesses operating from permanent structures."
      - id: transport_and_logistics_labor
        label: "Transport And Logistics Labor"
        description: "Livelihoods based on moving goods or people (e.g., drivers, porters, boatmen)."
      - id: tourism_and_hospitality_services
        label: "Tourism And Hospitality Services"
        description: "Livelihoods heavily reliant on seasonal or continuous visitor influx."
      - id: domestic_or_care_labor
        label: "Domestic Or Care Labor"
        description: "Paid employment providing household, caretaking, or domestic services."

  - id: wage_labor_and_employment_patterns
    label: Wage Labor And Employment Patterns
    description: >
      Classification of the structural nature of community labor engagement.
    concepts:
      - id: daily_or_casual_wage_labor
        label: "Daily Or Casual Wage Labor"
        description: "Heavy reliance on irregular, short-term, or day-to-day employment without job security."
      - id: seasonal_agricultural_labor
        label: "Seasonal Agricultural Labor"
        description: "Reliance on agricultural wage labor heavily dictated by the agrarian calendar."
      - id: formal_salaried_employment
        label: "Formal Salaried Employment"
        description: "Reliance on stable, regulated employment with public or large private institutions."
      - id: circular_labor_migration
        label: "Circular Labor Migration"
        description: "Systemic pattern where a significant portion of the workforce migrates seasonally for wage labor and returns."

alignment_notes:
  - "The `wage_labor_and_employment_patterns` class models the *systemic labor pattern* of the community, not the employment status of a single person (which belongs in Registration)."
  - "By categorizing `nomadic_or_semi_nomadic_pastoralism`, the taxonomy seamlessly integrates with `pastoral_migration_season` in `seasonal-events.yaml` to allow robust temporal and spatial reasoning."
  - "`circular_labor_migration` captures the macroeconomic reality of remittance-dependent communities, a critical factor in global humanitarian contexts, adhering strictly to ADR-022."
