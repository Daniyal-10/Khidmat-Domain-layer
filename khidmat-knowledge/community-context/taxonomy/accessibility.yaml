version: "1.0.0"
domain: community_context
file: community-context/taxonomy/accessibility.yaml
status: active

# ============================================================================
# Purpose: Model the accessibility characteristics of a geographic area and service location.
# Scope: This taxonomy classifies access constraints and modes. It does not
#        prescribe operational routing, volunteer assignments, or state transitions.
#        It provides the semantic vocabulary for reasoning about how an area or
#        service can be reached and communicated with.
#
# ADR Validation:
# - ADR-008 (Single Ownership): Concepts are natively owned by Community Context.
#   Does not redefine `functional_capacity` (Shared Human Model) or
#   `vulnerability` (Risk Domain).
# - ADR-022 (Regional Localization): Uses globally reusable canonical concepts.
#   (e.g., `security_checkpoint` instead of region-specific authority names).
#
# Ontology Compatibility:
# These values are used as property ranges (taxonomy_ref) for `geographic_area`
# and `built_infrastructure` entities in community-context/ontology/entities.yaml.
#
# Reasoning Compatibility:
# Enables forward-chaining rules (e.g., if seasonal_accessibility = `seasonally_cut_off`,
# infer `logistical_vulnerability` for services in that area).
# ============================================================================

schemes:
  - id: physical_accessibility
    label: Physical Accessibility
    description: >
      Classification of the physical terrain and pathway access to an area or location.
    concepts:
      - id: paved_road_access
        label: "Paved Road Access"
        description: "Reachable via continuous paved roads suitable for all standard vehicles."
      - id: unpaved_road_access
        label: "Unpaved Road Access"
        description: "Reachable via unpaved or dirt roads; may require specialized vehicles."
      - id: pedestrian_only_access
        label: "Pedestrian Only Access"
        description: "Reachable only on foot; no vehicular access possible."
      - id: waterway_access
        label: "Waterway Access"
        description: "Reachable primarily or exclusively via boats or waterways."
      - id: terrain_restricted_access
        label: "Terrain Restricted Access"
        description: "Access requires navigating difficult terrain (e.g., steep mountains, dense forest)."

  - id: transportation_accessibility
    label: Transportation Accessibility
    description: >
      Classification of the availability of public or shared transportation options.
    concepts:
      - id: frequent_public_transit
        label: "Frequent Public Transit"
        description: "Regular, scheduled public transportation is available throughout the day."
      - id: sparse_public_transit
        label: "Sparse Public Transit"
        description: "Public transportation is available but infrequent or unreliable."
      - id: informal_transit_only
        label: "Informal Transit Only"
        description: "Relies entirely on informal, unscheduled shared transport (e.g., shared taxis, animal carts)."
      - id: no_transit_available
        label: "No Transit Available"
        description: "No shared or public transportation options exist."

  - id: seasonal_accessibility
    label: Seasonal Accessibility
    description: >
      Classification of how weather and seasons impact access over time.
    concepts:
      - id: year_round_access
        label: "Year Round Access"
        description: "Location remains accessible regardless of seasonal changes."
      - id: seasonally_restricted
        label: "Seasonally Restricted"
        description: "Access becomes difficult but not impossible during specific seasons (e.g., mud, snow)."
      - id: seasonally_cut_off
        label: "Seasonally Cut Off"
        description: "Location becomes entirely unreachable during specific seasons (e.g., monsoon flooding, heavy snow)."
      - id: unpredictable_disruption
        label: "Unpredictable Disruption"
        description: "Access is subject to frequent, unpredictable weather-related closures."

  - id: communication_accessibility
    label: Communication Accessibility
    description: >
      Classification of the ability to establish reliable communication with individuals in the area.
    concepts:
      - id: pervasive_communication
        label: "Pervasive Communication"
        description: "Multiple reliable communication methods available (e.g., reliable post, multiple carriers)."
      - id: limited_communication
        label: "Limited Communication"
        description: "Only a single reliable communication method is available."
      - id: mediated_communication
        label: "Mediated Communication"
        description: "Direct communication is impossible; relies on intermediaries or community leaders."
      - id: isolated
        label: "Isolated"
        description: "No reliable means of remote communication exist."

  - id: digital_connectivity
    label: Digital Connectivity
    description: >
      Classification of data network and internet availability.
    concepts:
      - id: high_capacity_data
        label: "High Capacity Data"
        description: "Reliable, high-bandwidth internet suitable for heavy data usage."
      - id: reliable_mobile_network
        label: "Reliable Mobile Network"
        description: "Consistent voice and basic mobile data coverage."
      - id: intermittent_mobile_network
        label: "Intermittent Mobile Network"
        description: "Signal drops frequently; text-based communication may work but voice/data is unreliable."
      - id: network_dead_zone
        label: "Network Dead Zone"
        description: "No digital or cellular network coverage exists."

  - id: economic_accessibility
    label: Economic Accessibility
    description: >
      Classification of the financial requirements to access a service or location.
    concepts:
      - id: free_at_point_of_use
        label: "Free At Point Of Use"
        description: "No direct financial cost required for access."
      - id: subsidized_or_sliding_scale
        label: "Subsidized Or Sliding Scale"
        description: "Costs exist but are subsidized or adjusted based on ability to pay."
      - id: prohibitive_commercial_cost
        label: "Prohibitive Commercial Cost"
        description: "Standard commercial costs apply, acting as a barrier to vulnerable populations."

  - id: accessibility_barrier
    label: Accessibility Barrier
    description: >
      Specific, identifiable obstacles that inhibit access to a location or service.
    concepts:
      - id: security_checkpoint
        label: "Security Checkpoint"
        description: "Access is controlled by military, police, or armed actors."
      - id: natural_barrier
        label: "Natural Barrier"
        description: "A physical geographic feature (e.g., unbridged river, landslide) blocks the path."
      - id: infrastructure_collapse
        label: "Infrastructure Collapse"
        description: "A previously usable route is destroyed (e.g., washed-out bridge, collapsed road)."
      - id: social_exclusion_boundary
        label: "Social Exclusion Boundary"
        description: "Access is restricted due to social, sectarian, or community-enforced boundaries."
      - id: administrative_or_documentation_barrier
        label: "Administrative Or Documentation Barrier"
        description: "Access requires specific identity documents or permits that exclude vulnerable groups."
      - id: language_barrier
        label: "Language Barrier"
        description: "Services are only provided in a language not natively spoken by the local vulnerable population."
      - id: cultural_or_gender_barrier
        label: "Cultural Or Gender Barrier"
        description: "Access is restricted due to cultural norms (e.g., absence of female practitioners for female patients)."
      - id: financial_barrier
        label: "Financial Barrier"
        description: "The direct or indirect costs of access (fees, bribes, transport costs) exclude vulnerable populations."

alignment_notes:
  - "The `accessibility_barrier: social_exclusion_boundary` aligns with the need to model exclusion without hardcoding specific country dynamics, adhering exactly to ADR-022."
  - "Do not conflate `physical_accessibility` (terrain) with `digital_connectivity` (networks). They represent separate dimensions of isolation."
  - "These concepts describe the environment, not the individual. An area with `pedestrian_only_access` presents a systemic barrier to everyone. An individual's personal inability to walk is modeled separately under the Shared Human Model (`capabilities.yaml`) and must not be duplicated here."
  - "Operational availability of a service (e.g., `continuous_operation`, `emergency_only`) represents a mutable state rather than an immutable semantic classification. As such, it is excluded from this taxonomy and should be modeled as an attribute of the `built_infrastructure` entity in `community-context/ontology/data-properties.yaml`, once authored."
  - "C2 remediation: This file is the canonical owner of access-mode classification (`physical_accessibility`). Pure physical geography (terrain, land use) is strictly owned by `physical-environment.yaml`."
