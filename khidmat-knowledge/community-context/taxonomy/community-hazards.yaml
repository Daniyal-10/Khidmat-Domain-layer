version: "1.0.0"
domain: community_context
file: community-context/taxonomy/community-hazards.yaml
status: active

# ============================================================================
# Purpose: Model the relatively stable, structural exposure of a geographic area
#          to environmental, geological, and anthropogenic hazard profiles.
# Scope: This taxonomy classifies the *context of exposure* (e.g., a flood-prone
#        zone). It strictly does NOT model the hazard itself (e.g., a flood event),
#        which is owned exclusively by the Risk Domain. It also excludes dynamic
#        vulnerability, disaster events, and operational responses.
#
# ADR Validation:
# - ADR-008 (Single Ownership): Ensures pristine boundary with the Risk Domain.
#   Risk owns the hazard (`flood`). Community Context owns the environmental
#   trait that makes exposure likely (`flood_prone_lowland`).
# - ADR-022 (Regional Localization): Uses globally recognized, canonical concepts
#   rather than regional terms.
# ============================================================================

schemes:
  - id: hydrological_exposure_context
    label: Hydrological Exposure Context
    description: >
      Classification of geographic susceptibility to water-related extremes.
    concepts:
      - id: flood_prone_lowland
        label: "Flood Prone Lowland"
        description: "Geographic area subject to regular or seasonal inundation."
      - id: flash_flood_susceptible_channel
        label: "Flash Flood Susceptible Channel"
        description: "Dry or low-flow channels subject to rapid, severe water flow following heavy precipitation."
      - id: storm_surge_exposed_coastline
        label: "Storm Surge Exposed Coastline"
        description: "Coastal area highly susceptible to oceanic inundation during severe weather."
      - id: drought_sensitive_zone
        label: "Drought Sensitive Zone"
        description: "Area with low structural water security, highly susceptible to periods of low precipitation."

  - id: geological_exposure_context
    label: Geological Exposure Context
    description: >
      Classification of geographic susceptibility to earth and tectonic movements.
    concepts:
      - id: earthquake_prone_fault_zone
        label: "Earthquake Prone Fault Zone"
        description: "Region situated on or near active tectonic fault lines with high historical seismicity."
      - id: landslide_susceptible_terrain
        label: "Landslide Susceptible Terrain"
        description: "Steep or unstable terrain prone to earth movement, especially during heavy rains or tremors."
      - id: avalanche_prone_slope
        label: "Avalanche Prone Slope"
        description: "High-altitude or steep snow-covered terrain susceptible to rapid snowpack failure."
      - id: volcanic_hazard_zone
        label: "Volcanic Hazard Zone"
        description: "Area situated within the historical impact radius of active or dormant volcanoes."

  - id: climatological_exposure_context
    label: Climatological Exposure Context
    description: >
      Classification of geographic susceptibility to extreme atmospheric and climatic conditions.
    concepts:
      - id: cyclone_exposed_region
        label: "Cyclone Exposed Region"
        description: "Coastal or near-coastal area situated in the historical path of severe tropical cyclones/hurricanes."
      - id: extreme_heat_susceptible_zone
        label: "Extreme Heat Susceptible Zone"
        description: "Area structurally prone to prolonged periods of severe, life-threatening high temperatures."
      - id: severe_winter_exposure_zone
        label: "Severe Winter Exposure Zone"
        description: "Area prone to extreme cold, blizzards, and prolonged freezing conditions."
      - id: wildfire_prone_interface
        label: "Wildfire Prone Interface"
        description: "Area where human habitation borders dense vegetation susceptible to uncontrolled fires."

  - id: anthropogenic_exposure_context
    label: Anthropogenic Exposure Context
    description: >
      Classification of geographic susceptibility to human-made or industrial hazards.
    concepts:
      - id: industrial_pollution_zone
        label: "Industrial Pollution Zone"
        description: "Area persistently exposed to severe air, water, or soil contamination from adjacent industry."
      - id: hazardous_material_transit_corridor
        label: "Hazardous Material Transit Corridor"
        description: "Area situated along major routes used for the transportation of dangerous chemicals or materials."
      - id: structural_collapse_risk_zone
        label: "Structural Collapse Risk Zone"
        description: "Urban or semi-urban area characterized by highly precarious, unregulated, or degrading infrastructure."
      - id: unexploded_ordnance_zone
        label: "Unexploded Ordnance Zone"
        description: "Area known or suspected to contain historical landmines or unexploded military munitions."

alignment_notes:
  - "By appending terms like `_zone`, `_terrain`, or `_context`, we structurally enforce the ADR-008 boundary. The Risk Domain owns the active `earthquake` hazard; Community Context owns the persistent `earthquake_prone_fault_zone` geographic property."
  - "This taxonomy deliberately excludes social conflict (e.g., 'riot-prone area'). Social cohesion and conflict dynamics belong to a separate, dedicated social taxonomy within Community Context, ensuring physical and social exposures remain semantically distinct."
  - "These classifications are persistent context. An area is a `flood_prone_lowland` year-round, even during the dry season. The actual realization of the threat requires the intersection of this context with a `SeasonalEvent` or an acute hazard."
