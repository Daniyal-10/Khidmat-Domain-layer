version: "1.1.0"
domain: consent-and-privacy
file: consent-and-privacy/ontology/data-properties.yaml
status: active

data_properties:
  - id: consent_type
    domain: consent
    cardinality: { min: 1, max: 1 }
    datatype: xsd:anyURI
    notes: >
      Reference to the taxonomy of consent types (e.g. Medical, Data Sharing).

  - id: granted_date
    domain: consent
    cardinality: { min: 1, max: 1 }
    datatype: xsd:dateTime
    notes: >
      The date and time when the consent was explicitly granted.

  - id: expiration_date
    domain: consent
    cardinality: { min: 0, max: 1 }
    datatype: xsd:dateTime
    notes: >
      The date and time when the consent automatically expires and is no longer valid.
