version: "1.1.0"
domain: consent-and-privacy
file: consent-and-privacy/taxonomy/consent-types.yaml
status: active

concept_scheme:
  id: consent_type
  label: Consent Type Vocabulary
  description: >
    Canonical taxonomy categorizing the different types of consent 
    provided by a humanitarian subject.

concepts:
  - id: consent_medical_treatment
    label: Medical Treatment Consent
    description: Consent provided for receiving medical interventions.

  - id: consent_data_sharing
    label: Data Sharing Consent
    description: Consent provided for sharing personal or household data with external partners.

  - id: consent_media_photography
    label: Media and Photography Consent
    description: Consent provided for the use of images or media by the organization.

  - id: consent_protection_referral
    label: Protection Referral Consent
    description: Specialized consent explicitly permitting the sharing of sensitive data for protection referrals.
