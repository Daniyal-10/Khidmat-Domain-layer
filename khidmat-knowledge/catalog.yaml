repository:
  name: khidmat-knowledge
  version: 1.0.0
  description: Khidmat Knowledge Architecture and Ontology

architecture:
  canonical_schema_version: "1.0"
  taxonomy_schema_version: "1.0"
  repository_maturity: Level 1
  current_release: Release Certification Complete

statistics:
  number_of_domains: 13
  number_of_adrs: 29
  number_of_ontology_modules: 64
  number_of_taxonomy_modules: 94
  number_of_reasoning_modules: 12

namespaces:
  registration:
    namespace: registration
    canonical_prefix: reg
    directory: registration
    status: canonical
    paths:
      - gaps
      - ontology
      - questioning
      - readiness
      - reasoning
      - taxonomy
      - verification
      - README.md
    depends_on: []
  shared:
    namespace: shared
    canonical_prefix: shd
    directory: shared
    status: canonical
    paths:
      - human-model
      - ontology
      - risk
      - taxonomy
      - vocabulary
      - README.md
    depends_on: []
  case-management:
    namespace: case-management
    canonical_prefix: cm
    directory: case-management
    status: production
    paths:
      - discovery
      - ontology
      - taxonomy
      - README.md
    depends_on:
      - shared
      - needs-assessment
  verification-operations:
