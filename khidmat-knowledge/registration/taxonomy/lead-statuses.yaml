version: "1.1.0"
domain: registration
file: registration/taxonomy/lead-statuses.yaml
status: active

purpose: >
  Classification of lead status values during the intake and review phases.
  Governs the lead state machine prior to promotion to Case.

schemes:
  - id: lead_statuses
    description: >
      Classification of lead status values during the intake and review phases.
      Governs the lead state machine prior to promotion to Case.
    concepts:
      - id: draft
        label: Draft
        description: Registration intake conversation is currently in progress.

      - id: submitted
        label: Submitted
        description: Conversation is complete, metadata extracted, and ready for review.

      - id: assigned_for_review
        label: Assigned for Review
        description: Lead has been assigned to a volunteer for desk audit.

      - id: under_review
        label: Under Review
        description: Volunteer reviewer is actively inspecting the lead details.

      - id: approved
        label: Approved
        description: Lead approved and promoted to Case / verified Beneficiary.

      - id: needs_clarification
        label: Needs Clarification
        description: The reviewer has sent the lead back to intake to resolve information gaps.

      - id: rejected
        label: Rejected
        description: Lead rejected (suspected fraud, duplicate, or ineligible).

      - id: escalated
        label: Escalated
        description: Anomalies detected; flagged for supervisor override.

  # Added per Phase 1.4 Canonical Taxonomy Completion. Resolves the
  # '# TODO Phase 5' placeholder previously on volunteer_review.decision
  # in registration/ontology/data-properties.yaml. A dedicated scheme
  # rather than a reference to lead_statuses above, because a review's
  # decision is only ever one of these four outcome values — lead_statuses
  # also includes the pre-review process states (draft, submitted,
  # assigned_for_review, under_review) that a decision can never hold.
  # Named lead_review_decision, not review_decision, to avoid colliding
  # with verification-operations/taxonomy/review-decisions.yaml's own
  # review_decision scheme — a genuinely different concept (a human
  # reviewer's disposition on a verification finding, not a volunteer's
  # desk-audit outcome on a Lead).
  - id: lead_review_decision
    label: Lead Review Decision
    description: >
      The outcome a volunteer's desk audit of a Lead produces, matching the
      Lead lifecycle's four review-outcome states (see
      registration/ontology/lifecycle-constraints.yaml#lead).
    concepts:
      - id: approved
        label: Approved
        description: Lead approved; may proceed to promotion.
      - id: needs_clarification
        label: Needs Clarification
        description: Lead sent back to intake to resolve information gaps.
      - id: rejected
        label: Rejected
        description: Lead rejected (suspected fraud, duplicate, or ineligible).
      - id: escalated
        label: Escalated
        description: Anomalies detected; flagged for supervisor override.
