version: "1.3.0"
domain: registration
file: registration/taxonomy/needs.yaml
status: active

purpose: >
  Classification of needs identified during registration.
  A need is a specific, concrete gap between a household member's
  current state and a basic standard of wellbeing.
  Subtypes describe qualitative differences in need type, not duration.
  Duration is captured via the need_duration attribute separately.

schemes:
  - id: need_source
    description: >
      Whether the need was expressed by the registrant or assessed by the AI
    concepts:
      - id: expressed
        label: Expressed
        description: >
          The registrant explicitly asked for this type of assistance.
          Record verbatim what was requested.
      - id: assessed
        label: Assessed
        description: >
          The situation indicates this need is likely present even if
          the registrant did not explicitly state it.
          The AI inferred this from other information.
      - id: both
        label: Expressed and Assessed
        description: >
          The registrant expressed this need and the situation independently
          supports its presence.

  - id: need_categories
    concepts:
      - id: food
        label: Food
        description: Insufficient access to adequate nutrition for household members
      - id: general_food_supply
        label: General Food Supply
        description: >
          The household lacks access to sufficient food for normal sustenance.
          This is the default food need subtype.
        parent: food
      - id: therapeutic_nutrition
        label: Therapeutic Nutrition
        description: >
          A specific household member requires medically prescribed nutrition.
          Distinct clinical pathway from general food supply.
          Examples: RUTF for SAM, fortified supplement for MAM,
          prescribed diet for a specific medical condition.
        requires_linked_member: true
        note: >
          If therapeutic nutrition is identified, link to the specific
          household member it concerns. A medical claim will also be needed
          to support the prescription.
        parent: food

      - id: medical
        label: Medical
        description: Healthcare needs including treatment, medication, and rehabilitation
      - id: surgical_treatment
        label: Surgical Treatment
        description: A procedure requiring hospitalisation or surgery
        requires_linked_member: true
        parent: medical
      - id: ongoing_medication
        label: Ongoing Medication
        description: Recurring prescription medication
        requires_linked_member: true
        parent: medical
      - id: rehabilitation
        label: Rehabilitation
        description: Post-injury or post-surgery recovery support
        requires_linked_member: true
        parent: medical
      - id: assistive_device
        label: Assistive Device
        description: >
          Wheelchair, hearing aid, prosthetic, crutches, or similar device.
          Note: if the primary purpose is enabling return to work,
          also record a livelihood need.
        requires_linked_member: true
        parent: medical
      - id: diagnostic_assessment
        label: Diagnostic Assessment
        description: >
          Clinical assessment has not yet occurred and is itself the need.
          The beneficiary has symptoms but no confirmed diagnosis.
        requires_linked_member: true
        parent: medical

      - id: shelter
        label: Shelter
        description: Housing instability or inadequate living conditions
      - id: emergency_housing
        label: Emergency Housing
        description: >
          No current safe place to sleep. Immediate intervention required.
        parent: shelter
      - id: rent_support
        label: Rent Support
        description: Unable to pay rent, at risk of eviction
        parent: shelter
      - id: shelter_repair
        label: Shelter Repair
        description: Current shelter is structurally unsafe or environmentally inadequate
        parent: shelter

      - id: education
        label: Education
        description: Barriers to accessing education for a household member
        requires_linked_member: true
      - id: school_fees
        label: School Fees
        description: Cannot afford tuition or enrollment fees
        parent: education
      - id: educational_supplies
        label: Educational Supplies
        description: Lacks books, uniform, stationery, or required materials
        parent: education
      - id: re_enrollment_support
        label: Re-Enrollment Support
        description: >
          Child is out of school and requires active assistance
          to re-enroll — not merely fee payment
        parent: education

      - id: livelihood
        label: Livelihood
        description: Inability to earn income or sustain economic activity
      - id: income_support
        label: Income Support
        description: >
          Temporary financial support while unable to work.
          Distinct from emergency cash — implies a trajectory toward
          restored income capacity.
        parent: livelihood
      - id: equipment_or_tools
        label: Equipment or Tools
        description: Requires specific tools or equipment to resume work
        parent: livelihood
      - id: skills_development
        label: Skills Development
        description: >
          Requires training, certification, or skills acquisition
          to access employment or restart economic activity
        parent: livelihood

      - id: psychosocial
        label: Psychosocial
        description: >
          Mental health, emotional wellbeing, or social support needs.
          Subtypes describe the nature of the need, not the response type.
      - id: grief_and_bereavement
        label: Grief and Bereavement
        description: >
          Loss of a family member, particularly the primary caregiver or earner.
          Often co-occurs with economic and dependent-load vulnerability.
        parent: psychosocial
      - id: trauma_response
        label: Trauma Response
        description: >
          Acute psychological distress following a specific event.
          Examples: disaster, violence, accident, displacement.
        parent: psychosocial
      - id: chronic_stress_and_isolation
        label: Chronic Stress and Isolation
        description: >
          Persistent psychological burden from structural vulnerability
          with no single triggering event.
        parent: psychosocial
      - id: caregiver_burden
        label: Caregiver Burden
        description: >
          The needs of a person who is the sole caregiver for a dependent
          with high support requirements.
        parent: psychosocial
      - id: domestic_violence_aftermath
        label: Domestic Violence Aftermath
        description: >
          Psychological support needs following exposure to domestic violence.
          Safety flag must be assessed before this need can be addressed.
        parent: psychosocial

  - id: need_duration
    concepts:
      - id: one_time
        label: One-Time
        description: A single intervention will resolve the need
      - id: short_term
        label: Short-Term
        description: Support required for days to a few weeks
      - id: recurring
        label: Recurring
        description: Support required on a regular cycle (weekly or monthly)
      - id: long_term
        label: Long-Term
        description: Ongoing chronic need with no foreseeable resolution

  # Added per Phase 1.4 Canonical Taxonomy Completion. Resolves the
  # '# TODO Phase 5' placeholder previously on household_snapshot.income.frequency
  # in registration/ontology/data-properties.yaml.
  - id: income_frequency
    label: Income Frequency
    description: How often a household's stated income source is received.
    concepts:
      - id: daily
        label: Daily
      - id: weekly
        label: Weekly
      - id: monthly
        label: Monthly
      - id: seasonal
        label: Seasonal
        description: Tied to an agricultural or seasonal labour cycle.
      - id: irregular
        label: Irregular
        description: No predictable frequency.

  # Reconciled per Phase 1.3A Ownership Conflict Resolution (previously a
  # local placeholder pending reconciliation with the legacy
  # needs-assessment/ontology.yaml#IdentifiedNeed.need_severity monolith,
  # since retired). needs-assessment/ontology/data-properties.yaml's
  # need_assertion.need_severity now references this scheme cross-domain
  # (registration_tax:need_severity) as its own synthesized/verified
  # severity classification, distinct from this scheme's role here as
  # Registration's claimed severity at intake. Both domains share this one
  # scheme; neither duplicates it.
  - id: need_severity
    concepts:
      - id: critical
      - id: high
      - id: medium
      - id: low
