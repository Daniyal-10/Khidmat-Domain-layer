version: "1.1.0"
domain: registration
file: registration/taxonomy/claims.yaml
status: active

purpose: >
  Classification of assertions made during registration.
  Claims are what registrants say. Verification confirms or refutes them.
  Information quality is assessed along two independent dimensions:
  sufficiency (how much do we know) and consistency (does it hold together).

schemes:
  - id: claim_types
    concepts:
      - id: identity_claim
        label: Identity Claim
        description: >
          An assertion about who the beneficiary is and where they are.
          Examples: name, age, location, relationship to registrant.
        verification_approach: >
          Physical presence at stated location.
          Identity document if available.
          Community reference if no document.

      - id: situation_claim
        label: Situation Claim
        description: >
          An assertion about the circumstances creating vulnerability.
          Examples: husband died two months ago, we were displaced by the flood,
          I lost my job when the factory closed.
        verification_approach: >
          Documentary evidence where available.
          Observable conditions at visit.
          Community or institutional reference.

      - id: need_claim
        label: Need Claim
        description: >
          An assertion that a specific need exists at the stated severity.
          Examples: we have not eaten in three days, the child requires surgery,
          we will be evicted at the end of this week.
        verification_approach: >
          Physical observation.
          Medical documentation for health needs.
          Institutional confirmation for education and livelihood needs.

      - id: household_claim
        label: Household Claim
        description: >
          An assertion about household composition, relationships, and dependents.
          Examples: I have four children all under twelve,
          my elderly father also lives with us,
          there is no other adult in the home.
        verification_approach: >
          Observation of members present at visit.
          Cross-reference with stated household size.
          Birth or school records for children if available.

  - id: information_sufficiency
    description: >
      How much do we know about this claim?
      Governs whether more questioning is needed.
    concepts:
      - id: complete
        label: Complete
        description: All key information for this claim is present
      - id: partial
        label: Partial
        description: >
          Some information is present but important detail is missing.
          Follow-up questions required.
      - id: missing
        label: Missing
        description: >
          The claim type is identified but almost no information has been provided.
          Substantive questioning required.

  - id: information_consistency
    description: >
      Does the information hold together internally?
      Independent of sufficiency — a claim can be complete but contradictory.
    concepts:
      - id: consistent
        label: Consistent
        description: No internal contradictions detected
      - id: ambiguous
        label: Ambiguous
        description: >
          Information is present but open to more than one interpretation.
          Clarifying question required.
      - id: contradictory
        label: Contradictory
        description: >
          Two or more statements about this claim conflict with each other.
          Gentle challenge required before proceeding.

# verifiable and evidence_available are boolean attributes of the claim entity.
# They are defined in registration/ontology/attributes.yaml under the claim section.
# They are listed here only as a cross-reference for readers of this file.
#
# verifiable (boolean):
#   Whether the claim can be confirmed by field observation, documentation,
#   or third-party reference. If false, the reason must be noted.
#
# evidence_available (boolean):
#   Whether the registrant indicates supporting documentation or physical
#   evidence exists and can be produced at or before the field visit.
