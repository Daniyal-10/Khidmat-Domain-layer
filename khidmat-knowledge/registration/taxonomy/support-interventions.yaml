version: "1.0.0"
domain: registration
file: registration/taxonomy/support-interventions.yaml
status: placeholder

purpose: |
  Classification of support intervention types that can be requested
  during registration. A support intervention describes what help is
  being requested — not how it will be delivered (that is the
  support-delivery domain's concern).

  concepts_this_file_will_own:
    - intervention_type hierarchy (financial, in-kind, service-based, referral)
    - requested_amount units and validation rules
    - requested_duration vocabulary
    - justification requirements by intervention type

  dependency_note:
    Intervention types must align with what Khidmat can operationally
    provide. This taxonomy should be co-designed with operations staff,
    not invented by the knowledge layer.

  do_not_implement_until:
    Khidmat's operational intervention catalogue has been confirmed
    with programme staff.

schemes: []
