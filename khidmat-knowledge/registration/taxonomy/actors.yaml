version: "1.2.0"
domain: registration
file: registration/taxonomy/actors.yaml
status: active
imports: shared/taxonomy/persons.yaml

purpose: >
  Registration-specific actor taxonomy.
  Defines the roles and epistemic relationships of people
  who participate in registration conversations.
  Person base vocabulary is in shared/taxonomy/persons.yaml.

schemes:
  - id: registrant_types
    concepts:
      - id: beneficiary
        label: Self-Registering Beneficiary
        description: >
          The beneficiary is conducting the registration themselves.
          All claims are first-hand unless explicitly stated otherwise.
        default_claim_basis: first_hand
        questioning_note: >
          May be reluctant to disclose full situation due to shame or distrust.
          Approach with patience. Establish trust before asking sensitive questions.

      - id: proxy
        label: Proxy
        description: >
          A person registering on behalf of a beneficiary who is not present
          or cannot register themselves.
        questioning_note: >
          Confirm the proxy's relationship to the beneficiary early.
          Identify which claims are first-hand versus relayed.
          Ask whether the beneficiary is aware of and consenting to registration.

      - id: family_member
        label: Family Member
        description: A relative of the beneficiary, likely with household knowledge
        default_claim_basis: first_hand
        parent: proxy
      - id: community_member
        label: Community Member
        description: >
          A neighbour or community contact. May have incomplete household knowledge.
        default_claim_basis: second_hand
        parent: proxy
      - id: professional_advocate
        label: Professional Advocate
        description: >
          A social worker, NGO caseworker, or formal representative.
          May have assessed the situation before registering.
        default_claim_basis: second_hand
        parent: proxy

      - id: volunteer
        label: Volunteer
        description: >
          A Khidmat field worker registering a beneficiary after direct interaction.
          Has observational knowledge and may have conducted an informal assessment.
        default_claim_basis: observational
        questioning_note: >
          Volunteer registrations are often richer in observational detail.
          Ask what was directly observed versus what was reported by the beneficiary.

  - id: claim_basis
    description: >
      The epistemic relationship between the registrant and the claim they make.
      Determines verification weight and follow-up questioning approach.
    concepts:
      - id: first_hand
        label: First-Hand
        description: Registrant has direct personal knowledge of this fact
        verification_weight: standard
      - id: second_hand
        label: Second-Hand
        description: Registrant was told this by another person
        verification_weight: elevated
        questioning_note: Ask who told them and whether that person can be contacted
      - id: observational
        label: Observational
        description: Registrant observed this directly during a visit or interaction
        verification_weight: reduced
        questioning_note: Document what was observed and when
      - id: inferred
        label: Inferred
        description: >
          Registrant is concluding this from other information rather than
          stating it as direct knowledge
        verification_weight: elevated
        questioning_note: Surface the basis for the inference explicitly

  - id: proxy_consent
    description: >
      Whether the beneficiary is aware of and has consented to registration
    concepts:
      - id: confirmed
        label: Confirmed
        description: Beneficiary is aware and has consented
      - id: unable_to_obtain
        label: Unable to Obtain
        description: >
          Beneficiary cannot consent (incapacitated, minor, unreachable)
          and a responsible adult is acting on their behalf
      - id: not_yet_obtained
        label: Not Yet Obtained
        description: Registrant has not confirmed consent — follow up required
      - id: not_applicable
        label: Not Applicable
        description: Registrant is the beneficiary

  # Added per Phase 1.4 Canonical Taxonomy Completion. Resolves the
  # '# TODO Phase 5' placeholder previously on beneficiary.gender,
  # beneficiary.documentation_status, beneficiary.legal_status, and
  # case.registration_channel in registration/ontology/data-properties.yaml.
  - id: gender
    label: Gender
    description: >
      The beneficiary's or household member's gender, as self-reported or
      reported by the registrant.
    concepts:
      - id: female
        label: Female
      - id: male
        label: Male
      - id: other
        label: Other
        description: Gender identity outside the male/female binary, as self-described.
      - id: prefer_not_to_say
        label: Prefer Not to Say
        description: Beneficiary declined to state gender.

  - id: documentation_status
    label: Documentation Status
    description: >
      Whether the beneficiary possesses identity documentation, independent of
      which specific document type they hold (see shared/taxonomy/document-types.yaml
      for document type classification).
    concepts:
      - id: fully_documented
        label: Fully Documented
        description: Beneficiary holds valid, current identity documentation.
      - id: partially_documented
        label: Partially Documented
        description: Beneficiary holds some but not all typically-expected documentation.
      - id: undocumented
        label: Undocumented
        description: Beneficiary holds no identity documentation.
      - id: documentation_lost
        label: Documentation Lost
        description: >
          Beneficiary previously held documentation that has since been lost,
          destroyed, or confiscated (e.g. during displacement).

  - id: legal_status
    label: Legal Status
    description: >
      The beneficiary's legal status in their current location of residence.
      Country-neutral vocabulary; does not presume any specific jurisdiction's
      legal categories.
    concepts:
      - id: citizen
        label: Citizen
      - id: resident
        label: Resident
        description: Legally resident but not a citizen.
      - id: refugee
        label: Refugee
      - id: asylum_seeker
        label: Asylum Seeker
      - id: stateless
        label: Stateless
      - id: undocumented_migrant
        label: Undocumented Migrant
      - id: unknown
        label: Unknown
        description: Legal status not established or not disclosed.

  - id: registration_channel
    label: Registration Channel
    description: >
      The medium through which the registration conversation took place.
      Distinct from referral_types (registration/taxonomy/referral-sources.yaml),
      which classifies why the registration occurred, not how contact was made.
    concepts:
      - id: in_person
        label: In Person
      - id: phone
        label: Phone
      - id: whatsapp
        label: WhatsApp
      - id: walk_in
        label: Walk-In
        description: Beneficiary or registrant came directly to a Khidmat location.
      - id: home_visit
        label: Home Visit
        description: A volunteer conducted the registration during a home visit.
      - id: outreach_event
        label: Outreach Event
        description: Registration occurred during a community outreach event.
