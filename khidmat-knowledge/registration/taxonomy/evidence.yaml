version: "1.1.0"
domain: registration
file: registration/taxonomy/evidence.yaml
status: active

purpose: >
  Classification of evidence types used during registration to support claims.
  Provides a controlled vocabulary for documentary, physical, and testimonial
  evidence. Maps evidence subtypes to claim types to prevent free-text subtype drift.

imports:
  - shared/taxonomy/document-types.yaml
  - registration/taxonomy/claims.yaml

# The claim-type -> allowed-evidence-subtype matrix formerly here
# (claim_evidence_matrix) is relocated to
# registration/reasoning/evidence-rules.yaml in Phase 3 (D3).

schemes:
  - id: evidence_types
    concepts:
      - id: documentary
        label: Documentary Evidence
        description: >
          Written or printed certificates, official documents, bills, or digital scans.
          Subtypes for documentary evidence are defined and imported from
          shared/taxonomy/document-types.yaml.

      - id: physical
        label: Physical Evidence
        description: >
          Direct observable conditions, physical states, items, or infrastructure.
      - id: living_conditions_observation
        label: Living Conditions Observation
        description: Observation of shelter quality, room density, or safety hazards.
        parent: physical
      - id: physical_impairment_observation
        label: Physical Impairment Observation
        description: Direct observation of a physical injury, mobility aid, or functional dependency.
        parent: physical
      - id: nutritional_status_observation
        label: Nutritional Status Observation
        description: Direct observation of nutritional risk (e.g. child wasting, severe lethargy).
        parent: physical
      - id: utility_disruption_observation
        label: Utility Disruption Observation
        description: Observed lack of basic services (no electricity, dry taps, no sanitation facilities).
        parent: physical
      - id: asset_status_observation
        label: Asset Status Observation
        description: Observed absence or presence of major assets (vehicles, electronics, appliances).
        parent: physical

      - id: testimonial
        label: Testimonial Evidence
        description: >
          Verification or statements provided by third-party individuals or community members.
      - id: community_leader_confirmation
        label: Community Leader Confirmation
        description: Statement or reference from a local mukhtar, village elder, or community leader.
        parent: testimonial
      - id: neighbour_confirmation
        label: Neighbour Confirmation
        description: Verification of residency, household size, or relationship by nearby residents.
        parent: testimonial
      - id: landlord_confirmation
        label: Landlord Confirmation
        description: Statement from property owner verifying rent status, arrears, or eviction notice.
        parent: testimonial
      - id: employer_confirmation
        label: Employer Confirmation
        description: Statement from current/former employer verifying active job loss or salary.
        parent: testimonial
      - id: professional_confirmation
        label: Professional Confirmation
        description: Verification by a local doctor, pharmacist, teacher, or social worker.
        parent: testimonial

  - id: availability_classifications
    concepts:
      - id: provided_digitally
        label: Provided Digitally
        description: Document or media uploaded during intake.

      - id: available_at_visit
        label: Available at Visit
        description: Physical document or object held by beneficiary, requiring field inspection.

      - id: requires_retrieval
        label: Requires Retrieval
        description: Exists but is not immediately available, requiring coordination.

      - id: not_available
        label: Not Available
        description: Claimed to exist but cannot be produced (e.g. lost, destroyed).
