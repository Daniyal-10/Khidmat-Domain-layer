version: "1.0"
domain: registration
file: readiness/readiness-rules.yaml

purpose: >
  Defines the conditions that must be satisfied before a case can transition
  to ready_for_verification status.
  Readiness is the integration point of the registration domain:
  it synthesises gap detection, coherence checking, and entity completeness
  into a single gate condition.
  A case may have no blocking gaps and still fail readiness if coherence
  checks are unresolved. Both layers must pass.

# ─────────────────────────────────────────────────────────────────
# LAYER 1: BLOCKING GAP CLEARANCE
# All conditions in this layer must be true for readiness to pass.
# These correspond directly to gap types with blocking: true in
# gap-detection-rules.yaml.
# ─────────────────────────────────────────────────────────────────

blocking_gap_clearance:
  description: >
    No gap with blocking: true may remain open at closure.
    Each condition below corresponds to a blocking gap type.
    If the condition is false, the named gap is open and blocks closure.

  required_conditions:

    - id: beneficiary_entity_complete
      gap_type: entity_gap
      condition: >
        beneficiary.name is not null
        AND beneficiary.age is not null
        AND beneficiary.gender is not null
      failure_label: Beneficiary basic attributes incomplete

    - id: household_size_known
      gap_type: household_gap
      condition: >
        household.size is not null
        AND count(household.members) >= 1
      failure_label: Household composition unknown

    - id: need_severity_classified
      gap_type: severity_gap
      condition: >
        for all needs: need.need_severity is not null
      failure_label: At least one need has no severity classification

    - id: every_need_has_claim
      gap_type: claim_gap
      condition: >
        for all needs: at least one claim with linked_need_id matching need.need_id exists
      failure_label: At least one need has no linked claim

    - id: no_contradictory_claims
      gap_type: consistency_gap
      condition: >
        no claim has information_consistency value of contradictory
      failure_label: At least one claim contains an unresolved contradiction

    - id: safety_assessed_if_flagged
      gap_type: safety_gap
      condition: >
        if case.safety_flag is true:
          situation.safety_notes is not null
          AND case.status is not unsafe_to_verify
      failure_label: Safety flag raised but safety assessment not completed

    - id: guardian_identified_if_minor
      gap_type: guardian_gap
      condition: >
        if any household_member.minor is true:
          household.guardian_status is not null
      failure_label: Minor household member with no identified guardian

    - id: situation_linked_to_need
      gap_type: situation_traceability_gap
      condition: >
        for all needs: at least one situation is linked to the need
      failure_label: At least one need has no linked situation

    - id: beneficiary_reachable_by_contact
      gap_type: contact_gap
      condition: >
        beneficiary.contact is not null
        OR registrant.contact is not null
      failure_label: No contact information exists for beneficiary or registrant

    - id: beneficiary_location_navigable
      gap_type: location_gap
      condition: >
        beneficiary.location is not null
        AND location.precision is not unknown
        AND location.precision is not area_only
      failure_label: Location is missing or insufficiently precise for volunteer dispatch

    - id: proxy_relationship_declared
      gap_type: registrant_relationship_gap
      condition: >
        if registrant.registrant_type is proxy:
          registrant.relationship_to_beneficiary is not null
      failure_label: Proxy registrant with no declared relationship to beneficiary

    - id: at_least_one_support_intervention
      gap_type: support_intervention_gap
      condition: >
        count(support_interventions) >= 1
        AND for all needs: at least one support_intervention.linked_need_id
            matches a need in the case
      failure_label: No support intervention recorded


# ─────────────────────────────────────────────────────────────────
# LAYER 2: COHERENCE CLEARANCE
# All coherence rules in case-coherence-rules.yaml must pass.
# A case with no blocking gaps can still fail readiness here.
# ─────────────────────────────────────────────────────────────────

coherence_clearance:
  description: >
    Refers to case-coherence-rules.yaml.
    All rules in that file must pass before readiness is granted.
    Coherence failures are treated as blocking at closure even if
    they were not raised as blocking gaps during conversation.
  reference: registration/reasoning/case-coherence-rules.yaml
  all_rules_must_pass: true


# ─────────────────────────────────────────────────────────────────
# LAYER 3: MINIMUM ENTITY QUALITY
# These are entity-level completeness checks that are not gap types
# but are required for a usable verification brief.
# ─────────────────────────────────────────────────────────────────

minimum_entity_quality:
  description: >
    Checks that the case contains enough information to produce a
    verification brief that a volunteer can actually use.
    These checks do not duplicate gap detection — they assert that
    the minimum required entities are populated, not just present.

  required_conditions:

    - id: at_least_one_situation
      condition: count(situations) >= 1
      failure_label: No situation recorded

    - id: at_least_one_need
      condition: count(needs) >= 1
      failure_label: No need recorded

    - id: at_least_one_claim
      condition: count(claims) >= 1
      failure_label: No claim recorded

    - id: registrant_type_declared
      condition: registrant.registrant_type is not null
      failure_label: Registrant type not declared


# ─────────────────────────────────────────────────────────────────
# STATUS TRANSITION TABLE
# Maps readiness outcomes to case status values.
# ─────────────────────────────────────────────────────────────────

status_transitions:

  - condition: >
      All Layer 1 conditions pass
      AND all Layer 2 coherence rules pass
      AND all Layer 3 quality conditions pass
      AND case.safety_flag is false
    resulting_status: ready_for_verification

  - condition: >
      All Layer 1 conditions pass
      AND all Layer 2 coherence rules pass
      AND all Layer 3 quality conditions pass
      AND case.safety_flag is true
      AND situation.safety_notes is not null
    resulting_status: ready_for_verification
    note: >
      A case with a resolved safety flag can still proceed to verification.
      The safety notes become mandatory content in the verification brief.
      The volunteer must be briefed before dispatch.

  - condition: >
      case.safety_flag is true
      AND safety assessment has not been conducted
    resulting_status: unsafe_to_verify
    note: >
      Takes priority over all other conditions.
      A case flagged as unsafe cannot be closed in any other status
      until the safety assessment is complete.

  - condition: >
      One or more Layer 1 blocking conditions fail
      AND the conversation has reached a natural end
      AND the AI has made at least two attempts to resolve each blocking gap
    resulting_status: requires_review
    note: >
      Used when a gap cannot be resolved in the registration conversation.
      Human review is required before volunteer assignment.

  - condition: >
      beneficiary appears to have been registered previously
      AND previous_case_id cannot be confirmed
    resulting_status: duplicate_suspected
    note: >
      Must be resolved before the case proceeds.
      The existing record must be located and compared.

  - condition: >
      The identified need is outside Khidmat's current operational capacity
      AND the registrant has been informed
    resulting_status: referred_externally
    note: >
      Reserved for future use. Do not implement until referral
      network domain is active.


# ─────────────────────────────────────────────────────────────────
# ON_HOLD STATUS
# ─────────────────────────────────────────────────────────────────

on_hold_conditions:
  description: >
    A case may be placed on hold when the registrant cannot continue
    the conversation, a required document is pending, or an external
    event must occur before registration can complete.
    On hold is not a failure state. It is a deferral with a reason.
    See case-outcomes.yaml for the on_hold status definition.
  triggers:
    - registrant_unavailable_to_continue: true
    - pending_document_required_before_closure: true
    - external_confirmation_awaited: true
  reactivation: >
    The case returns to in_progress when the trigger condition is resolved.
    All gap detection and coherence checks are re-evaluated at reactivation.

# ─────────────────────────────────────────────────────────────────
# LEAD SUBMISSION READINESS
# Defines the minimum criteria for a Lead to transition from draft
# to submitted.
# ─────────────────────────────────────────────────────────────────

lead_submission_readiness:
  description: >
    Evaluated when the RegistrationAgent completes intake.
    Determines if the lead contains enough extracted data to be
    submitted to the Volunteer Review desk queue.

  required_conditions:
    - id: lead_has_name
      condition: lead.name is not null
      failure_label: Stated beneficiary name is missing.

    - id: lead_is_contactable
      condition: >
        lead.phone is not null
        OR lead.proxy_phone is not null
        OR lead.contact_notes is not null
        OR lead.conversation_channel is not null
      failure_label: No contact channel (phone, proxy, callback notes, or chat ID) is available.

    - id: lead_has_need_category
      condition: lead.need_category is not null
      failure_label: Need category is unclassified.

    - id: lead_has_need_description
      condition: lead.need_description is not null
      failure_label: Need description narrative is missing.

    - id: proxy_details_present_if_proxy
      condition: >
        if lead.registrant_persona is PROXY:
          lead.proxy_name is not null
          AND lead.proxy_phone is not null
          AND lead.proxy_relation is not null
      failure_label: Proxy details are incomplete.

    - id: volunteer_id_present_if_volunteer
      condition: >
        if lead.registrant_persona is VOLUNTEER:
          lead.registered_by is not null
      failure_label: Volunteer identifier is missing.
