version: "1.0"
domain: registration
file: verification/verification-requirements.yaml

purpose: >
  Defines how verification requirements are derived from claims at case closure.
  Verification requirements are NOT stored entities. They are computed from
  claims when the Verification Brief projection is generated.
  This file defines the derivation logic — the rules by which each claim type
  produces one or more verification actions for a field volunteer.

# ─────────────────────────────────────────────────────────────────
# DERIVATION RULES
# For each claim type, defines what verification action is required
# and what evidence or observation would satisfy it.
# ─────────────────────────────────────────────────────────────────

derivation_rules:

  - claim_type: identity_claim
    default_verification_action: >
      Confirm beneficiary is present at the stated location.
      Verify name and approximate age match registration record.
    evidence_priority:
      - national_id or passport if available
      - birth_certificate for minors
      - community reference if no document
    observable: true
    priority_modifier: >
      If claim_basis is second_hand, elevate to high priority.

  - claim_type: situation_claim
    default_verification_action: >
      Confirm the stated circumstances are consistent with
      observable conditions at the visit.
    evidence_priority:
      - death_certificate for bereavement
      - termination_letter or bank_statement for job loss
      - doctors_letter or diagnosis_report for illness
      - eviction_notice for shelter crisis
      - observable household conditions for all situation types
    observable: true
    priority_modifier: >
      If information_consistency is ambiguous, add a note to probe
      the specific ambiguity at the visit.

  - claim_type: need_claim
    default_verification_action: >
      Confirm the stated need is present and at the claimed severity.
    evidence_priority:
      - physical observation (food, shelter, household conditions)
      - medical documentation for health needs
      - school records for education needs
      - income evidence for livelihood needs
    observable: true
    priority_modifier: >
      If need.need_severity is critical, mark as priority_1.
      If need.deadline is not null and within 7 days, mark as priority_1.

  - claim_type: household_claim
    default_verification_action: >
      Confirm household composition by observing members present
      at the visit. Cross-reference stated size with observed members.
    evidence_priority:
      - observation of members present
      - birth or school records for children if stated age requires verification
    observable: true
    priority_modifier: >
      If information_consistency is contradictory, add a specific note
      about the discrepancy to investigate.


# ─────────────────────────────────────────────────────────────────
# PRIORITY CLASSIFICATION
# Verification requirements inherit priority from the need they
# are linked to. This section defines the mapping.
# ─────────────────────────────────────────────────────────────────

priority_classification:

  - id: priority_1
    label: Must Verify
    description: >
      Linked to a critical need, or linked to a claim whose failure
      would materially change the case outcome.
      Volunteer must attempt to verify this requirement before
      any other action.

  - id: priority_2
    label: Should Verify
    description: >
      Linked to a high-severity need, or a claim where the basis
      was second_hand or inferred.
      Volunteer should verify this if time and access permit.

  - id: priority_3
    label: Verify If Possible
    description: >
      Non-blocking verification. Linked to medium-severity needs
      or claims where information is partial but consistent.


# ─────────────────────────────────────────────────────────────────
# UNVERIFIABLE CLAIMS
# ─────────────────────────────────────────────────────────────────

unverifiable_claim_handling:
  description: >
    Some claims cannot be verified through field observation or documentation.
    Psychosocial claims about internal experience are the primary example.
    These should be noted in the brief as observed-context only.
  instruction: >
    For claims where verifiable is false:
    - Do not generate a verification requirement
    - Include a note in the brief: "Claimed but not verifiable in field —
      record volunteer's contextual observations."