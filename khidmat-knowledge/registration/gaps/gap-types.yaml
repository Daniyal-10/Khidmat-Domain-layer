version: "1.0"
domain: registration
file: gaps/gap-types.yaml

gap_types:
  - id: safety_gap
    description: Visit or contact might endanger the beneficiary.
    severity: critical
  - id: guardian_gap
    description: Minor beneficiary without an identified adult.
    severity: critical
  - id: entity_gap
    description: A core entity (Beneficiary/Household) is missing basic attributes.
    severity: high
  - id: situation_need_traceability_gap
    description: A need is stated but the cause (Life Event) is unknown.
    severity: high
  - id: household_gap
    description: Family size or composition is unknown.
    severity: high
  - id: severity_gap
    description: The urgency or life-impact of a need is not established.
    severity: high
  - id: duration_gap
    description: Whether a need is one-time or ongoing is unknown.
    severity: medium
  - id: contact_gap
    description: No way to reach or find the beneficiary.
    severity: critical
  - id: location_gap
    description: No way to reach or find the beneficiary.
    severity: critical
  - id: consistency_gap
    description: Logical conflict detected between statements.
    severity: high
  - id: evidence_gap
    description: Verifiable claim exists but no evidence path (documents/references) identified.
    severity: medium
  - id: treatment_plan_gap
    description: Medical need identified but treatment plan or hospital is missing.
    severity: high

  - id: claim_gap
    description: >
      A need is present but no claim has been linked to it.
      Every need must be expressed through at least one claim
      before the case can be verified.
    severity: high

  - id: support_intervention_gap
    description: >
      A need is present but no support intervention has been linked to it.
      At least one intervention must address each need before case closure
      as ready_for_verification.
    severity: high
