version: "1.1.0"
domain: registration
file: registration/ontology/lifecycle-constraints.yaml
status: active

# This file contains descriptive lifecycle semantics, keyed by entity.
# Lead is the one Registration entity with a fully taxonomized state machine
# (registration/taxonomy/lead-statuses.yaml) not yet expressed as a lifecycle
# constraint — added per Phase 1.2 domain completion pass, justified by
# Blueprint §4's Field Verifier / desk-audit intake responsibility. Other
# Registration entities (Situation, Need, Claim, Evidence, Support
# Intervention) have no distinct lifecycle beyond linear intake completion,
# already fully governed by semantic-constraints.yaml's required_if rules;
# Case's lifecycle is intentionally excluded pending ADR_RECONCILIATION_CASE.md.

lifecycle_constraints:
  lead:
    creation_semantics: >
      A Lead is instantiated when a registration intake conversation begins
      (status: draft), before any Case exists.
    transition_rule: >
      draft -> submitted requires the intake conversation to be complete and
      metadata extracted. submitted -> assigned_for_review requires a
      volunteer to be assigned (see lead_produces_review in
      relationships.yaml). assigned_for_review -> under_review -> approved is
      the desk-audit path; under_review -> needs_clarification returns the
      Lead to intake for gap resolution; under_review -> rejected or
      -> escalated ends the desk-audit path without promotion.
    promotion_precondition: >
      A Lead may only transition to a promoted state (see
      lead_promotes_to_case and lead_promotes_to_beneficiary in
      relationships.yaml) from status: approved. A Lead's volunteer_review
      (lead_produces_review, cardinality {min:1,max:1}) must exist and record
      an approving decision before promotion — a Lead is never promoted
      directly from draft, submitted, or under_review.
    terminal_states: >
      rejected and escalated (pending supervisor override) are terminal for
      the Lead's own lifecycle; escalated may still resolve to approved or
      rejected following supervisor review, per lead-statuses.yaml.
