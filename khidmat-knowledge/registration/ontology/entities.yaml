version: 1.2.0
domain: registration
file: registration/ontology/entities.yaml
status: active
entities:
- id: registrant
  label: Registrant
  description: 'The person conducting the registration conversation. Not always the beneficiary. Has an epistemic relationship
    to the information they provide, which affects claim weight.

    '
  required: true
  cardinality_in_case: exactly_one
- id: beneficiary
  label: Beneficiary
  description: 'The person whose need is being registered. May or may not be the same person as the registrant.

    '
  required: true
  cardinality_in_case: exactly_one
  notes: 'Per the Phase 1.1A Canonical Semantic Foundation, Beneficiary is a case-scoped
    snapshot observing exactly one shared:person — it carries this case''s claims
    about the person (name, age, documentation status, etc.) without redefining
    Person''s durable identity. See beneficiary_observes_person in relationships.yaml.

    '
- id: household_snapshot
  label: Household Snapshot
  description: 'The intake-time view of a household''s composition and attributes for
    this case — size, head of household, income, non-resident guardian. The primary
    context for assessing vulnerability and need severity within this registration.

    '
  required: true
  cardinality_in_case: exactly_one
  notes: 'Per the Phase 1.1A Canonical Semantic Foundation, this entity does not redefine
    the canonical Household (shared:household, owned by Shared Core, per
    ontology_authority_matrix.md). It is the case-scoped snapshot of that persistent
    unit''s composition at intake time, always referencing exactly one canonical
    Household. See household_snapshot_observes_household in relationships.yaml.
    Renamed from `household` to resolve the prior duplicate-id conflict with
    shared:household.

    '
- id: household_member
  label: Household Member
  description: "An individual person within the household. Distinct from the beneficiary entity \xE2\u20AC\u201D the beneficiary\
    \ is one member. Needs and evidence may be linked to specific members.\n"
  required: true
  cardinality_in_case: one_or_more
  notes: 'The beneficiary is always a household member. Other members are recorded here with their relationship to the beneficiary.

    '
- id: situation
  label: Situation
  description: 'A set of circumstances creating or sustaining vulnerability. A household may have more than one simultaneous
    situation. Each situation is independent with its own trajectory and trigger.

    '
  required: true
  cardinality_in_case: one_or_more
- id: need
  label: Need
  description: 'A specific, concrete gap between current state and a basic standard. Linked to one or more situations that
    contextualise it. May concern a specific household member or the household as a whole.

    '
  required: true
  cardinality_in_case: one_or_more
- id: claim
  label: Claim
  description: 'An assertion made during registration requiring external confirmation. Claims are made by registrants. Every
    need generates at least one claim.

    '
  required: true
  cardinality_in_case: one_or_more
- id: evidence
  label: Evidence
  description: 'Material that may support or refute a claim. Identified during registration, confirmed during verification.

    '
  required: false
  cardinality_in_case: zero_or_more
- id: support_intervention
  label: Support Intervention
  description: 'The type of assistance being requested to address a need. Describes what is needed, not how it will be delivered.
    Delivery mechanism is determined post-verification.

    '
  required: true
  cardinality_in_case: one_or_more
  notes: 'At least one support intervention is required before case can close as ready_for_verification. If registrant has
    not specified, ask before closing.

    '
- id: case
  label: Case
  description: 'The structured record produced by a completed registration conversation. The case is the primary domain entity.
    All other entities exist within it.

    '
  required: true
  cardinality_in_case: exactly_one
  notes: "Verification Brief is NOT an entity. It is a projection of the Case. See verification/verification-brief-projection.yaml.\n\
    \nOpen-gap findings are produced by reasoning/gap-detection-rules.yaml against gaps/gap-types.yaml and are pending the\
    \ Runtime/Instance-State Schema named in \xA719."
- id: lead
  label: Lead
  description: 'The initial unverified record representing a candidate''s registration request. Intake conversations write
    to this entity before promotion to a Case.

    '
  required: true
  cardinality_in_case: exactly_one
- id: volunteer_review
  label: Volunteer Review
  description: 'The record of the desk audit conducted by a volunteer on a submitted lead.

    '
  required: false
  cardinality_in_case: zero_or_one
