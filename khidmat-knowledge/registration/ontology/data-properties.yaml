    Added per Stage 5B Debt Structure & Typology. A single overall
    humanitarian characterisation of the household's debt situation
    (manageable / burdensome / high_risk / exploitative) — not a
    monetary figure, balance, or interest calculation. See
    registration/taxonomy/situations.yaml#debt_characteristic.
