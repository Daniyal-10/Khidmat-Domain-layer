    restructuring an already-active file (redesign, out of this phase's
    scope) or duplicating its four concepts into a new registration-owned
    scheme (forbidden — never duplicate concepts). Resolving this requires
    a decision on capabilities.yaml's canonical-shape migration, tracked
    separately from Phase 1 taxonomy completion.
