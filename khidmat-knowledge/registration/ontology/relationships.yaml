version: 1.3.0
domain: registration
file: registration/ontology/relationships.yaml
status: active

namespaces:
  shared: shared

relationships:
- id: beneficiary_observes_person
  from: beneficiary
  relationship: observes
  to: shared:person
  cardinality:
    min: 1
    max: 1
  notes: 'Per the Phase 1.1A Canonical Semantic Foundation. Every Beneficiary snapshot
    observes exactly one persistent Person; a Person may be observed by many
    Beneficiary snapshots over time (returning registrations). This is the
    relationship that makes longitudinal beneficiary reasoning representable.

    '
- id: household_snapshot_observes_household
  from: household_snapshot
  relationship: observes
  to: shared:household
  cardinality:
    min: 1
    max: 1
  notes: 'Per the Phase 1.1A Canonical Semantic Foundation. Every household_snapshot
    observes exactly one canonical Household; a Household may be observed by many
    household_snapshots over time (re-registration, household reconfiguration).

    '
- id: registrant_conducts_case
  from: registrant
  relationship: conducts
  to: case
  cardinality:
    min: 1
    max: 1
- id: case_has_registrant
  from: case
  relationship: has
  to: registrant
  cardinality:
    min: 1
    max: 1
- id: case_has_beneficiary
  from: case
  relationship: has
  to: beneficiary
  cardinality:
    min: 1
    max: 1
- id: case_has_household
  from: case
  relationship: has
  to: household_snapshot
  cardinality:
    min: 1
    max: 1
- id: case_has_situations
  from: case
  relationship: has
  to: situation
  cardinality:
    min: 1
    max: unbounded
- id: case_has_needs
  from: case
  relationship: has
  to: need
  cardinality:
    min: 1
    max: unbounded
- id: case_has_claims
  from: case
  relationship: has
  to: claim
  cardinality:
    min: 1
    max: unbounded
- id: case_has_evidence
  from: case
  relationship: has
  to: evidence
  cardinality:
    min: 0
    max: unbounded
- id: case_has_support_interventions
  from: case
  relationship: has
  to: support_intervention
  cardinality:
    min: 1
    max: unbounded
  notes: 'Closure rule: At least one support_intervention must exist before case status can be set to ready_for_verification.

    '
- id: beneficiary_is_member_of_household
  from: beneficiary
  relationship: is_member_of
  to: household_snapshot
  cardinality:
    min: 1
    max: unbounded
  notes: 'Cardinality relaxed from max:1 to max:unbounded per Phase 1.6A Operational
    Blocker Resolution, per Business Validation''s Migration scenario: a beneficiary
    may retain membership in both an origin and a destination household_snapshot
    during a migration transition. Beneficiary, household_snapshot, and every
    other relationship on this row are unchanged.

    '
- id: household_has_members
  from: household_snapshot
  relationship: has_members
  to: household_member
  cardinality:
    min: 1
    max: unbounded
  notes: The beneficiary is always one of the household members.
- id: situation_contextualises_need
  from: situation
  relationship: contextualises
  to: need
  cardinality:
    min: 0
    max: unbounded
  notes: "A need must be linked to at least one situation. A situation may contextualise multiple needs. The word contextualises\
    \ replaces generates because the situation does not always cause the need \xE2\u20AC\u201D it provides the context that\
    \ explains and supports it.\n"
- id: need_concerns_member
  from: need
  relationship: concerns
  to: household_member
  cardinality:
    min: 0
    max: 1
  notes: 'Null means the need affects the whole household. Required for medical, education, and therapeutic nutrition needs.
    The AI should ask which member is affected for these categories.

    '
- id: need_expressed_through_claim
  from: need
  relationship: expressed_through
  to: claim
  cardinality:
    min: 1
    max: unbounded
- id: need_addressed_by_intervention
  from: need
  relationship: addressed_by
  to: support_intervention
  cardinality:
    min: 1
    max: unbounded
  notes: 'Closure rule: Required before case closure as ready_for_verification.

    '
- id: claim_supported_by_evidence
  from: claim
  relationship: supported_by
  to: evidence
  cardinality:
    min: 0
    max: unbounded
- id: lead_produces_review
  from: lead
  relationship: produces
  to: volunteer_review
  cardinality:
    min: 1
    max: 1
- id: lead_promotes_to_case
  from: lead
  relationship: promotes_to
  to: case
  cardinality:
    min: 1
    max: 1
- id: lead_promotes_to_beneficiary
  from: lead
  relationship: promotes_to
  to: beneficiary
  cardinality:
    min: 1
    max: 1
- id: member_is_guardian_of_member
  from: household_member
  relationship: guardian_of
  to: household_member
  cardinality:
    min: 0
    max: unbounded
- id: need_influences_need
  from: need
  relationship: influences
  to: need
  cardinality:
    min: 0
    max: unbounded
  inverse: influenced_by_need
  notes: 'Added per Stage 2A Canonical Needs Assessment Enrichment. Records a diagnosed
    semantic relationship between two needs already established within the same
    case — e.g. income instability influences (contributes_to) food insecurity,
    documentation gap influences (blocks) an income_support need, disability
    influences (compounds) a caregiver_burden need. The specific relationship is
    carried by the need_relationship_type property (data-properties.yaml), qualified
    from the single scheme registration/taxonomy/needs.yaml#need_relationship_type,
    not by separate relationship ids per type — see that scheme''s design note.


    A need must not be recorded as influencing itself (from and to must reference
    distinct need instances); this is a case-authoring rule enforced by reasoning,
    not a new semantic-constraints type, consistent with how other single-instance
    invariants in this domain (e.g. household_snapshot cardinality) are enforced
    without adding a bespoke constraint type for a one-off case.


    Distinct from situation_contextualises_need (a situation explaining a need)
    and need_addressed_by_intervention (a need resolved by a response) — this
    relationship is the only one of the three that connects two instances of the
    same entity, and is the direct closure of the gap identified in the
    Humanitarian Needs Assessment Knowledge Audit (Stage 2): "it cannot represent
    how one confirmed need relates to another confirmed need."

    '
