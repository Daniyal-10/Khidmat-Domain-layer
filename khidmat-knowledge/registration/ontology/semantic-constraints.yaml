version: 1.1.0
domain: registration
file: registration/ontology/semantic-constraints.yaml
status: active
constraints:
- id: beneficiary_age_validation
  type: cardinality
  property: age
  entities:
  - beneficiary
  parameters:
    expression: age >= 0
- id: household_size_validation
  type: cardinality
  property: size
  entities:
  - household
  parameters:
    expression: size >= 1
- id: need_concerns_member_required_if
  type: required_if
  property: concerns_member
  entities:
  - need
  parameters:
    condition: 'need_category in [medical, education, therapeutic_nutrition]

      '
- id: claim_verifiable_note_required_if
  type: required_if
  property: verifiable_note
  entities:
  - claim
  parameters:
    condition: verifiable is false
- id: registrant_relationship_to_beneficiary_required_if
  type: required_if
  property: relationship_to_beneficiary
  entities:
  - registrant
  parameters:
    condition: registrant_type is proxy
- id: registrant_proxy_consent_required_if
  type: required_if
  property: proxy_consent
  entities:
  - registrant
  parameters:
    condition: registrant_type is proxy
- id: situation_trigger_event_required_if
  type: required_if
  property: trigger_event
  entities:
  - situation
  parameters:
    condition: trajectory in [crisis_triggered, acute]
- id: situation_safety_notes_required_if
  type: required_if
  property: safety_notes
  entities:
  - situation
  parameters:
    condition: safety_flag is true
- id: case_previous_case_id_required_if
  type: required_if
  property: previous_case_id
  entities:
  - case
  parameters:
    condition: referral_type is repeat_registration
- id: case_re_registration_reason_required_if
  type: required_if
  property: re_registration_reason
  entities:
  - case
  parameters:
    condition: previous_registration is true
- id: lead_urgency_score_validation
  type: cardinality
  property: urgency_score
  entities:
  - lead
  parameters:
    expression: urgency_score >= 0.0 AND urgency_score <= 1.0
- id: evidence_file_url_required_if
  type: required_if
  property: file_url
  entities:
  - evidence
  parameters:
    condition: availability is provided_digitally
