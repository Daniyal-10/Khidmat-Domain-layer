version: "1.1.0"
domain: registration
file: registration/reasoning/evidence-rules.yaml
status: active

claim_evidence_matrix:

  - claim_type: identity_claim
    allowed_evidence_types:
      - documentary
      - testimonial
    allowed_subtypes:
      documentary:
        - national_id
        - passport
        - birth_certificate
        - voter_registration_card
        - ration_card
        - refugee_documentation
      testimonial:
        - community_leader_confirmation
        - neighbour_confirmation

  - claim_type: situation_claim
    allowed_evidence_types:
      - documentary
      - physical
      - testimonial
    allowed_subtypes:
      documentary:
        - death_certificate
        - termination_letter
        - doctors_letter
        - diagnosis_report
        - eviction_notice
        - tenancy_agreement
        - court_order
        - police_report
      physical:
        - living_conditions_observation
      testimonial:
        - landlord_confirmation
        - neighbour_confirmation
        - employer_confirmation

  - claim_type: need_claim
    allowed_evidence_types:
      - documentary
      - physical
      - testimonial
    allowed_subtypes:
      documentary:
        - doctors_letter
        - diagnosis_report
        - prescription
        - discharge_summary
        - referral_letter
        - medical_test_result
        - salary_slip
        - bank_statement
        - termination_letter
        - tax_document
        - school_fee_statement
        - enrollment_certificate
        - government_benefit_letter
      physical:
        - living_conditions_observation
        - physical_impairment_observation
        - nutritional_status_observation
        - utility_disruption_observation
        - asset_status_observation
      testimonial:
        - professional_confirmation
        - neighbour_confirmation

  - claim_type: household_claim
    allowed_evidence_types:
      - documentary
      - physical
      - testimonial
    allowed_subtypes:
      documentary:
        - birth_certificate
        - national_id
        - voter_registration_card
      physical:
        - living_conditions_observation
      testimonial:
        - neighbour_confirmation
