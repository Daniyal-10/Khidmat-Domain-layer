version: "1.0"
domain: registration
file: reasoning/severity-rules.yaml

purpose: >
  Explicit rules for classifying need severity.
  Without these rules, severity classification is inconsistent
  across registrations. These rules give the AI a deterministic
  basis for assessment that volunteers can trust.

severity_classification_rules:

  food:
    critical:
      conditions:
        - "time_since_last_meal: '>= 24 hours'"
        - "OR children_in_household: true AND showing_signs_of_malnutrition: true"
        - "OR household_has_no_food: true"
      label: Life-threatening — immediate response required
    high:
      conditions:
        - "household_eating_less_than_two_meals_per_day: true"
        - "OR children_in_household: true AND food_quantity_insufficient: true"
      label: Significant hardship — priority response
    medium:
      conditions:
        - "household_managing_but_struggling: true"
        - "AND no_children_at_acute_risk: true"
      label: Important — response within days
    low:
      conditions:
        - "household_has_food_but_quality_is_inadequate: true"
      label: Quality concern — schedule response

  medical:
    critical:
      conditions:
        - "treatment_delay_threatens_life: true"
        - "OR treatment_delay_causes_permanent_harm: true"
        - "OR urgent_surgery_required: true"
      label: Life-threatening — escalate immediately
    high:
      conditions:
        - "treatment_has_deadline: true"
        - "AND deadline_within_days: 30"
      label: Time-sensitive — prioritise this week
    medium:
      conditions:
        - "condition_confirmed AND treatment_plan_exists: true"
        - "AND no_imminent_deadline: true"
      label: Important — schedule within month
    low:
      conditions:
        - "condition_manageable AND seeking_preventive_care: true"
      label: Preventive or monitoring — routine response

  shelter:
    critical:
      conditions:
        - "no_shelter_at_all: true"
        - "OR shelter_is_physically_dangerous: true"
        - "OR eviction_within_days: 7"
      label: Immediate — no safe place to sleep
    high:
      conditions:
        - "eviction_within_days: 30"
        - "OR shelter_is_severely_inadequate: true"
      label: Urgent — at risk within the month
    medium:
      conditions:
        - "at_risk_of_eviction_without_support: true"
        - "AND immediate_eviction_not_confirmed: true"
      label: Important — intervention required
    low:
      conditions:
        - "shelter_is_inadequate_but_stable: true"
      label: Improvement needed — not emergency

  education:
    critical:
      conditions:
        - "child_has_been_out_of_school_and_at_risk_of_permanent_withdrawal: true"
      label: Risk of permanent exclusion
    high:
      conditions:
        - "child_will_be_excluded_if_fees_not_paid: true"
        - "AND exam_period_approaching: true"
      label: Imminent exclusion risk
    medium:
      conditions:
        - "child_is_out_of_school: true"
        - "AND no_immediate_exam_deadline: true"
      label: Out of school — re-enroll
    low:
      conditions:
        - "child_is_enrolled_but_missing_supplies: true"
      label: Enrolled but under-resourced

  livelihood:
    critical:
      conditions:
        - "no_income_source AND no_savings AND no_family_support: true"
      label: Complete economic collapse
    high:
      conditions:
        - "income_lost_recently AND insufficient_reserves: true"
      label: Acute income loss — priority
    medium:
      conditions:
        - "income_significantly_reduced: true"
        - "AND household_managing_minimally: true"
      label: Reduced capacity — support needed
    low:
      conditions:
        - "income_source_unstable_but_currently_functioning: true"
      label: Vulnerability risk — stabilisation support

  psychosocial:
    critical:
      conditions:
        - "registrant_indicates_risk_to_self_or_others: true"
      label: Safety risk — escalate immediately
      escalation_note: >
        Do not close registration. Flag for immediate human review.
    high:
      conditions:
        - "acute_trauma_event_recent: true"
        - "AND no_existing_support: true"
      label: Acute trauma — early intervention
    medium:
      conditions:
        - "chronic_stress_or_isolation: true"
      label: Chronic need — scheduled support
    low:
      conditions:
        - "coping_but_would_benefit_from_support: true"
      label: Preventive support