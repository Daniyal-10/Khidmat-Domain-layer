version: "1.0"
domain: registration
file: questioning/question-templates.yaml

purpose: >
  Reusable question templates for common registration scenarios.
  Templates are starting points — the AI must adapt them to
  conversational context, not use them verbatim.
  Templates are organised by the gap type they are designed to resolve.

# ─────────────────────────────────────────────────────────────────
# FORMAT NOTE
# Each template contains:
#   gap_type: the gap this question resolves
#   context: when to use this template
#   template: the base question
#   variants: alternatives for different registrant types or situations
# ─────────────────────────────────────────────────────────────────

templates:

  - id: qt_household_size
    gap_type: household_gap
    context: Household size or composition is unknown
    template: "Who else lives with you at home?"
    variants:
      proxy: "Can you tell me who lives in [beneficiary name]'s household?"
      volunteer: "How many people are in the household, and can you describe who they are?"

  - id: qt_household_children
    gap_type: household_gap
    context: Children in household not yet confirmed
    template: "Are there any children living in the household? How old are they?"

  - id: qt_situation_onset
    gap_type: entity_gap
    context: Situation onset is unknown
    template: "When did this situation start — was it recent, or has it been going on for some time?"

  - id: qt_need_severity_food
    gap_type: severity_gap
    context: Food need present, severity unclassified
    template: "How long has the household been without enough food?"
    variants:
      follow_up: "Is anyone in the household, particularly children, showing any signs of illness from not eating enough?"

  - id: qt_need_severity_medical
    gap_type: severity_gap
    context: Medical need present, severity unclassified
    template: "Has a doctor given any indication of how urgently this needs to be treated?"
    variants:
      no_diagnosis: "Has anyone seen a doctor about this yet?"

  - id: qt_contact_primary
    gap_type: contact_gap
    context: No contact information recorded
    template: "What is the best way for us to reach you?"
    variants:
      no_phone: "If you don't have a phone, is there someone nearby we could contact to reach you?"

  - id: qt_location_precision
    gap_type: location_gap
    context: Location is area_only or unknown
    template: "Can you describe your address in more detail — the street name, or a nearby landmark that would help someone find you?"

  - id: qt_safety_assessment
    gap_type: safety_gap
    context: safety_flag is true
    template: "Is it safe for someone from our team to come and visit you at the address you gave?"
    variants:
      follow_up: "Is there a particular person they should ask for, or a time that would be safer than others?"
    note: >
      Use this template only after the triggering situation has been
      acknowledged. Do not ask this as a first question.

  - id: qt_guardian_identification
    gap_type: guardian_gap
    context: Minor household member, guardian not identified
    template: "Who is the adult responsible for [child's name]?"
    variants:
      no_guardian_apparent: "Is there an adult in the household or nearby family who looks after [child's name]?"

  - id: qt_treatment_plan
    gap_type: treatment_plan_gap
    context: Medical need, no treatment plan recorded
    template: "Is [member name] currently being seen by a doctor or hospital? Do you know what the treatment plan is?"

  - id: qt_support_intervention
    gap_type: support_intervention_gap
    context: Need present but no intervention requested
    template: "What kind of help would be most useful to address this?"
    variants:
      medical: "Is the main need help with the medical costs, or getting access to a doctor?"
      food: "Are you looking for food directly, or help with buying food?"

  - id: qt_proxy_relationship
    gap_type: registrant_relationship_gap
    context: Proxy registrant, relationship to beneficiary unknown
    template: "Can I ask — what is your relationship to [beneficiary name]?"

  - id: qt_proxy_consent
    gap_type: proxy_consent_gap
    context: Proxy registrant, consent not confirmed
    template: "Does [beneficiary name] know that you are registering on their behalf today?"
    variants:
      incapacitated: "If [beneficiary name] is not able to consent themselves, is there a family member or guardian who has agreed to this?"

  - id: qt_need_subtype
    gap_type: need_subtype_gap
    context: Need subtype is missing
    template: "Could you please specify the exact type or detail of this need (such as the specific disease or type of fees)?"

  - id: qt_referral_source
    gap_type: referral_source_gap
    context: Referral source details are missing for referred case
    template: "Could you tell me who or which organisation referred you to us?"