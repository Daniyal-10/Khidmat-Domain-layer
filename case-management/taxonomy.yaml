case_management:
  case_status:
    entity: Case
    description: The operational lifecycle state of a Case.
    values:
      - opened
      - planning
      - active
      - suspended
      - closed

  case_plan_status:
    entity: CasePlan
    description: Distinguishes the currently authoritative Case Plan from preserved historical Case Plans.
    values:
      - current
      - historical

  referral_status:
    entity: Referral
    description: The operational lifecycle state of a Referral.
    values:
      - draft
      - sent
      - acknowledged
      - accepted
      - rejected
      - completed

  referral_type:
    entity: Referral
    description: Classifies whether a Referral is internal or external. External referrals require an associated Consent reference.
    values:
      - internal
      - external

  case_assignment_status:
    entity: CaseAssignment
    description: Distinguishes currently active assignments from preserved historical assignments.
    values:
      - current
      - historical

  priority_level:
    entity: Case
    description: The operational priority assigned to a Case for workload management and response sequencing. Independent of vulnerability, risk, and need severity.
    values:
      - critical
      - high
      - medium
      - low

  case_origin:
    entity: Case
    description: The business event or source through which a Case was initiated.
    values:
      - registration
      - referral
      - risk_identification
      - emergency
      - volunteer_identification
      - community_outreach
      - self_request
      - program_escalation

  case_outcome:
    entity: CaseOutcome
    description: The substantive operational result describing how the Case's objectives concluded.
    values:
      - resolved
      - partially_resolved
      - referred_elsewhere
      - transferred
      - withdrawn
      - unable_to_contact

  administrative_closure_reason:
    entity: CaseOutcome
    description: An administrative qualifier explaining why a Case was closed outside of normal operational resolution. This qualifier complements, but never replaces, the substantive case_outcome.
    values:
      - duplicate
      - merged
      - cancelled